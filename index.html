  { subject: "102. 不動産証券化の概要", no: "25-3", question: "使用価値とは「資産又は資産グループの継続的使用と使用後の処分によって生ずると見込まれる将来キャッシュ・フローの現在価値」のことをいい、正味売却価額とは「資産又は資産グループの時価から処分費用見込額を控除して算定される金額」のことをいう。", answer: "正しい", explanation: "103/下テキストP.92、Web講義103第Ⅲ部③資料P.7参照" },
  { subject: "102. 不動産証券化の概要", no: "25-4", question: "減損対象となる資産の帳簿価額が15,000、使用価値が9,000、正味売却価額が8,500のとき、計上される減損損失の額は6,500である。", answer: "誤り", explanation: "回収可能価額は使用価値と正味売却価額のいずれか高い金額であるため、問題文の場合は使用価値の9,000となり、資産の帳簿価額15,000との差額である6,000が減損損失として認識される。" },
  { subject: "102. 不動産証券化の概要", no: "26-イ", question: "「資産除去債務に関する会計基準」の適用対象となる固定資産は、企業が営業活動に使用している有形固定資産だけでなく、建設仮勘定や投資不動産なども適用対象となる。", answer: "正しい", explanation: "建設仮勘定や投資不動産についても資産除去債務が存在している場合には、資産除去債務会計基準の適用対象となる。" },
  { subject: "102. 不動産証券化の概要", no: "26-ロ", question: "資産除去債務として認識しなければならない債務がある場合には、これに対応する除去費用は原則として債務の計上時に一時の費用として計上する。", answer: "誤り", explanation: "一時の費用として計上するのではなく、減価償却を通じて有形固定資産の残存耐用年数にわたり各期に配分する。" },
  { subject: "102. 不動産証券化の概要", no: "26-ハ", question: "資産除去債務の発生時に、当該債務の金額を合理的に見積ることができない場合には、これを計上せず、当該債務額を合理的に見積ることができるようになった時点で負債として計上し、その理由等の注記はしない。", answer: "誤り", explanation: "負債計上していない場合には、①資産除去債務の概要、②合理的に見積もることができない旨、③その理由を注記事項として開示する必要がある。" },
  { subject: "102. 不動産証券化の概要", no: "26-ニ", question: "資産除去債務の認識対象には、有形固定資産を除去する際にその有形固定資産に使用されている有害物質等を法律等の要求による特別の方法で除去する義務も含まれるため、将来こうした義務に基づく除去費用が発生すると見込まれる場合には、その金額を合理的に見積り資産除去債務として計上しなければならない。", answer: "正しい", explanation: "記述の通り。（103/下テキスト P.94 参照）" },
  { subject: "102. 不動産証券化の概要", no: "27-1", question: "「棚卸資産の評価に関する会計基準」によれば、同会計基準の適用対象となる棚卸資産の範囲は商品、製品、半製品、原材料、仕掛品等であるが、証券化ヴィークルが保有しうる販売用不動産は対象外となっている。", answer: "誤り", explanation: "販売用不動産は商品であり、販売用不動産を同基準の適用対象から除外するといった例外規定はないため、同基準の適用対象となると考えられる。" },
  { subject: "102. 不動産証券化の概要", no: "27-2", question: "「賃貸等不動産の時価等の開示に関する会計基準」の適用対象となる賃貸等不動産に関しては、重要性が乏しい場合を除き、賃貸等不動産の概要や当期末における時価等を財務諸表に注記しなければならない。", answer: "正しい", explanation: "記述の通り。（103/下テキスト P.99～100 参照）" },
  { subject: "102. 不動産証券化の概要", no: "27-3", question: "取得価額を土地と建物に配分する場合において、通常土地は減価償却が行われないため、土地への配分額が多くなると各期の減価償却費が小さくなる。従って、取得価額を土地と建物に配分する場合には、鑑定評価書に記載されている各資産の積算価格の比率により配分しなければならず、それ以外の方法は利益操作防止の観点から禁止されている。", answer: "誤り", explanation: "問題文に記載の方法の他にも配分方法は考えられ、それが状況に応じて合理的と認められる方法であればその方法によって取得価額を配分することは可能であり、問題文の方法以外を禁止した基準等はない。" },
  { subject: "102. 不動産証券化の概要", no: "27-4", question: "固定資産の減価償却費の算定にあたり、法人税法等で定められている耐用年数は課税の公平性から一律に定められているものである一方で、会計上はそれぞれの企業の使用状況等を勘案した上で減価償却費の算定をする必要があることから、会計上の減価償却費の算定においては法人税法等による耐用年数を使用することができない。", answer: "誤り", explanation: "よほど不合理と認められる事情がない場合には（法人税法の耐用年数を使用しても）会計監査上も妥当なものとして取り扱われている。" },
  { subject: "102. 不動産証券化の概要", no: "29-1", question: "任意組合又は匿名組合への出資のうち、集団投資スキームとして金商法上のみなし有価証券となるものは、法人税法においても有価証券として取扱う。", answer: "誤り", explanation: "金商法において有価証券とみなされる任意組合及び匿名組合出資は法人税法上の有価証券には該当しない。" },
  { subject: "102. 不動産証券化の概要", no: "29-2", question: "匿名組合契約に基づく利益の分配の額については、非居住者及び外国法人に対するものについてののみ源泉所得税の徴収が必要となる。", answer: "誤り", explanation: "匿名組合契約等に基づく匿名組合分配に係る源泉税については源泉徴収を義務付けられている。なお、任意組合契約に基づく利益の分配については、原則として源泉徴収は不要であるが、非居住者及び外国法人が恒久的施設を通じて行う組合契約事業から生ずる利益の分配に対しては源泉徴収が必要となる。" },
  { subject: "102. 不動産証券化の概要", no: "29-3", question: "法人が任意組合員であり、個々の損益の帰属時期についての一定要件を満たす場合には、任意組合事業から生じる帰属損益額を、組合事業の計算期間の終了の日の属する当該法人の事業年度の益金の額又は損金の額に算入することができる。", answer: "正しい", explanation: "法人が組合員となっている組合の利益金額又は損失金額のうち分配割合に応じて利益の分配を受けるべき金額又は損失の負担をすべき金額は、原則、当該法人の当該事業年度の益金の額又は損金の額に算入する。ただし、一定の時期において計算し、かつ、事業年度終了の日の属する当該法人の事業年度の益金の額又は損金の額に算入することもできる。" },
  { subject: "102. 不動産証券化の概要", no: "29-4", question: "法人が匿名組合員である場合、その匿名組合事業について生じた利益の額又は損失の額については、現実に利益の分配を受け、又は損失の負担をしていない場合であっても、匿名組合契約によりその分配を受け又は負担をすべき部分の金額を、その計算期間の末日の属する事業年度の益金の額又は損金の額に算入する。", answer: "誤り", explanation: "法人が匿名組合員である場合におけるその匿名組合営業について生じた利益の額又は損失の額については、現実に利益の分配を受け、又は損失の負担をしていない場合であっても、匿名組合契約によりその分配を受け又は負担をすべき部分の金額を、その計算期間の末日の属する事業年度の益金の額又は損金の額に算入する。（法基通14-1-3）" },
  { subject: "102. 不動産証券化の概要", no: "30-1", question: "特定受益証券発行信託、合同運用信託、証券投資信託等の集団投資信託から生ずる信託収益および費用は、信託計算期間の末日において、受益者の所得になる。", answer: "誤り", explanation: "「集団投資信託」という用語は、一般的に用いられる「集団投資スキーム」という用語とはその対象範囲が異なっており、集団投資スキームに含まれる特定目的信託等、税法上法人課税信託に分類されているヴィークルは含まれないことに留意が必要である。" },
  { subject: "102. 不動産証券化の概要", no: "30-2", question: "受益者等課税信託においては、その信託財産に帰せられる収益及び費用は、その収益を受益者が現実に受領したときに、受益者に対し課税される。", answer: "誤り", explanation: "受益者等課税信託は、その信託財産に帰せられる収益及び費用の額は...現実の受領等にかかわらず...計算に算入する。" },
  { subject: "102. 不動産証券化の概要", no: "30-3", question: "受益者等課税信託においては、信託財産に係る消費税の計算の際、信託財産の譲渡及び信託財産からもたらされる課税取引に係る消費税は、信託財産の実質的所有者である受益者が納税義務を負う。", answer: "正しい", explanation: "受益者等課税信託においては、信託財産の譲渡及び信託財産からもたらされる収支は、受益者の取引とみなされることから、消費税の計算においても受益者の計算に含められる。" },
  { subject: "102. 不動産証券化の概要", no: "30-4", question: "法人税課税信託においては、信託損失のうち信託金額を超える部分の金額については受益者の課税所得の金額の計算上、損金算入が制限される。", answer: "誤り", explanation: "損失の取り込み制限が置かれているのは、法人課税信託ではなく、信託から生じた損益を受益者が取り込む受益者等課税信託である。" },
  { subject: "102. 不動産証券化の概要", no: "31-1", question: "特定目的会社の導管性要件について。特定社債の発行により対象事業体の要件を満たす場合、その特定社債の発行時に機関投資家のみによって引き受けられたことが求められるが、保有について特段の制限はない。", answer: "誤り", explanation: "対象法人の要件として、その発行した特定社債が機関投資家又は特定債権流動化特定目的会社のみによって「保有されている」ことが見込まれていることが必要であり、早期に社債を償還するスキームには制限が置かれている。" },
  { subject: "102. 不動産証券化の概要", no: "31-2", question: "特定目的会社の導管性要件について。資産流動化計画に定めた業務の範囲内であれば、特定資産の管理及び処分を自ら行うことが出来る。", answer: "誤り", explanation: "対象事業の要件として、特定資産を信託財産として信託していること「又は」特定資産の管理及び処分に係る業務を他の者に「委託している」ことが定められている。" },
  { subject: "102. 不動産証券化の概要", no: "31-3", question: "特定目的会社の導管性要件について。適切に届出を行った資産流動化計画に記載されている特定の種類の資産の範囲内であれば、届出を行うことなく新たな特定資産の追加取得が可能である。", answer: "誤り", explanation: "対象事業年度の要件として、流動化計画に記載のある特定資産以外の資産（ただし、業務の運用に必要となる一定の資産等は除く）を保有していないことが定められており、新たな特定資産を追加取得する際には流動化計画の変更とこれに関する届出等の手続きが必要となる。" },
  { subject: "102. 不動産証券化の概要", no: "31-4", question: "特定目的会社の導管性要件について。優先出資及び基準特定出資の募集は、募集ごとかつ種類ごとに50%超が国内で行われる旨が流動化計画に記載されていればよい。", answer: "正しい", explanation: "対象法人の要件として、その発行した優先出資及び基準特定出資の募集等が募集ごとかつ種類ごとに50％超国内で行われる旨流動化計画に記載があることが要件となっている。" },
  { subject: "102. 不動産証券化の概要", no: "32-1", question: "投資法人の導管性要件について。投資法人の非同族会社要件の判定においては、重要事項に係る議決権を3グループで50%超保有しているかにより判定する。", answer: "誤り", explanation: "投資主が「1グループで」総投資口数の50％超の投資口を有している同族会社又は投資主が「1グループで」重要事項に係る議決権のいずれか50％超を有している同族会社に該当しなければ、導管性要件を満たすこととされている。" },
  { subject: "102. 不動産証券化の概要", no: "32-2", question: "投資法人の導管性要件について。その事業年度終了時において発行済投資口が50人に満たない機関投資家のみに保有されている場合には、事業年度終了時の投資口の保有要件を満たす。", answer: "正しい", explanation: "事業年度終了時の投資口の保有要件については、発行済投資口が50人以上の者によって所有されていること、あるいは発行済投資口が機関投資家のみにより所有されていることのいずれかを満たせばよい。" },
  { subject: "102. 不動産証券化の概要", no: "32-3", question: "投資法人の導管性要件について。その事業年度末における特定資産の帳簿価額が総資産価額の70%相当額を超えていることが必要である。", answer: "誤り", explanation: "事業年度末において有する有価証券、不動産等一定の特定資産の帳簿価額が総資産価額の「2分の1（50％）」超を有していることとされている。" },
  { subject: "102. 不動産証券化の概要", no: "32-4", question: "投資法人の導管性要件について。投資法人の他法人支配禁止要件について、制限の対象となる他法人出資等は会社法上の法人のものに限定されており、匿名組合や任意組合の出資、あるいはこれらを通じて保有する株式について特段の制限はない。", answer: "誤り", explanation: "租税特別措置法において導管性要件の一つとして「他の法人の発行済株式または出資の50％以上を有していないこと」が定められている。出資等の範囲には匿名組合出資が含まれることと明確化され、匿名組合を通じて間接的に有する株式等についても合算して判定する。" },
  { subject: "102. 不動産証券化の概要", no: "33-1", question: "投資法人の支払配当損金算入の要件においては、その事業年度の配当等の金額が、法人税申告書に記載する配当損金算入前の課税所得金額の90%を超えていることが求められる。", answer: "誤り", explanation: "配当可能利益の額の「100分の90に相当する金額」を超えている場合に、その支払配当の額が損金に算入される。ここにいう配当可能利益の額は、会計上の税引前当期純利益を起点として調整を加えた金額であり、法人税法上の課税所得とは異なる概念である。" },
  { subject: "102. 不動産証券化の概要", no: "33-2", question: "寄附金など永久差異の発生により税務上の所得が会計上の利益を大きく上回る場合、一時差異等調整積立金の設定により90%超判定式を充足することが可能である。", answer: "誤り", explanation: "税務上の所得が会計上の利益を上回る一時差異が生じた場合には、一時差異等調整引当額による導管性要件を図ることとなるが、寄附金等の永久差異が生じていても一時差異等調整引当金の設定対象とならない。" },
  { subject: "102. 不動産証券化の概要", no: "33-3", question: "デリバティブ取引等によって生じた繰延ヘッジ利益が純資産直入法により計上され、評価・換算差額等が過大となることによって投信法上の利益が大きくなる場合には、一時差異等調整積立金の計上により利益を留保することができる。", answer: "誤り", explanation: "繰延ヘッジ利益が生じている場合について特段の対応措置はない。" },
  { subject: "102. 不動産証券化の概要", no: "33-4", question: "投資法人が支払う金銭の分配の額のうち、投資法人の計算に関する規則に則り「一時差異等調整引当額」として区分した金額については、支払配当額の全額が損金の額に算入される。", answer: "正しい", explanation: "会計上、一時差異等調整引当額として区分される部分については、通常の利益の分配と同様、「配当等の額」として取り扱われ、その全額が損金の額に算入される。" },
  { subject: "102. 不動産証券化の概要", no: "34-1", question: "資本金1,000万円未満の合同会社が設立された場合において、設立事業年度開始の日において、その法人のその事業年度の基準期間に相当する期間の課税売上高が8億円である法人により60%の出資が行われている場合には、課税事業者となる。", answer: "正しい", explanation: "資本金1,000万円未満の法人であっても、その事業年度開始の日において他の者に50％超支配されており、その判定の基礎となった他の者の課税売上高が5億円を超える法人の場合は、納税義務の免除の特例が適用されない。" },
  { subject: "102. 不動産証券化の概要", no: "34-2", question: "事業者が、設立事業年度において高額特定資産の仕入れ等を行い、原則課税により仕入れ税額控除を行った場合、その翌々事業年度までは基準期間の課税売上高にかかわらず、課税事業者となる。", answer: "正しい", explanation: "高額特定資産の仕入れ等を行った場合には、当該高額特定資産の仕入れ等の日の属する課税期間の翌課税期間から、当該高額特定資産の仕入れ等の日の属する課税期間の初日以後３年を経過する日の属する課税期間（設問の場合では、翌々事業年度）までの各課税期間においては、事業者免税点制度は適用されない。" },
  { subject: "102. 不動産証券化の概要", no: "34-3", question: "簡易課税制度により仕入れ税額控除の計算を行う場合のみなし仕入れ率は、不動産に関する取引であれば、棚卸資産の売却取引に対しても、賃料の収入取引に対しても一律に40%となる。", answer: "誤り", explanation: "簡易課税制度におけるみなし仕入れ率は、取引の内容に応じた事業の区分により適用される。ヴィークルにおける賃料収入等は第六種事業に該当し40％、固定資産の売却については第四種事業に該当し60％、棚卸資産の売却については売却先により第一種事業又は第二種事業に該当し90％又は80％のみなし仕入率が適用される。" },
  { subject: "102. 不動産証券化の概要", no: "34-4", question: "事業者が国内において行う居住用賃貸建物に係る課税仕入れ等の税額については、原則として仕入れ税額控除を受けることが出来ない。", answer: "正しい", explanation: "事業者が国内において行う居住用賃貸建物に係る課税仕入れ等の税額（建物に係る資本的支出を含む）については、原則として仕入れ税額控除の対象とされない。" },
  { subject: "102. 不動産証券化の概要", no: "35-1", question: "法定4ヴィークルが取得する流通税の軽減措置は恒久的措置であるが、不特法において特例事業者が取得する一定の不動産に係る流通税の軽減措置は時限措置である。", answer: "誤り", explanation: "法定4ヴィークルが取得する軽減措置、不特法において特例事業者が取得する軽減措置のいずれも時限措置であり、延長の是非は2年ごとに検討されている。" },
  { subject: "102. 不動産証券化の概要", no: "35-2", question: "不動産を信託したことに伴う委託者から受託者への所有権の移転登記は、原則として形式的なものであるとして登録免許税は非課税となるが、信託財産となったことによる所有権の信託の登記には、登録免許税が課される。", answer: "正しい", explanation: "記述の通り。（103/下テキスト P.328 参照）" },
  { subject: "102. 不動産証券化の概要", no: "35-3", question: "不動産取得税は、不動産の取得について取得者に課税される都道府県税であり、その税額は固定資産税評価額に基づき賦課決定されるものであるため特段の申告手続きは不要である。", answer: "誤り", explanation: "不動産の取得日から30日以内に、土地、家屋の所在地を所管する都税事務所等への申告が必要となる。特に軽減措置を受ける場合には、申告手続きを行っていることが適用の要件となる。" },
  { subject: "102. 不動産証券化の概要", no: "35-4", question: "信託設定された不動産の信託受益権を取得したことに関しては、受託者を不動産の取得者とみなして不動産取得税が課される。", answer: "誤り", explanation: "信託設定された不動産を信託受益権として取得したことに関しては、不動産取得税でいう不動産の取得にはあたらず、不動産取得税は課されない。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "36-1", question: "0.5の確率で0円、0.5の確率で10,000円を得られる投資機会Aがある。富Wに対する投資家Xの効用をU=√Wで表せるとき、投資家Xの効用関数U=√Wでは下に凸な関数である。", answer: "誤り", explanation: "U=√Wは上に凸な関数であり、この効用を持つ投資家はリスク回避的な投資家である。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "36-2", question: "0.5の確率で0円、0.5の確率で10,000円を得られる投資機会Aがある。富Wに対する投資家Xの効用をU=√Wで表せるとき、投資家Xにとって、投資機会Aの期待効用は5,000である。", answer: "誤り", explanation: "期待効用は効用関数を用いて、0.5×√0＋0.5×√10,000＝0.5×100＝50となる。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "36-3", question: "0.5の確率で0円、0.5の確率で10,000円を得られる投資機会Aがある。富Wに対する投資家Xの効用をU=√Wで表せるとき、投資家Xにとって、投資機会Aの確実性等価は2,000円である。", answer: "誤り", explanation: "確実性等価Wは、50＝√Wより、W＝50²＝2,500円である。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "36-4", question: "0.5の確率で0円、0.5の確率で10,000円を得られる投資機会Aがある。富Wに対する投資家Xの効用をU=√Wで表せるとき、投資家Xにとって、投資機会Aと、確実に5,000円を得られる投資機会Bとでは投資機会Bの効用の方が大きい。", answer: "正しい", explanation: "投資機会Bの期待効用はU＝√5,000≒70.71であり、投資機会A（期待効用50）を上回る。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "37-イ", question: "正規分布の期待値が大きいほど裾の広い分布となる。", answer: "誤り", explanation: "期待値ではなく、標準偏差が大きいほど裾が広がる。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "37-ロ", question: "正規分布は、標準偏差が大きいほど裾の広い分布となる。", answer: "正しい", explanation: "記述の通り。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "37-ハ", question: "標準正規分布の期待値は1、標準偏差は0である。", answer: "誤り", explanation: "標準正規分布は、期待値0、標準偏差1の分布である。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "37-ニ", question: "正規分布は左右対称の釣りがね型の確率分布である。", answer: "正しい", explanation: "記述の通り。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "38-1", question: "資産Aは期待リターン5%でリスク(標準偏差)2%、資産Bは期待リターン7%でリスク(標準偏差)3%とする。今、資産A、Bのそれぞれを50%の保有割合で組み合わせるポートフォリオを考えるとき、このポートフォリオのリスク(リターンの標準偏差)を算出するには、AとBのリターンの相関係数または共分散の情報が必要である。", answer: "正しい", explanation: "記述の通り。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "38-2", question: "資産Aは期待リターン5%でリスク(標準偏差)2%、資産Bは期待リターン7%でリスク(標準偏差)3%とする。今、資産A、Bのそれぞれを50%の保有割合で組み合わせるポートフォリオを考えるとき、このポートフォリオの期待リターンは7%である。", answer: "誤り", explanation: "ポートフォリオの期待リターンは、(50%×5%)＋(50%×7%)＝6%となる。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "38-3", question: "資産Aは期待リターン5%でリスク(標準偏差)2%、資産Bは期待リターン7%でリスク(標準偏差)3%とする。今、資産A、Bのそれぞれを50%の保有割合で組み合わせるポートフォリオを考えるとき、AとBのリターンの相関係数が－1の場合に比べて、リターンの相関係数が0である場合の方がこのポートフォリオのリスク(リターンの標準偏差)は小さくなる。", answer: "誤り", explanation: "2つの資産の相関係数が小さくなるほど、ポートフォリオのリスク（標準偏差）は小さくなる。したがって、相関係数が0よりも－1の場合の方がリスクは小さくなる。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "38-4", question: "資産Aは期待リターン5%でリスク(標準偏差)2%、資産Bは期待リターン7%でリスク(標準偏差)3%とする。今、資産A、Bのそれぞれを50%の保有割合で組み合わせるポートフォリオを考えるとき、AとBが正の完全相関にある場合でもこのポートフォリオの分散効果は得られる。", answer: "誤り", explanation: "相関係数が1（正の完全相関）の場合には、分散投資によるリスク低減効果（分散効果）は得られない。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "39-1", question: "現代ポートフォリオ理論において、「効率的フロンティア」とは、投資機会集合のうち、同じリスクで最も高い期待リターンを持つポートフォリオの集合である。", answer: "正しい", explanation: "記述の通り。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "39-2", question: "現代ポートフォリオ理論において、「最小分散ポートフォリオ」とは、「効率的フロンティア」上でリスク（標準偏差）が最も低いポートフォリオである。", answer: "正しい", explanation: "記述の通り。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "39-3", question: "現代ポートフォリオ理論において、「無差別曲線」とは、同じ効用水準が得られるリスクとリターンの組み合わせを結んだ曲線である。", answer: "正しい", explanation: "記述の通り。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "39-4", question: "安全資産が存在する場合、トービンの分離定理によれば、「最適ポートフォリオ」における安全資産と接点ポートフォリオの組み合わせ比率は、投資家のリスク回避度に無関係である。", answer: "誤り", explanation: "トービンの分離定理によれば、「最適ポートフォリオ」における安全資産と接点ポートフォリオの組み合わせ比率は、投資家のリスク回避度によって決まる。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "42-1", question: "5年物スポットレートは、「5年物固定利付債の投資収益率」を表すものである。", answer: "誤り", explanation: "満期n年の割引債の割引率のことをn年のスポットレートと呼ぶ。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "42-2", question: "5年物スポットレートは、「4年物固定利付債の最終利回り（内部収益率）」を表すものである。", answer: "誤り", explanation: "満期n年の割引債の割引率のことをn年のスポットレートと呼ぶ。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "42-3", question: "5年物スポットレートは、「4年物割引債の残存年数」を表すものである。", answer: "誤り", explanation: "満期n年の割引債の割引率のことをn年のスポットレートと呼ぶ。" },

/* ============================================================
   これより下はプログラム本体です（通常は変更不要）。
   ============================================================ */

// localStorageに保存するときのキー名
const STORAGE_KEY = "flashcard_marks_v1";

// 1枚のカードを一意に識別する内部キー（科目＋問題番号）
// ※問題番号が科目をまたいで重複しても混ざらないようにするため
function cardKey(card) {
  return card.subject + "|" + card.no + "|" + card.question;
}

/* ---- マーク状態（覚えた／要復習）の読み書き ----
   保存形式: { "英単語|1": "known", "歴史|1": "review", ... } */
let marks = loadMarks();

// localStorageから読み込み（使えない環境ではメモリのみで動作）
function loadMarks() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch (e) {
    // localStorageが無効・失敗しても止めない（フォールバック）
    return {};
  }
}
// localStorageへ保存（失敗しても無視して継続）
function saveMarks() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(marks));
  } catch (e) {
    // 保存できないだけ。アプリは通常どおり動く（リロードで消えるのみ）
  }
}

/* ---- 画面の状態を管理する変数 ---- */
let deck = [];        // 現在出題中のカード配列（フィルタ・シャッフル適用後）
let index = 0;        // deck内の現在位置
let isFlipped = false;// 裏返っているか

/* ---- HTML要素の取得 ---- */
const el = {
  subjectFilter: document.getElementById("subjectFilter"),
  shuffleToggle: document.getElementById("shuffleToggle"),
  reviewToggle: document.getElementById("reviewToggle"),
  excludeKnownToggle: document.getElementById("excludeKnownToggle"),
  card: document.getElementById("card"),
  cardArea: document.querySelector(".card-area"),
  emptyMessage: document.getElementById("emptyMessage"),
  frontSubject: document.getElementById("frontSubject"),
  frontNo: document.getElementById("frontNo"),
  frontBadge: document.getElementById("frontBadge"),
  backSubject: document.getElementById("backSubject"),
  backNo: document.getElementById("backNo"),
  backBadge: document.getElementById("backBadge"),
  questionText: document.getElementById("questionText"),
  answerText: document.getElementById("answerText"),
  noteText: document.getElementById("noteText"),
  knownBtn: document.getElementById("knownBtn"),
  reviewBtn: document.getElementById("reviewBtn"),
  prevBtn: document.getElementById("prevBtn"),
  nextBtn: document.getElementById("nextBtn"),
  position: document.getElementById("position"),
};

/* ---- 科目フィルタの選択肢を作る ---- */
function buildSubjectOptions() {
  // 重複を除いた科目一覧を作成
  const subjects = [];
  CARDS.forEach(c => { if (!subjects.includes(c.subject)) subjects.push(c.subject); });

  el.subjectFilter.innerHTML = "";
  const optAll = document.createElement("option");
  optAll.value = "__ALL__";
  optAll.textContent = "すべての科目 (" + CARDS.length + ")";
  el.subjectFilter.appendChild(optAll);

  subjects.forEach(s => {
    const count = CARDS.filter(c => c.subject === s).length;
    const opt = document.createElement("option");
    opt.value = s;
    opt.textContent = s + " (" + count + ")";
    el.subjectFilter.appendChild(opt);
  });
}

/* ---- 配列をシャッフル（Fisher–Yates法） ---- */
function shuffleArray(arr) {
  const a = arr.slice(); // 元配列を壊さないようコピー
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ---- 出題する山札(deck)を組み立て直す ---- */
function buildDeck() {
  const subject = el.subjectFilter.value;
  const reviewOnly = el.reviewToggle.checked;

  // 1) 科目でしぼり込み
  let list = CARDS.filter(c => subject === "__ALL__" || c.subject === subject);

  // 2) 「要復習だけ」がONなら、要復習マークのカードだけに
  if (reviewOnly) {
    list = list.filter(c => marks[cardKey(c)] === "review");
  }

  // 2.5) 「覚えたを除く」がONなら、覚えたマークのカードを除外
  if (el.excludeKnownToggle.checked) {
    list = list.filter(c => marks[cardKey(c)] !== "known");
  }

  // 3) シャッフルONなら順番をランダムに
  if (el.shuffleToggle.checked) {
    list = shuffleArray(list);
  }

  deck = list;
  index = 0;
  isFlipped = false;
  render();
}

/* ---- 現在のカードを画面に描画 ---- */
function render() {
  // 出題対象が0件のとき
  if (deck.length === 0) {
    el.card.style.display = "none";
    el.emptyMessage.style.display = "block";
    el.emptyMessage.textContent = el.reviewToggle.checked
      ? "「要復習」のカードがありません。\n通常表示に戻すか、カードに「要復習」をつけてください。"
      : el.excludeKnownToggle.checked
      ? "すべて「覚えた」になっています。\n「覚えたを除く」をOFFにすると再表示できます。"
      : "表示できるカードがありません。";
    el.position.textContent = "0 / 0";
    updateNavButtons();
    updateMarkButtons(null);
    return;
  }
  el.card.style.display = "";
  el.emptyMessage.style.display = "none";

  const card = deck[index];

  // 裏返り状態をリセット（新しいカードは必ず表から）
  el.card.classList.toggle("is-flipped", isFlipped);

  // 表面
  el.frontSubject.textContent = card.subject;
  el.frontNo.textContent = card.no;
  el.questionText.textContent = card.question;

  // 裏面
  el.backSubject.textContent = card.subject;
  el.backNo.textContent = card.no;
  el.answerText.textContent = card.answer;
  el.noteText.textContent = card.explanation || "";
  el.noteText.style.display = card.explanation ? "" : "none";

  // 位置表示（例: 3 / 20）
  el.position.textContent = (index + 1) + " / " + deck.length;

  updateMarkBadges(card);
  updateMarkButtons(card);
  updateNavButtons();
}

/* ---- カード上のマーク状態バッジを更新 ---- */
function updateMarkBadges(card) {
  const status = marks[cardKey(card)];
  let text = "", cls = "mark-badge";
  if (status === "known")  { text = "覚えた";  cls += " known"; }
  if (status === "review") { text = "要復習";  cls += " review"; }
  el.frontBadge.textContent = text; el.frontBadge.className = cls;
  el.backBadge.textContent  = text; el.backBadge.className  = cls;
}

/* ---- マークボタンの見た目（押されている状態）を更新 ---- */
function updateMarkButtons(card) {
  const status = card ? marks[cardKey(card)] : null;
  el.knownBtn.classList.toggle("active-known",  status === "known");
  el.reviewBtn.classList.toggle("active-review", status === "review");
  const disabled = !card;
  el.knownBtn.disabled = disabled;
  el.reviewBtn.disabled = disabled;
}

/* ---- 前へ／次へボタンの有効・無効を更新 ---- */
function updateNavButtons() {
  el.prevBtn.disabled = deck.length === 0 || index <= 0;
  el.nextBtn.disabled = deck.length === 0 || index >= deck.length - 1;
}

/* ---- カードを裏返す ---- */
function flip() {
  if (deck.length === 0) return;
  isFlipped = !isFlipped;
  el.card.classList.toggle("is-flipped", isFlipped);
}

/* ---- 移動（次へ／前へ） ---- */
function go(step) {
  const next = index + step;
  if (next < 0 || next >= deck.length) return;
  index = next;
  isFlipped = false; // 新しいカードは表から表示
  render();
}

/* ---- マークを付ける／外す（同じボタン再タップで解除） ---- */
function toggleMark(status) {
  if (deck.length === 0) return;
  const key = cardKey(deck[index]);
  if (marks[key] === status) {
    delete marks[key]; // すでに同じ状態なら解除
  } else {
    marks[key] = status;
  }
  saveMarks();
  render();
}

/* ============================================================
   操作イベントの登録
   ============================================================ */

// フィルタ・トグルの変更で山札を作り直す
el.subjectFilter.addEventListener("change", buildDeck);
el.shuffleToggle.addEventListener("change", buildDeck);
el.reviewToggle.addEventListener("change", buildDeck);
el.excludeKnownToggle.addEventListener("change", buildDeck);

// 前へ／次へボタン
el.prevBtn.addEventListener("click", () => go(-1));
el.nextBtn.addEventListener("click", () => go(1));

// マークボタン
el.knownBtn.addEventListener("click", () => toggleMark("known"));
el.reviewBtn.addEventListener("click", () => toggleMark("review"));

/* ---- カードの「タップで裏返し」と「スワイプで移動」 ----
   指の移動量で判定：
   ・横に大きく動いた → スワイプ（左で次へ／右で前へ）
   ・ほぼ動かない     → タップ（裏返し） */
let touchStartX = 0, touchStartY = 0, touchMoved = false;
const SWIPE_THRESHOLD = 50; // これ以上横に動いたらスワイプ扱い(px)

el.card.addEventListener("touchstart", (e) => {
  const t = e.changedTouches[0];
  touchStartX = t.clientX; touchStartY = t.clientY; touchMoved = false;
}, { passive: true });

el.card.addEventListener("touchmove", () => { touchMoved = true; }, { passive: true });

el.card.addEventListener("touchend", (e) => {
  const t = e.changedTouches[0];
  const dx = t.clientX - touchStartX;
  const dy = t.clientY - touchStartY;
  // 横移動が大きく、かつ縦より横が優勢ならスワイプ
  if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) go(1);   // 左スワイプ＝次へ
    else        go(-1);  // 右スワイプ＝前へ
  } else if (!touchMoved || (Math.abs(dx) < 10 && Math.abs(dy) < 10)) {
    flip(); // ほぼ動いていない＝タップ
  }
});

// マウス（PCブラウザ）用：クリックで裏返し
// ※touch対応端末では touchend が先に処理され二重発火しないよう分岐
let supportsTouch = ("ontouchstart" in window);
el.card.addEventListener("click", () => { if (!supportsTouch) flip(); });

// キーボード（PCでの確認用）：← → で移動、スペースで裏返し
document.addEventListener("keydown", (e) => {
  if (e.key === "ArrowRight") go(1);
  else if (e.key === "ArrowLeft") go(-1);
  else if (e.key === " ") { e.preventDefault(); flip(); }
});

/* ============================================================
   起動
   ============================================================ */
buildSubjectOptions();
buildDeck();
</script>
