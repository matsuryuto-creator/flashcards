  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問45-1", question: "公募発行した特定社債の発行価額の総額が10億円以上であることが必要である。", answer: "誤り", explanation: "特定社債の発行価額の総額は「1億円」以上であることが要件とされているだけでなく、他の要件を満たすことでも導管性は達成しうる。(104/下テキストP.241参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問45-2", question: "特定社債の引き受けは税法上の機関投資家又は金商法上の適格機関投資家であることが必要である。", answer: "誤り", explanation: "特定社債の引き受けは機関投資家又は特定債権流動化特定目的会社のみとされている。金商法の適格機関投資家ではない。(104/下テキストP.241参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問45-3", question: "会計期間については、原則として1年を超えないこととされているが、資産流動化計画に記載する等一定の要件を満たす場合には、1年超とすることもできる。", answer: "誤り", explanation: "特定目的会社の会計期間が1年を超えないものであることとされており、例外規定は置かれていない。(104/下テキストP.241参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問45-4", question: "事業年度終了時点において法人税法上の同族会社に該当する場合であっても、一定の議決権が付与された優先出資について、上位3グループで50%以下の保有であれば、非同族会社要件を満たすことができる。なお、個人又は法人と同一の内容の議決権を行使することに同意している者はいないものとする。", answer: "正しい", explanation: "(104/下テキストP.234、P.240～241参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問46-1", question: "一時差異等調整引当額の設定の対象となる所得超過税会不一致は計算上、損金不算入となる交際費、寄附金等永久差異となる部分の金額は除かれている。", answer: "正しい", explanation: "(104/下テキストP.260参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問46-2", question: "負ののれん発生益等、分配原資の裏付けのない利益超過税会不一致が生じた場合には、一時差異等調整積立金を計上することで導管性を維持するための措置の調整を行うことができる。", answer: "正しい", explanation: "(104/下テキストP.263～264参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問46-3", question: "投信法136条に規定される投資法人の利益には、損益計算書を通じて計算される利益に含まれない「評価・換算差額等」が含まれる。", answer: "誤り", explanation: "投信法の利益の額から除外されることが明確化された。(104/下テキストP.265～267参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問46-4", question: "投資法人の対象事業年度の要件として、他の法人の発行済み株式又は出資の50%以上を保有することができないと定められている。", answer: "正しい", explanation: "他の法人の議決権の50%超の保有が禁止されている。(104/下テキストP.257参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問47-1", question: "受益者等課税信託において、発生時に受益者段階で課税される信託の受益者等の信託損失のうち、信託金額を超える部分の金額は損金に算入できない。", answer: "正しい", explanation: "(104/下テキストP.212～213参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問47-2", question: "集団投資信託等については、その信託の計算期間とは関係なく、発生の都度、受益者に課税する仕組みが採用されている。", answer: "誤り", explanation: "集団投資スキームに当てはまる場合でも集団投資信託に該当しているヴィークルは含まれないことに留意が必要。(104/下テキストP.214～215参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問47-3", question: "受益者等課税信託においては、受益者がその財産を保有しているとみなすものの、消費税は受託者が納税義務を負うこととなっている。", answer: "誤り", explanation: "受託者の消費税計算からは除かれる。(104/下テキストP.225参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問47-4", question: "法人課税信託は、信託収益を受益者が現実に受領した時に、受益者に課税する仕組みである。", answer: "誤り", explanation: "法人課税信託においては、信託段階において受託者を納税義務者として法人税を課税する。(104/下テキストP.219参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問48-1", question: "個人が匿名組合員である場合に、匿名組合契約に基づいて出資する者が当該匿名組合契約に基づく営業者から受ける利益の分配は、原則として不動産所得になる。", answer: "誤り", explanation: "個人の匿名組合員への利益の分配は、雑所得となる。(104/下テキストP.199参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問48-2", question: "匿名組合契約等に基づく匿名組合配当に係る源泉税率は、個人の組合員については20.42%となっている。", answer: "誤り", explanation: "20.42%の源泉徴収を義務付けられており、個人の場合にかぎられない。(104/下テキストP.200参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問48-3", question: "法人が匿名組合員である場合におけるその匿名組合営業により生じた収益又は費用の額を、現実の利益の分配を受け、又は損失を負担していない場合であっても、匿名組合契約による計算期間の末日の属する事業年度の益金の額又は損金の額に算入する。", answer: "正しい", explanation: "(104/下テキストP.196～197参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問48-4", question: "法人税法上の有価証券には、匿名組合出資及び任意組合の出資の持分も含まれる。", answer: "誤り", explanation: "法人税法上の有価証券には、匿名組合出資は含まれない。(104/下テキストP.202～203参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問49-1", question: "不動産取得税は土地や家屋を購入したり家屋を建築するなどして不動産を取得したときにかかる税で、有償・無償の別、登記の有無を問わない。", answer: "正しい", explanation: "(104/下テキストP.313参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問49-2", question: "不動産を信託に伴う委託者から受託者への所有権の移転登記は、原則として形式的なものであるとして登録免許税は非課税となるが、信託財産となったことによる所有権の信託の登記には、登録免許税が課される。", answer: "正しい", explanation: "(104/下テキストP.319参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問49-3", question: "法定4ヴィークルに関しては、一定の条件を備えた場合には不動産取得税の軽減が認められているが、保存登記及び変更登記に関わる登録免許税については軽減の対象外である。", answer: "誤り", explanation: "法定4ヴィークルの軽減対象は不動産取得税と移転登記に関わる登録免許税のみであり、保存登記及び変更登記に関わる登録免許税について軽減対象外である。(104/下テキストP.320～321参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問49-4", question: "登録免許税は土地建物の取得をして所有権の移転登記や保存登記を行う場合に課税される都道府県税である。", answer: "誤り", explanation: "登録免許税は国税である。(104/下テキストP.319参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "1-イ", question: "専門家責任とは、専門家がその職務を遂行する上で他人に不適切な役務の提供をすることによって、これを信頼した依頼者に対して負う損害賠償責任をいうものであり、第三者に対して負う損害賠償責任は含まれない。", answer: "誤り", explanation: "専門家の民事責任とは、専門家がその職務を遂行するうえで他人に不適切な役務の提供をすることによって（あるいはなすべき役務の提供を行わないことによって）、これを信頼した依頼者その他の第三者が損害を受けた場合に負う賠償責任をいう（105テキストP.29参照）。依頼者との関係だけではなく第三者に対しても責任を負う場合がある。その典型的な例が、ニ.の設例で問題となるような、依頼者の相手方（当該相手方との関係には契約関係はない）に対する責任である[1]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "1-ロ", question: "宅地建物取引業者A社は、オフィス物件の賃貸借契約の締結に関する媒介を賃借人候補から依頼されたが、担当したA社の従業員である宅地建物取引士Bは賃借人から中途解約ができる条項を入れるよう依頼者から指示されていたにも拘わらず、実際の契約では中途解約ができる条項を入れずに賃貸借契約を作成し締結させてしまった（当該物件の賃貸人は賃借人からの中途解約を認める条項が入ることを了承していたものとする）。この事例において、A社は、善管注意義務違反に基づき依頼者に対して損害賠償責任を負う可能性がある。", answer: "正しい", explanation: "まず、似たような具体例は建物所有者のための仲介業者の事例として105テキスト第II部1.3.2で紹介している（105テキストP.30参照）。本設問では、依頼者からの具体的な指示に反しているので、善管注意義務違反であることは明らかであろう。専門家としての善管注意義務の程度を問題にすることもない明確な違反行為と考えられる。この場合、依頼者との間の契約関係における善管注意義務違反ということで契約上の債務不履行に基づく損害賠償という構成となる。なお、この構成の場合は、担当した宅地建物取引士B個人は業者Aが負う債務の履行過程における履行補助者の立場である[1]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "1-ハ", question: "上記のロの事例において、宅地建物取引士Bは対象となる賃貸借契約の重要事項を依頼者に対して説明する際に、宅地建物取引業法上の規定に基づく重要事項だけではなく、信義則上の説明義務を負う。", answer: "正しい", explanation: "上記ロで紹介した裁判例でも「信義則上の説明義務」を認めている。信義則が基礎にあることは105テキスト第II部1.4.4でも指摘している。（105テキストP.36参照）[1]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "1-ニ", question: "不動産信託受益権を投資対象とする匿名組合出資持分の私募の取扱いを匿名組合契約上の営業者から受託した会社が、その従業員の説明義務違反が原因で匿名組合員となる者（投資家）から損害賠償責任を追及される場合、賠償責任を負う可能性のある者は専門家としての当該従業員個人のみであり、会社は投資家に対して契約上の善管注意義務を負わないため投資家に対して損害賠償責任を負うことはない。", answer: "誤り", explanation: "まず設問の事案で投資家に賠償責任を負う可能性があるのは、当該従業員と会社の両方である。(Web講義105第II部P6参照)。原告は両方を被告とすることができるし、いずれか一方を被告とすることもできる。専門家責任を負う者は専門家としての当該従業員個人である。会社の責任は専門家責任ということではなく使用者責任と整理される。「会社は投資家に対して契約上の善管注意義務を負わないため、会社が投資家に対して損害賠償責任を負うことはない。」と記載している点が誤りである。会社も当該従業員も投資家との間には契約関係がないので、契約上の善管注意義務を投資家に対して負っているわけではないが、第三者たる投資家に不法行為責任を負う。（105テキストP.40参照）[1]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "2-イ", question: "「忠実義務とは、受任者は専ら依頼者の利益を優先させるべきであり、自己又は第三者の利益を優先させてはならないという義務」を言うが、金融商品取引業者等は、自己又は第三者の利益と依頼者の利益が対立するような関係に立つ場合には、利益相反行為をしてはならない義務を負う場合もある。", answer: "正しい", explanation: "金融商品取引業者等は、自己又は第三者の利益と依頼者の利益が対立するような関係に立つ場合には、利益相反行為をしてはならない義務を負う場合もある、という点は正しい（例外があるとしても）。例えば金商法第42条の2は、「金融商品取引業者等は、その行う投資運用業に関して、次に掲げる行為をしてはならない。」としていくつかの行為を禁止しているが、利益相反関係にある行為だからと解される。（105テキストP.43参照）[1]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "2-ロ", question: "金融庁が公表している「顧客本位の業務運営に関する原則」（以下「顧客本位の原則」という。）では、金融事業者は顧客との関係で利益相反の可能性を適切に管理し、具体的な対応方針をあらかじめ策定すべきであるとされているため、金融商品取引業者等は、顧客本位の原則に基づき、利益相反対策について、対策を策定し、公表する法的義務がある。", answer: "誤り", explanation: "顧客本位の原則は法的義務ではないことは明確である。ただし、原則とされている事項については、すでにある金商法上の規定とされていることもある。（105テキストP.48参照）[1]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "2-ハ", question: "「委託者である合同会社と投資一任契約を締結し合同会社のために投資運用業を営む会社Aは、当該合同会社に対して忠実義務を負う。」という点は、金融商品取引法上明記されているわけではないが、民法上、委任契約において受任者が委任者に対して負う善管注意義務の明文規定から解釈上導き出される。", answer: "誤り", explanation: "金商法第42条第1項では、「金融商品取引業者等は、権利者（次の各号に掲げる業務の区分に応じ当該各号に定める者をいう。以下この款において同じ。）のため忠実に投資運用業を行わなければならない。」として、権利者については、投資一任契約では契約の相手方とあるので、投資一任運用会社が本設問の合同会社に対して忠実義務を負うことは明文化されているが、民法には受任者は善管注意義務を負うという規定はあるものの、忠実義務の明文規定はなく、解釈上、忠実義務を負うとされている（105テキストP.41〜42）[1]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "2-ニ", question: "投資法人から投資口の募集の取扱いの委託を受けた第一種金融商品取引業者は、金融商品取引法上、顧客に対して忠実義務を負うと規定されているが、この場合の顧客とは委託者である投資法人ではなく、勧誘の相手方である投資家である。", answer: "誤り", explanation: "第一種金融商品取引業者は、金商法上は、忠実義務を規定されていない。ただし、民法の受任者としての忠実義務は負うものと解される。その場合の解釈については上記ハ.で述べた通りである。第一種金融商品取引業者が受任者としての忠実義務を負うとした場合に、その相手方は委託者である。第一種金融商品取引業者は、投資家に対しては信義則上の義務を負う[2]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "3-イ", question: "上場不動産投資法人Aは、その資産運用会社Bの親法人Cから、Cが所有する不動産を購入した（この取引がAの資産に及ぼす影響は軽微でないものとする）。この利益相反取引にあたって行うプロセスに関し、資産運用会社Bは、この取引に先立ち、投資法人Aから事前に取引の同意を得た。", answer: "正しい", explanation: "投信法の規制である。（105テキストP.65参照）[2]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "3-ロ", question: "上場不動産投資法人Aは、その資産運用会社Bの親法人Cから、Cが所有する不動産を購入した（この取引がAの資産に及ぼす影響は軽微でないものとする）。この利益相反取引にあたって行うプロセスに関し、資産運用会社Bは、この取引に先立ち、自社の社内規程に基づく意思決定プロセスに沿って、この取引の実施について審議及び決議した。", answer: "正しい", explanation: "資産運用会社の自主規制に基づくプロセスである。（105テキストP.75参照）[2]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "3-ハ", question: "上場不動産投資法人Aは、その資産運用会社Bの親法人Cから、Cが所有する不動産を購入した（この取引がAの資産に及ぼす影響は軽微でないものとする）。この利益相反取引にあたって行うプロセスに関し、投資法人Aは、この取引が行われた後、取引に係る事項を記載した取引報告書面を、資産運用会社Bに交付した。", answer: "誤り", explanation: "投信法の規制により、利益相反取引の取引報告書面を交付するのは、資産運用会社から投資法人に対してである。（105テキストP.66〜67参照）[2]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "3-ニ", question: "上場不動産投資法人Aは、その資産運用会社Bの親法人Cから、Cが所有する不動産を購入した（この取引がAの資産に及ぼす影響は軽微でないものとする）。この利益相反取引にあたって行うプロセスに関し、投資法人Aは、この取引が行われた後、投資主に通知する資産運用報告において、期中に行ったこの取引を表示した。", answer: "正しい", explanation: "投信協会が定める「投資信託及び投資法人に係る運用報告書等に関する規則」に基づく要請である。（105テキストP.67参照）[2]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "4", question: "個人Dは、上場不動産投資法人Aの資産運用会社Bの役員である。Dは、Aが他の投資法人との新設合併を機関決定したことを知り、その事実が公表される前に、Aの投資証券（投資口）1,000口を3,000万円で買い付け、後日それを売却することで4,000万円を得た。この場合、インサイダー取引の罰則規定により、Dが没収される財産の金額として正しいものはどれか。", answer: "4,000万円", explanation: "個人Dは、上場投資法人Aの資産運用会社Bの役員であるから、A（上場会社等）の会社関係者である。また、Aが合併を機関決定した場合、その事実はAに係る重要事実（決定事実）にあたる。Dは、この重要事実が公表される前にAの投資証券を購入しており、インサイダー取引規制に抵触する。金商法では、インサイダー取引規制に違反する株式等の売買を行った者について、罰金刑等と合わせて、その取引で得た財産を没収するものとされる（金商法第198条の2）。この場合に没収される財産は、取引によって不正に得られた「利益」だけでなく、取引された「財産全体」となるため、Dが没収される財産は4,000万円となる。（105テキストP.79【図表III-2-1】参照）[2]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "5-イ", question: "「信認」では通常、その関係は3人（3つのグループ等）より構成され、それは「信認する者」（信認者・委託者）、「信認される者」（受認者・受託者）、その両者間の約束を通じて「利益を享受する者」（受益者）である。", answer: "正しい", explanation: "もっとも、信認者が自らを受益者に指定すれば、契約の場合と同様2人関係になる。（105テキストP.12）[2]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "5-ロ", question: "契約では、取引関係に入る関係者間には圧倒的な情報格差が存在しており、一方が他方を信頼しなければ取引関係は成り立たない。いわゆるプロフェッショナルに全てを託すことが前提となる。", answer: "誤り", explanation: "選択肢は信認について述べている。（105テキストP.12）[2]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "5-ハ", question: "プロフェッショナルにおいては、上級者になればなるほど、出来上がった殻をやぶり、自らを成長させるため、それまでの業界の常識、商慣習などに対し、新たな視点から疑問を投げかけ、投資家の利益に適う改善を続けていく必要がある。", answer: "正しい", explanation: "その意味で、マスター職業倫理規程は「不断の研鑚」を求めているのである。（105テキストP.21）[2]。" },
  { subject: "105. 不動産ファイナンスの基礎", no: "5-ニ", question: "不動産証券化協会認定マスターが職業倫理規程に反する行為を行った場合には不動産証券化協会による処分の対象となる。処分は、軽度のものから厳重注意、一時登録抹消、資格の取消しの３つのいずれかである。", answer: "誤り", explanation: "処分は、厳重注意、戒告、一時登録抹消、資格の取消し、資格の剥奪の５つ。（105テキストP.110）[2]。" },
  { subject: "101. 企業と不動産", no: "6-イ", question: "不動産証券化は、主に企業の信用力に依存して資金調達をするため、「アセットファイナンス」の領域に属する。", answer: "誤り", explanation: "不動産証券化は特定の資産の信用力に依存して資金調達をするため、「アセットファイナンス」の領域に属する。（101テキストP.11〜12参照）[3]。" },
  { subject: "101. 企業と不動産", no: "6-ロ", question: "J-REITと同じスキームを活用している私募REITは、所有している不動産価格を基準に投資口価格が評価されるため元本変動リスクが少なく、J-REITと比べて流動性は劣後するものの、相対的に安定的な運用を図ることができる。", answer: "正しい", explanation: "（101テキストP.18参照）[3]。" },
  { subject: "101. 企業と不動産", no: "6-ハ", question: "日本の不動産証券化市場では投資家の多様化が進み、機関投資家や個人、海外投資家の投資資金も着実に増加してきている。年金積立金管理運用独立行政法人（GPIF）も2014年にJ-REITへの投資を開始しており、今後、年金の不動産投資への増加が期待される。", answer: "正しい", explanation: "年金積立金管理運用独立行政法人（GPIF）は、2014年にJ-REITへの投資を開始している。（101テキストP.19参照）[3]。" },
  { subject: "101. 企業と不動産", no: "6-ニ", question: "不動産証券化を活用することによって、リスクの移転・分散・消去といったリスクコントロールが可能となる。", answer: "誤り", explanation: "不動産証券化を活用することによって、リスクの移転・分散・加工といったリスクコントロールは可能になるが、リスクそのものを消去することはできない。（101テキストP.13参照）[3]。" },
  { subject: "101. 企業と不動産", no: "7-イ", question: "レバレッジ効果とは、外部の低利な資金を借入または社債発行で取り入れることにより、エクイティ投資家の出資分に対する利回りが上昇することをいう。エクイティ投資家はレバレッジによってリターンを増幅するとともに将来の出口リスクを抑制することができる。", answer: "誤り", explanation: "借入比率が高まると出口リスクは増幅する。（101テキストP.48〜49参照）[3]。" },
  { subject: "101. 企業と不動産", no: "7-ロ", question: "不動産が適正な価格でSPVに譲渡されることは、真正売買の条件の１つであり非常に重要である。通常、不動産の適正価格とは、当該不動産が生み出すキャッシュフローを基に収益還元法で求めた市場価格（時価）のことである。", answer: "正しい", explanation: "（101テキストP.52参照）[3]。" },
  { subject: "101. 企業と不動産", no: "7-ハ", question: "利益相反とは、忠実義務を負う者が自己や第三者の利益を図り、オリジネーターの利益を損なうことをいう。利益相反リスクは、証券化スキーム上の工夫や、実務上の運用の工夫により可能な限り回避する仕組みを構築することが必要になる。", answer: "誤り", explanation: "オリジネーターではなく投資家。（101テキストP.50〜51参照）[3]。" },
  { subject: "101. 企業と不動産", no: "7-ニ", question: "二重課税の回避では、それ自体がもともと非課税のSPVを使う方法（パススルー）と、一定の配当・分配ルールを満たせば、投資家への配当金・分配金を費用として損金算入することが認められているSPVを使う方法（ペイスルー）がある。", answer: "正しい", explanation: "（101テキストP.46〜47参照）[3]。" },
  { subject: "101. 企業と不動産", no: "8-1", question: "RMBSは、収益不動産向けのノンリコースローンを裏付けに発行される証券をいう。ノンリコースローンは、証券化されることで高格付のRMBSから低格付けや無格付けまでの多様な金融商品に変換される。", answer: "誤り", explanation: "RMBSではなくCMBSのことである。（101テキストP.64〜65参照）[3]。" },
  { subject: "101. 企業と不動産", no: "8-2", question: "私募REITは投資信託及び投資法人に関する法律に基づく投資法人スキームをベースに、運用期間の定めがあり、一定の条件の下で出資金の払戻しを認めるなどの特徴を持っている。", answer: "誤り", explanation: "私募REITは運用期間の定めがない。（101テキストP.63〜64参照）[3]。" },
  { subject: "101. 企業と不動産", no: "8-3", question: "特定目的会社（TMK）とは、資産の流動化に関する法律に基づいて資産を証券化するためのビークルである。対象資産の特定及び資産流動化計画の作成が義務付けられており、特定目的会社の発行する資産対応証券は金融商品取引法上の有価証券に指定されている。", answer: "正しい", explanation: "（101テキストP.61〜62参照）[3]。" },
  { subject: "101. 企業と不動産", no: "8-4", question: "資産流動化型スキームは、投資家利益の最大化を図るため、能動的かつ機動的に運用を行う仕組みで、アセットマネジメント機能の発揮が期待される。", answer: "誤り", explanation: "資産流動化型スキームではなくファンド型もしくは資産運用型スキームのことである。（101テキストP.60参照）[3]。" },
  { subject: "101. 企業と不動産", no: "9-1", question: "開発型証券化では、投資家は開発事業による将来の収益に期待して投資を行うため、稼働中物件への投資に比べ、収益分配の不確実性リスクは高くなる。", answer: "正しい", explanation: "（101テキストP.67参照）[3]。" },
  { subject: "101. 企業と不動産", no: "9-2", question: "ファンドを利用して行う資産価値向上（バリューアップ）の手法においては、キャッシュフローの改善とリスクプレミアムの引き上げが基本となっている。", answer: "誤り", explanation: "リスクプレミアムの圧縮が正しい。（101テキストP.74参照）[3]。" },
  { subject: "101. 企業と不動産", no: "9-3", question: "流動性リスクが大きく、個別性も強い不動産では、安全資産利回りに一定のリスクプレミアムを上乗せし、不動産価格の成長率を控除した水準が、投資利回りとして妥当な水準であると考えられている。", answer: "正しい", explanation: "（101テキストP.37参照）[3]。" },
  { subject: "101. 企業と不動産", no: "9-4", question: "不動産証券化を契機に、金融技術を活用した投資評価やリスク制御手法が発達し、不動産投資の分野に金融市場の論理や技術、倫理・規律が持ち込まれた。", answer: "正しい", explanation: "（101テキストP.40〜41参照）[3]。" },
  { subject: "101. 企業と不動産", no: "10-1", question: "借地借家法は居住用不動産の賃借人保護等を目的に制定されたことから、事業用不動産の賃貸借契約に同法の適用はない。", answer: "誤り", explanation: "そのような規定はない。（101テキストP.108参照）[3]。" },
  { subject: "101. 企業と不動産", no: "10-2", question: "借地借家法において借地権とは、建物の所有を目的とする地上権又は土地の賃借権をいう。", answer: "正しい", explanation: "借地借家法第2条第1号（101テキストP.108参照）[3]。" },
  { subject: "101. 企業と不動産", no: "10-3", question: "民法において宅地建物の売買契約が成立するためには、売買契約書の作成が要件とされている。", answer: "誤り", explanation: "作成されるのが通常であるが、売買契約の成立要件ではない。売買契約は不要式契約であり諾成契約である（民法第555条）。（101テキストP.101参照）[3]。" },
  { subject: "101. 企業と不動産", no: "10-4", question: "民法において宅地建物の売買契約が成立するためには、売主から買主への所有権移転登記が要件とされている。", answer: "誤り", explanation: "所有権移転登記がされるのが通常であるが、売買契約の成立要件ではない。第三者対抗要件として機能するものである（民法第177条）。（101テキストP.102参照）[3]。" },
  { subject: "101. 企業と不動産", no: "11", question: "不動産の取引や管理においては、様々な法規制が存在する。たとえば、宅地や建物の売買の媒介や代理等を業として行う場合、宅地建物取引業の免許が求められる。また、一定規模を超える賃貸住宅の管理業務を業として行う場合、賃貸住宅管理業の登録が必要となる。この登録を受け管理を受託した賃貸住宅管理業者であって宅地建物取引業者でない者は、当該賃貸住宅の賃貸借契約の媒介を業とすることはできない。この記述は正しいか。", answer: "正しい", explanation: "空欄を埋めた文章は以下のとおりである。（101テキストP.122〜123、P.130参照）不動産の取引や管理においては、様々な法規制が存在する。たとえば、宅地や建物の売買の媒介や代理等を業として行う場合、宅地建物取引業の免許が求められる。また、一定規模を超える賃貸住宅の管理業務を業として行う場合、賃貸住宅管理業の登録が必要となる。この登録を受け管理を受託した賃貸住宅管理業者であって宅地建物取引業者でない者は、当該賃貸住宅の賃貸借契約の媒介を業とすることはできない[4]。" },
  { subject: "101. 企業と不動産", no: "12-イ", question: "金融市場は、取引される資金の期間により、1年以内の資金を取引する短期金融市場と1年超の資金を取引する長期金融市場に大別される。また、取引所を通さずに市場参加者の間で、相対に取引がなされる店頭市場もある。", answer: "正しい", explanation: "（101テキストP.140参照）[4]。" },
  { subject: "101. 企業と不動産", no: "12-ロ", question: "証券市場で企業が株式・社債・コマーシャルペーパー（CP）等を発行して資金調達を行うことを市場型間接金融と呼ぶ。", answer: "誤り", explanation: "株式・社債・CP等による資金調達は直接金融である。（101テキストP.140参照）[4]。" },
  { subject: "101. 企業と不動産", no: "12-ハ", question: "オプション取引やスワップ取引等、その取引価格が金利・為替等の他の資産の価格に依存して決定されるような取引を先渡契約という。", answer: "誤り", explanation: "先渡契約ではなくデリバティブ取引である。（101テキストP.144参照）[4]。" },
  { subject: "101. 企業と不動産", no: "12-ニ", question: "イールドカーブ（利回り曲線）は、通常、短期金利ほど低く長期金利ほど高くなる（順イールド）が、金利低下期待が高まり金利の先安感が強い場合などには、長期金利が短期金利に近づき（フラットイールド）、さらには長期金利が短期金利を下回る（逆イールド）ことがある。", answer: "正しい", explanation: "（101テキストP.146参照）[4]。" },
  { subject: "101. 企業と不動産", no: "13-イ", question: "金商法に基づく開示は、投資家に対して適切な投資判断材料を提供することにより資本市場の健全な発展及び投資家の保護を図ることを目的としており、書類提出から公衆縦覧に至る手続きがEDINET（エディネット）により電子化されている。", answer: "正しい", explanation: "（101テキストP.152〜153参照）[4]。" },
  { subject: "101. 企業と不動産", no: "13-ロ", question: "会社法に基づく開示は、企業の直接的な利害関係者である債権者、株主の保護を目的としており、計算書類及び事業報告の定時株主総会での報告または承認が求められる。", answer: "正しい", explanation: "（101テキストP.153参照）[4]。" },
  { subject: "101. 企業と不動産", no: "13-ハ", question: "金融商品取引所（証券取引所）の規則に基づく開示は、有価証券の投資判断に重要な影響を与える会社の業務運営または業績等に関する情報について、投資家に適時・適切に開示（適時開示）することを目的としている。", answer: "正しい", explanation: "（101テキストP.153参照）[4]。" },
  { subject: "101. 企業と不動産", no: "13-ニ", question: "上場企業は、法律や取引所の規則に基づく開示にとどまらず、任意のIR活動を実施している。", answer: "正しい", explanation: "（101テキストP.154参照）[4]。" },
  { subject: "101. 企業と不動産", no: "14-イ", question: "株式を証券取引所に上場させるには、幹事証券会社を通して証券取引所に申請を行い、各証券取引所の定める「上場審査基準」に適合していれば、上場適格と判断され上場される。", answer: "誤り", explanation: "上場審査基準に適合していることに加え、企業内容などの開示を適切に行うことができる状況にあるか等の実質的な審査が行われる。（101テキストP.161参照）[4]。" },
  { subject: "101. 企業と不動産", no: "14-ロ", question: "株式は上場されると不特定多数の投資家により売買されるようになるため、上場は株式公開とも呼ばれ、市場への最初の株式供給という意味でIPO（Initial Public Offering）ともいう。", answer: "正しい", explanation: "（101テキストP.161参照）[4]。" },
  { subject: "101. 企業と不動産", no: "14-ハ", question: "上場株式の流通量が不足し、公正な価格形成が困難となった場合や、会社がいわゆる破綻状態となった場合などは、上場廃止基準に基づき上場廃止の措置が取られる。", answer: "正しい", explanation: "（101テキストP.161〜162参照）[4]。" },
  { subject: "101. 企業と不動産", no: "14-ニ", question: "顧客が売買代金の一定比率を委託保証金として証券会社に預託し、買付資金又は売付証券を当該証券会社から借りて売買を行い、所定の期限内に返済する取引を貸借取引という。", answer: "誤り", explanation: "貸借取引ではなく信用取引という。（101テキストP.162参照）[4]。" },
  { subject: "101. 企業と不動産", no: "15", question: "額面100円、クーポン0.5%の債券を95円で購入し、5年後に額面の100円で償還を受けた場合、単利の最終利回り（償還利回り）の数値として正しいものはどれか。計算にあたっては、小数点以下第3位を四捨五入するものとする。", answer: "1.58%", explanation: "償還利回り(%) = [年間クーポン収入 + (償還価格 - 購入価格) ÷ 残存年数] ÷ 購入価格 × 100 = [100円×0.5% + (100円 - 95円) ÷ 5] ÷ 95円 × 100 ≒ 1.58% （101テキストP.169参照）[4]。" },
  { subject: "101. 企業と不動産", no: "16-イ", question: "預金業務は銀行の固有業務の一つで受信業務ともいい、バランスシート上、預金は銀行の負債になる。", answer: "正しい", explanation: "イ. 正しい。（101テキストP.176参照）[1]" },
  { subject: "101. 企業と不動産", no: "16-ロ", question: "銀行の信用創造機能により新たに創り出された預金を派生的預金といい、支払準備率が高いほど派生的預金は大きくなる。", answer: "誤り", explanation: "ロ. 誤り。支払準備率が高いほど銀行が支払準備のため手元に置くお金が増えることから、信用創造の結果、創り出される派生的預金は小さくなる。（101テキストP.183〜184参照）[1]" },
  { subject: "101. 企業と不動産", no: "16-ハ", question: "銀行が株式を保有する目的は政策投資と純投資があり、前者は親密取引先との関係強化や総合取引推進のために行われてきた。", answer: "正しい", explanation: "ハ. 正しい。（101テキストP.180参照）[2]" },
  { subject: "101. 企業と不動産", no: "16-ニ", question: "2004年の信託業法改正により、信託銀行は特許権や著作権なども受託することができるようになった。", answer: "正しい", explanation: "ニ. 正しい。（101テキストP.200参照）[2]" },
  { subject: "101. 企業と不動産", no: "17", question: "銀行の自己資本比率規制（バーゼルII）におけるリスク算出方法について、これまでは各行一律横並びで適用されていたが、バーゼルIIでは、標準的手法と内部格付手法、更に後者を基礎的手法と先進的手法とに区分し、簡易なものから高度なものまで3つの手法から各行が選択できるようになった。この記述は正しいか。", answer: "正しい", explanation: "リスクの算出方法について、これまでは各行一律横並びで適用されていたが、バーゼルIIでは、（イ）標準的手法と（ロ）内部格付手法、更に後者を（ハ）基礎的手法と（ニ）先進的手法とに区分し、簡易なものから高度なものまで3つの手法から各行が選択できるようになった。（101テキストP.187〜188参照）[2]" },
  { subject: "101. 企業と不動産", no: "18", question: "プロジェクトファイナンスにおいても、スポンサーは事業の実質的な推進主体として重要であり、与信判断の重要な要素となる。また、スポンサーは通常SPVに出資するとともに、限定的な形での信用補完を与えることが多い。この記述は正しいか。", answer: "正しい", explanation: "プロジェクトファイナンスにおいても、スポンサーは事業の実質的な推進主体として（イ）重要であり、与信判断の（ロ）重要な要素となる。また、スポンサーは通常SPVに出資するとともに、（ハ）限定的な形での（ニ）信用補完を与えることが多い。（101テキストP.191参照）[2]" },
  { subject: "101. 企業と不動産", no: "19-ロ", question: "保険会社の中でも、生命保険会社と損害保険会社とでは資産運用における投資配分に違いがみられる。国内保険会社の平均資産配分でみると、生命保険会社は、安全資産とされる国債への配分割合が損害保険会社より低い。", answer: "誤り", explanation: "ロ. 誤り。生命保険協会と損害保険協会の2022年のデータによれば、運用資産に占める国債の割合は、国内生命保険会社では39.7％であるのに対し、国内損害保険会社では13.8％であり、生命保険会社の方が高い。（101テキストP.212〜215、【図表V-2-1】【図表V-2-3】参照）[2]" },
  { subject: "101. 企業と不動産", no: "19-ハ", question: "国内銀行は、株式・債券への投資が主な有価証券投資であるが、その他有価証券として不動産証券化商品にも投資している。", answer: "正しい", explanation: "ハ. 正しい。（101テキストP.212〜216参照）[2]" },
  { subject: "101. 企業と不動産", no: "19-ニ", question: "銀行、保険会社、年金基金などの機関投資家は、顧客等から拠出された資金を投資運用・管理しており、利息、保険金、給付金等の形で顧客に一定の支払いをする必要がある。こうした支払い義務等の特性に基づき、総合的に資産管理を行うリスク管理手法をPMLという。", answer: "誤り", explanation: "ニ. 誤り。支払い義務等の特性に基づき総合的にリスク管理を行う手法は、ALM（Asset Liability Management）であり、機関投資家の資産運用・管理では、ALMの考え方が導入されている。PML はProbable Maximum Loss（予想最大損失率）の略称で、地震などの災害リスク評価で用いられる指標である。（101テキストP.207〜208参照）[2]" },
  { subject: "101. 企業と不動産", no: "20-イ", question: "海外機関投資家で、不動産運用資産額において上位を占めるのは、年金基金、保険会社、SWF（ソブリン・ウェルス・ファンド）などである。", answer: "正しい", explanation: "イ. 正しい。（Web講義101 第V部第2章 P.17、P.19参照）[2]" },
  { subject: "101. 企業と不動産", no: "20-ロ", question: "年金基金以外の国内機関投資家による不動産投資状況として、J-REITへの投資を行っている投資家の割合が高いことが挙げられる。一方で、私募REITの投資家層のシェアでも地域金融機関と中央金融法人を合わせた年金以外の国内機関投資家による投資口保有比率は、2022年末時点で60%を超えている。", answer: "正しい", explanation: "ロ. 正しい。（101テキストP.212〜216参照）[2]" },
  { subject: "101. 企業と不動産", no: "20-ハ", question: "国内保険会社では、自社の営業拠点としての使用を含めて実物不動産を所有しているが、近年は不動産証券化商品も投資対象としている。", answer: "正しい", explanation: "ハ. 正しい。（101テキストP.216【図表V-2-4】及びP.238参照）[2]" },
  { subject: "101. 企業と不動産", no: "21-イ", question: "年金による不動産投資は、日本において不動産の証券化が本格的に開始される以前から行われていた。", answer: "正しい", explanation: "イ. 誤りではない。（101テキストP.216【図表V-2-4】及びP.238参照）[2]" },
  { subject: "101. 企業と不動産", no: "21-ロ", question: "世界の不動産証券化市場において国別に時価残高を見ると、オーストラリアの規模が最大である。", answer: "誤り", explanation: "ロ. 誤り。最大なのは、言わずもがな米国である。（101テキストP.242参照）[2]" },
  { subject: "101. 企業と不動産", no: "21-ハ", question: "国家公務員共済組合連合会の運用資産残高は、地方公務員共済制度全体の運用資産残高より大きい。", answer: "誤り", explanation: "ハ. 誤り。（Web講義101第VI部資料P.12参照）[2]" },
  { subject: "101. 企業と不動産", no: "21-ニ", question: "企業年金が運用対象とする資産の種類については、特に制限がない。", answer: "正しい", explanation: "ニ. 誤りではない。5：3：3：2規制が廃止された後、継続基準および非継続基準を充足していれば、特定の投資対象に対する制限は科されていない。（Web講義101第VI部P.7での解説）[3]" },
  { subject: "101. 企業と不動産", no: "21-ホ", question: "投資対象別のタイムホライズンを考えると、レジデンスはオフィスより投資のホライズンの長いことが一般的である。", answer: "正しい", explanation: "ホ. 必ずしも誤りとは言えない。[3]" },
  { subject: "101. 企業と不動産", no: "22", question: "企業年金基金は、年金の受給権者や制度加入者に対して受託者責任を負っている。企業年金基金が年金資産の運用に関し負っている受託者責任の中で特に重要なものは、注意義務と忠実義務である。この記述は正しいか。", answer: "正しい", explanation: "企業年金基金は、年金の（イ）受給権者や制度加入者に対して（ロ）受託者責任を負っている。企業年金基金が年金資産の運用に関し負っている（ロ）受託者責任の中で特に重要なものは、注意義務と（ハ）忠実義務である。（101テキストP.236参照）[3]" },
  { subject: "101. 企業と不動産", no: "23-イ", question: "コーポレートファイナンスとは直接金融を意味し、アセットファイナンスとは間接金融を意味する。", answer: "誤り", explanation: "イ. 誤り。（101テキストP.253参照）[3]" },
  { subject: "101. 企業と不動産", no: "23-ロ", question: "わが国でも、現在では米国などのように直接金融が発達したことから、間接金融の影響力は少なくなっている。", answer: "誤り", explanation: "ロ. 誤り。わが国では銀行借入を中心とした間接金融が現在でも引き続き比較的大きな影響力を持っている。（101テキストP.307参照）[3]" },
  { subject: "101. 企業と不動産", no: "23-ハ", question: "アセットファイナンスはコーポレートリスクから切り離されたファイナンスであるから、オリジネーターの信用力がストラクチャーに影響することは全くない。", answer: "誤り", explanation: "ハ. 誤り。オリジネーターによる詐欺的行為のリスクやサービシングリスクなどを勘案する必要があり、スキームによってオリジネーターの信用力が影響する事が全くない訳ではない。（101テキストP.274〜275参照）[3]" },
  { subject: "101. 企業と不動産", no: "23-ニ", question: "アセットファイナンスはコーポレートリスクから切り離されるため、必ずコーポレートファイナンスより低利の資金調達を実現できる。", answer: "誤り", explanation: "ニ. 誤り。資産そのものが生み出すキャッシュフロー、資産価値等を裏付とする信用力の高い金融商品にできれば低コストでの資金調達が可能であるが必ずではない。（Web講義101第VII部P.28参照）[3]" },
  { subject: "101. 企業と不動産", no: "24-イ", question: "オリジネーターは信託受託者として、信託契約を締結の上で資産を信託設定し、委託者兼受託者として、信託受益権をSPCへ発行するというストラクチャーが一般的である。", answer: "誤り", explanation: "イ. 誤り。オリジネーターは信託受託者（信託銀行）と信託契約を締結の上で資産を信託譲渡し、委託者兼当初受益者として信託受益権を取得した後に信託受益権をSPCへ譲渡するというストラクチャーが一般的である。（101テキストP.266参照）[3]" },
  { subject: "101. 企業と不動産", no: "24-ロ", question: "受託者の債権者は、信託財産に対して強制執行をすることができず、受託者が破産手続開始の決定を受けた場合であっても、信託財産に属する財産は破産財団に属さない。", answer: "正しい", explanation: "ロ. 正しい。（101テキストP.267参照）[3]" },
  { subject: "101. 企業と不動産", no: "24-ハ", question: "信託は法人格を認める余地がないことに加え、形式的名義人ではなく実際に収益を享受する者を課税対象とするのが課税の原則であるから、集団投資信託や法人課税信託などの法人税法第12条ただし書きに掲げられた信託（但書信託）を含め、信託財産に帰せられる収入及び支出は受益者のものとみなされ信託は課税対象とはならず二重課税の回避が実現される。", answer: "誤り", explanation: "ハ. 誤り。集団投資信託や法人課税信託などの法人税法第12条ただし書きに掲げられた信託（但書信託）は、例外として課税対象とされる。（101テキストP.267参照）[3]" },
  { subject: "101. 企業と不動産", no: "24-ニ", question: "資産の流動化に関する法律に基づく特定目的会社は、不動産特定共同事業法の適用を受けないため、信託が利用されることはない。", answer: "誤り", explanation: "ニ. 誤り。特定目的会社でも信託が利用されるケースがある。（Web講義101第VII部P.12参照）[3]" },
  { subject: "101. 企業と不動産", no: "25-イ", question: "住宅ローンを裏付けとした証券化商品は、債務者が自らの住居として住宅を利用しているものと、投資または賃貸を目的として購入しているものがあるが、最終的には債務者の収入や資産が返済原資となるため、リスク特性が異なるものではない。", answer: "誤り", explanation: "イ. 誤り。事業性のアパートローンは相対的にデフォルトリスクが高いと見なされ、当該アパートの収支計画と債務者の返済余力の双方をチェックする必要があると考えられるのに対し、債務者が自らの住居として住宅を利用している住宅ローンとはリスク特性が異なるとの見方が一般的である。（101テキストP.301参照）[3]" },
  { subject: "101. 企業と不動産", no: "25-ロ", question: "2007年からのサブプライム住宅ローン問題を契機とするグローバルな金融危機の発生及び証券化市場の大幅な縮小により、その後現在までCBOやCLOの発行は行われていない。", answer: "誤り", explanation: "ロ. 誤り。2016年以降に再び日本政策金融公庫が主導する形で再開されて参加型のCLOの発行がされている。（101テキストP.298参照）[3]" },
  { subject: "101. 企業と不動産", no: "25-ハ", question: "商業用不動産担保ローンはオフィスや商業施設、共同住宅といった商業用不動産を担保としたローンであり、借入の実質的な主体に対してノンリコースという特徴を有している。", answer: "正しい", explanation: "ハ. 正しい。（101テキストP.302参照）[3]" },
  { subject: "101. 企業と不動産", no: "25-ニ", question: "再生可能エネルギー発電設備等の民間資産や、空港、道路、上下水道等の公的資産も、事業採算が見込め、投資家に安定したリターンを提供することができることから証券化の対象とされており、インフラファンド市場に上場するなどしてリテール投資家も含めたパブリック・キャピタルにより資金調達するケースもある。", answer: "正しい", explanation: "ニ. 正しい。（101テキストP.305参照）[3]" },
  { subject: "102. 不動産証券化の概要", no: "26-イ", question: "不動産投資において大切なことは、短期的な利益ばかりに目を奪われることなく、中長期の視点で安定性や成長性、特に「利用」の側面からの視点を持つことである。", answer: "正しい", explanation: "イ. 正しい。（102テキスト巻頭の「本テキストのねらいと学習のポイント」参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "26-ロ", question: "不動産は総額が高いため、他の金融資産等と比較して、投資金額が大きくなる傾向がある。", answer: "正しい", explanation: "ロ. 正しい。（102テキストP.11参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "26-ハ", question: "不動産投資に伴う「オポチュニティ」は、いわばアップサイドであり、保有期間中のキャッシュフローの向上のみを指す。", answer: "誤り", explanation: "ハ. 誤り。保有期間中のキャッシュ・フローの向上に加えて、出口価格の上昇がある。（102テキストP.12参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "26-ニ", question: "プライベートファンドの投資基準は、ファンドが設立されてから、投資家との話し合いで決まり、一旦決まった後は、ファンド持分の5分の4の合意で変更できる。", answer: "誤り", explanation: "ニ. 誤り。どのような物件に投資するかという投資基準は、あらかじめ決めてある。（102テキストP.22参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "27-イ", question: "自然災害などの被害や伝染病などのパンデミックによる被害は不動産投資におけるリスクとなるが、コンピュータウイルスによる被害はリスクに含まれない。", answer: "誤り", explanation: "イ. 誤り。コンピュータウイルスによる被害も不動産投資におけるリスクである。（102テキストP.14参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "27-ロ", question: "地震による予想最大損失の大きさを示すものとしてPMLがあるが、一般的にPMLが15を超えるものについては、レンダーは借入人に地震保険への加入を強く求める。", answer: "正しい", explanation: "ロ. 正しい。（102テキストP.15参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "27-ハ", question: "不動産投資で将来の不動産の売却先をあらかじめ見つけ、確保しておくことは、マーケットの変動や流動性に関するリスクを軽減する方策といえる。", answer: "正しい", explanation: "ハ. 正しい。（102テキストP.16参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "27-ニ", question: "管理運営が適正に行われているかどうかのチェックやテナントへのCS調査等を行うことはリスク軽減の方策となる。", answer: "正しい", explanation: "ニ. 正しい。（102テキストP.16参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "28-1", question: "アセットマネジメントでは、ストラクチャーにより主として以下の法令に則った業務遂行が求められる。例えば、GK-TK スキームでは資産流動化に関する法律に、TMK スキームであれば金融商品取引法に、REIT であれば投資信託及び投資法人に関する法律や金融商品取引法に則ることが求められる。", answer: "誤り", explanation: "1. 誤り。GK-TKスキームでは金融商品取引法、TMKスキームでは資産流動化に関する法律に主に則る必要がある。（102テキストP.29【図表I-2-3】参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "28-2", question: "投資期間中の運用業務において大規模修繕工事が予定されている場合には、特にキャッシュマネジメント上の注意が必要であり、一定の期間に高額の工事を多数実施すると DSCR テストに抵触するおそれや、配当原資（余剰現金）に対し利益配当が不足するいわゆる未払い配当が発生することがある。", answer: "誤り", explanation: "2. 誤り。前段は正しいが、未払い配当は配当原資に対し利益配当が不足するのではなく、利益配当に対し配当原資が不足する状態。（102テキストP.49〜50参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "28-3", question: "デューデリジェンスにおける注意点として、賃貸借内容の実態（例えば、賃料や共益費及び敷金の額など賃貸借契約の経済条件や契約の期間など）を正確に把握するためにはレントロールで確認しなければならない。", answer: "誤り", explanation: "3. 誤り。レントロールは必ずしも賃貸借内容の実態（フリーレント、レントホリデーの有無等）を反映したものではない。（102テキストP.35参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "28-4", question: "ビジネスプランとは、アンダーライティングをベースとして売買金額やローン条件・リース戦略・修繕計画などの物件レベルでの収支、AM報酬などを考慮したSPCレベルでの収支、そして最終的な配当計画が記載されており、アセットマネジャーが投資家やレンダーに提示する投資運用計画のことである。", answer: "正しい", explanation: "4. 正しい。（102テキストP.46参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "29-イ", question: "投資（運用）委員会は取得価格や取引条件等の投資判断に関する事項、投資戦略やビジネスプランに関する事項、資金調達に関する事項などを妥当性の観点から決議するもので、不動産や信託受益権の取得時のみに行う。", answer: "誤り", explanation: "イ. 誤り。投資（運用）委員会は不動産・信託受益権の取得時のみ限らず、運用期間中の大規模修繕工事の実施や資金調達（リファイナンス）、また売却時にも行う。（102テキストP.47〜48参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "29-ロ", question: "タームシートとは、契約書作成の前段階として関係当事者間の合意を形成するために作成される契約内容の要点を規定したもので「条件規定書」などと呼ばれるものである。", answer: "正しい", explanation: "ロ. 正しい。（102テキストP.44参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "29-ハ", question: "LTV テストとは、ある時点の不動産鑑定評価額に対するローン元本額の割合である LTV 値が、ローン契約において定められた基準値を満たしているかテストするもので、LTV 値が基準値を何度か下回るとリリース口座への資金移動が停止され、物件の強制売却に至る場合もある。", answer: "誤り", explanation: "ハ. 誤り。LTVテストはLTV値が基準値以下である必要があり、LTV値が基準値を上回ると記載の事態となる。（102テキストP.52参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "29-ニ", question: "投資クライテリアとは、どのような基準で不動産に投資するかを定めた投資基準のことである。", answer: "正しい", explanation: "ニ. 正しい。（Web講義102第I部資料第2章P.19参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "30-イ", question: "TMKスキームは現物不動産のみの投資に利用できるスキームであり、開発案件などに広く利用されている。", answer: "誤り", explanation: "イ. 誤り。前段の現物不動産のみに利用できるという部分が誤りであり、現物不動産のほか信託受益権でも利用することができる。後段の開発案件などに利用されることは正しい。（102テキストP.29【図表I-2-3】、P.40〜P.41【図表I-2-9】参照）[4]" },
  { subject: "102. 不動産証券化の概要", no: "30-ハ", question: "信託受託者を選定する場合、信託受託者によって受託スタンスやテナント及び投資対象不動産に対する審査基準などが相違しているので信託報酬などの諸条件を総合的に判断して選定すべきである。", answer: "正しい", explanation: "ハ. 正しい。（102テキストP.42参照）[5]" },
  { subject: "102. 不動産証券化の概要", no: "30-ニ", question: "プロパティマネジャーを選定する場合、賃料収入や修繕計画などの投資対象不動産ごとの将来見通し及び金利動向などを踏まえてリファイナンスを実施した方がよいなどの提案が出来るPM会社を選定すべきである。", answer: "誤り", explanation: "ニ. 誤り。リファイナンスなどの資金調達に関する業務はアセットマネジャーの業務範囲であり、PMの業務範囲となるものではない。（102テキストP.42〜43参照）[5]" },
  { subject: "102. 不動産証券化の概要", no: "31-1", question: "東京23区のオフィスストック（賃貸面積）について規模別、築年別の構成をみると、延床5,000坪以上のビルはバブル期に竣工が集中している。", answer: "誤り", explanation: "1. 誤り。延床5,000坪未満の中小規模ビルはバブル期に竣工が集中しているが、延床5,000坪以上のビルはバブル期以降にも竣工が続いている。（102テキストP.72、P.73【図表II-3-3】参照）[5]" },
  { subject: "102. 不動産証券化の概要", no: "31-2", question: "民間仲介会社の調査データによると、2022年9月末時点における東京23区のオフィス賃貸可能面積は、大阪市のオフィス賃貸可能面積の約2倍に相当する。", answer: "誤り", explanation: "2. 誤り。東京23区は1,206万坪。対して大阪市は313万坪で、東京23区の賃貸可能面積は大阪市の4倍近くになる。（102テキストP.71〜72参照）[5]" },
  { subject: "102. 不動産証券化の概要", no: "31-3", question: "オフィス需要量を構成する要素である「1人あたりオフィス床面積」は、新型コロナウイルスの感染拡大（2020年）が生じる前までは継続して上昇していた。", answer: "誤り", explanation: "3. 誤り。コロナ禍前もほぼ4坪前後で推移している。（102テキストP.75、P.76【図表II3-6】参照）[5]" },
  { subject: "102. 不動産証券化の概要", no: "31-4", question: "東京23区のオフィスストックを棟数でみたときに、延床5,000坪未満のビルが約9割を占めている。", answer: "正しい", explanation: "4. 正しい。（Web講義102第II部第3章P.17参照）[5]" },
  { subject: "102. 不動産証券化の概要", no: "32-イ", question: "基準地価は、都道府県知事が、毎年7月1日時点における標準的な土地（基準地）の正常な価格を判定して公表する価格である。土地取引規制の際の価格審査や地方公共団体等による買収価格算定の基準になる。", answer: "正しい", explanation: "イ. 正しい。（102テキストP.67参照）" },
  { subject: "102. 不動産証券化の概要", no: "32-ロ", question: "固定資産税評価は、市町村が、固定資産税課税標準となる適正な時価を求めるための価格である。売買価格事例や公示地価、相続税路線価を総合的に勘案して算定し、評価水準の目安は地価公示の7割程度とされ、2年毎の1月1日に評価替えが行われる。", answer: "誤り", explanation: "ロ. 誤り。評価替えは3年に1度である。（102テキストP.68参照）" },
  { subject: "102. 不動産証券化の概要", no: "32-ハ", question: "地価公示は、国土交通省土地鑑定委員会が、毎年7月1日時点における標準的な土地の1㎡当たりの正常な価格を判定して公示するもので、価格は一般的に公示地価といわれる。", answer: "誤り", explanation: "ハ. 誤り。毎年1月1日時点における価格である。（102テキストP.67参照）" },
  { subject: "102. 不動産証券化の概要", no: "33-イ", question: "住宅の需要に影響する人口移動の動向をみると、東京23区は新型コロナウイルスの感染拡大の影響を受けて、2021年、2022年ともに人口の転出が転入を上回って転出超過となり、都心から地方へ人が移動する流れが続いている。", answer: "誤り", explanation: "イ. 誤り。東京23区は2021年には転出超過であったが、2022年には再び流入超過となった。（102テキストP.97参照）" },
  { subject: "102. 不動産証券化の概要", no: "33-ロ", question: "商業施設で採用がよくみられる売上歩合賃料は、入居テナントの売上が上がるほど賃料が高くなるため、賃貸人にとって有利な契約条件といえる。", answer: "誤り", explanation: "ロ. 誤り。入居テナントの売上が下がった場合は賃料が減少し賃料収入が不安定となるため、必ずしも有利とはいえない。（102テキストP.91〜92参照）" },
  { subject: "102. 不動産証券化の概要", no: "33-ハ", question: "有料老人ホームやサービス付き高齢者向け住宅（サ高住）の供給量は、日本の人口の高齢化の進展などを背景に増加が続いている。", answer: "正しい", explanation: "ハ. 正しい。（102テキストP.111〜113参照）" },
  { subject: "102. 不動産証券化の概要", no: "33-ニ", question: "国土交通省「貨物地域流動調査」によると、物流施設が増加しているのは、日本国内における貨物の輸送量の増加傾向が続いているためである。", answer: "誤り", explanation: "ニ. 誤り。EC取引や宅配などは増えているが、国土交通省「貨物地域流動調査」によると、貨物の国内輸送量は減少傾向にあり、2020年にはさらに落ち込んだ。（102テキストP.107参照）" },
  { subject: "102. 不動産証券化の概要", no: "34-1", question: "観光庁の「宿泊旅行統計調査」によると、2019年までは、国内延べ宿泊者数は外国人が全体の約半数を占めていた。新型コロナウイルスの感染拡大によってインバウンド需要が激減しており、今後の回復が期待される。", answer: "誤り", explanation: "1. 誤り。外国人の割合は多い年（2019年）でも2割未満である。（102テキストP.101〜102【図表II-5-3】参照）" },
  { subject: "102. 不動産証券化の概要", no: "34-2", question: "観光庁の「宿泊旅行統計調査」によると、リゾートホテルの稼働率は夏季より正月を含む冬季の方が高い傾向にある。", answer: "誤り", explanation: "2. 誤り。リゾートホテルの最も稼働率が高いのは夏休みの時期にあたる8月である。（102テキストP.105参照）" },
  { subject: "102. 不動産証券化の概要", no: "34-3", question: "ホテル経営の指標として、一日あたり販売可能客室数あたり客室売上を指すRevPAR（Revenue Per Available Rooms）が用いられるが、これは平均客室単価（ADR、Average Daily Rate）と客室稼働率（OCC、Occupancy Rate）で算出される。", answer: "正しい", explanation: "3. 正しい。（102テキストP.104参照）" },
  { subject: "102. 不動産証券化の概要", no: "34-4", question: "ホテルの収入に関する指標として、平均客室単価（ADR）が用いられるが、これは「客室販売収入÷販売客室数」で算出される。また、販売客室数には実際には販売されなかった客室も含まれている。", answer: "誤り", explanation: "4. 誤り。実際に販売された客室数で除し、売れなかった客室は計算に含まない。（102テキストP.104参照）" },
  { subject: "102. 不動産証券化の概要", no: "35-イ", question: "一般的に、普通賃貸借契約を締結しているテナントの賃料が市場賃料と比較して低廉な場合は、更新時に直ちに市場賃料まで増額することが容易な場合が多い。", answer: "誤り", explanation: "イ. 誤り。一般的に、普通賃貸借契約を締結しているテナントの賃料が、市場賃料と比較して低廉な場合は、更新時に直ちに市場賃料まで増額することが困難な場合が多い。（102テキストP.127参照）" },
  { subject: "102. 不動産証券化の概要", no: "35-ロ", question: "一般的に、入居中のテナントの賃料が市場賃料よりも高位な場合は、テナントの退去リスクや賃料減額請求のリスクを考慮すべきである。", answer: "正しい", explanation: "ロ. 正しい。（102テキストP.127参照）" },
  { subject: "102. 不動産証券化の概要", no: "35-ハ", question: "一般的に、テナントが所有者（賃貸人）の関係会社である場合は、売却を契機に退去する可能性もあるため、取得後に空室リスクがあることに留意する必要がある。", answer: "正しい", explanation: "ハ. 正しい。（102テキストP.127参照）" },
  { subject: "102. 不動産証券化の概要", no: "35-ニ", question: "一般的に、更新を行い長期間入居しているテナントについては、現在の契約内容を確認するとともに過去の契約内容、条件変更の経緯も確認すべきである。", answer: "正しい", explanation: "ニ. 正しい。（102テキストP.126〜127参照）" },
  { subject: "102. 不動産証券化の概要", no: "36-イ", question: "感度分析とは、予想を立てる際、ある要素が変化した時に、最終的なキャッシュフローにどの程度の影響を与えるかをみる分析手法であり、結果の変動幅や結果に最も影響を与える要因を把握することができる。", answer: "正しい", explanation: "イ. 正しい。（102テキストP.150〜151参照）" },
  { subject: "102. 不動産証券化の概要", no: "36-ロ", question: "感度分析を行う上では、キャッシュフローや価格に影響を与えるすべての要因について、起こりえない範囲まで分析を広げて行うことが重要である。", answer: "誤り", explanation: "ロ. 誤り。感度分析を行う上では、キャッシュ・フローや価格に大きな影響を与える要因について把握し、起こりうる範囲で分析を行うことに留意する必要がある。あまり重要でない要因の分析や現実的でない範囲の分析は、かえって投資判断を過度に楽観的や悲観的にさせる場合もありうる。（102テキストP.150〜151、Web講義102第III部P.18参照）" },
  { subject: "102. 不動産証券化の概要", no: "36-ハ", question: "シナリオ分析とは、戦略立案する上で、リスク要因に対処するため、複数の異なる条件で戦略を分析する手法をいい、感度分析もシナリオ分析の一つと言える。", answer: "正しい", explanation: "ハ. 正しい。（102テキストP.151参照）" },
  { subject: "102. 不動産証券化の概要", no: "36-ニ", question: "シナリオ分析において、現状テナントが入居するが、将来の取り壊しを想定する場合は、テナントを退去させるために要する費用、建物の取り壊しに要する費用、建物の建て替えに要する費用はいずれの用途を想定する場合でも重要な検討事項である。", answer: "正しい", explanation: "ニ. 正しい。（102テキストP.154参照）" },
  { subject: "102. 不動産証券化の概要", no: "37-イ", question: "取引事例比較法は、市場性に着目した手法で、取引事例比較法を適用して求められた試算価格を積算価格という。", answer: "誤り", explanation: "イ. 誤り。取引事例比較法は、市場性に着目した手法であるが、取引事例比較法を適用して求められた試算価格は比準価格という。（102テキストP.195参照）" },
  { subject: "102. 不動産証券化の概要", no: "37-ロ", question: "原価法について、建物の減価修正の方法としては耐用年数に基づく方法と観察減価法があり、いずれかの方法を選択する。", answer: "誤り", explanation: "ロ. 誤り。建物の減価修正の方法としては耐用年数に基づく方法と観察減価法があり、原則としてこれらを併用する。（102テキストP.200参照）" },
  { subject: "102. 不動産証券化の概要", no: "37-ハ", question: "取引事例比較法を適用する際には、選択された取引事例が特殊な事情を含み、当該取引価格に影響していると認められるときは適正な補正を行わなければならない。これを事情補正という。", answer: "正しい", explanation: "ハ. 正しい。（102テキストP.198参照）" },
  { subject: "102. 不動産証券化の概要", no: "37-ニ", question: "収益価格を求める方法には、直接還元法とDCF法があるが、いずれの方法を適用するか、また、併用した場合にいずれの方法を重視するかは、対象不動産の種類、収集可能な資料の範囲及び評価目的に即して適切に選択することが必要である。", answer: "正しい", explanation: "ニ. 正しい。（102テキストP.202参照）" },
  { subject: "102. 不動産証券化の概要", no: "38", question: "以下の前提条件に基づいて、直接還元法を適用して収益価格を試算した場合、査定された収益価格として正しい金額はいくらか。なお、収益価格については、上3桁未満を四捨五入した金額とする。【前提条件】賃貸可能面積：3,000.00㎡、貸室月額賃料単価：6,000円/㎡、月額共益費単価：800円/㎡、共益費込み貸室賃料収入以外の収入はないものとする。空室等損失は、共益費込み貸室賃料収入（満室想定）の5.0％を計上すること。運営収益は、共益費込み貸室賃料収入から空室等損失を控除して査定すること。運営費用は、運営収益の25.0％を計上すること。敷金残高は貸室月額賃料の6ヶ月分を計上すること。建物再調達原価：1,820,000,000円、敷金の運用益は、敷金残高の1.0％を計上すること。資本的支出は、建物再調達原価の0.5％を計上すること。還元利回り：5.0％", answer: "3,330,000,000円", explanation: "直接還元法は一期間の純収益を還元利回りで還元して収益価格を試算する方法である。純収益は166,400,000円と計算され、還元利回り5.0%で割ると、収益価格は3,328,000,000円となる。上3桁未満を四捨五入して3,330,000,000円となる。（102テキストP.202〜208、P.214〜217、P.242〜243参照）" },
  { subject: "102. 不動産証券化の概要", no: "39", question: "以下の前提条件に基づいて、保有期間を5年間とするDCF法を適用し、DCF法による収益価格を試算した場合、査定された収益価格として正しい金額はいくらか。なお、保有期間満了時の売却価格及びDCF法による収益価格は上3桁未満を四捨五入した金額とする。【前提条件】1年目の純収益（NCF）を50,000,000円とし、2年目以降は各年対前年+5%、+5%、±0.0%、±0.0%、±0.0%で変動する。複利現価率は1年目0.95、2年目0.91、3年目0.86、4年目0.82、5年目0.78。保有期間満了時の売却価格は、6年目の純収益（NCF）を最終還元利回り（5.1%）にて還元し、査定すること。売却費用は、売却価格の2.0％として査定すること。復帰価格は、売却価格から売却費用を控除して査定すること。復帰価格の現在価値は、5年目の複利現価率を乗じて査定すること。割引率は5.0％として、前提条件の複利現価率に従い査定すること。", answer: "1,060,000,000円", explanation: "各年の純収益の現在価値合計は230,882,500円。6年目の純収益は55,125,000円であり、最終還元利回り5.1%で還元した売却価格は1,080,000,000円（上3桁未満四捨五入）。売却費用21,600,000円を引いた復帰価格は1,058,400,000円。これに5年目の複利現価率0.78を乗じた復帰価格の現在価値は825,552,000円。両者を合計したDCF法による収益価格は1,056,434,500円となり、上3桁未満を四捨五入して1,060,000,000円となる。（102テキストP.202〜209、P.218〜219、P.244〜245参照）" },
  { subject: "102. 不動産証券化の概要", no: "40", question: "遵法性の視点の一つに、建物の建設に関わる適正手続きを確認するという側面がある。建物竣工当時の遵法性の確保は、「検査済証」の書面をもって証明されることになるため、この書類は最も重要な書類のひとつである。この書類を紛失した場合には、「特定行政庁」から建築確認台帳に関わる記載事項証明というものを発行してもらえる場合がある。これら一連の申請・確認・検査は、建築物、建築設備、工作物を対象に行われる。特に「昇降機」は1台ずつこれらの手続きが行われ、それぞれにおいて書類が交付される場合があるので注意を要する。一方、遵法性には建物の管理が法的に適正に行われているかという視点もある。たとえば竣工後に法違反や無届の増改築がないか、「避難経路」に物が置かれていないかといった管理上の問題がないかを確認する側面である。この記述は正しいか。", answer: "正しい", explanation: "空欄を埋めた文章の通り正しい。（102テキストP.175〜177、Web講義102第III部P.47〜49参照）" },
  { subject: "102. 不動産証券化の概要", no: "41-1", question: "緊急を要する修繕更新費用の対象と判断されるものとして、現地調査時において機能していないものが挙げられる。", answer: "正しい", explanation: "1. 正しい。（102テキストP.171〜172参照）" },
  { subject: "102. 不動産証券化の概要", no: "41-2", question: "緊急を要する修繕更新費用の対象と判断されるものとして、消防法等の違反で、非常時において人命・安全に関わる事項が挙げられる。", answer: "正しい", explanation: "2. 正しい。（102テキストP.171〜172参照）" },
  { subject: "102. 不動産証券化の概要", no: "41-3", question: "緊急を要する修繕更新費用の対象と判断されるものとして、テナント誘致等を含むマーケティング上、重大なマイナス要因と思われるものが挙げられる。", answer: "誤り", explanation: "3. 誤り。この記載は短期修繕更新費用の内容である。（102テキストP.171〜172参照）" },
  { subject: "102. 不動産証券化の概要", no: "41-4", question: "緊急を要する修繕更新費用の対象と判断されるものとして、建物入居者、利用者、通行人にとって潜在的に危険なものが挙げられる。", answer: "正しい", explanation: "4. 正しい。（102テキストP.171〜172参照）" },
  { subject: "102. 不動産証券化の概要", no: "42-1", question: "地震リスク評価における予想最大損失（PML）は、当該地で想定される最大級の地震に対して、建物の構造のみならず『建物全般（建築・設備）』の損失率・損失額（物的損失）を算出するものである。", answer: "正しい", explanation: "1. 正しい。（102テキストP.177〜181、Web講義解説参照）" },
  { subject: "102. 不動産証券化の概要", no: "42-2", question: "複数物件のポートフォリオPML分析を行う場合でも、ER作成者により評価方法や評価結果が異なることは無い。", answer: "誤り", explanation: "2. 誤り。ER作成者により評価方法や評価結果は異なるため、ポートフォリオ分析を行うまたは行う可能性がある場合は、ER作成者（PML評価者）を1社に統一することが望ましい。（102テキストP.177〜181、Web講義解説参照）" },
  { subject: "102. 不動産証券化の概要", no: "42-3", question: "1981年以降に竣工した「新耐震基準」の建物であるが、地震リスク評価を行い、被害想定を算定して各種の判断を実施した。", answer: "正しい", explanation: "3. 正しい。（102テキストP.177〜181、Web講義解説参照）" },
  { subject: "102. 不動産証券化の概要", no: "42-4", question: "PMLの評価手法は、米国のASTM基準やBELCA等で複数の定義が有るため、ER作成者と協議して、最も適確と思われる手法で評価した。", answer: "正しい", explanation: "4. 正しい。（102テキストP.177〜181、Web講義解説参照）" },
  { subject: "102. 不動産証券化の概要", no: "43-1", question: "プロパティマネジメントの役割とは、投資家のために不動産ファンドの対象となる不動産を運用し、投資家のインカムゲインとキャピタルゲインの最大化を図ることである。", answer: "誤り", explanation: "1. 誤り。問題文はアセットマネジメントの説明である。（102テキストP.254、Web講義102第IV部P.3参照）" },
  { subject: "102. 不動産証券化の概要", no: "43-2", question: "プロパティマネジャーは、日常的な対象不動産の管理運営における実務の専門家として、維持管理レベルにかかわらず、コストカットを最優先することが重要である。", answer: "誤り", explanation: "2. 誤り。プロパティマネジメントでは維持管理のコストと品質を最適化することが肝要であって、コスト削減が最優先されるわけではない。（102テキストP.254、Web講義102第IV部P.4参照）" },
  { subject: "102. 不動産証券化の概要", no: "43-3", question: "広義のプロパティマネジメント業務は、「運営業務」と「建物管理業務」に分類できる。", answer: "誤り", explanation: "3. 誤り。狭義のプロパティマネジメントの説明となっている。広義のプロパティマネジメントはこれらに「リーシングマネジメント」と「コンストラクションマネジメント」を含む。（102テキストP.255、Web講義102第IV部P.7参照）" },
  { subject: "102. 不動産証券化の概要", no: "43-4", question: "プロパティマネジャーは、年間予算計画に基づき、月次の予実管理を行い、月次報告書（マンスリーレポート）を作成し、ビルオーナー（AM等）に報告する。", answer: "正しい", explanation: "4. 正しい。（102テキストP.254、Web講義102第IV部P.9〜10参照）" },
  { subject: "102. 不動産証券化の概要", no: "44-1", question: "テナント誘致計画の立案では、立地条件や交通利便性、ビルのグレード、競合物件の賃貸条件や稼働状況などを踏まえ、テナント誘致にかかわる広告宣伝費や仲介料などの費用の予算化も含めて検討される。", answer: "正しい", explanation: "1. 正しい。（102テキストP.273、Web講義102第IV部第2章P.14参照）" },
  { subject: "102. 不動産証券化の概要", no: "44-2", question: "入居申込書は、入居希望テナントとの契約条件交渉に先立って、書面により受領するものであり、一般的に法的拘束力を有する。", answer: "誤り", explanation: "2. 誤り。一般的に法的拘束力は有さない。（102テキストP.274、Web講義102第IV部第2章P.17参照）" },
  { subject: "102. 不動産証券化の概要", no: "44-3", question: "契約期間が2年以上の定期建物賃貸借契約の場合、建物の賃貸人は期間満了の1年前から6か月前までの間に賃借人に対し期間の満了により賃貸借が終了する旨の通知をしなければ、その終了を賃借人に対抗することができない。", answer: "正しい", explanation: "3. 正しい。「2年以上」は借地借家法第38条第6項の「1年以上」に含まれる内容であるため正しい。（102テキストP.276参照、※公式の正誤訂正あり）" },
  { subject: "102. 不動産証券化の概要", no: "44-4", question: "貸方基準は賃貸借契約の付随文書であり、賃貸借契約の内容を具体的に補充するため、館内の利用や管理に関する規則、注意事項などを定めたものである。", answer: "誤り", explanation: "4. 誤り。館内使用細則などの説明となっている。（102テキストP.278、P.282、Web講義102第IV部第2章P.21、P.26参照）" },
  { subject: "102. 不動産証券化の概要", no: "45-イ", question: "賃料改定などの条件の見直しは、主として賃貸借契約の更新期に行われるが、景気変動による影響を受けて行われることも多い。", answer: "正しい", explanation: "イ. 正しい。（102テキストP.279参照）" },
  { subject: "102. 不動産証券化の概要", no: "45-ロ", question: "入居工事は、「A工事」「B工事」「C工事」の3つの工事区分を設けるのが一般的であり、そのうち「C工事」とはビルオーナー側の指定業者、費用負担で施工する工事を指す。", answer: "誤り", explanation: "ロ. 誤り。A工事の説明となっている。C工事はテナント側の指定業者、費用負担で施工する工事を指す。（102テキストP.281、Web講義102第IV部第2章P.24参照）" },
  { subject: "102. 不動産証券化の概要", no: "45-ハ", question: "引越し作業にともなう養生などの費用は、通常、オーナー側の負担となる。そのためプロパティマネジャーは、適切に養生が施されているか特に注意して確認する必要がある。", answer: "誤り", explanation: "ハ. 誤り。引越し作業にともなう養生などの費用は、通常、テナント側の負担となる。（102テキストP.282、Web講義102第IV部第2章P.25参照）" },
  { subject: "102. 不動産証券化の概要", no: "45-ニ", question: "原状回復工事の実施に際しては「原状回復の範囲・程度」が問題とならないよう、賃貸借契約書には原状回復工事の範囲・程度を明確に定める必要がある。", answer: "正しい", explanation: "ニ. 正しい。（102テキストP.282、Web講義102第IV部第2章P.26参照）" },
  { subject: "102. 不動産証券化の概要", no: "46-イ", question: "定期整備業務は設備管理員にて、各種設備機器の運転状況を監視し、記録を取り、不具合や異常兆候があれば適切な措置を施すなどして快適な環境を維持する業務である。", answer: "誤り", explanation: "イ. 誤り。日常運転監視業務の説明となっている。（102テキストP.291〜292、Web講義102第IV部第3章P.31参照）" },
  { subject: "102. 不動産証券化の概要", no: "46-ロ", question: "建築物における衛生的環境の確保に関する法律（通称：建築物衛生法）では清掃する上での技術基準を定め、日常清掃や定期清掃（大掃除）が求められており、「特定建築物」についてはその実施を義務付けられている。", answer: "正しい", explanation: "ロ. 正しい。「特定建築物」については清掃の実施が義務付けられている。（102テキストP.293、Web講義102第IV部第3章P.33参照）" },
  { subject: "102. 不動産証券化の概要", no: "46-ハ", question: "ビルメンテナンス業務仕様の立案に際しては、仕様のみならずコストの面も意識し、無理・無駄のないものを検討する必要がある。", answer: "正しい", explanation: "ハ. 正しい。（102テキストP.298、Web講義102第IV部第3章P.35〜37参照）" },
  { subject: "102. 不動産証券化の概要", no: "46-ニ", question: "競争入札により建物管理業務の委託先を選定するうえでは、提案金額の一番安い委託先候補を選ばなくてはならない。", answer: "誤り", explanation: "ニ. 誤り。提案金額だけでなく、コストと品質の両面から検討する。（102テキストP.302、Web講義102第IV部第3章P.38参照）" },
  { subject: "102. 不動産証券化の概要", no: "47-イ", question: "物理的劣化とは、設備機器の性能の向上や利用者のニーズの変化、法令改正などにより、市場が求める価値基準より劣る状態のことで、改修を行うことで再び商品価値を上げ、競争力のある建物に仕立てることが可能となる。", answer: "誤り", explanation: "イ. 誤り。社会的劣化の説明となっている。（102テキストP.304、Web講義102第IV部第3章P.42参照）" },
  { subject: "102. 不動産証券化の概要", no: "47-ロ", question: "修繕計画を作成するにあたり必要となる情報は、主に、建物概要、資産と修繕の区分、修繕履歴、点検結果報告書、耐用年数、現地でのヒアリング調査である。", answer: "正しい", explanation: "ロ. 正しい。（102テキストP.307、Web講義102第IV部第3章P.6参照）" },
  { subject: "102. 不動産証券化の概要", no: "47-ハ", question: "長期修繕計画は概ね10年を超える修繕計画のことで、将来実行する更新工事のおおよその実施時期と概算金額の把握が目的であることから、定期的な見直しは行わない。", answer: "誤り", explanation: "ハ. 誤り。定期的な見直しが必要である。（102テキストP.308、Web講義102第IV部第3章P.46参照）" },
  { subject: "102. 不動産証券化の概要", no: "47-ニ", question: "工事が完了した際には、完了検査を行い、不備箇所があれば是正の指示をしたうえで工事費用の支払いを行う。", answer: "誤り", explanation: "ニ. 誤り。是正の完了と提出書類の完備が揃って初めて支払いに這入る。（102テキストP.311、Web講義102第IV部第3章P.48参照）" },
  { subject: "102. 不動産証券化の概要", no: "48-1", question: "改正省エネ法により今後の届出や定期報告にあたっては化石エネルギーだけでなく非化石エネルギーの使用状況やディマンドレスポンスの実績について報告することが求められることとなる。", answer: "正しい", explanation: "1. 正しい。（102テキストP.315、Web講義102第IV部第3章P.52参照）" },
  { subject: "102. 不動産証券化の概要", no: "48-2", question: "建築物のエネルギー消費性能の向上等に関する法律（通称、改正建築物省エネ法）では、賃貸不動産の所有者に対し、テナントとして利用している事業者へのエネルギー使用量の情報提供を努力義務として課している。", answer: "誤り", explanation: "2. 誤り。改正省エネ法等の説明になっている。（102テキストP.315〜316、Web講義102第IV部第3章P.53参照）" },
  { subject: "102. 不動産証券化の概要", no: "48-3", question: "インスペクションは建物の商品的な価値を維持・向上していくことを目的として実施するものであり、具体的には「営業診断」「管理診断」「建物診断」などがある。", answer: "誤り", explanation: "3. 誤り。ビル診断の説明になっている。（102テキストP.321〜322、Web講義102第IV部第3章P.58参照）" },
  { subject: "102. 不動産証券化の概要", no: "48-4", question: "建物の維持管理に潜むリスクの一つに設備機器の「リコール」がある。リコールがあった場合、常に製造者（メーカー）側から連絡があるため、連絡があった場合には速やかに修理などの対応を行う。", answer: "誤り", explanation: "4. 誤り。リコール製品への対応については、所有者などの使用者から連絡が必要な場合がある。（102テキストP.318、Web講義102第IV部第3章P.55参照）" },
  { subject: "102. 不動産証券化の概要", no: "49-1", question: "建築時は法に適合していたが、法令などの改正により不適合となった部分が生じた建築物は既存不適格建築物とされ、建設時点で法令に違反して建築された違反建築物とは区別する必要がある。", answer: "正しい", explanation: "1. 正しい。（102テキストP.352、Web講義102第IV部第4章P.81参照）" },
  { subject: "102. 不動産証券化の概要", no: "49-2", question: "低濃度PCB廃棄物は、政府全額出資の特殊会社である中間貯蔵・環境安全事業株式会社において、PCB特措法上の処分期限である2031年3月までに処理を行う。", answer: "誤り", explanation: "2. 誤り。政府全額出資の特殊会社である中間貯蔵・環境安全事業株式会社で処理を行うのは高濃度PCBである。また、低濃度PCBのPCB特措法上の処分期限は2027年3月となっている。（102テキストP.358〜359、Web講義102第IV部第4章P.86参照）" },
  { subject: "102. 不動産証券化の概要", no: "49-3", question: "建設業法は、建設工事の請負契約の当事者に対して、請負契約書の記載事項及びその相互交付について義務を課している。", answer: "正しい", explanation: "3. 正しい。（102テキストP.345、Web講義102第IV部第4章P.76参照）" },
  { subject: "102. 不動産証券化の概要", no: "49-4", question: "大気汚染防止法は石綿を特定粉じんとして規制している。2020年改正では規制対象が、石綿スレートや石綿含有成形板などの非飛散性石綿含有建材に拡大し、事前調査結果の報告や、作業記録の作成、保管の義務化などが定められた。", answer: "正しい", explanation: "4. 正しい。（102テキストP.355、Web講義102第IV部第4章P.83〜84参照）" },
  { subject: "102. 不動産証券化の概要", no: "50-1", question: "2022年に開催された国連生物多様性条約第15回締約国会議において、「愛知目標」の後継であり2020年以降の生物多様性に関する世界目標となる「昆明・モントリオール生物多様性枠組」が採択された。", answer: "正しい", explanation: "1. 正しい。（102テキストP.368、Web講義102第IV部第4章P.92参照）" },
  { subject: "102. 不動産証券化の概要", no: "50-2", question: "改正建築物省エネ法（建築物のエネルギー消費性能の向上等に関する法律）が2022年6月に公布され、中・大規模（300㎡以上）の非住宅の新築等を行う建築主に対して課している省エネ基準への適合義務の対象が、小規模非住宅及び住宅にも拡大された。", answer: "正しい", explanation: "2. 正しい。（102テキストP.369、Web講義102第IV部第4章P.92参照）" },
  { subject: "102. 不動産証券化の概要", no: "50-3", question: "テナント企業による脱炭素化への取組みを取りまとめた「リーディングテナント行動方針」を環境省が策定し、2022年1月に初回の賛同者が公表された。", answer: "正しい", explanation: "3. 正しい。（102テキストP.385〜386、Web講義102第IV部第4章P.103参照）" },
  { subject: "102. 不動産証券化の概要", no: "50-4", question: "建物の環境性能を総合的に評価する代表的な環境性能評価として米国のLEEDや日本のCASBEEがある。また、ウェルネスに特化した評価としてはCASBEE-ウェルネスオフィスやWELL認証があり、建物の省エネルギー性能に特化した評価としては、欧州の年金基金グループが中心となって創設されたGRESBがある。", answer: "誤り", explanation: "4. 誤り。GRESBの説明が誤り。建物の省エネルギー性能に特化した評価としては建築物省エネルギー性能表示制度（BELS）がある。なお、GRESBは欧州の年金基金グループが中心となって創設された世界の不動産ポートフォリオにおけるサステナビリティパフォーマンスを測定するベンチマークであり、2009年より運用が開始されている。（102テキストP.374、P.380〜381、Web講義102第IV部第4章P.97〜100参照）" },
  { subject: "103. 不動産投資の基礎", no: "1-イ", question: "倒産隔離とは、借手であるSPCが債務超過とならないようにするための措置を意味することがある。SPCが債務超過とならないようにするための具体的手法として、SPCの役員が、SPCに対して倒産手続き開始の申立てをしないように誓約するということがある。", answer: "誤り", explanation: "SPCが倒産しないこと、そのために債務超過とならないようにすることも倒産隔離の一つの意味である。しかし、債務超過を防ぐための手法として倒産手続き開始の申立てをしないように誓約するわけではない。誓約するのは、債務超過になるか否かに拘わらず、仮になったとしても、手続き開始の申立てはしないということである。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "1-ロ", question: "倒産隔離とは、証券化の対象となる宅地建物の売主との関係で、当該売主から不動産等を譲り受けるSPCが売主の倒産手続きの影響を受けないようにするための措置を意味することがある。その具体的方法として、売主が債務超過にならないようにする措置や、売主が債務超過になっても買主であるSPCが売主に対して倒産手続き開始の申立てをしないように誓約するということがある。", answer: "誤り", explanation: "倒産隔離という概念のなかには、売主からの倒産隔離という意味があり、それは後日売主が倒産したとしても、買主たるSPCが売主と締結した不動産の売買取引が影響を受けないようにするという意味である。売主が倒産しないような措置を買主たるSPC側がとるということはない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "1-ハ", question: "証券化の対象となる不動産の売買契約に関して買主となるSPCが留意すべき点として、不動産が真正に譲渡された場合でも、売主が倒産手続きに入った場合に、売主側から否認権を行使されないようにするという点がある。不動産の場合には、適正な対価であっても、不動産を費消しやすい金銭に替えてしまう売買取引は、この否認権を行使されるリスクが高い。", answer: "誤り", explanation: "売主が倒産した場合に売主側から売買契約を否認されないようにするという点も広い意味では倒産隔離と言える。ただし、この場合は真正売買性が議論されるわけではなく、民法上の詐害行為取消権と同様に、売主の売却行為が売主の債権者を害する行為であったか否かの問題である。この否認や取消しという行為に関しては、適正価格による不動産の売却には原則として適用されないという法律上の規定がある。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "1-ニ", question: "売主が倒産する可能性がない場合でも、対象不動産を真正に譲渡するかどうかは、売主の会計上、当該売買をどのように処理するか（売主の資産から切り離すことができるか）という判断に影響を受ける。この点、会計上はいわゆる5%ルールというものがあるが、この会計上のルールと法律上の真正譲渡性の議論は密接に関連している。", answer: "正しい", explanation: "法律上の真正売買性の議論をする際に会計上のオフバランスの議論が影響してくることは確かである。法的観点からだけで真正譲渡の判断をしても、それが会計上オフバランスされていない場合には、法律会計税務が一体となっている証券化の仕組み上、適正な法的判断と言えるかという問題があり、密接に関係している。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "2-イ", question: "現物不動産を取得・保有するために投資家との間で匿名組合契約を締結し、現物不動産の賃貸によって生じた利益を投資家に分配する仕組みは、不動産特定共同事業法（不特法）の適用があるため、不特法上、特別目的会社の性質を有する合同会社が当該現物不動産の保有主体となることはできない。", answer: "誤り", explanation: "不特法上、特例事業では、対象となる現物不動産の保有主体としてSPCである合同会社を選択できる。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "2-ロ", question: "資産の流動化に関する法律上の特定目的会社（TMK）は現物不動産だけではなく信託受益権も取得することができるが、現物不動産を取得した場合には同時に信託会社に信託をする必要があるため、TMKでは不動産信託受益権の形態で保有及び売却する必要がある。", answer: "誤り", explanation: "TMKは現物不動産も不動産信託受益権も取得できるが、特定資産の管理及び処分に係る業務を行わせるため、これを信託会社等に信託しなければならないとされている。ただし、特定資産が現物不動産の場合には、当該資産の管理及び処分を適正に遂行するに足りる財産的基礎及び人的構成を有する者にその業務を委託することができるとされている。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "2-ハ", question: "投資信託及び投資法人に関する法律上の登録投資法人が現物不動産のみを取得・保有・売却する場合でも、当該登録投資法人は、有価証券の運用をするわけではないが、金融商品取引法上の投資運用業の登録をしている資産運用会社と資産の運用に係る業務の委託契約を締結する必要がある。", answer: "正しい", explanation: "投資法人も特定資産として現物不動産等を取得できるが、登録投資法人は資産運用会社に運用に係る業務の委託をしなければならない。特定資産に現物不動産が含まれる場合には、資産運用会社は金商法上の金融商品取引業者（投資運用業者）としての登録のほかに宅建業法の免許等が必要となる。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "2-ニ", question: "投資家から資金調達を行う親ファンドが別の合同会社やTMKを子ファンドとして個別の対象不動産等を取得・保有・売却していく二層構造の仕組みにおいて、投資事業有限責任組合契約に関する法律上の投資事業有限責任組合（有責組合）を親ファンドとして利用することができる。", answer: "正しい", explanation: "二層構造のファンドの仕組みでは、投資家から直接の出資を受ける親ファンドとして投資事業有限責任組合を利用することができ、有責組合が親ファンドとして資金調達をする場合がある。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "3-イ", question: "Aは、現物不動産であるマンション一棟を所有していたが、Mとマスターリース契約を締結して一括賃貸をし、Mがテナントとの間で個別の転貸借契約を締結していた。Aは、マンション一棟全てを信託受託者に信託譲渡したが、それによって得た不動産信託受益権はSPCに譲渡する。この事例において、信託受託者はAとM間のマスターリース契約上のAの賃貸人としての地位を自動的に承継し、この点についてテナントから承諾を得る必要はない。", answer: "正しい", explanation: "現物不動産の信託に伴う賃貸人の地位の移転に関する規定（民法第605条の2）が適用される。転貸借契約は従前と何ら変わりなく存続するため、テナントは何らの不利益をうけず、テナントの承諾は不要となる。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "3-ロ", question: "上記イの事例において、A、M、信託受託者及びSPC間で、Aから信託受託者への信託による所有権移転と同時に、信託受託者と賃貸借契約を締結するものを従前のマスターリース契約上のマスターレッシーであるMからLに変更することを合意した。この場合、Lが、Mとテナント間の転貸借契約上のMの地位をMから承継するためには、テナントの承諾を要する。", answer: "正しい", explanation: "この場合には、Lをテナントの関係で新たな転貸人とするため、契約上の地位の変更の原則どおり、テナントの承諾が必要となる。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "3-ハ", question: "上記イの事例において、Aから信託受託者への信託による所有権移転と同時に、Aが信託受託者との間で賃貸人の地位（Mを賃借人とするマスターリース契約上の賃貸人の地位）を留保する合意をし、受託者からAへ賃貸する合意をした。この場合、AがMと転貸借契約関係に入ることにいてMの承諾は不要である。", answer: "正しい", explanation: "民法第605条の2第1項第一文により、信託受託者からAへの賃貸借契約、AからMへの転貸借契約が成立する。この場合Mの承諾は不要となる。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "3-ニ", question: "上記ハでAから信託受託者への信託による所有権移転に伴い、Aが信託受託者との間で賃貸人の地位を留保する合意をし、受託者からAへ賃貸する合意をした結果、信託受託者からAへの賃貸借契約、AからMへの転貸借契約が成立している場合に、信託受託者及びA間の賃貸借契約が終了したとすると、信託受託者及びM間での賃貸借契約が生じる。", answer: "正しい", explanation: "信託受託者及びA間の賃貸借契約が終了した場合、民法第605条の2第1項第二文により、譲渡人であるAが留保していた賃貸人（転貸人）たる地位は信託受託者に移転するので、信託受託者とM間の賃貸借契約が生ずることとなる。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "4-イ", question: "現物不動産を保有しているA社は、当該不動産を契約に基づき信託して、信託受益権は保有したまま、信託受託者B社を借主として銀行から融資を受けさせ、信託受託者が信託不動産に抵当権を設定した。信託受託者が融資によって得た資金は受益者としてのA社が受領した。この事例において、融資銀行は、信託受託者及び受益者A社に対して、直接、融資金の返還請求権を有する。", answer: "誤り", explanation: "受託者が信託財産を担保にして融資を受ける場合の融資債務は信託財産責任負担債務となる。受益者は債権者に対して直接の権利義務関係に立たないため、A社（受益者）は実質的に融資の利益の享受者であっても、融資銀行はA社に直接融資金の返還請求権を有しない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "4-ロ", question: "上記イの事例において、信託受託者が融資銀行との間で、融資金の返還請求権の責任財産を当該信託財産のみに限定する特約（責任財産限定特約）を融資契約上合意すると、信託受託者の融資返還債務は信託財産限定責任負担債務となる。", answer: "正しい", explanation: "責任財産を信託財産のみに限定した場合、信託財産責任負担債務のうちでも「信託財産限定責任負担債務」となる。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "4-ハ", question: "上記イの事例において、責任財産限定特約の合意をしていなかったとすると、受託者は融資返済債務について自らの財産で返済の責任を負うが、受託者は受益者との間で、受託者が自らの財産で返済した金額等について償還請求できることを合意することはできない。", answer: "誤り", explanation: "責任財産限定特約がない場合、信託受託者の固有財産も責任財産となるので、信託受託者は固有財産で融資債務全額を返済する責任がある。しかし、受益者は、その同意があれば、信託受託者からの費用償還請求を受けることになる。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "4-ニ", question: "上記イの事例において、信託設定行為以前にA社に対して債権を取得していたA社の債権者C社は、A社による当該不動産の信託設定による所有権移転行為が詐害行為に該当するとして、その取消を請求することができる場合がある。ただし、C社は信託契約が有効である期間中は信託財産である当該不動産に対して仮差押えをすることはできない。", answer: "正しい", explanation: "信託財産の独立性という性質から、信託財産責任負担債務に係る債権者ではない場合は、信託財産に対して仮差押え等ができない。一方で、委託者がその債権者を害することを知って当該信託をしたときは、一定の要件のもと詐害行為取消請求をすることができる場合がある。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "5-イ", question: "特定目的会社は資産流動化法に基づき設立される会社で、設立方法は合同会社より厳格であり、定款の公証人による認証や出資の払込金保管証明の取得などが必要とされている。税法上の導管性を有するという点や、流通税の減免を受けることができるという点で、不動産証券化の媒体として利用されている。", answer: "正しい", explanation: "特定目的会社の設立方法は、合同会社の設立方法と比較すると厳格であり、簡便性はない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "5-ロ", question: "特定目的会社では、株主と似た機関として優先出資社員と特定社員が必ず存在するが、役員としては取締役が1名以上、監査役が1名以上いれば足り、代表取締役や会計監査人の選任は任意となっている。", answer: "誤り", explanation: "特定目的会社には特定社員と優先出資社員が存在しうるが、両社員が必ず存在しなければならないとは規定されていない。特定社員だけで優先出資社員が存在しない第一種特定目的会社という区分もある。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "5-ハ", question: "特定目的会社は、最初に資産流動化計画を提出する事業開始届出時までに、特定資産である現物不動産の売買契約の締結や特定資産管理処分委託契約の締結をする必要はなく、それらの契約は特定資産取得時までに締結していれば良い。", answer: "誤り", explanation: "特定目的会社では資産流動化計画の最初の提出時、つまり業務開始届出時において、特定資産の売買契約書の締結済み写しや特定資産管理処分委託契約書の締結済み写しを添付する必要がある。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "5-ニ", question: "不動産信託受益権を特定資産とする特定目的会社では、資産流動化法上、特定資産管理処分受託者、投資運用業者等の選任は必要とされていない。しかし、不動産信託受益権の売却時に売却に関する投資判断を第三者に一任することは可能であり、その一任を業として受任する第三者は、金商法上の投資運用業の登録をしている必要がある。", answer: "正しい", explanation: "特定資産がはじめから信託受益権の場合には、管理処分受託者である信託受託者が既に存在するので、資産流動化法上の管理等の委託は必須ではない。しかし、特定目的会社が主体の有価証券である不動産信託受益権についての投資判断の一任をする場合には、登録をしている投資運用業者に委託する必要がある。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "6-1", question: "投資法人は規約で定めた一定の運用方針のもとで、不動産市場から現物不動産や不動産信託受益権を反復継続して取得し売却していくものであるため、資産運用会社の選定が極めて重要となる。ただし、投資法人が登録投資法人となる際には、すでに資産運用会社は決定されているため、実際に投資主が資産運用会社との契約の締結に関して議決権の行使をするという事態はまれである。", answer: "正しい", explanation: "投資法人は登録の際には締結済みの資産運用委託契約を添付しなければならず、規約には設立時の運用会社も記載されるので、投資主において資産運用会社の選定は所与の前提となっている。運用期間中に運用会社が交代するような例外的な事態を除き、投資主が議決権を行使する事態はまれである。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "6-2", question: "投資法人による不動産等の取得及び売却は、投資法人の役員会の決議事項となっているとはいえ、投資法人の役員会を構成する執行役員等に関しては不動産等に関する運用判断についての専門的知識等が要求されていない。そのため、役員会での決議の際には、投資判断の専門家である資産運用会社の運用判断を尊重するという慣行がある。", answer: "誤り", explanation: "投資法人は、資産の運用に係る業務を資産運用会社に委託しなければならず、不動産の取得や譲渡に係る投資判断もこれに含まれる。投資法人の役員会の決議事項には、不動産等の取得や売却は含まれない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "6-3", question: "投資法人の執行役員は資産運用会社を監督する立場を有しているため、資産運用会社の代表者が、運用の委託を受けている投資法人の執行役員に就任することは、法律上禁止されている。", answer: "誤り", explanation: "資産運用会社の代表者が、運用委託を受けている投資法人の執行役員に就任することは、法律上特に禁止されていない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "6-4", question: "投資法人は投信法上、規約で投資主の請求により投資口の払戻しをしない旨を規定することができるが、上場投資法人になる場合に限り、投資口の市場での流動性が確保されるため、規約で投資主の請求により投資口の払戻しをする旨を規定することもできる。", answer: "誤り", explanation: "上場投資法人は投資口の市場での流動性が確保されているため、規約で投資主の請求により投資口の払戻しを「しない」旨を規定することがほとんどである。私募REITにおいては流動性が確保されていないため、払戻しを「する」旨を規定することがほとんどである。「上場投資法人になる場合に限り…払戻しをする旨を規定することができる」とする点が誤り。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "7-イ", question: "金商法は、ファンド規制として、SPC自体が金融商品取引行為に該当する行為をする場合もあるものとして規制されている。匿名組合の営業者として匿名組合員から出資を受けて不動産信託受益権に投資をする行為は自己運用行為となる。しかし、特定目的会社が不動産信託受益権に投資をする場合でも、特定目的会社が金商法上の自己運用行為をしていることにはならない。", answer: "正しい", explanation: "特定目的会社の出資は、自己運用行為となる一定の投資家からの出資等に含まれないため、自己運用行為をしていることにはならない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "7-ロ", question: "金融サービス法上の重要事項の説明は、顧客の知識、経験等に照らして理解されるために必要な方法及び程度によるものでなければならないとしているが、金商法には顧客の知識、経験等に照らして不適当と認められる勧誘を行ってはならないという規定があり、これは適合性の原則を意味する。", answer: "正しい", explanation: "金商法上の、顧客の知識、経験、財産の状況及び金融商品取引契約を締結する目的に照らして不適当と認められる勧誘を行ってはならないという規定は、金商法第40条第1号の適合性の原則である。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "7-ハ", question: "不特法上の匿名組合契約型の不動産特定共同事業契約に基づく特例事業の場合には、匿名組合出資持分は金商法上のいわゆる第二項有価証券となるが、当該契約の締結を勧誘する際に匿名組合員となる者が500人以上となる場合には、金商法上の新規有価証券の募集となり、金商法上の募集に関する開示規制が適用される。", answer: "誤り", explanation: "金商法の開示規制を受ける「募集」となるのは、営業者の事業が有価証券投資事業となるような場合を前提としている。不特法上の特例事業の場合は有価証券投資をするわけではなく現物不動産に投資するため、金商法上の公開開示規制は受けない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "7-ニ", question: "不動産信託受益権に投資をする匿名組合契約上の権利を有する個人が、別の個人の投資家に当該権利を販売する場合、消費者契約法は例えば売主側の個人だけが事業者となる場合などに適用されるが、金商法はどのような場合であっても当該権利を購入する個人投資家に適用されることはない。", answer: "誤り", explanation: "匿名組合出資持分は金商法上の有価証券であるから、有価証券の売買という金融商品取引行為を業として行う場合には、個人であっても金商法上の登録義務がある。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "8-イ", question: "不動産信託受益権については、金商法上の有価証券とみなされるようになったことに伴い、当該受益権を紙媒体に表示した受益権証書を引き渡すことが権利移転の対抗要件となった。", answer: "誤り", explanation: "金商法は信託受益権の権利移転の対抗要件まで定めているわけではなく、信託受益権については信託法第94条が対抗要件を定めている（指名債権譲渡と同様の方式）。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "8-ロ", question: "不特法上の第一号事業者は自ら投資家勧誘行為を行うことができるが、特例事業者は、匿名組合契約型の不動産特定共同事業契約を締結する場合、金商法上の集団投資スキーム持分を発行することになるため、不特法上の事業者ではなく金商法上の第二種金融商品取引業者に勧誘に係る業務の委託をする必要がある。", answer: "誤り", explanation: "特例事業における不動産保有主体たる特例事業者は、契約の締結の勧誘に係る業務を「不特法上の第四号事業者」に委託しなければならないのであり、金商法上の第二種金融商品取引業者に直接委託するわけではない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "8-ハ", question: "不動産信託受益権に投資をする匿名組合契約の匿名組合員の権利は第二項有価証券であるが、当該権利が電子情報処理組織を用いて移転することができる財産的価値に表示されると、その権利は電子記録移転権利に該当する場合があり、該当する場合には、第一項有価証券となる。", answer: "正しい", explanation: "第二項有価証券であっても、電子記録移転権利に該当する場合には流通性を付与されるため、第一項有価証券の取扱いとなる。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "8-ニ", question: "特定目的会社の優先出資証券は金商法上の第一項有価証券となるが、金商法第2条第2項で規定されている優先出資証券に表示される権利（有価証券表示権利）も第一項有価証券となる。", answer: "正しい", explanation: "特定目的会社の優先出資証券は金商法上の第一項有価証券であり、それに表示される権利も第一項有価証券としてみなされる。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "9-イ", question: "金融商品取引業者等の行為規制については、特定投資家と一般投資家で適用関係が異なる場合がある。例えば、不特法上の不動産特定共同事業者にも準用されている損失補填等の禁止という規制は、補填をする相手方が特定投資家の場合には適用がない。", answer: "誤り", explanation: "損失補填等の禁止は、投資家の属性（特定投資家であるか一般投資家であるか）によらず一律に適用される。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "9-ロ", question: "宅建業法上の宅建業者でもある第二種金融商品取引業者が不動産信託受益権の販売の媒介行為を行う場合、販売の相手方が特定投資家である場合には、金商法上の義務は負わないが、宅建業法上の一定の重要な事項についての説明義務は負う。", answer: "誤り", explanation: "宅建業法上の説明義務についても、相手方が金商法上の特定投資家である場合には適用が除外される（一定の場合この限りではない、に含まれる）。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "9-ハ", question: "販売の媒介行為を行う第二種金融商品取引業者が、買主のためにも売買の媒介を行う場合、買主が金商法上の適格機関投資家である場合や特定目的会社である場合には、あらかじめ当該買主に対して金商法上のオプトアウト手続き（特定投資家が一般投資家になること）の告知をする義務がある。", answer: "誤り", explanation: "特定目的会社はオプトアウト告知の対象となるが、適格機関投資家はそもそもオプトアウトの対象にはならないため、オプトアウト手続きの告知義務はない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "9-ニ", question: "不動産信託受益権に投資をする匿名組合の営業者として自己運用行為を行い、投資家勧誘を行う者が、適法な適格機関投資家等特例業務の届出をした場合、当該営業者は法定の特定投資家であるため、投資家勧誘をする際に投資家に金商法上の契約締結前書面の交付をするという行為規制の適用を受けない。", answer: "誤り", explanation: "適格機関投資家等特例業務の届出をした者も特定投資家となるが、投資家に対して契約締結前書面等の交付義務の適用を受けるかどうかは、勧誘の相手方（投資家）が特定投資家であるか否かによる。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "10-イ", question: "1995年から施行されている不特法は、現物不動産取引から生じる利益を多数の投資家に分配するための共同投資の仕組みを規定する法律であるが、立法の背景として、1980年代後半からのバブル経済下において不動産小口化商品が出現し投資家を保護する必要性があった。", answer: "正しい", explanation: "不特法制定の背景として正しい内容である。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "10-ロ", question: "資産流動化法は、資産を流動化するための仕組みを特別に作る法律であるが、特定目的会社が現物不動産を売買する場合でも、業務開始届出をした特定目的会社に宅建業法の適用はないものとされた。", answer: "正しい", explanation: "資産流動化法上の業務開始届出等を行った特定目的会社は、宅建業法の適用を受けない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "10-ハ", question: "バブル経済崩壊後の1997年頃から合同会社（当時は有限会社）をSPCとして匿名組合契約によりエクイティ資金の出資をうけ、不動産投資を行う仕組みが出現したが、当時不特法が施行されていたため、SPCが取得する資産は現物不動産ではなく不動産信託受益権になった。", answer: "正しい", explanation: "GK-TK方式の由来に関する説明として正しい。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "10-ニ", question: "2000年に改正施行された投信法で初めて、不動産を特定資産として保有する投資法人が組成可能となり、2001年に初めてJ-REITという運用型の投資商品が出現した。", answer: "正しい", explanation: "2000年の法改正により不動産が特定資産の対象となり、J-REITが組成可能となった。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "11-イ", question: "不特法上の第二号事業者である会社の従業員Aは、第一号事業者が任意組合型の契約で現物不動産の共有持分の出資を受け、金銭で出資の返還を行う商品を個人に勧誘した。この事例の場合、出資をした個人は、金融サービス法上の保護規定の適用を受けることができる。", answer: "誤り", explanation: "金融サービス法の適用を受ける不特法上の商品は、金銭をもって出資を受け、かつ契約の終了の場合における出資の返還が金銭により行われる契約に限定されており、現物出資型の任意組合型不動産特定共同事業契約には金融サービス法の適用はない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "11-ロ", question: "上記イの事例において、Aは「1年後における出資持分の相続税の評価額は300万円となり、その時点で1,300万円で売却できる」旨を告げて商品を販売した。商品購入時から1年後に金融危機が発生し不動産価格が大幅に下落したとして、従業員Aの説明は、通常とは異なる想定外の事態が事後的に生じたために間違ったものとなったとしても、適用のある法令上、断定的判断の提供となる。", answer: "正しい", explanation: "不確実な事項について断定的判断を提供し、又は確実であると誤解させるような説明は、事後的な事情の変動に関わらず、不特法等の規定による禁止行為（断定的判断の提供）に該当し得る。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "11-ハ", question: "上記イの事例において、出資をした個人は消費者契約法上の契約取消権の行使を考えたが、消費者契約法の当事者である第一号事業者自体が消費者契約法上取消し得る行為（断定的判断の提供）をしたわけではないため、当該個人投資家は消費者契約法上の取消権を行使することはできない。", answer: "誤り", explanation: "消費者契約の当事者（事業者）以外の者（例えば媒介業者やその従業員）が取消の対象となる行為をした場合でも、消費者契約法第4条の取消権の行使は可能である。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "11-ニ", question: "上記イの事例において、従業員Aが、勧誘行為の相手方である個人が不動産投資の仕組みを理解できないことを知りながら勧誘行為を行った場合、不特法上、違法な勧誘行為となり得る。", answer: "正しい", explanation: "不特法第21条の2が準用する金商法第40条第1項の適合性の原則により、投資者の知識、経験等に鑑み、その保護に欠けるような不適切な勧誘行為は禁止されている。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "12-イ", question: "不動産投資商品として、宅建業者が個人に対して投資用賃貸マンション（現物不動産）の販売を勧誘するだけであれば、消費者契約法や金融サービス法の適用はない。", answer: "誤り", explanation: "現物不動産の販売だけであれば金融サービス法の適用はないが、宅建業者自身が個人であっても事業者としての販売であれば、相手が個人消費者である場合には消費者契約法の適用がありうる。「消費者契約法の適用はない」と言い切ることはできない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "12-ロ", question: "賃貸マンションを投資対象とする共同投資商品を組成しようとすると、不特法を使うか、特定目的会社を使うか、信託受益権化して合同会社を使うか、投資法人を使うかの選択肢があるが、投資事業有限責任組合が現物不動産を直接保有する方式は使えない。", answer: "正しい", explanation: "投資事業有限責任組合が遂行できる事業目的のなかには現物不動産の取得及び保有は原則としてないため、現物不動産を直接保有する方式は使えない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "12-ハ", question: "現物不動産の投資商品を組成・販売したい不動産会社に、証券化の仕組みや販売戦略を助言し、必要な許認可の取得や契約書作成の補助業務を行う者は、その限度にとどまる限り、自ら不特法や金商法上の許認可取得、登録、届出をする必要はない。", answer: "正しい", explanation: "単なる助言や補助業務の範囲にとどまる限り、不特法上の不動産特定共同事業や金商法上の金融商品取引業には該当せず、自ら許認可や登録等を取得する必要はない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "12-ニ", question: "金商法では有価証券の取得を基準に勧誘を規定しているが、不特法では契約を基準に勧誘を規定している。また、一定の重要な事項を説明する書面の交付義務について、金商法上は私募の場合に金融商品取引契約の締結前の書面の交付義務を規定し、不特法では不動産特定共同事業契約の成立前の書面の交付義務を規定している。", answer: "正しい", explanation: "それぞれの法律における勧誘の概念や書面交付義務の規定に関する説明として正しい。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "13-イ", question: "GK-TK方式の私募ファンド（Xファンド）の一任運用を受託しているA社が、一任運用する別の私募ファンド（Yファンド）に当該不動産信託受益権を運用業務として売却した。この売却行為は、運用財産相互間における取引となり、投資運用業者の忠実義務との関係で、原則として金商法上、禁止される。", answer: "正しい", explanation: "運用会社による運用財産相互間の取引は金商法第42条の2の第2号で原則禁止されている。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "13-ロ", question: "上記イの運用財産相互間取引において、例外的に許容される取引となる場合があり、そのためには、A社において、各ファンドの匿名組合営業者に対して事前の説明を行い、かつ全員から同意を取るだけで足りる。", answer: "誤り", explanation: "金商法等の内閣府令により、例外的に許容される要件として「双方の運用財産のすべての権利者（GK-TK方式の場合には匿名組合員）」に対する事前説明と同意が必要となる。営業者（委託者）だけの同意では足りない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "13-ハ", question: "上記イの運用財産相互間取引において、売買価格は、不動産信託受益権に係る信託不動産の鑑定評価額と同一で行わない限り、A社の運用行為は忠実義務違反となる。", answer: "誤り", explanation: "運用財産相互間取引で許容される要件として「合理的な方法により算出した価額」により行う取引とあるが、必ずしも不動産鑑定価額と同一でなければ直ちに忠実義務違反になるというわけではない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "13-ニ", question: "上記イの事例において、Yファンドの運用担当者が不動産鑑定士に圧力をかけ、通常のキャップレートよりも高くして得られた鑑定評価額でA社が売買をした場合には、A社は忠実義務に違反する行為をしたことになる。", answer: "正しい", explanation: "A社は両ファンドに対して忠実義務を負うため、Yファンドの利益を図る不当な圧力により価格を歪めて取引することは、Xファンドに対する忠実義務違反となる。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "14-イ", question: "資産流動化法に基づく特定目的会社は、資産の流動化に係る業務を行うときは、あらかじめ資産流動化計画を監督官庁に提出しなければならない。", answer: "正しい", explanation: "資産流動化法第4条第1項に基づく義務である。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "14-ロ", question: "資産流動化法に基づき特定目的会社を設立する場合の最低資本金は1,000万円である。", answer: "誤り", explanation: "現在、資産流動化法に基づく特定目的会社に関する最低資本金制度は撤廃されている。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "14-ハ", question: "不動産証券化商品の組成にあたっては、債務不履行の発生確率が低くなるように留意し、かつ不動産証券化商品の債務不履行に備えるための費用を必ず留保しなければならない。", answer: "誤り", explanation: "一般に債務不履行の費用をあらかじめ留保することまでは行われていない。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "14-ニ", question: "SPVを利用している不動産証券化商品は、SPVの役職員が重要な意思決定及び事務管理業務の全てを担うため、キャッシュ・フローが十分であれば、債務不履行に陥ることはない。", answer: "誤り", explanation: "一般にSPVそれ自体は空箱であり、事務管理業務の多くを外部に委託する。また、キャッシュ・フローが十分でも契約上などの理由で債務不履行状態に陥るリスクはある。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "15-イ", question: "金融商品取引業を行うためには、原則として監督官庁の登録を要するが、例外として1名以上の適格機関投資家及び99名以下の適格機関投資家以外の者を相手方として行う集団投資スキーム持分の私募は、届出をもって行うことができる。", answer: "誤り", explanation: "適格機関投資家等特例業務は届出をもって行うことができるが、適格機関投資家以外の者は「49名以下」である必要がある。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "15-ロ", question: "第二種金融商品取引業には、集団投資スキーム持分等の自己募集、二項有価証券の売買、私募の取扱いが含まれるが、二項有価証券の売買の媒介・取次ぎ・代理は含まれない。", answer: "誤り", explanation: "二項有価証券の売買の媒介・取次ぎ・代理も、第二種金融商品取引業に含まれる。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "15-ハ", question: "投資運用業のうち、不動産信託受益権又はこれを主な投資対象とする組合に投資するものを不動産関連特定投資運用業といい、これを含めて登録を受ける場合には、人的構成等の登録の要件が加重される。", answer: "正しい", explanation: "不動産関連特定投資運用業を含めて登録を受ける場合は、通常の要件に加えて人的構成等の要件が加重される。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "15-ニ", question: "銀行は、自己投資で行う場合を除き、原則として有価証券売買等を行うことができないが、第一種金融商品取引業者としての登録を受ければこれを行うことができる。", answer: "誤り", explanation: "銀行が有価証券関連の一定の業務を行う場合は、第一種金融商品取引業者としての登録ではなく、金商法上の「登録金融機関」としての登録を受けることによって行う。（103テキスト等参照）" },
  { subject: "103. 不動産投資の基礎", no: "16-1", question: "不動産特定共同事業には、大きく分けて現物不動産から生じる収益を分配するものと、不動産信託受益権から生じる収益を分配するものがある。", answer: "誤り", explanation: "不動産特定共同事業は現物不動産から生じる収益を分配することを内容とする。（103テキストP.238参照）" },
  { subject: "103. 不動産投資の基礎", no: "16-2", question: "特例事業者を当事者とする不動産特定共同事業契約の締結の代理又は媒介を行う場合、不動産特定共同事業の許可に加え、第二種金融商品取引業の登録を受ける必要はない。", answer: "誤り", explanation: "特例事業者を当事者とする不動産特定共同事業契約に基づく権利は、金商法上の有価証券であることから、その契約の締結の代理又は媒介には第二種金融商品取引業の登録が必要となる（不特法第6条第12号）。（103テキストP.238〜239参照）" },
  { subject: "103. 不動産投資の基礎", no: "16-3", question: "不動産特定共同事業の「業務管理者」に要求される要件は、宅地建物取引士であることに加え、3年以上現物不動産の売買の業務に従事した経験を有することである。", answer: "誤り", explanation: "業務管理者としての要件は、宅地建物取引士であることに加え、不動産特定共同事業に関し3年以上の実務経験を持つか、それと同等の能力を持つと認められる者（ビル経営管理士、不動産コンサルティングマスター等の資格取得者）である。（103テキストP.239参照）" },
  { subject: "103. 不動産投資の基礎", no: "16-4", question: "不動産特定共同事業契約の締結の勧誘を行うときは、原則として損失補填等の禁止及び適合性の原則の遵守を要する。", answer: "正しい", explanation: "金商法の適合性の原則や損失補填等の禁止の規定が準用されているため、勧誘にはこれらが適用される。（103テキストP.239、P.246参照）" },
  { subject: "103. 不動産投資の基礎", no: "17-1", question: "一項有価証券について、適格機関投資家のみを対象とした取得勧誘で、適格機関投資家以外に譲渡されるおそれが少ないものを適格機関投資家私募というが、二項有価証券については適格機関投資家私募という概念は存在しない。", answer: "正しい", explanation: "二項有価証券は、専ら所有者数が開示規制の軽重の基準となり、適格機関投資家・特定投資家限定等の線引きはない。（103テキストP.245参照）" },
  { subject: "103. 不動産投資の基礎", no: "17-2", question: "適格機関投資家とは、特定投資家、国、日本銀行等を指す。", answer: "誤り", explanation: "特定投資家が適格機関投資家であるわけではない。全ての特定投資家が適格機関投資家になるわけではない点に注意。（103テキストP.242〜243参照）" },
  { subject: "103. 不動産投資の基礎", no: "17-3", question: "金融業者等が二項有価証券の募集や売出しに携わる場合に、当局への届出が必要となることはない。", answer: "誤り", explanation: "二項有価証券であっても、金融業者等が二項有価証券の募集や売出しに携わり、500名以上を対象とする場合には届出が必要となることがある。（103テキストP.245参照）" },
  { subject: "103. 不動産投資の基礎", no: "17-4", question: "一項有価証券について発行額1億円以上の公募を行うときは、内閣総理大臣への届出（有価証券届出書の提出）が必要となるが、それ以後、定期的に有価証券報告書を提出する必要はない。", answer: "誤り", explanation: "発行額1億円以上の公募を行う場合、有価証券届出書の提出が必要となり、発行者には事業年度ごとに有価証券報告書を提出することが義務付けられる。（103テキストP.243〜244参照）" },
  { subject: "103. 不動産投資の基礎", no: "18-1", question: "J-REITの役員が当該J-REITの投資口のインサイダー取引を行った場合、証券会社等は、日本証券業協会の規則により、原則として6ヶ月は当該J-REITの投資口の募集の引受けを行うことができないが、投資法人や資産運用会社はこの規則に直接拘束されないため、当該6ヶ月の期間経過前に投資口を募集することについて、実務上の支障は生じない。", answer: "誤り", explanation: "証券会社が日本証券業協会の規則に拘束され、投資口の引受けを行うことができないため、実質的にJ-REITは実務上投資口を募集することができない。（103テキストP.277参照）" },
  { subject: "103. 不動産投資の基礎", no: "18-2", question: "金商法に基づき、J-REITの投資口についてもインサイダー取引は規制されるが、その規制対象となる「重要事実」は、資産運用委託契約の締結・解約や投資法人の合併といったJ-REITの根本的性質を左右する事項のみであり、投資口の発行は重要事実に当たらない。", answer: "誤り", explanation: "投資口の発行もインサイダー取引規制の対象となる重要事実である。（103テキストP.275参照）" },
  { subject: "103. 不動産投資の基礎", no: "18-3", question: "金商法のインサイダー取引規制にはバスケット条項が置かれており、J-REITの運営、業務または財産に関する重要な事実であって投資者の投資判断に著しい影響を及ぼすものは、インサイダー取引規制上の重要事実に当たるものと定められている。", answer: "正しい", explanation: "金商法第166条第2項第14号に規定されている。（103テキストP.276参照）" },
  { subject: "103. 不動産投資の基礎", no: "18-4", question: "資産運用会社は、J-REITに係る未公表の重要情報で、投資者の投資判断に影響を及ぼすと認められるものであっても、それがインサイダー取引規制上の重要事実に当たらないのであれば、金商法上、その拡散を防止するための措置を講じる必要はない。", answer: "誤り", explanation: "資産運用会社は、未公表の重要情報で投資判断に影響を及ぼすと認められるものに関し、不公正な取引の防止を図るために必要かつ適切な措置を講じる必要がある。（103テキストP.275〜276参照）" },
  { subject: "103. 不動産投資の基礎", no: "19-イ", question: "J-REITは内国法人として法人税の納税義務を負うが、所定の導管性要件を満たした場合には、投資主への分配の利益配当部分を損金に算入でき、その限りで免税法人に近い取扱いを受けることができる。", answer: "正しい", explanation: "（103テキストP.281参照）" },
  { subject: "103. 不動産投資の基礎", no: "19-ロ", question: "現在の投信法では、J-REITが他の日本法人の議決権の過半数を取得することは禁止されており、また、これに違反した場合には導管性を失うことになるが、一定の要件を満たせば禁止は解除され、導管性も維持できるため、様々な目的でいわゆる導管体接続を行うことができる。", answer: "誤り", explanation: "海外の法令等で現地不動産の売買・賃貸等を直接行えない場合に、専ら係る取引を行うことを目的とする現地法人の株式を取得するときに限り、50%超を取得でき、導管性も失われない。様々な目的で他の日本法人の議決権の過半数を取得することが認められているわけではない。（103テキストP.282〜283参照）" },
  { subject: "103. 不動産投資の基礎", no: "19-ハ", question: "J-REITが発行できる有価証券は、投資口、投資法人債（及び短期投資法人債）、新投資口予約権（ただしライツ・オファリングの場合に限る。）のみであり、米国のREITで多用される転換社債を発行することは認められていない。", answer: "正しい", explanation: "（103テキストP.281参照）" },
  { subject: "103. 不動産投資の基礎", no: "19-ニ", question: "期末時点において発行済み投資口の過半数が特定の会社に保有されていた場合、投資法人はその期について税務上の導管性を失うことになってしまうので、J-REITにおいて敵対的買収が試みられることはない。", answer: "誤り", explanation: "期末時点で同族会社に当たらないという導管性要件を充足しない場合、当該期についての導管性は失われることになるが、かかるデメリットがあったとしても、当該投資法人の保有資産の価値に比べて投資口価格が低迷すれば、敵対的買収の試みも想定される。（103テキストP.280〜282参照）" },
  { subject: "103. 不動産投資の基礎", no: "20-イ", question: "会計制度委員会報告第15号に関する実務指針において、譲渡人が譲渡不動産の対価として特別目的会社の発行する証券等を有している場合でも、譲渡人のリスク負担割合が概ね10%の範囲内であれば、リスクと経済価値のほとんど全てが他者に移転しているものとして取り扱われる。", answer: "誤り", explanation: "リスク負担割合が概ね「5%」の範囲内であれば、リスクと経済価値のほとんどすべてが他者に移転しているものとして取り扱う。（103テキストP.28、Web講義103下第III部P.13参照）" },
  { subject: "103. 不動産投資の基礎", no: "20-ロ", question: "譲渡人がセール・アンド・リースバック取引により、継続的に譲渡不動産を使用している場合には、当該リースバック取引がファイナンス・リース取引であって、譲渡人（借手）が適正な賃借料を支払うこととなっているときには、売却処理が認められる。", answer: "誤り", explanation: "リースバック取引がオペレーティング・リース取引であって、適正な賃借料を支払うこととなっているときは、その限りにおいて売却処理が認められることとなっている。（103テキストP.28参照）" },
  { subject: "103. 不動産投資の基礎", no: "20-ハ", question: "追加出資の可能性がある場合や他の名目でありながら実質的に追加負担となるリスクに該当する場合でも、当該リスクは加味せずリスク負担割合を算定する。", answer: "誤り", explanation: "追加出資の可能性がある場合等は、実質的に追加負担となるリスクに該当するか否かを判断し、該当する場合はリスクを加味してリスク負担割合を算定する。（103テキストP.28参照）" },
  { subject: "103. 不動産投資の基礎", no: "20-ニ", question: "「特別目的会社を活用した不動産の流動化に係る譲渡人の会計処理に関する実務指針（同Q&A）」で例示されている継続的関与の一例として、「譲渡人が譲渡した不動産の管理業務を行っている場合」がある。", answer: "正しい", explanation: "継続的関与の例として9つの項目が挙げられており、その一つである。（103テキストP.24〜25参照）" },
  { subject: "103. 不動産投資の基礎", no: "21-2", question: "企業Bが自己の計算において他の企業の議決権の41%を所有している場合に、企業Bが他の企業の重要な財務及び営業又は事業の方針の決定を支配する契約等が存在するときは、企業Bは当該他の企業を支配していると判断することができる。", answer: "正しい", explanation: "（103テキストP.34〜35参照）" },
  { subject: "103. 不動産投資の基礎", no: "21-3", question: "企業Cが自己の計算において所有している議決権と、緊密な者及び同意している者が所有している議決権とを合わせて他の企業の議決権の過半数を占めている場合に、企業Cの役員若しくは使用人である者、又はこれらであった者で自己が他の企業の財務及び営業又は事業の方針の決定に関して影響を与えることができる者が、当該他の企業の取締役会その他これに準ずる機関の構成員の過半数を占めているときは、企業Cは当該他の企業を支配していると判断することができる。", answer: "正しい", explanation: "（103テキストP.34〜35参照）" },
  { subject: "103. 不動産投資の基礎", no: "21-4", question: "「連結財務諸表に関する会計基準」第7-2項において、同規定の対象となるヴィークルが非連結とされる要件の1つとして、「譲渡人が譲渡不動産からのキャッシュ・フローや譲渡不動産の残存価額を実質的に保証している場合」が定められている。", answer: "誤り", explanation: "非連結とされる要件は、特定目的会社が適正な価額で資産を譲り受けていること等に加えて、譲渡人がその資産のキャッシュ・フローや残存価額を「実質的に保証していないこと」等が求められる。（103テキストP.38参照）" },
  { subject: "103. 不動産投資の基礎", no: "22", question: "「連結財務諸表に関する会計基準」第7-2項により、子会社に該当しないものと推定された特別目的会社は、次の事項を注記しなければならない。\n(1) 開示対象特別目的会社の概要及び開示対象特別目的会社を利用した取引の概要（開示対象特別目的会社の数、主な事業内容や主な形態、会社との関係、会社と開示対象特別目的会社との取引状況や取引の目的）\n(2) 開示対象特別目的会社との取引金額等（当期に行った主な取引の金額、当該取引の期末残高、当期の主な損益計上額、開示対象特別目的会社の直近の財政状態）\nこの記述は正しいか。", answer: "正しい", explanation: "空欄を埋めた文章の通り正しい。（103テキストP.47〜48参照）" },
  { subject: "103. 不動産投資の基礎", no: "23-1", question: "土地のリース取引については、「所有権移転条項」又は「割安購入選択権」のいずれかを有する場合を除き、オペレーティング・リース取引に該当するものと推定する。", answer: "正しい", explanation: "土地の経済的耐用年数は無限であるため、通常の所有権移転外リースではオペレーティング・リース取引と推定される。（103テキストP.52参照）" },
  { subject: "103. 不動産投資の基礎", no: "23-2", question: "土地と建物等を一括したリース取引をファイナンス・リース取引に該当するか判定する際には、原則として、リース料総額を土地に係る部分と建物に係る部分に分割せずに判定を行う。", answer: "誤り", explanation: "原則として、リース料総額を合理的な方法で土地に係る部分と建物等に係る部分に分割した上で、該当可否の判定を行う。（103テキストP.52参照）" },
  { subject: "103. 不動産投資の基礎", no: "23-3", question: "経済的耐用年数基準に基づき判断した場合、解約不能のリース期間が5年、リース物件の経済的耐用年数が8年のリース取引についてはファイナンス・リース取引に該当すると判断される。", answer: "誤り", explanation: "経済的耐用年数基準での判定基準は「解約不能のリース期間が、当該リース物件の経済的耐用年数の75%以上である場合」である。5年÷8年＝62.5%であり、75%を下回るため該当しない。（103テキストP.51、P.53〜54参照）" },
  { subject: "103. 不動産投資の基礎", no: "23-4", question: "「リース取引に関する会計基準の適用指針」において、現在価値基準とは、「解約不能のリース期間中のリース料総額の現在価値が、当該リース物件を借手が現金で購入するものと仮定した場合の合理的な見積金額の概ね75%以上であること」と定義されている。", answer: "誤り", explanation: "現在価値基準の定義は、合理的な見積金額の概ね「90%以上」であることである。（103テキストP.51参照）" },
  { subject: "103. 不動産投資の基礎", no: "24-1", question: "固定資産の減損損失の計上を行う際は、①固定資産のグルーピング、②減損の認識の判定、③減損の兆候の把握、④減損損失の測定、の順番でステップを踏んだ上で、⑤減損損失を損益計算書に計上する。", answer: "誤り", explanation: "正しい順番は、①固定資産のグルーピング、②減損の兆候の把握、③減損損失の認識の判定、④減損損失の測定、⑤減損損失を損益計算書に計上、である。（103テキストP.97参照）" },
  { subject: "103. 不動産投資の基礎", no: "24-2", question: "減損対象となる資産の帳簿価額が10,000、使用価値が6,000、正味売却価額が5,500のとき、計上される減損損失の額は4,500である。", answer: "誤り", explanation: "回収可能価額は、使用価値（6,000）と正味売却価額（5,500）のいずれか高い方の額（6,000）となる。帳簿価額（10,000）との差額が減損損失となるため、計上される減損損失は4,000である。（103テキストP.100参照）" },
  { subject: "103. 不動産投資の基礎", no: "24-4", question: "減損会計により固定資産の減損損失を計上した場合、当該固定資産の価値が翌期以降に回復した場合でも、減損損失の戻入益を計上して固定資産の帳簿価額を回復させることはできない。", answer: "正しい", explanation: "減損会計に関しては「帳簿切離し方式」によるものとされ「洗替え方式」は採用しないため、戻入れは行わない。（103テキストP.97参照）" },
  { subject: "103. 不動産投資の基礎", no: "25", question: "売買目的有価証券は、時価をもって貸借対照表価額とし、評価差額は当期の損益として処理する。\n満期保有目的の債券は、取得原価をもって貸借対照表価額とする。ただし、債券を債券金額より低い価額又は高い価額で取得した場合において、取得価額と債券金額との差額の性格が金利の調整と認められるときは、償却原価法に基づいて算定された価額をもって貸借対照表価額としなければならない。\n子会社株式及び関連会社株式は、取得原価をもって貸借対照表価額とする。\nその他有価証券は、時価をもって貸借対照表価額とし、評価差額は洗替え方式に基づき処理する。なお、時価が取得原価を上回る銘柄に係る評価差額は純資産の部に計上し、時価が取得原価を下回る銘柄に係る評価差額は当期の損失として処理する方式等がある。\nこの記述は正しいか。", answer: "正しい", explanation: "空欄を埋めた文章の通り正しい。（103テキストP.79〜81参照）" },
  { subject: "103. 不動産投資の基礎", no: "26-1", question: "資産除去債務に関して、「資産除去債務に関する会計基準」の適用となる固定資産は、企業が営業活動に使用している有形固定資産のみであり、建設仮勘定や投資不動産などは同会計基準の適用対象となることはない。", answer: "誤り", explanation: "建設仮勘定や投資不動産についても、資産除去債務が存在している場合には資産除去債務会計基準の適用対象となる。（103テキストP.102参照）" },
  { subject: "103. 不動産投資の基礎", no: "26-4", question: "資産除去債務の認識対象は、有形固定資産の取得、建設、開発又は通常の使用によって生じ、当該有形固定資産の除去に関して法令又は契約で要求される法律上の義務及びそれに準ずるものをいい、この場合の義務には有形固定資産を除去する際に当該有形固定資産に使用されている有害物質等を法律等の要求による特別の方法で除去する義務も含まれる。", answer: "正しい", explanation: "（103テキストP.102参照）" },
  { subject: "103. 不動産投資の基礎", no: "27-1", question: "会計制度委員会報告第15号「特別目的会社を活用した不動産の流動化に係る譲渡人の会計処理に関する実務指針（同Q&A）」の適用対象となる不動産の譲渡にあたっては、企業会計基準第29号「収益認識に関する会計基準」もあわせて適用されることとなる。", answer: "誤り", explanation: "不動産流動化実務指針の適用対象となる不動産の譲渡にあたっては、収益認識会計基準は適用されない。（103テキストP.20参照）" },
  { subject: "103. 不動産投資の基礎", no: "27-2", question: "同実務指針によると、不動産信託受益権の譲渡にあたっては、財務構成要素アプローチにより、当該信託受益権を構成する財務的要素に対する支配が他に移転した場合に当該移転した財務構成要素の消滅を認識し、留保される財務構成要素の存続を認識する。", answer: "誤り", explanation: "不動産信託受益権の譲渡についても、リスク・経済価値アプローチに基づいて会計処理を行う。（103テキストP.23〜25参照）" },
  { subject: "103. 不動産投資の基礎", no: "27-3", question: "企業会計基準第20号「賃貸等不動産の時価等の開示に関する会計基準」では、賃貸等不動産を保有している場合には、期末時点の時価をもって貸借対照表価額とし、その上で賃貸等不動産の概要等をはじめとする所定の事項を注記することとされている。", answer: "誤り", explanation: "賃貸等不動産に該当する場合には、期末における時価の注記を行うが、期末時点の時価をもって貸借対照表価額とするわけではない。（103テキストP.107〜108参照）" },
  { subject: "103. 不動産投資の基礎", no: "27-4", question: "企業会計基準第31号「会計上の見積りの開示に関する会計基準」によると、当年度の財務諸表に計上した金額が会計上の見積りによるもののうち、翌年度の財務諸表に重要な影響を及ぼすリスクがある項目における会計上の見積りの内容について、財務諸表利用者の理解に資する情報を開示することとしている。例えば、固定資産について減損損失の認識は行わない場合でも、翌年度の財務諸表を及ぼすリスクを検討したうえで、当該固定資産を開示する項目として識別する可能性がある。", answer: "正しい", explanation: "（103テキストP.122〜123参照）" },
  { subject: "103. 不動産投資の基礎", no: "28-1", question: "投資法人は法人税の納税主体となる事業体であるため、税務上一定の要件を満たすことができなければ法人税の課税所得の計算において配当の損金算入ができず、結果として所得に対し法人税課税を受けることとなる。", answer: "正しい", explanation: "（103テキストP.203〜206参照）" },
  { subject: "103. 不動産投資の基礎", no: "28-2", question: "任意組合においては、各組合員が事業から生じる所得に対する申告義務を負うこととなるため、税務上の加算項目が生じた場合にはその申告調整は組合員側が行う必要がある。", answer: "正しい", explanation: "（法基通14-1-2、103テキストP.218〜219参照）" },
  { subject: "103. 不動産投資の基礎", no: "28-3", question: "匿名組合が、組合員同士の合議を行っている等、実態として人格のない社団であるとみなされる場合には、法人税課税の対象となる可能性がある。", answer: "正しい", explanation: "（103テキストP.203、P.215〜216参照）" },
  { subject: "103. 不動産投資の基礎", no: "28-4", question: "受益者等課税信託の受託者は、信託財産の法的な所有者であるため、単独で信託財産にかかる課税資産の譲渡等を行ったものとみなされ、消費税の納税義務を負う。", answer: "誤り", explanation: "受益者等課税信託においては、信託財産の形式的な所有者は受託者であるが、信託財産より生じる利益にかかる法人税や消費税の納税義務者は受益者となる。（103テキストP.204〜207、P.219参照）" },
  { subject: "103. 不動産投資の基礎", no: "29-1", question: "匿名組合契約から生じる利益の分配を行う場合には、原則としてすべての組合員に対し、源泉徴収を行う必要がある。", answer: "正しい", explanation: "（103テキストP.214〜215、P.220、P.376〜378参照）" },
  { subject: "103. 不動産投資の基礎", no: "29-2", question: "匿名組合の計算期間の末日と営業者の決算日が一致していない場合、匿名組合員に分配されない損益について営業者側で法人税課税の対象となる。", answer: "正しい", explanation: "（法基通14-1-3、103テキストP.217〜218参照）" },
  { subject: "103. 不動産投資の基礎", no: "29-3", question: "匿名組合事業が不動産事業である場合、個人である組合員がその組合事業から得る所得は、原則として不動産所得に区分される。", answer: "誤り", explanation: "匿名組合の組合員が組合事業から受ける利益の分配は、個人組合員については原則として雑所得となり、他の所得と通算することはできない。（103テキストP.219〜220参照）" },
  { subject: "103. 不動産投資の基礎", no: "29-4", question: "任意組合事業が不動産事業である場合、その組合事業から損失が生じていても、個人である組合員の所得税申告においてその損失の額はなかったものとされ、他の所得と通算することはできない。", answer: "正しい", explanation: "任意組合が行う不動産事業により損失が発生している場合、個人の組合員の所得税申告において、その損失はなかったものとされ通算することはできない（租税特別措置法第41条の4の2）。（103テキストP.211参照）" },
  { subject: "103. 不動産投資の基礎", no: "30-1", question: "受益者等課税信託について、信託金額を超える損失金額が生じていたため、その超える部分の金額については損金の額に算入しなかった。", answer: "正しい", explanation: "受益者等課税信託の受益者の信託損失について、信託金額を超える損金計上はできず、その金額は損金の額に算入できない。（租特法第67条の12）（103テキストP.233参照）" },
  { subject: "103. 不動産投資の基礎", no: "30-2", question: "受益者等課税信託より生じる収益及び費用について、その金額が僅少であるため、受益者において個々の収益、費用の項目を区分せず純額で会計処理を行った。", answer: "誤り", explanation: "受益者等課税信託の受益者等である法人は、信託財産に属する資産負債並びに収益費用を当該法人のものとして区分して各事業年度の所得金額の計算を行う必要があり、純額での計算を行うことはない。（103テキストP.232〜233参照）" },
  { subject: "103. 不動産投資の基礎", no: "30-3", question: "集団投資信託から生じている信託収益について、実際に信託収益の分配を受領する時まで益金の額に算入しなかった。", answer: "正しい", explanation: "集団投資信託においては、現実の収益分配を受領したときに受益者に課税される（法人税法第12条第1項等）。（103テキストP.229、P.235参照）" },
  { subject: "103. 不動産投資の基礎", no: "30-4", question: "受益者等課税信託より生じる収益及び費用について、受益者において会計処理を行う際、信託の会計期間は考慮しなかった。", answer: "正しい", explanation: "受益者等課税信託の信託財産に帰せられる収益費用は、信託の計算期間にかかわらず、受益者等である法人の事業年度の期間に対応する収益費用となる。（103テキストP.232参照）" },
  { subject: "103. 不動産投資の基礎", no: "31-1", question: "特定目的会社が解散したことにより廃業の届出を提出し、特定目的会社名簿から抹消された場合、特例が適用され導管性が維持される。", answer: "誤り", explanation: "導管性要件には「特定目的会社名簿に登載されているものであること」が含まれるため、抹消されると導管性を損なう。（103テキストP.257〜259参照）" },
  { subject: "103. 不動産投資の基礎", no: "31-2", question: "特定目的会社において、優先出資は機関投資家である投資家2者、特定出資は一般社団法人1者が保有しており、特定社債を発行していない場合（すべて国内募集）、導管性が維持される。", answer: "誤り", explanation: "特定社債の公募発行もなく機関投資家等のみの保有にも該当しないため、特例の要件を満たさず導管性を損なう。（103テキストP.262〜263参照）" },
  { subject: "103. 不動産投資の基礎", no: "31-3", question: "特定目的会社において、優先出資は機関投資家ではない投資家1者、特定出資は一般社団法人1者が保有しており、機関投資家に対し特定社債を発行している場合（すべて国内募集）、導管性が維持される。", answer: "正しい", explanation: "機関投資家以外の者から借入れがなく特定社債を発行しているなどの要件を満たせば、導管性を損なわない。（103テキストP.257〜263参照）" },
  { subject: "103. 不動産投資の基礎", no: "31-4", question: "特定目的会社において、優先出資のうち100%を国内募集し、同時に残余財産の分配を受ける権利を有する特定出資のうち55%を国外募集する旨が資産流動化計画に記載されている場合、導管性が維持される。", answer: "誤り", explanation: "基準特定出資の募集は国内において募集される割合が50%を超える旨の記載等が必要であり、国外募集が55%（国内45%）である場合は要件を満たさず導管性を損なう。（103テキストP.259〜260参照）" },
  { subject: "103. 不動産投資の基礎", no: "32", question: "投資法人の対象事業年度の要件として、他の法人の発行済株式または出資の「50%」以上を保有することができないこととする他法人支配禁止要件がおかれている。また、特定資産の保有要件としてその事業年度末における特定資産の帳簿価額の合計額が総資産の帳簿価額の合計額の「二分の一」相当額を超えていることが求められている。また、借入は「機関投資家」からのものであることが必要である。この記述は正しいか。", answer: "正しい", explanation: "空欄を埋めた文章の通り正しい。（103テキストP.276〜277参照）" },
  { subject: "103. 不動産投資の基礎", no: "33-1", question: "特定目的会社がデリバティブ取引を行い、繰延ヘッジ処理により評価損が純資産の部に計上されている場合には、税会不一致は生じず、導管性への影響はない。", answer: "誤り", explanation: "税会不一致が生じて純資産に計上された場合には、SPC法による配当可能利益の額が減少し配当の支払制限を受け、導管性の維持に影響が出る場合がある。（103テキストP.269〜270参照）" },
  { subject: "103. 不動産投資の基礎", no: "33-2", question: "投資法人において、寄附金や交際費など永久差異の発生により税務上の所得が会計上の利益を上回る場合、一時差異等調整引当額の設定により利益超過分配を行い、導管性の維持を図ることができる。", answer: "誤り", explanation: "寄附金等の永久差異は一時差異等調整引当額の対象とならない。（103テキストP.281〜283参照）" },
