<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<!-- スマホ表示の基本設定（縦向き・幅に合わせる） -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<!-- iOSでホーム画面に追加したときにアプリ風（全画面）で開く設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#2f6fed">
<title>フラッシュカード</title>

<style>
/* ===== 全体のリセットと基本スタイル ===== */
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0; height: 100%;
  /* 端末標準のフォントのみ使用（Webフォント読み込みなし＝完全オフライン） */
  font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
  background: #eef1f6;
  color: #1c2430;
  /* iOSでの過剰な拡大を防止 */
  -webkit-text-size-adjust: 100%;
}
body {
  display: flex; justify-content: center;
  /* iPhoneのノッチ・ホームバーを避ける余白 */
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}

/* ===== アプリ全体のレイアウト（縦1列・画面いっぱい） ===== */
#app {
  width: 100%;
  max-width: 480px;   /* スマホ幅を主対象。PCでも中央に収まる */
  min-height: 100vh;
  display: flex; flex-direction: column;
  padding: 12px 14px;
}

/* ===== 上部バー（フィルタ・トグル） ===== */
.toolbar {
  display: flex; flex-direction: column; gap: 10px;
  margin-bottom: 12px;
}
.row { display: flex; gap: 10px; align-items: center; }

select {
  flex: 1;
  font-size: 17px;
  padding: 12px 12px;
  border: 1px solid #c3ccda;
  border-radius: 12px;
  background: #fff;
  color: #1c2430;
  min-height: 48px;   /* タップ領域を大きく */
}

/* トグルスイッチ（シャッフル・要復習だけ表示） */
.toggle {
  display: flex; align-items: center; justify-content: space-between;
  flex: 1;
  background: #fff;
  border: 1px solid #c3ccda;
  border-radius: 12px;
  padding: 10px 14px;
  min-height: 48px;
  font-size: 15px;
  user-select: none;
}
.toggle input { display: none; }
.switch {
  width: 46px; height: 28px; border-radius: 999px;
  background: #c3ccda; position: relative; transition: background .2s; flex: none;
}
.switch::after {
  content: ""; position: absolute; top: 3px; left: 3px;
  width: 22px; height: 22px; border-radius: 50%;
  background: #fff; transition: transform .2s;
  box-shadow: 0 1px 3px rgba(0,0,0,.25);
}
.toggle input:checked + .switch { background: #2f6fed; }
.toggle input:checked + .switch::after { transform: translateX(18px); }

/* ===== カード表示エリア ===== */
.card-area {
  flex: 1;                 /* 残りの高さをすべて使う */
  display: flex; align-items: center; justify-content: center;
  /* カードの3D回転を見せるための遠近感 */
  perspective: 1200px;
  min-height: 320px;
  margin-bottom: 8px;
}
.card {
  width: 100%; height: 100%;
  position: relative;
  cursor: pointer;
  /* 子要素(表・裏)を3D空間に配置 */
  transform-style: preserve-3d;
  transition: transform .5s;
}
/* .is-flipped が付くとY軸で180度回転＝裏返る */
.card.is-flipped { transform: rotateY(180deg); }

/* 表面・裏面の共通スタイル */
.face {
  position: absolute; inset: 0;
  border-radius: 20px;
  padding: 24px 20px;
  display: flex; flex-direction: column;
  box-shadow: 0 6px 18px rgba(31,50,80,.14);
  /* 裏側になった面を隠す */
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  overflow-y: auto;
}
.face-front { background: #ffffff; }
/* 裏面は最初から180度回しておく（表と背中合わせ） */
.face-back { background: #f0f7ff; transform: rotateY(180deg); }

/* カード上部の小さなラベル（科目・問題番号・マーク状態） */
.card-meta {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: #6b7688; margin-bottom: 14px;
}
.tag {
  background: #e7edf7; color: #3a5b91;
  padding: 3px 10px; border-radius: 999px; font-weight: 600;
}
.mark-badge { margin-left: auto; font-weight: 700; }
.mark-badge.known  { color: #1f9d55; }
.mark-badge.review { color: #e07b00; }

/* 問題文・回答文 */
.q-label { font-size: 12px; color: #9aa4b4; letter-spacing: .05em; margin-bottom: 6px; }
.q-text {
  font-size: 24px; line-height: 1.5; font-weight: 700;
  display: flex; align-items: center; flex: 1;
}
.a-text { font-size: 23px; line-height: 1.5; font-weight: 700; margin-bottom: 14px; }
.note {
  font-size: 15px; line-height: 1.6; color: #46536b;
  border-top: 1px dashed #c9d3e2; padding-top: 12px; margin-top: 4px;
  white-space: pre-wrap;   /* 改行をそのまま表示 */
}
.tap-hint { text-align: center; font-size: 12px; color: #aeb6c4; margin-top: 12px; }

/* データが無いときの表示 */
.empty {
  text-align: center; color: #6b7688; font-size: 16px; line-height: 1.7;
  padding: 40px 20px;
}

/* ===== マークボタン（覚えた／要復習） ===== */
.mark-buttons { display: flex; gap: 10px; margin: 8px 0 12px; }
.mark-btn {
  flex: 1; min-height: 52px;
  font-size: 16px; font-weight: 700;
  border: 2px solid #c3ccda; border-radius: 14px;
  background: #fff; color: #46536b;
}
.mark-btn.active-known  { border-color: #1f9d55; background: #e7f7ee; color: #157a41; }
.mark-btn.active-review { border-color: #e07b00; background: #fff3e2; color: #b56200; }

/* ===== 下部ナビ（前へ／位置／次へ） ===== */
.nav { display: flex; align-items: center; gap: 10px; }
.nav-btn {
  flex: 1; min-height: 60px;   /* 親指で押しやすい大きなボタン */
  font-size: 18px; font-weight: 700;
  border: none; border-radius: 16px;
  background: #2f6fed; color: #fff;
}
.nav-btn:disabled { background: #b9c4d6; }
.nav-btn:active:not(:disabled) { background: #2358c9; }
.position {
  min-width: 74px; text-align: center;
  font-size: 18px; font-weight: 700; color: #46536b;
}
</style>
</head>
<body>
<div id="app">

  <!-- ▼ 上部：科目フィルタ・シャッフル・要復習だけ表示 -->
  <div class="toolbar">
    <div class="row">
      <select id="subjectFilter" aria-label="科目でしぼり込み"></select>
    </div>
    <div class="row">
      <label class="toggle">
        <span>🔀 シャッフル</span>
        <input type="checkbox" id="shuffleToggle">
        <span class="switch"></span>
      </label>
      <label class="toggle">
        <span>★ 要復習だけ</span>
        <input type="checkbox" id="reviewToggle">
        <span class="switch"></span>
      </label>
    </div>
  </div>

  <!-- ▼ カード本体（タップで裏返る） -->
  <div class="card-area">
    <div class="card" id="card">
      <!-- 表面：問題 -->
      <div class="face face-front">
        <div class="card-meta">
          <span class="tag" id="frontSubject"></span>
          <span id="frontNo"></span>
          <span class="mark-badge" id="frontBadge"></span>
        </div>
        <div class="q-label">問題</div>
        <div class="q-text" id="questionText"></div>
        <div class="tap-hint">タップで答えを見る</div>
      </div>
      <!-- 裏面：回答＋解説 -->
      <div class="face face-back">
        <div class="card-meta">
          <span class="tag" id="backSubject"></span>
          <span id="backNo"></span>
          <span class="mark-badge" id="backBadge"></span>
        </div>
        <div class="q-label">回答</div>
        <div class="a-text" id="answerText"></div>
        <div class="note" id="noteText"></div>
        <div class="tap-hint">タップで問題に戻る</div>
      </div>
    </div>
    <!-- 出題対象が0件のときに表示 -->
    <div class="empty" id="emptyMessage" style="display:none;"></div>
  </div>

  <!-- ▼ 覚えた／要復習 マークボタン -->
  <div class="mark-buttons">
    <button class="mark-btn" id="knownBtn">✓ 覚えた</button>
    <button class="mark-btn" id="reviewBtn">★ 要復習</button>
  </div>

  <!-- ▼ 下部ナビ -->
  <div class="nav">
    <button class="nav-btn" id="prevBtn">◀ 前へ</button>
    <div class="position" id="position">0 / 0</div>
    <button class="nav-btn" id="nextBtn">次へ ▶</button>
  </div>

</div>

<script>
"use strict";

/* ============================================================
   ★★★ ここを書き換えてください（問題データ）★★★
   CSV（科目, 問題番号, 問題, 回答, 解説）の各行を
   下の1行 { ... } に置き換えていくだけです。
   ・subject      = 科目
   ・no           = 問題番号
   ・question     = 問題（カード表面）
   ・answer       = 回答（カード裏面）
   ・explanation  = 解説（回答の下に表示。空 "" でもOK）
   ※ 解説内で改行したいときは \n と書くと改行されます。
   ============================================================ */
const CARDS = [
  { subject: "101", no: "問題1", question: "企業の資金調達には、企業が金融資産を売り出す、という側面がある。", answer: "正しい", explanation: "資金調達とは企業がその金融資産を売り出すことであり、その後の財務的な活動も含まれる（101 テキスト P.38〜39 参照）。" },
  { subject: "101", no: "問題1", question: "企業の価値向上のための原則においては、株主が企業の外に持っている投資機会が企業の内部で行う投資の基準になる。", answer: "正しい", explanation: "（101 テキスト P.33 参照）。" },
  { subject: "101", no: "問題1", question: "他の資産に比べて、オンバランス不動産の資産の効率性（回転率）は高いが、そのマージン（税引き後営業利益率）は非常に低い、という傾向がある。", answer: "誤り", explanation: "オンバランス不動産の資産の効率性（回転率）は非常に低く、そのマージン（税引き後営業利益率）は非常に高い（101 テキスト P.43〜44 参照）。" },
  { subject: "101", no: "問題1", question: "現在日本では、不動産証券化は企業の資金調達のためだけを目的として行われる。", answer: "誤り", explanation: "企業価値を向上するための戦略的な経営の重要な手法として、少なからぬ日本企業に採用されている（101 テキスト P.46〜47 参照）。" },
  { subject: "101", no: "問題1", question: "ダイベストメント（divestment）は、投資（investment）と同じく拡大型企業戦略である。", answer: "誤り", explanation: "ダイベストメント（divestment）とは逆の縮小型企業戦略である（101テキスト P.40 参照）。" },
  { subject: "101", no: "問題2", question: "不動産証券化商品の中には金融商品取引法で定める有価証券ではないものが存在する。", answer: "誤り", explanation: "投資証券、受益証券、ここでの優先出資証券は全て有価証券である（101 テキスト P.13 参照）。証券化商品に含まれる「信託の受益権」及び「集団投資スキーム持分」なども、金融商品取引法上では有価証券とみなされる（101 テキスト P.104 参照）。" },
  { subject: "101", no: "問題2", question: "有価証券に化体された不動産とオンバランス不動産は同じことを意味する。", answer: "誤り", explanation: "（101 テキスト P.11、P.42 参照）。" },
  { subject: "101", no: "問題2", question: "不動産ファンドと不動産証券化のためのvehicleは同じものではない。", answer: "誤り", explanation: "不動産証券化のための特別法人（vehicle）は「不動産ファンド」と呼ばれる（101 テキスト P.12〜13 参照）。" },
  { subject: "101", no: "問題2", question: "単一の資産も証券化の対象となる、と説明されている。", answer: "誤り", explanation: "（101 テキスト P.10 参照）。" },
  { subject: "101", no: "問題2", question: "証券化ではオリジネータ自身が原資産を裏付けとする有価証券を発行することもある。", answer: "誤り", explanation: "（101 テキスト P.12 参照）。" },
  { subject: "105", no: "問題28", question: "テキスト105「不動産ファイナンスの基礎」において、狭義の意味としてのファイナンスという言葉は、資金調達及び投資理論を含むものとして使用している。", answer: "誤り", explanation: "狭義のファイナンスの概念は資金調達のみを対象としている（105 テキスト P.10 参照）。" },
  { subject: "105", no: "問題28", question: "不動産ファイナンスの代表的な形態であるノンリコースローンは、非遡及型ローンとも言われており、対象となる不動産からの収益や売却代金によって返済がなされるが、万一返済が滞った場合には、関係者である投資家や不動産投資顧問会社に対して残債権額の返済を求めるといったような保証を求めることが多い。", answer: "誤り", explanation: "ノンリコースローンが、非遡及型と言われるのは、事業主体のその他の資産のみならず、第三者による返済をも想定されていないことにある（105 テキスト P.14 参照）。" },
  { subject: "105", no: "問題28", question: "不動産ファイナンスでは、仕組みを構築する際に、倒産隔離性を確保することが重要だと言われる。これは、当該事業主体にファイナンスを行っている債権者から見た場合に、第三者の債権者が出現しないための工夫であり、事業主体の株主への備えのためではない。", answer: "誤り", explanation: "事業主体（子会社）の直接の債権者ではなくとも、事業主体の株主（親会社）の債権者が、株主権を行使して、事業主体の債権者になる可能性があり、当該事業主体の株主への備えのためでもある（105 テキスト P.15〜16 参照）。" },
  { subject: "105", no: "問題28", question: "一般に不動産ファンドは投資期間が有限であるが、J-REITは期限の定めがない事業主体であることから、J-REITへのファイナンスにおいては継続企業であることを前提とした可否判断をする必要がある。", answer: "正しい", explanation: "J-REITは継続企業を前提とした事業主体であり、必ずしもファイナンスの期限時に所有している不動産もしくは不動産信託受益権の売却によって返済がされるわけではない（105 テキスト P.19 参照）。" },
  { subject: "105", no: "問題29", question: "サブプライム住宅ローン問題が拡大した大きな要因の一つは、証券化という金融技術の普及に伴って原資産のリスクが過度に分散した結果、リスクの所在や規模の特定が困難になったことである。その対応として、原資産などのリスクなどに関わる情報を確保・提供することでトレーサビリティを担保する仕組みが整備された。", answer: "正しい", explanation: "（105 テキスト P.61〜62 参照）。" },
  { subject: "105", no: "問題29", question: "日本においては1994年の証券化商品第1号の発行以降、2007年からのサブプライム住宅ローン問題を契機とするグローバルな金融危機の発生や、2020年以降の新型コロナウイルス発生の影響により証券化商品の発行額が一時的に減少する期間はあったものの、その後回復し、2023年度では過去最大の発行額となっている。", answer: "誤り", explanation: "2023年度は過去最大の発行額にはなっていない（105 テキスト P.61 【図表Ⅱ-4-3】参照）。" },
  { subject: "105", no: "問題29", question: "金融危機が発生した後、オリジネーターが売却することを前提にローンをオリジネートするOTDモデル（originate-to-distribute）への批判から、スポンサーやオリジネーターに証券化商品のリスクの一部の保有を義務付けるレバレッジ規制が導入されている。", answer: "誤り", explanation: "（105 テキスト P.62 参照）。" },
  { subject: "105", no: "問題29", question: "商業用不動産担保ローンの証券化は、①単一の借入人向けの単一の大型ローンを担保としたCMBS（シングルボロワー）、②単一の借入人向けの複数の大型ローン／コンデュイットローンのプールを担保としたCMBS（マルチボロワー）の2つに大きく分類される。", answer: "正しい", explanation: "（105 テキスト P.66 参照）。" },
  { subject: "105", no: "問題30", question: "オートローンなどの小口債権はそれ単体では流動性は低いが、分散の効いた小口債権の集合体となっていることで買手が現れる可能性が出てくる。これは試行回数や抽出標本数を増やすことで本来の確率に近づく「和の法則」による効果である。", answer: "誤り", explanation: "試行回数や抽出標本数を増やすことで本来の確率に近づく法則は「大数の法則」である（105 テキスト P.25 参照）。" },
  { subject: "105", no: "問題30", question: "証券化は、資金調達主体（原所有者（原債権者）に限らない）が金銭債権を裏付けに倒産隔離されたSPV（Special Purpose Vehicle）を経由して優先劣後構造を有する二つ以上の階層化された有価証券の発行により資金調達をすることと言えるが、この二つ以上の階層化をメザニンという。", answer: "誤り", explanation: "前半の文章は正しいが、「この二つ以上の階層化をメザニンという」としている点が誤り（105 テキスト P.27 参照）。（正しくはトランシェ等と呼ばれる）" },
  { subject: "105", no: "問題30", question: "ストラクチャードファイナンスもアセットファイナンスであり、「アセット（資産）を使ったファイナンス」であるから、企業が行う不動産担保などの担保付借入れも広義のストラクチャードファイナンスと言える。", answer: "誤り", explanation: "（105 テキスト P.24 参照）。" },
  { subject: "105", no: "問題30", question: "企業が保有する資産の信用力のみを裏付けに資金調達をするという特別な目的に沿って資産を保有する企業から当該資産を切り離すための“箱”として利用されるのが、SPVであり、SPVには、資産から生ずる損益をできる限りそのまま投資家に還元させること（導管性、Pass-through性）が求められる。", answer: "正しい", explanation: "（105 テキスト P.28 参照）。" },
  { subject: "105", no: "問題31", question: "満期一括償還（ハードブレット）は、一般的な国内事業債のように、決められた満期に社債額面全額が償還となるタイプである。", answer: "正しい", explanation: "（105 テキスト P.44 参照）。" },
  { subject: "105", no: "問題31", question: "ソフトブレットは、予定償還期日に期日一括償還されることが想定されているものの、証券化期間中、元本返済口座に十分なキャッシュが積み上がらなかった場合を想定して事前にトリガー条項を設定し、それに抵触した場合トリガーが引かれ、最終償還期日（法定償還期日）まで償還が延期されたり、パススルーに変更されてとにかく早く投資家に返済していくといった措置がとられることになる。", answer: "正しい", explanation: "（105 テキスト P.44 参照）。" },
  { subject: "105", no: "問題31", question: "コントロールアモチゼーションは、毎回（月次、四半期、又は半年）の償還金額が一定金額に決められて元本償還を部分的に行っていく形態である。償還金額を超える債権プールからの元本回収金はSPVに滞留することになるので証券化商品の利回りと滞留資金の短期市場などでの運用利回りの差異が逆ざやとなり、オリジネーターの資金調達コストが低減することになる。", answer: "誤り", explanation: "（105 テキスト P.44 参照）。" },
  { subject: "105", no: "問題31", question: "パススルーは、債権プールからのキャッシュフロー（債務者からの任意の期限前返済や貸倒債権からの回収等も含む）を投資家にそのまま元利金として支払う形態である。投資家にとってみれば元本償還のスケジュールが変動する点や期限前返済等による機会損失（再運用リスク）は好ましくはないが、ハードブレットのような一定金額の利払いにするためにキャッシュフローを調整するコストがかからない分だけオリジネーターの資金調達コストは上昇することになる。", answer: "誤り", explanation: "（105 テキスト P.44 参照）。" },
  { subject: "105", no: "問題32", question: "借入金利に関して、変動金利、固定金利による借入れのいずれにおいても、ベンチマークとなる市場金利（基準金利）に、個別のローン取引のスプレッド（貸付人が要求するクレジットリスク等に見合ったリターン）を足し合わせた構造であることに変わりはない。", answer: "正しい", explanation: "（105 テキスト P.81 参照）。" },
  { subject: "105", no: "問題32", question: "スプレッドは、借入金額や借入期間、マクロ環境だけでなく、各金融機関が評価するJ-REITごとの内部格付（行内格付）にも依拠している。", answer: "正しい", explanation: "（105 テキスト P.82 参照）。" },
  { subject: "105", no: "問題32", question: "J-REITと金融機関との間で個別に設定されたコベナンツ（財務制限条項）に抵触しているか（抵触の懸念があるか）も、内部格付（行内格付）上の重要なポイントとなり、LTV（Loan to Value）やDSCR（Debt Service Coverage Ratio）等の指標が参照される。", answer: "正しい", explanation: "（105 テキスト P.82 参照）。" },
  { subject: "105", no: "問題32", question: "日本銀行が2016年にマイナス金利の導入を決定した後の5年程度は、長期金利が0%近傍で推移したことから、J-REIT各社はリファイナンスに乗じて借入れの短期変動化を進め、財務安定性の向上に努めた。", answer: "誤り", explanation: "借入れの長期固定化を進めた（105 テキスト P.83 参照）。" },
  { subject: "105", no: "問題33", question: "2013年は日本銀行が「異次元の金融緩和」を開始した年であり、年間1.20兆円のエクイティファイナンス（IPO、PO、第三者割当増資の合計）はJ-REITの歴史の中で最大となっている。", answer: "正しい", explanation: "（105 テキスト P.76〜77 参照）。" },
  { subject: "105", no: "問題33", question: "公募増資において、物件取得後のDPU成長を重視する場合、LTVを引き下げるストラクチャーを設計することが多い。", answer: "誤り", explanation: "LTVを引き上げるストラクチャーを設計することが多い（105 テキスト P.92 参照）。" },
  { subject: "105", no: "問題33", question: "公募増資によるEPUの希薄化を最小限に抑える観点で、払込日（J-REITの口座への調達資金の入金日）をJ-REITの決算期の期初に設定することも多く、その場合そこから逆算してプライシング日等のスケジュールを組んでいくことになる。", answer: "正しい", explanation: "（105 テキスト P.97〜98 参照）。" },
  { subject: "105", no: "問題33", question: "私募REITとの比較において、J-REITでは個人投資家（投資信託経由での資金を含む）と海外投資家が保有金額ベースで主要なシェアを占めている一方で、年金の資金は限定的である。", answer: "正しい", explanation: "（105 テキスト P.100〜101 参照）。" },
  { subject: "105", no: "問題34", question: "CAPMによれば、個別のエクイティ銘柄の期待リターンは「リスクフリーレート×ベータ＋エクイティリスクプレミアム」で計算される。", answer: "誤り", explanation: "CAPMによれば、個別のエクイティ銘柄の期待リターンは「リスクフリーレート＋ベータ×エクイティリスクプレミアム」で計算される（105 テキスト P.105〜107 を参照）。" },
  { subject: "105", no: "問題34", question: "市場リスクは、株式市場を構成する全ての銘柄が等しく影響を受けるわけではない。市場リスクの影響の度合いは、個々の銘柄によって異なる。このような個々の銘柄が市場リスクに影響を受ける度合いが、ベータ（β＝市場のリターンの分散／当銘柄と市場のリターンの共分散）と呼ばれる指標で表される。", answer: "誤り", explanation: "ベータ（β）＝当銘柄と市場のリターンの共分散／市場のリターンの分散 である（105 テキスト P.105〜107 を参照）。" },
  { subject: "105", no: "問題34", question: "ベータは、市場のリターンの変動1%に対して当銘柄のリターンが何%変動するかという傾向を表している。ベータが1より大きいということは、その銘柄のリターンの変動幅は市場を上回る傾向があることを示している。", answer: "正しい", explanation: "（105 テキスト P.105〜107 を参照）。" },
  { subject: "105", no: "問題35", question: "定率成長配当割引モデルにおいて前提が変更された場合、変更前に比べて変更後の株価は何%変動するか。（前:予想配当10円/期待リターン5%/成長率1%、後:予想配当12円/期待リターン5%/成長率-1%）", answer: "-20%", explanation: "定率成長配当割引モデルによる株価の計算式は「予想配当金 ÷ (期待リターン － 配当金の成長率)」。変更前:10÷(5%-1%)=250、変更後:12÷(5%-(-1%))=200。200÷250-1=-20%（105 テキスト P.108〜110 参照）。" },
  { subject: "105", no: "問題37", question: "TOPIX（東証株価指数）には、配当込みと配当なし（非配当込み）のものとがある。これらのうち、配当なし（非配当込み）のTOPIXを用いるより、配当込みのTOPIXを用いる方が、TOPIXを構成する株式の総合的なリスク・リターンを把握するのに便利である。", answer: "正しい", explanation: "配当込みインデックスには、キャピタルゲインとインカムゲインの両方が反映されており、投資パフォーマンスを総合的に測定するのに便利である（105 テキスト P.163 参照）。" },
  { subject: "105", no: "問題37", question: "東証REIT指数には、新聞等に掲載されている配当なし（非配当込み）のインデックスは存在する一方、配当込みのインデックスは存在しない。", answer: "誤り", explanation: "配当込みインデックスも存在する（105 テキスト P.164 参照）。" },
  { subject: "105", no: "問題37", question: "日経平均株価（日経225）は、株式時価総額を指数化したものである。", answer: "誤り", explanation: "日経平均株価（日経225）は、株価平均型のインデックスであり、構成銘柄の株価の合計を構成銘柄の数で除して算出される（105 テキスト P.161 参照）。" },
  { subject: "105", no: "問題37", question: "不動産証券化協会が公表しているAJPI（ARES Japan Property Index）は、一定の期間に実際に取引された不動産を基礎として、総合収益率を算出している。", answer: "誤り", explanation: "「一定の期間に実際に取引された不動産を基礎として」が誤り。J-REITの保有不動産の開示情報を元に算出されてきた旧AJPIのユニバースに、非上場・私募不動産ファンドの保有不動産を加えたものを基礎に作成する（105 テキスト P.171 参照）。" },
  { subject: "105", no: "問題38", question: "格付けにおいては、デフォルト・リスクと回収リスクが基本的判断要素である。", answer: "正しい", explanation: "（105 テキスト P.145 参照）。" },
  { subject: "105", no: "問題38", question: "債務の「格付け」とは、事業会社や証券化商品のSPC等が、その債務にかかる利息について、その支払いを約定通りに行うことが可能かどうかの確実性を簡単な符号でランキングしたものである。", answer: "誤り", explanation: "債務の「格付け」とは、事業会社や証券化商品のSPC等が、その債務にかかる利息の支払いや元本の償還を約定通りに行うことが可能かどうかの確実性を簡単な符号でランキングしたものである（105 テキスト P.144 参照）。" },
  { subject: "105", no: "問題38", question: "資本構成によって財務リスクを見るだけで、その企業のデフォルト・リスクを正しく判断することができる。", answer: "誤り", explanation: "資本構成によって財務リスクを見るだけでは不十分であり、事業リスクを合わせて明らかにして、デフォルト・リスクが判断できる（105 テキスト P.145 参照）。" },
  { subject: "105", no: "問題38", question: "企業のデフォルト・リスクが小さい場合、常に回収リスクも低くなる。", answer: "誤り", explanation: "デフォルト・リスクが小さいからといって常に回収リスクも低いわけではない（105 テキスト P.145 参照）。" },
  { subject: "105", no: "問題44", question: "リスクを標準偏差で捉えた場合、リスク回避的な投資家であれば、資産Bより資産Aを選択する。", answer: "正しい", explanation: "リスク回避的な投資家であれば、期待値が同じ場合、標準偏差が低い資産を選択する（105 テキスト P.189〜191 を参照）。" },
  { subject: "105", no: "問題44", question: "収益率が期待値（5%）を上回る確率は、資産AのほうがBよりも大きい。", answer: "誤り", explanation: "正規分布は左右対称であり、期待値を上回る確率も下回る確率も同じである（105 テキスト P.189〜191 を参照）。" },
  { subject: "105", no: "問題44", question: "収益率が期待値（5%）を下回る確率は、資産AとBとでは同じである。", answer: "正しい", explanation: "正規分布は左右対称であるため同じ確率となる（105 テキスト P.189〜191 を参照）。" },
  { subject: "105", no: "問題44", question: "資産Aの収益率が－5%から15%までの値を取る確率と、資産Bの収益率が－5%から15%までの値を取る確率は同じである。", answer: "誤り", explanation: "資産Aの収益率が（±2標準偏差内）の値を取る確率が約95%である一方、資産Bの収益率が±1標準偏差内の値を取る確率は約68%である（105 テキスト P.189〜191 を参照）。" },
  { subject: "106", no: "問題48", question: "嘘をついてはいけないということや他人を裏切ってはならないという倫理観は個人の内面の問題であるが、法律の条文のなかにはそのような倫理観と共通する規範を持つものがある。しかし、業務遂行過程における個人の誠実性を要求するような法律の規定はない。", answer: "誤り", explanation: "個人の誠実性を要求する法律の条文はあるので、ないという記述部分が誤りである。金融サービス提供法第2条第1項は、不動産証券化商品を取り扱う事業者（金融商品取引業者等）及びその役員及び使用人が負う義務として、誠実業務遂行義務を明文化している（106テキスト P.39参照）。" },
  { subject: "106", no: "問題48", question: "不動産証券化商品の販売を行う会社の担当者個人は、販売行為の相手方である投資者に対して、会社が用意した法定の説明書（例えば、契約締結前交付書面）を交付し説明をすればその義務を果たしたことになり、当該投資者に相応しい説明になっていないと知りつつ形式的な説明に終始しても、当該担当者個人が当該投資者に対して直接、不法行為責任を負うことはない。", answer: "誤り", explanation: "この場合に当該担当者個人が当該投資者に対して直接、不法行為責任を負うことはない、という部分が誤り。従業員個人が事業者の負う行為義務に抵触している場合には、個人の不法行為が認定されることがある（106テキスト P.41〜42参照）。" },
  { subject: "106", no: "問題48", question: "不動産証券化商品の販売を金融商品取引業者に委託した会社は、委託先である金融商品取引業者の不適切な販売行為によって当該会社が損害を被った場合、委託先である金融商品取引業者に対して委託契約上の善管注意義務違反に基づく損害賠償請求をすることは可能であるが、実際に不適切な販売行為を行った金融商品取引業者の従業員個人に対しては、委託契約上の善管注意義務違反に基づく損害賠償請求をすることはできない。", answer: "正しい", explanation: "契約上の善管注意義務違反とは、契約関係にある当事者間での債務不履行の問題である。従業員が会社の債務不履行責任を負うことはない（106テキスト P.42参照）。" },
  { subject: "106", no: "問題48", question: "金融商品取引法では、金融商品取引業者等の従業員も行為義務の主体となっている場合があるが、従業員が当該義務に違反しても会社の補助者として行為しているに過ぎないので、従業員個人が罰せられることはない。", answer: "誤り", explanation: "違反をした従業員個人が罰せられることはないという点が誤り。事業者のみが行為義務の主体となっている場合でも、違反行為をした個人も行政処罰を受ける場合がある（106テキスト P.29〜30参照）。" },
  { subject: "106", no: "問題49", question: "金融商品取引法上、金融商品取引業者等が負う善良な管理者としての注意義務（善管注意義務）は行政法規上の注意義務であって、それに反した場合には、民事上の善管注意義務違反を問われることはない。", answer: "誤り", explanation: "行政法規上の善管注意義務違反が民事上の善管注意義務違反となることもあるので、その点が誤り（106 テキスト P.40 参照）。" },
  { subject: "106", no: "問題49", question: "金融庁が公表している「顧客本位の業務運営に関する原則」の中にある「金融事業者は、顧客の最善の利益を図るべきである。」という原則は、法的拘束力のないものと言われているため、金融商品取引業者等は顧客の最善の利益を勘案するという法的な義務を負うわけではない。", answer: "誤り", explanation: "顧客の最善の利益を勘案する法的義務はないという点が誤り。「顧客本位の業務運営に関する原則」自体は法的義務を課すものではないが、金融サービス提供法第2条第1項で規定されている（106 テキスト P.39〜40 参照）。" },
  { subject: "106", no: "問題49", question: "上記ロの金融庁の原則のなかにある「金融事業者は、取引における顧客との利益相反の可能性について正確に把握し、利益相反の可能性がある場合には、当該利益相反を適切に管理すべきである」という場合の「顧客」と、「金融事業者は、金融商品・サービスの販売・推奨等に係る重要な情報を顧客が理解できるよう分かりやすく提供すべきである」という原則に記載されている「顧客」は、同一の概念とは限らない。", answer: "正しい", explanation: "「顧客」の意味が相対概念であり得ることはテキストやWeb講義でも説明されている。（Web 講義 106 第Ⅱ部 P.18、106 テキスト P.51〜52 参照）。" },
  { subject: "106", no: "問題49", question: "金融商品取引業者の従業員が、投資経験のない投資者に過大なレバレッジリスクのある不動産証券化商品の購入を勧誘する場合には、当該従業員個人だけではなく金融商品取引業者が不法行為責任を負うことがある。", answer: "正しい", explanation: "証券会社は民法第 715 条の使用者責任を理由として不法行為責任を認められるほか、会社自体が組織的な不法行為の主体として民法第 709 条の責任を負うこともある（106 テキスト P.35、P.42 参照）。" },
  { subject: "106", no: "問題50", question: "「信認」（フィデュシャリー）という概念は、契約概念との対比において、通常その関係者は3人（3つのグループ等）であり、受認者は基本的に自己の利益を追求してはならず、受認者にはより大きな裁量が与えられるという特徴がある。", answer: "正しい", explanation: "（106 テキスト P.12〜13 参照）。" },
  { subject: "106", no: "問題50", question: "信認義務とは、主に忠実義務と善管注意義務という2つの義務からなり、前者の忠実義務とは、その分野のプロであれば当然払うであろう十分な注意を払い、業務を誠実に遂行するという義務を指している。", answer: "誤り", explanation: "その分野のプロであれば当然払うであろう十分な注意を払い、業務を誠実に遂行するという義務は「善管注意義務」を指している（106 テキスト P.14〜15 参照）。" },
  { subject: "106", no: "問題50", question: "不動産証券化ビジネスに関わる人々はプロフェッショナルである。それゆえ、信頼を寄せる投資家や市場に対し、専門家としての「信認義務」を負うのである。", answer: "正しい", explanation: "（106 テキスト P.14 参照）。" },
  { subject: "106", no: "問題50", question: "不動産証券化協会では、不動産証券化に携わる事業者に求められる共通の行動基準「一般社団法人不動産証券化協会自主行動基準」を策定し、会員の規律保持に努めている。", answer: "正しい", explanation: "（106 テキスト P.66 参照）。" },
  { subject: "102", no: "問題1", question: "企業がその信用力に基づき、保有する不動産を担保として提供し、金融機関などから資金調達することをアセットファイナンスという。", answer: "誤り", explanation: "企業がその信用力に基づき、自身のバランスシートを用いて資金調達する「コーポレートファイナンス」に対し、証券化は不動産等の収益性に依存して資金調達をするため、「アセットファイナンス」の領域に属する。" },
  { subject: "102", no: "問題1", question: "「法人企業統計」によると2023年度の結果において企業の総資産に占める割合は、有形固定資産（建物も含まれる）が約25%、土地は約10%であり、これらの有効活用・オフバランスなどが企業の収益力や効率性などに及ぼす影響は大きい。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題1", question: "市場型間接金融を拡大させる意義として、様々なリスク・リターンを持つ金融商品が提供されること、伝統的間接金融の下で銀行部門に集中するリスク量の増大を抑制することなどがある。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題1", question: "私募REITは、安定的な資産運用を志向する地銀・信金・信組や年金などのニーズに応えるものであり、運用開始後15年程度で、既に運用投資法人は11銘柄、運用資産額は1.2兆円（2024年12月末）にまで増加している。", answer: "誤り", explanation: "私募REITの運用投資法人は58銘柄、運用資産額は6.8兆円（2024年12月末）となっている。" },
  { subject: "102", no: "問題2", question: "二重課税の回避では、信託や組合のように、それ自体がもともと非課税のSPVを使う方法（パススルー）と、特定目的会社（TMK）や投資法人のように、一定の配当・分配ルールを満たせば、投資家への配当金・分配金を費用として損金算入することが認められているSPVを使う方法（ペイスルー）がある。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題2", question: "証券化スキームそのものの信用力を強化したり、流動性を補完したりする仕組みのことを信用補完措置という。具体的には、余剰金積立（キャッシュリザーブ）や、銀行や損害保険会社などの第三者による保証、コミットメントラインの設定などがある。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題2", question: "エクイティは自己資本・株式持分を意味する。資産流動化法に基づく特定目的会社（TMK）の発行する優先出資証券や、J-REITの投資法人債、GK-TKスキームを使った私募ファンドへの匿名組合出資がエクイティに該当する。", answer: "誤り", explanation: "投資法人債はエクイティではなくデットである。" },
  { subject: "102", no: "問題2", question: "ノンリコースローンとは、債権者の求償権が担保不動産にしか及ばないローンで、債務不履行による貸付金の回収不足が生じても、債権者は債務者の他の資産から回収することはできない。ただし、J-REITの借り入れは通常、投資法人自体の信用力などに基づく一種のコーポレートローンである。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題3", question: "ファンド型スキームでは、不動産の売却や入替え、あるいは投資家からの追加的な資金調達による不動産の買増しなどを、運用の専門家であるアセットマネジャーが判断し適宜行う。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題3", question: "私募REITは非上場のオープンエンド型の不動産投資法人であり、運用期間の定めがあり、一定の条件の下で出資金の払戻しを認めるなどの特徴を持っている。", answer: "誤り", explanation: "私募REITは運用期間の定めがない。" },
  { subject: "102", no: "問題3", question: "特定目的会社（TMK）は、投資家保護の観点から、対象資産の特定及び資産流動化計画の作成が義務付けられており、この計画に沿って業務を行わなければならない。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題3", question: "賃貸オフィスビルや賃貸マンションなど収益不動産向けのノンリコースローンを裏付けに発行される証券をCMBSという。ノンリコースローンは、証券化されることで高格付のCMBSから低格付や無格付までの多様な金融商品に変換される。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題4", question: "不動産が適正な価格でSPVに譲渡されることは、真正売買の条件の1つでもあり非常に重要である。通常、不動産証券化における不動産の適正価格とは、当該不動産が生み出すキャッシュフローを基に収益還元法で求めた市場価格（時価）のことである。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題4", question: "不動産証券化では、当該不動産の生み出す将来のキャッシュフローとその変動リスクが投資家に移転するだけに、不動産の評価では細心の注意が求められる。そこで、デューデリジェンスと呼ばれる不動産調査ビジネスが大きく成長した。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題4", question: "ファンドを利用して行う資産価値向上（バリューアップ）の手法においては、キャッシュフローの改善とリスクプレミアムの圧縮が基本となっている。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題4", question: "2023年末における米国REIT市場のセクター構成比率は、J-REIT市場と同様、オフィスの比率が最も大きい。また、通信基地局やレンタル倉庫、森林などJ-REITにはないユニークな不動産を保有し、セクター分散の効いた多様な不動産で構成されている。", answer: "誤り", explanation: "米国REIT市場のオフィス比率は5%と小さい。" },
  { subject: "102", no: "問題5", question: "不動産の広告に関して、宅地建物取引業法第32条により誇大広告は禁止されているが、おとり広告に同条の適用はない。", answer: "誤り", explanation: "国土交通省は、いわゆるおとり広告についても宅地建物取引業法第32条が適用されるとしている。" },
  { subject: "102", no: "問題5", question: "宅地建物取引業法上、いわゆる一般媒介契約の場合においても宅地建物取引業者は指定流通機構への登録義務を負う。", answer: "誤り", explanation: "一般媒介契約の場合、指定流通機構への登録は義務ではない。" },
  { subject: "102", no: "問題5", question: "未成年者は、宅地や建物の所有者となることはできないため、法定代理人が未成年者を代理し所有者となる。", answer: "誤り", explanation: "未成年者も権利能力を有するため、法定代理人の同意または代理のもとであれば宅地や建物の所有者となることができる。" },
  { subject: "102", no: "問題5", question: "隣り合う土地の利用について、建築基準法で定めがあるため民法には建物の築造に関する定めはない。", answer: "誤り", explanation: "民法でも相隣関係の規定があり、建築に関する定めも存在する。" },
  { subject: "102", no: "問題6", question: "宅地建物取引業法上、宅地もしくは建物の取引において買主になる場合には、業として行う場合でも同法における免許は不要である。", answer: "誤り", explanation: "売買を業として行う場合、宅地建物取引業法が適用される。" },
  { subject: "102", no: "問題6", question: "近時の法改正により、宅地建物取引業者が買主に重要事項説明を行う場合、重要事項としてアスベスト調査及び建物状況調査を実施し、その内容を説明しなくてはならないこととなった。", answer: "誤り", explanation: "アスベスト調査や建物状況調査は実施が義務化されているわけではなく、実施している場合は説明等が必要である。" },
  { subject: "102", no: "問題6", question: "不動産投資顧問業登録規程において、一般不動産投資顧問業の登録は任意だが、総合不動産投資顧問業の登録は強制される。", answer: "誤り", explanation: "不動産投資顧問業登録規程は任意の登録制度である。" },
  { subject: "102", no: "問題6", question: "賃貸住宅の管理業務等に関する法律において、賃貸住宅管理業を行う者は、その管理する賃貸住宅が200戸未満でも、同法の要件を満たせば賃貸住宅管理業者として登録することができる。", answer: "正しい", explanation: "国土交通省は、賃貸住宅の管理戸数が200戸未満でも法の要件を満たせば登録できるとしている。" },
  { subject: "102", no: "問題7", question: "金融市場は、取引される資金の期間により、1年以内の資金を取引する短期金融市場と1年超の資金を取引する長期金融市場に大別される。また、取引所を通さず、市場参加者の間で相対で取引がなされるオープン市場もある。", answer: "誤り", explanation: "市場参加者の間で相対で取引がなされるのは店頭市場である。" },
  { subject: "102", no: "問題7", question: "証券市場で株式・社債・コマーシャルペーパー（CP）等を発行して資金調達を行うことを市場型間接金融と呼ぶ。", answer: "誤り", explanation: "株式・社債・CP等による資金調達は直接金融である。" },
  { subject: "102", no: "問題7", question: "オプション取引は、ある商品を、将来の一定期日までに、もしくは一定期日に、あらかじめ定める価格（権利行使価格）で売り付け（プット）または買い付け（コール）する権利の取引である。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題7", question: "TIBORとは東京の銀行間の資金取引における出し手サイドが提示する金利で、国内の金融取引の基準金利として利用されている。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題8", question: "金融商品取引法の施行により、信託受益権や投資ファンド等の集団投資スキーム持分も広く有価証券とみなされて規制対象となった。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題8", question: "金融商品取引法により規定される金融商品取引業として①第一種金融商品取引業、②第二種金融商品取引業、③投資運用業、④投資助言・代理業があり、これらの業務全てを登録制として横断的に規制する一方で、業務内容の範囲に応じて、例えば財産的基礎要件などの参入規制（登録拒否要件）を設けている。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題8", question: "証券市場は、その機能により、新たに証券を発行して発行者が資金調達を行う発行（プライマリー）市場と、既発証券が売買される流通（セカンダリー）市場がある。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題8", question: "証券のセカンダリー市場における証券会社の主な業務には、顧客の証券の売買等の媒介、取次ぎ、代理を行う委託売買業務（ブローカレッジ）と、証券会社が自らの計算とリスクで証券の売買を行う自己売買業務（ディーリング）がある。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題10", question: "銀行業を営むには金融庁長官の免許が必要である。", answer: "誤り", explanation: "銀行業を営むには金融庁長官ではなく、内閣総理大臣の免許が必要である。" },
  { subject: "102", no: "問題10", question: "貸付に際してのスプレッドとは、基準金利に対する上乗せ金利を指し、銀行の引き受ける信用リスクやコストに見合うリターンといえる。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題10", question: "銀行の信用創造機能により新たに創り出された預金を派生的預金といい、理論上、支払準備率が低いほど派生的預金は小さくなる。", answer: "誤り", explanation: "支払準備率が低いほど派生的預金は大きくなる。" },
  { subject: "102", no: "問題10", question: "バーゼル規制による自己資本比率の算出に当たっては、貸出先の信用リスクは定量化の対象となるが、市場リスクやオペレーショナルリスクは対象とされていない。", answer: "誤り", explanation: "バーゼル規制による自己資本比率の算出に当たっては、貸出先の信用リスクのみならず、市場リスクやオペレーショナルリスクも対象に含まれる。" },
  { subject: "102", no: "問題11", question: "ノンリコースローンとは、特定の事業もしくは資産から発生するキャッシュフローのみを返済原資とする融資のことで、伝統的なコーポレートファイナンスの一つである。", answer: "誤り", explanation: "ノンリコースローンとは、特定の事業もしくは資産から発生するキャッシュフローのみを返済原資とする融資のことで、それ以外にスポンサーへの求償権がない非遡求型ローンを指し、伝統的なコーポレートファイナンスとは異なる。" },
  { subject: "102", no: "問題11", question: "建設中の物件を対象とした不動産ノンリコースローンをコンストラクションローンといい、対象物件の竣工後にパーマネントローンへ切り換えられることはない。", answer: "誤り", explanation: "対象物件の竣工後はパーマネントローンへ切り換えられるケースが多い。" },
  { subject: "102", no: "問題11", question: "PFI（Private Finance Initiative）は、PPP（Public Private Partnership）の代表的な手法の一つで、公共事業に民間のノウハウや資金を活用する手法である。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題11", question: "VFM（Value For Money）とは、一般に「支払いに対して最も価値の高いサービスを供給する」という考え方であり、同一の目的を有する2つの事業を比較する場合、支払いに対して価値の高いサービスを供給する方を他に対し、「VFMがない」という。", answer: "誤り", explanation: "支払いに対して価値の高いサービスを供給する方を他に対し、「VFMがある」という。" },
  { subject: "102", no: "問題12", question: "銀行、保険会社、年金基金などの機関投資家は、顧客等から拠出された資金を投資運用・管理しており、利息、保険金、給付金等の形で顧客に一定の支払いをする必要がある。こうした支払い義務等の特性に基づき総合的にリスク管理を行う手法がALM（Asset Liability Management）であり、運用に関する方針や目標はこのALMの観点から決定される。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題12", question: "国内銀行は、不動産会社や不動産流動化等を目的とするSPCへの貸し出しにより、不動産投資市場を支えている。また、私募REITなどの不動産証券化商品への投資も行っている。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題12", question: "国内保険会社の中でも、生命保険会社と損害保険会社では資産運用における投資配分に差があり、それぞれにおける運用資産配分の構成比でみると、損害保険会社は、安定資産とされる国債への配分割合が生命保険会社より高い。", answer: "誤り", explanation: "運用資産に占める国債の割合は、国内生命保険会社では39.6%であるのに対し、国内損害保険会社では13.1%であり、生命保険会社の方が高い。" },
  { subject: "102", no: "問題12", question: "不動産証券化ビジネスの拡大に伴い、機関投資家が不動産に投資する場合、対象不動産の経営をアセットマネジャー等の第三者へ委託することが普及した。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題13", question: "海外機関投資家は、国内の不動産投資市場において、先進的物流施設のような新たな種類のアセットの国内での普及や、ホテルやリゾート分野で見られるような運営ノウハウの提供などにも寄与してきた。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題13", question: "グローバルに不動産投資を行っている海外の大型年金基金は、各国の年金制度の一部であり、基礎年金や社会保障年金でないものも多い。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題13", question: "SWF（政府系基金）は石油等の資源収入を運用原資としている中東の投資家であり、アジアやヨーロッパの投資家は含まれない。", answer: "誤り", explanation: "SWF（政府系基金）には、石油等による資源収入を原資とするものと外貨準備金等を原資とするものがあり、アジアのSWFには外貨準備金を原資とするものも散見される。" },
  { subject: "102", no: "問題13", question: "SWF（政府系基金）は、投資利回りの設定に関して柔軟性が高く、優良な投資物件に対しては長期投資を前提に強気なスタンスで投資する傾向がある。そのため、世界の大型不動産取引で取得者あるいは売却者として、名を連ねている。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題14", question: "日本では健康保険と同様に国民皆年金の公的年金制度が広く普及しており、全国民が国民年金に加入している。", answer: "誤り", explanation: "国民年金保険料の未納者も国民年金制度の加入者ではあるが、20歳未満の国民は国民年金制度の加入者とはなっていない。" },
  { subject: "102", no: "問題14", question: "国家公務員には職務専念義務があるため、iDeCo（個人型確定拠出年金）に加入することが認められていない。", answer: "誤り", explanation: "公務員のiDeCo加入については、当初、勤務中の守秘義務等との関係で加入できなかったが、確定拠出年金法の改正によって2017年1月より加入することが可能になっている。" },
  { subject: "102", no: "問題14", question: "大阪公立大学に常勤で勤務する教員は、日本私立学校振興・共済事業団の行う私学共済事業に加入し将来に年金給付を受けることができる。", answer: "誤り", explanation: "公立大学に勤務する常勤の教員は、公立学校共済を経由して地方公務員共済制度に加入している。" },
  { subject: "102", no: "問題14", question: "警視庁に勤務する常勤職員の年金積立金は、警察共済組合を通じて国家公務員共済組合連合会が運用を行っている。", answer: "誤り", explanation: "警視庁の職員については、警察共済組合を通じて地方公務員共済制度の加入者になっている。" },
  { subject: "102", no: "問題15", question: "企業年金は、年金の受給権者や制度加入者に対して受託者責任を負っている。企業年金の受託者責任は年金資産の運用に関し負っている受託者責任の中で特に重要なものは、注意義務と忠実義務である。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題15", question: "2023年11月20日に成立した「金融商品取引法等の一部を改正する法律」によって、企業年金を含む年金積立金の管理運用業者や年金基金には、金融サービスの提供等に係る業務を行う者として、顧客に対する最善利益義務を含む誠実義務が課されている。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "102", no: "問題15", question: "2024年8月に内閣府が制定・公表した「アセットオーナー・プリンシプル」は企業年金を含む様々な種類のアセットオーナーが守るべき基本的な共通規範とされており、すべての企業年金が既に受け入れを表明している。", answer: "誤り", explanation: "2025年4月末までに受け入れを表明している企業年金は、135に留まる。" },
  { subject: "102", no: "問題15", question: "年金の不動産投資にかかるゲートキーパーの選定に際しては、受託者責任の観点から、不動産に関する専門知識、ストラクチャリングに関する専門知識、ゲートキーパーとしての実績及びトラックレコード、組織・人材、コンプライアンス体制などを確認することが、ポイントになる。", answer: "正しい", explanation: "正しい記述です。" },
  { subject: "103", no: "問題4", question: "不動産投資とは、投資対象となる不動産を購入し、それを賃貸したり、売却することによって利益を得る方法である。", answer: "正しい", explanation: "（103 テキスト P.12 参照）。" },
  { subject: "103", no: "問題4", question: "リーマンショック後はインカムゲインよりキャピタルゲインを狙うオポチュニスティックな投資が選好されてきている。", answer: "誤り", explanation: "リーマンショック後はインカムゲインがより重視されてきている（103 テキスト P.13 参照）。" },
  { subject: "103", no: "問題4", question: "投資による儲けの度合いは一般にリターンと呼ばれている。そのリターンはもっぱら投資対象となる不動産の規模や金額の大きさにより決まってくる。", answer: "誤り", explanation: "不動産投資のリターンは当該資産に対する投資リスクの高低により概ね決まってくる（103テキスト P.13 参照）。" },
  { subject: "103", no: "問題4", question: "不動産投資におけるオポチュニティの1つとして、出口価格の上昇、すなわち将来の物件売却時の価格が上昇する可能性を挙げることができる。", answer: "正しい", explanation: "（103 テキスト P.15 参照）。" },
  { subject: "103", no: "問題5", question: "不動産のタイプによって求められる専門性やリスク特性が異なるため、投資する不動産のタイプを限定することはリスクマネジメントの1つの方策である。", answer: "正しい", explanation: "（103 テキスト P.17 参照）。" },
  { subject: "103", no: "問題5", question: "商業施設の場合、100%歩合賃料で契約するよりも固定賃料又は固定＋歩合賃料形式の方がリスク軽減策となりうる。", answer: "正しい", explanation: "（103 テキスト P.17〜18 参照）。" },
  { subject: "103", no: "問題5", question: "適正な管理仕様を維持することは、テナント満足度を高めるだけでなく、事故の発生軽減などの効果があり、リスク軽減策の1つである。", answer: "正しい", explanation: "（103 テキスト P.18 参照）。" },
  { subject: "103", no: "問題5", question: "建物設備・什器備品などに関する法改正やリコール情報を定期的に収集することは、リスク軽減策の1つである。", answer: "正しい", explanation: "（103 テキスト P.18 参照）。" },
  { subject: "103", no: "問題6", question: "アセットマネジャーの使命は投資家の利益を最大化することであり、投資家が出資する資金を原資として不動産投資事業を行い、不動産を所有するヴィークルを経営する役割を担うものである。", answer: "正しい", explanation: "（103 テキスト P.30〜31 参照。Web 講義でも触れている。）。" },
  { subject: "103", no: "問題6", question: "アセットマネジメント業務の遂行に際しては様々な法令を順守する必要があり、一般にアセットマネジメント会社は金融商品取引法上の金融商品取引業者としての登録が必要である。", answer: "正しい", explanation: "（103 テキスト P.31 参照）。" },
  { subject: "103", no: "問題6", question: "ファンドを組成しようとする場合、投資家の趣向や投資資金の性格にあったファンドを組成すべきであり、コアファンドとは、安定的な利益配当を趣向する投資家に適合するファンドである。", answer: "正しい", explanation: "（103 テキスト P.33【図表Ⅰ-2-5】参照）。" },
  { subject: "103", no: "問題6", question: "アセットマネジャーが立案した投資戦略に基づき、具体的に遂行するのがプロパティマネジャーの役割であり、テナント管理はプロパティマネジャーの業務領域であるが、キャッシュフローに影響を及ぼす重要な場合では、アセットマネジャーも関与する場合がある。", answer: "正しい", explanation: "（103 テキスト P.30【図表Ⅰ-2-1】、P.43 参照）。" },
  { subject: "103", no: "問題7", question: "GK-TKスキームにおいて口座の階層は信託口座・メイン口座・リリース口座の3階層に分けられており、固定資産税・法人税・消費税などSPCの全ての公租公課の支払いは信託口座レベルで行う。", answer: "誤り", explanation: "口座の階層は記載の通りだが、公租公課は全て信託口座から支払われるのではなく、法人税・消費税の納付はメイン口座から支払われる（103 テキスト P.50〜52、【図表Ⅰ-2-14】参照）。" },
  { subject: "103", no: "問題7", question: "メイン口座では、レンダーへの元利金の支払いや会計事務委託報酬、鑑定評価書取得費用などのストラクチャー維持に必要な支払いを行うほか、それらの費用のリザーブを行う。", answer: "正しい", explanation: "（103 テキスト P.52【図表Ⅰ-2-14】、P.53 参照）。" },
  { subject: "103", no: "問題7", question: "年度資金計画において計画していた工事が予算を超過する場合、レンダーの承諾が必要となることがあるので、工事の発注前にローン契約を確認するなどして必要な手続きを確認する必要がある。", answer: "正しい", explanation: "（103 テキスト P.53 参照）。" },
  { subject: "103", no: "問題7", question: "一定の期間に高額の工事を多数実施すると、DSCRテストに抵触したり未払い配当が生じることがあるため、予め修繕積立金を増額したり、工事の実施時期を分散するなどの手当てが必要である。", answer: "正しい", explanation: "（103 テキスト P.52 参照）。" },
  { subject: "103", no: "問題8", question: "売却方針について、ビジネスプランの達成状況を確認するとともに、今後の金融情勢や不動産マーケットの状況などを考慮し策定した。", answer: "正しい", explanation: "（103 テキスト P.56〜57 参照）。" },
  { subject: "103", no: "問題8", question: "売却に向けた準備において、取得候補者から受けた質問をその当事者に回答し、他の取得候補者にその質疑内容を共有しなかった。", answer: "誤り", explanation: "公平性を確保するために質問者以外にも質疑内容を開示すべきである（103 テキスト P.61 参照）。" },
  { subject: "103", no: "問題8", question: "入札の結果、提示価格が最も高い取得候補者において取引成立の確実性に疑義があったため、確実性の高い次点の候補者に優先交渉権を付与した。", answer: "正しい", explanation: "（103 テキスト P.60 参照）。" },
  { subject: "103", no: "問題8", question: "信託受益権の売却先を決定する際、レンダーには事前に譲渡先を告知し承諾を取得したが、信託受託者には告知しなかった。", answer: "誤り", explanation: "前段のレンダー承諾の必要性は正しいが、後段の信託受託者への告知をしなかった点が誤り。信託受託者へも同様に必要となる（103 テキスト P.61 参照）。" },
  { subject: "103", no: "問題9", question: "平均募集賃料は、実際の成約金額とは乖離がなく、市場の動向を常に正確に反映している。", answer: "誤り", explanation: "平均募集賃料は、成約賃料との価格差やサンプリングバイアスなどの問題がある（103 テキスト P.65 参照）。" },
  { subject: "103", no: "問題9", question: "成約賃料の情報を入手できれば、これにより常にマーケットプライスを正確に把握することができる。", answer: "誤り", explanation: "成約賃料は、関連会社との取引やフリーレントが長く付いていたなどの個別事情が絡んでいる場合があり、マーケットプライスとは異なる価格形成が行われた可能性があるので注意が必要である（103 テキスト P.65 参照）。" },
  { subject: "103", no: "問題9", question: "鑑定価格は、市場の大きな変化に対しても遅れることなく迅速に価格変動を捉えることのできる指標である。", answer: "誤り", explanation: "鑑定価格は、市場の大きな変化への遅れが指摘されている（103 テキスト P.65 参照）。" },
  { subject: "103", no: "問題9", question: "成約売買事例には、関連会社間の取引であったなどの事情が絡んでいる場合もあり、参考にする場合には注意が必要である。", answer: "正しい", explanation: "（103 テキスト P.65 参照）。" },
  { subject: "103", no: "問題10", question: "空室率の算出基準は公表機関によって異なり、比較する際はその特性を理解することが重要である。", answer: "正しい", explanation: "（103 テキスト P.77 参照）。" },
  { subject: "103", no: "問題10", question: "オフィスストックが拡大している場合、空室率が同じ水準であっても、市場全体の空室面積は減少する傾向にある。", answer: "誤り", explanation: "空室率が一定でも、ストックの増減によって市場の空室面積の総量は変わる可能性がある。オフィスストックが拡大している場合は、同じ空室率の時には空室面積は増える（103 テキスト P.77 参照）。" },
  { subject: "103", no: "問題10", question: "空室率は稼働面積をオフィス貸室総面積で除した（割った）もので、オフィスの需要と供給の影響を受ける。", answer: "誤り", explanation: "空室率は、空室面積を貸室総面積で除した（割った）ものである（103 テキスト P.77 参照）。" },
  { subject: "103", no: "問題10", question: "新築ビルの空室率は、算出の際に竣工後12ヶ月間は算出対象外とされるため、市場動向の指標としては用いられない。", answer: "誤り", explanation: "テキストで用いた新築ビルの空室率は、「12 ヶ月を超えると算出対象から外れる」ものであるが、「市場動向の指標としては用いられない」訳ではなく、指標の特徴を理解した上での活用は有用である（103 テキスト P.77 参照）。" },
  { subject: "103", no: "問題11", question: "地価公示は、国土交通省土地鑑定委員会が毎年1月1日時点の標準的な土地の価格を判定して公示するものである。", answer: "正しい", explanation: "（103 テキスト P.68 参照）。" },
  { subject: "103", no: "問題11", question: "都道府県地価調査は、都道府県知事が標準的な土地の価格を判定して公表するもので、林地・リゾート地なども対象としている。", answer: "正しい", explanation: "（103 テキスト P.68 参照）。" },
  { subject: "103", no: "問題11", question: "相続税路線価は国税庁が算定し、公示地価の8割程度が目安とされる。", answer: "正しい", explanation: "（103 テキスト P.68 参照）。" },
  { subject: "103", no: "問題11", question: "固定資産税評価は毎年見直しが行われ、評価水準の目安は公示地価の7割程度とされる。", answer: "誤り", explanation: "固定資産税評価は、3年ごとに見直され、公示地価の7割程度とされる（103 テキスト P.69 参照）。" },
  { subject: "103", no: "問題12", question: "商業施設は、入居テナントである小売業者等の支払う賃料は固定賃料であるため、施設運営の巧拙に関わらず賃料収入が安定している。", answer: "誤り", explanation: "商業施設では、固定賃料だけでなく、入居店舗の売上に応じた売上歩合賃料が導入されることがある。そのため、商業施設の賃料収入は施設の管理運営（オペレーション）の巧拙に大きく左右される（103 テキスト P.88 参照）。" },
  { subject: "103", no: "問題12", question: "商業施設の需給バランスは、空室部分を特定しやすいことからオフィスと同様に全国的な空室率データが整備されており、これを基に把握することができる。", answer: "誤り", explanation: "商業施設では、マスターリースや一時的な催事が行われている場合などには空室部分を特定しづらいことなどから空室面積を集計するのが難しい。なお、オフィス市場ほど全国的・体系的な空室率データはない（103 テキスト P.91～92 参照）。" },
  { subject: "103", no: "問題12", question: "売上歩合賃料は、入居テナントの売上が落ちると賃料収入が減少するため、賃貸側の所有者にとっては不安定な要素となる。", answer: "正しい", explanation: "賃貸側の所有者にとっては、売上歩合賃料は店舗テナントの売上が増加すれば賃料も増加するが、売上が下落すると賃料が減少するため、賃貸収入の変動が大きく不安定な要素となる（103 テキスト P.93 参照）。" },
  { subject: "103", no: "問題12", question: "近年の小売事業者は大型店舗の新規出店によるマーケットシェア拡大を最優先戦略としている。", answer: "誤り", explanation: "小売事業者の戦略において新規出店による売上高・マーケットシェアアップという企業規模の拡大が主流であったのは、2000年代初頭までである（103 テキスト P.89 参照）。" },
  { subject: "103", no: "問題13", question: "不動産のデューデリジェンスにおける法的調査は、私法関係調査と公法関係調査に大別されるが、投資リターンに直接影響を及ぼす可能性があるのは後者である。", answer: "誤り", explanation: "法的調査は私法・公法関係の両面から行われ、双方ともに投資リターンに影響を及ぼす可能性がある（103 テキスト P.126～137 参照）。" },
  { subject: "103", no: "問題13", question: "建物の敷地利用権が借地権の場合、物権である地上権であっても、債権である賃借権であっても、売買時の手続きやコストに差異はないため、投資価値への影響も同等であると判断される。", answer: "誤り", explanation: "権利の安定性、売買時の手続きやコストが異なる等、価格に影響があることに注意を要する（103 テキスト P.126～129 参照）。" },
  { subject: "103", no: "問題13", question: "不動産登記簿謄本の乙区に根抵当権が設定されている場合、その極度額は債務者が実際に借り入れている残債務額を厳密に反映しているため、別途残債務額を確認する必要はない。", answer: "誤り", explanation: "根抵当権が設定されている場合は、極度額と実際の借り入れ残額と異なる場合が多いので、注意を要する（103 テキスト P.127 参照）。" },
  { subject: "103", no: "問題13", question: "賃貸借契約の更新を行い長期間入居しているテナントの場合、契約始期の契約書に加え、変更契約書や覚書等も徴求し、過去の条件変更の経緯を詳細に確認することが必要である。", answer: "正しい", explanation: "（103 テキスト P.129～130 参照）。" },
  { subject: "103", no: "問題14", question: "一般的要因の分析は、抽象的、形式的になり、地域分析や個別分析に比べて軽視されがちであるが、不動産全般の価格形成に影響を与えるマクロ的要因であるため、投資価値判断の基礎として十分な調査が不可欠である。", answer: "正しい", explanation: "（103 テキスト P.139 参照）。" },
  { subject: "103", no: "問題14", question: "感度分析は、予想を立てる際、ある要素が変化した時に、最終的なキャッシュフローにどの程度の影響を与えるかをみる分析手法である。また、シナリオ分析とは、戦略立案する上で、リスク要因に対処するため、複数の異なる条件で戦略を分析する手法である。", answer: "正しい", explanation: "（103 テキスト P.154～155 参照）。" },
  { subject: "103", no: "問題14", question: "多数の不動産を所有するファンドの場合、プロパティマネジメントや建物維持管理、火災保険等に係る契約を一括して締結することで経費削減を図るケースがあるため、対象不動産単独の管理に要する費用を把握することが必要である。", answer: "正しい", explanation: "（103 テキスト P.153 参照）。" },
  { subject: "103", no: "問題14", question: "賃貸用不動産の市場動向調査では、対象不動産と同種・同等の不動産の市場賃料や稼働率、新規供給量を確認することは重要であるが、テナントの平均的な入居期間や退去時の平均的な空室期間は、個別の賃貸借契約の条件に強く依存するため、市場全体の動向としては調査の対象外である。", answer: "誤り", explanation: "「市場全体の動向としては調査の対象外である」が誤り。テナントの平均入居期間や空室期間は、市場全体の安定性や収益性に影響を与える重要な市場動向の指標である（103 テキスト P.150～151 参照）。" },
  { subject: "103", no: "問題15", question: "オペレーショナルアセットとは、賃貸用不動産に限定されず、その収益性が当該不動産が供される事業の経営動向に強く影響を受けるものを指し、ホテルやゴルフ場、医療施設などがその典型例である。", answer: "正しい", explanation: "（103 テキスト P.219 参照）。" },
  { subject: "103", no: "問題15", question: "ホテルの事業形態において、「所有直営方式」はオーナーが全てのリスクを負うため、ハイリスク・ハイリターンであると同時に、経営の自由度が最も高い方式である。", answer: "正しい", explanation: "（103 テキスト P.220 参照）。" },
  { subject: "103", no: "問題15", question: "ホテルの個別的要因分析では、賃借人やホテルマネジメント会社のブランド、ホスピタリティ、知名度、固定客の有無といった要素を重要視することは少ない。", answer: "誤り", explanation: "賃借人、ホテルマネジメント会社のブランド、実力（ホスピタリティ、知名度、固定客の有無）はホテルの個別的要因として挙げられており、これらは収益性に大きく影響するため、「重要視することは少ない」は誤りとなる（103 テキスト P.222 参照）。" },
  { subject: "103", no: "問題15", question: "オペレーショナルアセットにおける総収益把握の留意点として、現に賃貸借に供されている場合でも、現行賃料と事業採算性の観点から把握した適正賃料水準との乖離について分析を行うことは、現行賃料が負担能力を超過しているか否かの検証に有用である。", answer: "正しい", explanation: "テキストでも「現に賃貸借に供されている場合においても、現行の賃貸借契約における賃料と、事業採算性の観点から把握した適正な賃料水準との関係について分析を行うことが有用である。」と述べている通り、これは賃料改定やテナント管理戦略に繋がる有用な分析となる（103 テキスト P.219～220、226 参照）。" },
  { subject: "103", no: "問題18", question: "アスベスト（レベル1）について過去の分析調査報告書により3種類のアスベストの含有が無い結果が出ているため、アスベストの問題は無いものと判断した。", answer: "誤り", explanation: "現時点ではアスベストは6種類とされており、法改正前の3種類のみではアスベスト含有が無いとは言い切れない（103 テキスト P.171～173【図表Ⅲ-2-5】、Web 講義 103 第Ⅲ部 P.52 参照）。" },
  { subject: "103", no: "問題18", question: "低濃度PCB廃棄物の処理期限は2027年3月31日までである。", answer: "正しい", explanation: "（103 テキスト P.172～173 参照）。" },
  { subject: "103", no: "問題18", question: "主な調査項目・対象はアスベスト含有建材及びPCBであるが、委託者の要請により「鉛含有塗料」や「ラドンガス」などの「留意項目」もある。", answer: "正しい", explanation: "（103 テキスト P.172～173【図表Ⅲ-2-5】参照）。" },
  { subject: "103", no: "問題18", question: "アスベストやPCBのスコープで問題点が指摘された場合、サンプリング採取とその試料検体の成分分析・材料試験等（フェーズⅡ）調査を必ず行う。", answer: "誤り", explanation: "フェーズⅡ調査は問題点の明確化と解決策のために行われるオプション調査であり、「必ず」行う訳ではない（103 テキスト P.172 参照）。" },
  { subject: "103", no: "問題19", question: "経年劣化に対して機能維持をするための修繕・更新費用であり、緊急を要する修繕更新費用・短期修繕更新費用を含む。", answer: "誤り", explanation: "緊急を要する修繕更新費用・短期修繕更新費用を含まない（103 テキスト P.159 参照）。" },
  { subject: "103", no: "問題19", question: "調査対象建物は平日日中に使用しているため休日および夜間工事を前提に算出した。", answer: "誤り", explanation: "一般的な工法による施工を前提とするため、夜間工事や特殊性は考慮されない。（Web 講義 103 第Ⅲ部 P.45 参照）。" },
  { subject: "103", no: "問題19", question: "建築時点及び現状の建物の性能を維持する前提で作成され、機能や性能の向上などの要因は考慮されない。", answer: "正しい", explanation: "（103 テキスト P.167～168 参照）。" },
  { subject: "103", no: "問題19", question: "修繕更新費用は安い方が良いため希望金額をER作成者に指定して依頼した。", answer: "誤り", explanation: "安ければよいというのは大きな誤解である（103 テキスト P.167～168 参照）。" },
  { subject: "103", no: "問題20", question: "築年が浅く、図面や検査済証など必要書類は全て揃っていると判断されたため、現地調査は行わず机上調査としてエンジニアリングレポート作成者に委託した。", answer: "誤り", explanation: "原則として現地調査なしのレポートはあり得ない（103 テキスト P.184、Web 講義 103 第Ⅲ部 P.81 参照）。" },
  { subject: "103", no: "問題20", question: "立ち入れる範囲で調査を許可された部分について行うサンプリング調査（抜取り調査）である。", answer: "正しい", explanation: "全数調査ではない（103 テキスト P.161～162、P.183～184 参照）。" },
  { subject: "103", no: "問題20", question: "現地調査において設備が機能しているか確認できない場合には、目視調査だけでなく試験運転を行うことが一般的である。", answer: "誤り", explanation: "目視調査およびヒアリング調査を基本とする（103 テキスト P.161 参照）。" },
  { subject: "103", no: "問題20", question: "調査対象建物の設備に詳しい施設管理者の立会いを求めた。", answer: "正しい", explanation: "現地調査においてヒアリング調査は重要である（103 テキスト P.162～164【図表Ⅲ-2-2】、P.183～184 参照）。" },
  { subject: "103", no: "問題21", question: "プロパティマネジメントとは、ビルオーナーを代行して、建物管理・テナント管理を一括して行うことで収益と資産価値の最大化を図る業務である。", answer: "正しい", explanation: "（103 テキスト P.235 参照）。" },
  { subject: "103", no: "問題21", question: "テナント誘致や契約管理もプロパティマネジメント業務の一環として実施される。", answer: "正しい", explanation: "（103 テキスト P.235 参照）。" },
  { subject: "103", no: "問題21", question: "建物ごとの築年数や用途、立地条件は、不変で固定的なものであり、こうした変化を前提として管理する必要はない。", answer: "誤り", explanation: "不動産は、築年数や用途、立地条件等の様々な要因の組合せにより特有のリスクが形成され、こうした要因は常に変化するものである。プロパティマネジャーには刻々と変化するリスクを的確にコントロールすることが求められる（103 テキスト P.235 参照）。" },
  { subject: "103", no: "問題21", question: "プロパティマネジメント業務のうち「運営業務」は、建物や建物設備を適切に保全していく運営中のハード面の対応を指す。", answer: "誤り", explanation: "選択肢の内容は「建物管理業務」である（103 テキスト P.236 参照）。" },
  { subject: "103", no: "問題22", question: "建物の管理運営計画では、テナントや建物利用者の快適性や安全性の提供が主要な目的の一つである。", answer: "正しい", explanation: "（103 テキスト P.238 参照）。" },
  { subject: "103", no: "問題22", question: "事後保全は、必ずしもリスクの高い対応とは限らず、状況によっては意図的に選択されることもある。", answer: "正しい", explanation: "（103 テキスト P.240 参照）。" },
  { subject: "103", no: "問題22", question: "年間維持管理計画は、月次点検などを含む定期的な点検計画である。", answer: "正しい", explanation: "（103 テキスト P.240 参照）。" },
  { subject: "103", no: "問題22", question: "コンバージョンは、既存用途のまま内装をリニューアルすることで市場価値を高める手法であり、テナントや利用者のニーズが変化した際に有効である。", answer: "誤り", explanation: "コンバージョンとは用途変更することである（103 テキスト P.239 参照）。" },
  { subject: "103", no: "問題23", question: "定期建物賃貸借契約の特徴の一つは、契約の期間に関わらず賃貸人による賃借人に対する契約終了の事前通知義務がないことである。", answer: "誤り", explanation: "契約期間が1年以上の場合には期間満了の1年前から6ヶ月前までの間に契約終了の通知が必要である（103 テキスト P.249 参照）。" },
  { subject: "103", no: "問題23", question: "賃貸借契約の締結時には、館内規則や貸方基準などの書類も同時に交付される。", answer: "正しい", explanation: "（103 テキスト P.248 参照）。" },
  { subject: "103", no: "問題23", question: "入居申込書は、契約条件の交渉に先立って入居希望テナントから提出されることが一般的である。", answer: "正しい", explanation: "（103 テキスト P.248 参照）。" },
  { subject: "103", no: "問題23", question: "環境配慮を企業方針に掲げる企業は、環境認証の有無などをオフィスビル選定の判断基準にすることがある。", answer: "正しい", explanation: "（103 テキスト P.246 参照）。" },
  { subject: "103", no: "問題24", question: "コスト管理とは、単なる支出削減ではなく、賃料や入居率に影響しうる建物の品質を維持しつつ、効率的な運営を目指すことである。", answer: "正しい", explanation: "（103 テキスト P.251～253 参照）。" },
  { subject: "103", no: "問題24", question: "法定定期点検の実施内容や周期は建築基準法により全国で統一されている。", answer: "誤り", explanation: "自治体により周期や内容が異なるものもある（103 テキスト P.255 参照）。" },
  { subject: "103", no: "問題24", question: "PMレポートは、キャッシュフローや入出金状況を含むビル経営状況の報告書であり、ビルオーナーが意思決定するための重要な資料となる。", answer: "正しい", explanation: "（103 テキスト P.264～265 参照）。" },
  { subject: "103", no: "問題24", question: "貸方基準におけるA工事とは、ビルの標準仕様に基づき、賃貸人が発注者となり、施工者を指定し、費用負担を行う工事であることが一般的である。", answer: "正しい", explanation: "（103 テキスト P.261 参照）。" },
  { subject: "103", no: "問題25", question: "定期整備業務は各種設備機器の劣化状況の確認やモーターへのグリスアップ、ベルト交換などを行うもので、これらはすべて専門業者に委託して行う。", answer: "誤り", explanation: "専門業者に委託するほか設備管理員にて行う場合もある（103 テキスト P.266 参照）。" },
  { subject: "103", no: "問題25", question: "日常清掃は、照明器具やブラインドなど建物全体の細部を対象とした清掃である。", answer: "誤り", explanation: "選択肢は特別清掃に関する記載である（103 テキスト P.268 参照）。" },
  { subject: "103", no: "問題25", question: "機械警備では、警備員の異常発生時の到着時間までは定められていないものの、どれだけ早く的確な判断や措置をするかが重要である。", answer: "誤り", explanation: "30分以内（都内などの場合は25分以内）に到着しなければいけないことが警備業法で定められている（103 テキスト P.269 参照）。" },
  { subject: "103", no: "問題25", question: "プロパティマネジメントにおけるコンストラクションマネジメントは、修繕・改修工事の品質、工期、コストの最適化を通じた、ビルの価値の維持・向上を図るものである。", answer: "正しい", explanation: "（103 テキスト P.271 参照）。" },
  { subject: "103", no: "問題26", question: "物理リスクとは、具体的にはESG評価で低スコアを付けられることによって投資資金が引きあげられるリスクが挙げられる。", answer: "誤り", explanation: "選択肢は移行リスクの説明である（103 テキスト P.290 参照）。" },
  { subject: "103", no: "問題26", question: "ネガティブスクリーニングとは、社会的責任投資の一種であり、環境や社会に対して高い評価を得ている企業を選別する手法である。", answer: "誤り", explanation: "選択肢はポジティブスクリーニングの説明である（103 テキスト P.291 参照）。" },
  { subject: "103", no: "問題26", question: "GRESBの評価項目においては、保有物件単位での環境認証取得状況が加点対象となっている。", answer: "正しい", explanation: "（103 テキスト P.297～298 参照）。" },
  { subject: "103", no: "問題26", question: "GRIスタンダードは、企業の財務情報の開示に関する国際的な会計基準である。", answer: "誤り", explanation: "サステナビリティ報告（非財務情報）のために準拠する基準である（103 テキスト P.296 参照）。" },
  { subject: "103", no: "問題27", question: "BELSは建築物省エネルギー性能表示制度であり、日本国内で運用されている制度である。", answer: "正しい", explanation: "（103 テキスト P.304 参照）。" },
  { subject: "103", no: "問題27", question: "Energy Starは、環境保護庁（EPA）が運営している制度で、日本国内の建築物だけが対象となる。", answer: "誤り", explanation: "国際的な基準であり、対象物は多岐に渡る（103 テキスト P.304 参照）。" },
  { subject: "103", no: "問題27", question: "同じ用途の建築物での比較において、BEI（Building Energy Index）の値が0.6の建築物は、0.5の建築物よりも省エネルギー性能が高いことを意味する。", answer: "誤り", explanation: "値が1.0より低くなるほど省エネルギー性能が高いことを意味するため、BEIの値が0.5の建築物の方が、0.6の建築物よりも省エネルギー性能が高いことを意味する（103 テキスト P.311 参照）。" },
  { subject: "103", no: "問題27", question: "エンボディドカーボンは、CO2排出のうち運用時に発生するもののみを対象とする。", answer: "誤り", explanation: "施工や資材調達、解体なども含む（103 テキスト P.312 参照）。" },
  { subject: "104", no: "問題16", question: "不動産証券化の媒体として、宅地建物取引業法上の宅地建物を、直接取得・保有することができる法人としては、投資法人と特定目的会社があるが、いずれの法人もその全議決権を一般社団法人が保有するという倒産隔離の措置が採用されている。", answer: "誤り", explanation: "投資法人の議決権保有者を一般社団法人とする点が誤り。投資法人も倒産隔離をするために一般社団法人に議決権を保有させる措置は執らず、議決権保有者は投資口を保有する投資家である。" },
  { subject: "104", no: "問題16", question: "合同会社が不動産取引から生ずる収益を日本在住の投資家に分配するために現物不動産を保有し、投資家から匿名組合出資を受ける場合には、合同会社は必ず不動産特定共同事業法（以下、「不特法」という。）上の許可を得る必要がある。", answer: "誤り", explanation: "不特法上の特例事業という制度を使えば、当該合同会社は不特法上の許可を得る必要がない。" },
  { subject: "104", no: "問題16", question: "日本における不動産証券化は1990年代後半の不良債権の処理過程における担保不動産の流動化の要請のもとで発展したが、資産の流動化に関する法律の制定により、特定目的会社に不動産を譲渡する場合には、法律上及び会計上、真正譲渡が認められやすくなった。", answer: "誤り", explanation: "特定目的会社に不動産を譲渡すれば真正譲渡が法律上及び会計上認められやすくなったという点が誤り。どのSPCに対象資産を譲渡するときにも、SPCの種類如何で真正譲渡の要件が変わるということはない。" },
  { subject: "104", no: "問題16", question: "投資法人は規約で存続期間を定める必要がなく、また合併をすることにより資産規模を増やすという方法があるが、特定目的会社の場合は資産流動化計画で計画期間を定める必要があり、資産流動化法上、合併の手続き規定がない。", answer: "正しい", explanation: "投資法人の存続期間を定めることはできるが、相対的記載事項となる。投資法人は合併できるが、特定目的会社の場合、計画期間を資産流動化計画に記載し、存続期間又は解散の事由を定款に記載しなければならない。特定目的会社には合併手続きはない。" },
  { subject: "104", no: "問題17", question: "不動産証券化商品の組成における考慮点として、売主であるオリジネーターから買主となる特別目的会社への不動産の移転が真正な譲渡なのか、担保取引による資産の移転なのかという問題がある。この問題は、売主の会計処理としていわゆる5%ルールなどの会計上の基準から売却処理ができるかどうかで決定されるものであり、会計上オフバランスされると法律上も真正な譲渡となる。", answer: "誤り", explanation: "会計上のオフバランスの問題と法律上の真正譲渡の問題は別の問題であり、会計上の基準から売却処理ができる結果法律上も真正な譲渡となるという記載が誤り。" },
  { subject: "104", no: "問題17", question: "不動産証券化商品の組成でSPCが対象不動産を取得する際に、その不動産の売主が売買決済後に引き続きテナントとして当該不動産を継続使用する場合、当該売主の財務状況が健全であったとしても、売主と買主間の賃貸条件によっては、売主であるオリジネーターからの倒産隔離が図られていないと評価される場合がある。", answer: "正しい", explanation: "真正譲渡を考慮する際の論点として、売主の継続的関与という点があり、セール・アンド・リースバックの場合に賃貸条件によっては譲渡担保性の論点がでてくる。" },
  { subject: "104", no: "問題17", question: "不動産証券化商品の組成時にSPCが対象不動産の取得をする場合には、対象不動産の売主の財務状況の健全性を確認することが重要であるが、売主に債務超過の可能性があるような場合には、対象不動産の売買が真正譲渡の観点から問題がない場合であっても、買主であるSPCが当該売買取引について詐害行為取消権や否認権を行使され売買取引の効力が否定される場合がある。", answer: "正しい", explanation: "真正譲渡であっても売買取引が否定される場合として、否認権や詐害行為取消権がある。" },
  { subject: "104", no: "問題17", question: "財務的基盤の弱いオリジネーターが売上げをたてるため、GK-TK方式のファンドを組成して対象となる不動産信託受益権をオリジネーター指定の価格でGKに売却し、3年後の出口売却でオリジネーターが当初の売却価格以下で優先的に購入できる権利が一時的に付与されるスキームを考えた。匿名組合員となる投資家もオリジネーターが当該オプションを取得することを事前に了解し、実際に売主がGKに不動産信託受益権を売却し、当該オプションに基づき買戻しを実行して投資家への分配もレンダーへの返済も完了した。そのような場合には、証券化商品として破綻なく終了しているので、真正譲渡の問題はなかったことになる。", answer: "誤り", explanation: "真正譲渡でなかったにも拘わらず真正譲渡として会計処理や税務処理をしてしまえば、商品自体が終了した後でも、その時点における不適切な会計・税務処理が問題になることもある。" },
  { subject: "104", no: "問題18", question: "オリジネーターがSPCと不動産売買契約を締結して所有権をSPCに移転し、SPCは所有権移転登記をした。所有権移転時に既に売主との間で不動産の賃貸借契約を締結して引渡しを受けていた賃借人（既存テナント）は、SPCに対して従前と同様の賃借人としての地位を有する。この場合SPCは、既存テナントへの通知や承諾なしに、既存テナントに賃料の請求ができる。", answer: "正しい", explanation: "所有権の移転に伴う賃貸借契約の承継に関する基本型である。" },
  { subject: "104", no: "問題18", question: "上記イの事例で、売主はSPCとの間で、売買と同時に当該不動産をSPCから借り受け、既存テナントに対して有する賃貸人としての地位を留保する旨の合意をした。その後、売主がSPCから賃貸借契約を債務不履行で解除された場合、既存テナントは従前と同様の賃借人としての地位をSPCに対して主張できない。", answer: "誤り", explanation: "既存テナントは従前と同様の賃借人としての地位をSPCに対して主張できないという点が誤り。賃貸人の地位の留保の場合には条文で手当てされ、主張できることになっている（民法第605条の2第2項）。" },
  { subject: "104", no: "問題18", question: "オリジネーターが既存テナントのいる対象不動産を信託業法上の信託会社等に信託して得た不動産信託受益権をSPCに譲渡した。信託会社は信託の登記と所有権移転登記をしたが、信託不動産については既存テナント以外の第三者へ賃貸はしていない。その後、SPCが破産手続きを開始した場合には、当該信託不動産の既存テナントは、原則として信託会社の固有財産から敷金の返還を受けることはできない。", answer: "誤り", explanation: "信託会社と既存テナントとの間に承継された既存賃貸借契約上の信託会社の債務は信託財産責任負担債務となり、責任財産限定特約がなされない限り、原則として信託会社の固有財産から敷金の返還を受けることができる。" },
  { subject: "104", no: "問題18", question: "上記ハの事例で、信託会社は信託の登記と所有権移転登記をしたのちに、サブリース会社であるA社に信託不動産を一括して賃貸するマスターリース契約を締結した。既存テナントは、信託会社とA社から連名で、対象借室について信託会社が信託譲渡を受け新たな所有者となると共に、A社が当該信託会社から一括賃貸を受けマスターレッシーとなり、同一の賃貸条件でA社が賃貸人となる、ついては、A社の指定する口座に賃料を振り込み、敷金返還債務もA社のみが負うという同意書に承諾していただきたいという通知を受けた。既存テナントが、この同意書により同意した場合、A社が破綻してマスターレッシーとしての地位を失っても、既存テナントとして、従前と同様の賃借人としての地位を信託会社に対して主張できる。", answer: "誤り", explanation: "マスターレッシーが既存テナントとの関係で新たな賃貸人となる場合には、既存テナントの承諾が必要となる。テナント承諾をしてしまった場合には、通常の転貸借関係になるので、A社は自らの賃借権を主張できず、既存テナントは従前と同様の地位を信託会社に主張できない。" },
  { subject: "104", no: "問題19", question: "ある不動産から生じる賃貸収益や売却収益を多数の投資家に取得させるために、対象となる不動産をオリジネーターが信託会社に信託し、それにより発生する信託受益権を分割して投資家に販売する場合には、オリジネーターは金融商品取引法の登録をせずに、当該信託受益権の準共有持分を販売できる。", answer: "正しい", explanation: "オリジネーターによる新規信託受益権の売却は、分割して、かつ反復継続しても、金融商品取引行為としての私募にはならず、また既発行有価証券の売買にもならない。" },
  { subject: "104", no: "問題19", question: "現物不動産を所有するオリジネーターが当該不動産を信託受益権化するために自ら信託受託者となり、不動産信託受益権を準共有持分化し複数の投資家に販売する場合には、当該オリジネーターは信託業法に基づく自己信託業の登録と金商法上の第二種金融商品取引業の登録が必要となる。", answer: "誤り", explanation: "複数にしただけで自己信託業の登録を要するという点が誤りであり、また自己信託の場合でも当初委託者兼受益者が受益権の発行者となり、その者が行う発行時の投資家勧誘行為は第二種金融商品取引業に該当するため、第二種の登録が必要という点も誤りである。多数（原則50人）の者に譲渡する場合に自己信託業の登録が必要となる。" },
  { subject: "104", no: "問題19", question: "信託会社は受託者として、信託不動産の物件管理行為をプロパティマネジメント会社（PM会社）に自由に委託することができる。ただし、受益者が信託契約でPM会社を指名した場合には、受託者である信託会社は、指名されたPM会社に委託しなければならない。そのようにして指名されたPM会社は信託業法上の義務を負わず、信託会社はPM会社の業務遂行に責任を有しない。", answer: "誤り", explanation: "PM会社は信託業法上の義務を負わず、信託会社はPM会社の業務遂行に責任を有しない、という点が誤り。信託会社がPM会社へ信託不動産に関する管理の委託をすることは信託業の一部を第三者たるPM会社に委託することになり、選任の方法が設問のような場合でも、信託会社に適用される行為義務の一部と同様の責任を負う。" },
  { subject: "104", no: "問題19", question: "不動産証券化で利用される管理型の信託契約において、受益者が信託受託者に信託財産の管理及び処分に関して指図を行う権限を有することが明記される場合、受益者であるSPCから投資一任契約に基づき信託受益権の投資判断の委託を受けているアセットマネジメント会社は、信託業法上、受益者のために忠実に信託財産の管理及び処分に係る指図を行う義務を負う。", answer: "正しい", explanation: "指図権については信託法や信託業法上に定義はないが、信託業法第65条は信託財産の管理又は処分の方法について指図を行う委託者等に対する規律を定めている。信託財産の管理又は処分に係る指図をする上で信託業法第65条の信託の目的に従った忠実義務等をSPCに負うことになる。" },
  { subject: "104", no: "問題20", question: "投資法人が行う不動産売買の手続き的な意思決定は、投資法人の業務を執行し投資法人を代表する執行役員が行う。その意思決定には役員会の承認が必要な場合がある。ただし投資法人は使用人を雇用することができず、投資法人の役員に不動産投資に関する知識経験を要求する条項がない以上、投資法人の執行役員が自ら資産の運用に係る実質的な投資判断を行うことは法制度としては予定されていない。", answer: "正しい", explanation: "投資法人を売買の当事者とする売買契約の締結には投資法人の意思表示が必要であり、その意思表示は投資法人の代表者である執行役員が行う。投資法人は執行役員が資産の運用に係る実質的な投資判断を行うことは予定されていない。" },
  { subject: "104", no: "問題20", question: "特定目的会社が行う不動産信託受益権の売買の手続き的な意思決定は、特定目的会社の業務を執行し会社を代表する取締役が行う。資産流動化法上、その意思決定に取締役会の承認は必要とされていない。特定目的会社が有する不動産信託受益権については、特定資産管理処分受託者に不動産の管理及び処分に係る業務を委託する必要はないが、その売買の投資判断は投資一任業者に一任する義務がある。", answer: "誤り", explanation: "特定目的会社では取締役自らが実質的な投資判断をすることも想定されており、特定資産が信託受益権のような有価証券の場合には、投資判断を投資一任業者に一任する義務があるという点が誤り。" },
  { subject: "104", no: "問題20", question: "登録投資法人が公募形式で投資口を発行する場合には、投資法人の執行役員は、投資信託及び投資法人に関する法律上、一般事務受託者に募集行為を委託する義務があり、委託を受けた一般事務受託者は、金商法上は第二種金融商品取引業の登録を有する必要がある。", answer: "誤り", explanation: "第二種金融商品取引業者という点が誤り。登録投資法人は一般事務受託者に募集に関する事務を委託しなければならないが、第一項有価証券に関する募集の取扱いは第一種金融商品取引業に含まれている。" },
  { subject: "104", no: "問題20", question: "特定目的会社の取締役は、資産流動化法上、一定の場合に優先出資の募集等に係る事務を行うことが禁止されている。", answer: "正しい", explanation: "資産流動化法第207条の規定により、届出が行われたときは特定目的会社の取締役又は使用人は募集等に係る事務を行ってはならない。" },
  { subject: "104", no: "問題21", question: "投資事業有限責任組合契約に関する法律（以下、「LPS法」という。）上の投資事業有限責任組合（以下、「有責組合」という。）は、LPS法に基づく登記によって組成されるが、LPS法上、現物不動産に対する投資事業は原則としてできない。", answer: "誤り", explanation: "LPSは、登記によって組成されるわけではなく、契約によって成立する。なお、LPS法上、例外的に現物不動産を取得できる場合がある（104/上テキスト P.175 参照）。" },
  { subject: "104", no: "問題21", question: "投資家が特定目的会社にエクイティ出資をする手段として組合契約は利用できない。しかし、投資家が合同会社に匿名組合出資をして、当該合同会社が特定目的会社の優先出資持分を取得することはできる。ただし、その場合、当該合同会社は金商法上の投資運用行為（自己運用行為）をしていることになる。", answer: "正しい", explanation: "（104/上テキスト P.249～252 第8章 10等 参照）。なお、合同会社が自己運用行為に関して適格機関投資家等特例業務の届出を行う場合もある。" },
  { subject: "104", no: "問題21", question: "上場リートでは、特定資産として、現物不動産や信託受益権に投資をする匿名組合契約上の営業者に対して出資をすることができる。特定目的会社も、現物不動産や不動産信託受益権を保有する事業に関して匿名組合出資をすることができる。ただし、特定目的会社の場合には、当該組合の営業者は、対象資産の変更や追加取得はできない。", answer: "正しい", explanation: "（104/上テキスト P.113【図表Ⅰ-4-3】、P.138 第5章 3.3 参照）。" },
  { subject: "104", no: "問題21", question: "A氏、B氏及びC氏は、都心の新築マンションを三人で購入し転売利益を得る目的で民法上の任意組合を組成する合意をして、各自1億円の出資をした。A氏及びB氏は忙しいので不動産に詳しいC氏に当該マンションの業務執行を一任し、C氏は自己の名義で不動産登記をしたうえで転売し出資の割合で収益の分配をしたが、業務執行に対する報酬を得ていない。この場合、C氏は、不特法上の不動産特定共同事業の許可を取得する必要はない。", answer: "誤り", explanation: "不特法上の不動産特定共同事業を行うことに該当する可能性が高いため、許可を取得する必要はないという点が誤り（104/上テキスト P.186～187 第7章 2.2 参照）。" },
  { subject: "104", no: "問題22", question: "金商法上のみなし有価証券である不動産信託受益権の売買を行う売主及び買主は、既発行の受益権の売買を業として行う場合、いずれも金商法上の金融商品取引業者としての登録が必要とされるようになった。ただし、当該売主及び買主が金融商品取引業者による代理又は媒介により売買を行う場合には、売主及び買主本人はそれぞれ自ら勧誘を行わない限り、金融商品取引業の登録は不要となる。", answer: "誤り", explanation: "買主が金融商品取引業者等による代理又は媒介により売買を行う場合に、買主本人の金融商品取引業の登録が不要となるという除外規定はない（104/上テキスト P.221 第8章 4.10.2 参照）。" },
  { subject: "104", no: "問題22", question: "不特法上の特例事業者として合同会社が現物不動産を取得して賃貸運用した収益金を投資家に分配する方式では、事業参加者が取得する匿名組合契約型の不動産特定共同事業契約に基づく権利のみなし有価証券となった。そのため、投資家勧誘を行うことができる不動産特定共同事業者は、第二種金融商品取引業の登録を有することが必要である。", answer: "正しい", explanation: "（104/上テキスト P.202 第7章 5.1.2、P.223 第8章 5.2 参照）。" },
  { subject: "104", no: "問題22", question: "上記ロの事例で投資家勧誘を行う事業者は、金商法上の適合性の原則の適用（あるいは不特法上は準用）を受けるため、投資家の知識、経験、財産の状況及び不動産特定共同事業契約を締結する目的に照らして適切な属性を持つ投資家にのみ勧誘行為を行う義務を負う。しかし、勧誘の相手方が金商法上のオプトインをする場合には、そのような義務の適用（準用）を受けない。", answer: "正しい", explanation: "特定投資家（オプトインした場合も含む）に対しては、不特法上の特例投資家にもなり、適合性の原則の適用はなくなる（104/上テキスト P.200～201 第7章 4.8 参照）。" },
  { subject: "104", no: "問題22", question: "上記ロの事例で、匿名組合契約型の不動産特定共同事業契約に基づく権利の取得を電子取引業務の方法で勧誘する（具体的にはインターネット上で不特定多数の者に当該権利の取得の申込みを勧誘する）場合には、勧誘の相手方が500人以上となるので、金商法上のいわゆる公募型の募集となる。", answer: "誤り", explanation: "第二項有価証券の場合、公募の扱いにするためには出資総額の50%を超える額を有価証券に投資する事業である場合である。さらに、匿名組合出亡持分取得の勧誘対象が500名以上となるから公募となるわけではない（104/上テキスト P.235 第8章 6.8.3 参照）。" },
  { subject: "104", no: "問題23", question: "ST（セキュリティー・トークン）の発行体は資産として、有価証券だけではなく、現物不動産も保有することが可能となっている。", answer: "正しい", explanation: "2024年11月から施行されている不特法上も電子記録移転権利と同様の概念が導入されており、現物不動産を保有する法人が発行体となることも可能である（104/上テキスト P.210～211 第7章 8 参照）。" },
  { subject: "104", no: "問題23", question: "投資家が対面での勧誘や説明を受けることなく、インターネットを通じて、不動産信託受益権に投資をする匿名組合出資持分を取得する場合でも、当該匿名組合出資持分はSTとは限らない。", answer: "正しい", explanation: "2014年の金商法改正で導入された「電子募集取扱業務」はインターネットを通じて有価証券の取得勧誘を行う業務であるが、これはST化と同じではない（104/上テキスト P.244 参照）。" },
  { subject: "104", no: "問題23", question: "金商法でみなし有価証券とされる匿名組合契約上の権利でSTが発行される場合には、発行体のために募集（公募）や私募の取扱いができる事業者は、第一種金融商品取引業者である必要がある。", answer: "正しい", explanation: "電子記録移転権利は属性としては第二項有価証券（みなし有価証券）であるが、開示規制上は第一項有価証券として扱われ、取扱業者は第一種金融商品取引業者となる（104/上テキスト P.241 参照）。" },
  { subject: "104", no: "問題23", question: "不特法上の対象不動産を自ら保有し不動産特定共同事業を行う許可を得ようとする者は、金商法上の第二種金融商品取引業の登録をしている場合、組合契約型の不動産特定共同事業契約上の権利をSTにして勧誘する許可を得ることができる。", answer: "誤り", explanation: "ST化されている場合には、第一種金融商品取引業の範囲となるため、第二種の登録では足りない（104/上テキスト P.243【図表 Ⅰ-8-14】参照）。" },
  { subject: "104", no: "問題24", question: "金商法上の第二種金融商品取引業の登録をして不動産信託受益権を第三者から取得し自ら販売を継続している宅地建物取引業者が、不動産信託受益権を投資経験のない個人に販売する際には、宅建業法、金商法、金融サービスの提供及び利用環境の整備等に関する法律、及び消費者契約法の条文に適合した方法で販売する必要がある。", answer: "正しい", explanation: "宅建業者が金融商品取引業者として不動産信託受益権の売主になる場合、これらすべての法律の適用がある（104/上テキスト P.261～262 参照）。" },
  { subject: "104", no: "問題24", question: "上記イの事例で、不動産信託受益権の販売時に、販売担当者が不動産投資経験のない個人に対して、対象不動産は将来確実に値上がりすると断定的に説明し、それを当該個人が信じて売買契約を締結した場合、その買主個人は売買契約を消費者契約法に基づき取り消すことができる。また、販売担当者が会社から言われたとおりに説明し、断定的な説明をしたことについて故意又は過失がなかったとしても、販売会社は不法行為責任を負うことがある。", answer: "正しい", explanation: "消費者契約法により取り消しが可能であり、金融サービス提供法上の断定的判断の提供禁止違反による損害賠償責任は故意過失を問わない（104/上テキスト P.276～277 参照）。" },
  { subject: "104", no: "問題24", question: "上記イの事例で、当該宅建業者がその受益権を特別目的会社として設立された合同会社に販売する際には、当該合同会社は金商法のいわゆるオプトインをすることができる。合同会社がオプトインをした場合、当該宅建業者は、宅建業法、金商法及び金融サービス提供法上の説明義務がなくなる。", answer: "正しい", explanation: "オプトインして特定投資家として扱われる投資家に対しては、宅建業法、金商法、金融サービス提供法の各種説明義務が免除される（104/上テキスト P.257～259 参照）。" },
  { subject: "104", no: "問題24", question: "不動産信託受益権を直接保有する合同会社からの委託を受けて、匿名組合契約上の営業者となる合同会社に出資することを勧誘する場合、販売会社は勧誘の相手方が資本金1億円の上場会社であるときは、当該勧誘の相手方に金商法上のいわゆるオプトアウトができる旨の告知をする必要はない。", answer: "誤り", explanation: "上場会社は特定投資家としての資本金要件はなく特定投資家に該当するが、金融商品取引契約締結前にオプトアウト告知をしなければならない（104/上テキスト P.254～256 参照）。" },
  { subject: "104", no: "問題25", question: "(1)特定資産として不動産を保有する登録投資法人から資産の運用に係る業務の委託を受ける者、(2)特定目的会社から特定資産である不動産の管理及び処分に係る業務の委託を受ける者、(3)不特法上の特例事業者から不動産特定共同事業契約に基づき営まれる不動産取引に係る業務の委託を受ける者、これらはそれぞれ、金商法上の金融商品取引業の登録及び宅建業法上の宅建業の免許を保有している必要がある。", answer: "誤り", explanation: "特定目的会社から特定資産が不動産の場合に管理処分受託者になる者や、特例事業者の委託を受けて業務を行う者（第三号事業者）については、金商法上の登録は要件とされていない（104/上テキスト P.159～160 参照）。" },
  { subject: "104", no: "問題25", question: "上記イの事例で (1)主として不動産に投資をする登録投資法人、(2)特定資産として不動産を保有する特定目的会社及び (3)不特法上の特例事業者は、宅建業法上はみなし宅建業者となる。", answer: "誤り", explanation: "特定目的会社は宅建業法が非適用であり、みなし宅建業者とはならない（104/上テキスト P.136 参照）。" },
  { subject: "104", no: "問題25", question: "旅館業を遂行するために匿名組合出資を受けて旅館施設（不動産）を取得し、旅館業からの事業収益を金銭で分配するためだけに設立された合同会社が匿名組合出資を法人に勧誘する場合（合同会社自らが勧誘を行う）には、不特法の適用はないが、金商法と金融サービス提供法が適用される。", answer: "正しい", explanation: "不動産取引からの事業収益の分配がなく旅館業に限定している場合には不特法の適用はないが（104/上テキスト P.193～194 参照）、自己募集となるため金商法及び金融サービス提供法は適用される。" },
  { subject: "104", no: "問題25", question: "特定目的会社が旅館施設（不動産）を取得し、オペレーター（旅館業の許可を有する会社）に賃貸する場合には、当該旅館施設（不動産）を特定目的会社に譲渡した者は、一定の届出をすることにより、特定目的会社が優先出資証券を発行する際の投資家勧誘行為を行うことができる。", answer: "正しい", explanation: "特定目的会社では、特定資産の譲渡人が届出をして資産対応証券の募集等の取扱いができるという規定がある（104/上テキスト P.149 参照）。" },
  { subject: "104", no: "問題26", question: "投資事業有限責任組合が特定目的会社の発行する全ての特定社債を引受ける場合には、当該有責組合の無限責任組合員は、自己運用行為を行うことになる。", answer: "正しい", explanation: "LPSで有価証券投資を行う場合には、無限責任組合員が自己運用行為を行うことになる（104/上テキスト P.177 参照）。" },
  { subject: "104", no: "問題26", question: "登録投資法人が特定資産として更地を取得し新たな建物を新築するといった、新築工事、建替工事、増築、リニューアル工事等の発注を行うことは、資産運用会社が当該開発行為に係る各種リスクに留意して投資法人のポートフォリオ全体に過大な影響を生じさせないものと判断できる場合で、投資法人がゼネコン類似の行為を行わない場合、実行することは可能である。しかし、資産運用会社がそのような開発計画の立案をすることは、内閣総理大臣の承認を得る必要が生じる場合がある。", answer: "正しい", explanation: "（104/上テキスト P.114～115 参照）。" },
  { subject: "104", no: "問題26", question: "不特法上の任意組合契約型の不動産特定共同事業契約では（ただし特例事業ではないものとする）、任意組合員となる事業参加者は組合事業から生じる損失について第三者に対して無限責任を負う可能性があるため、対象不動産について宅地の造成や建物の修繕を行う場合には、事業参加者は特例投資家のみに限定する必要がある。", answer: "誤り", explanation: "特例事業ではない第一号事業の場合、事業参加者を特例投資家のみに限定する必要はない。" },
  { subject: "104", no: "問題26", question: "一定の運用方針のもとで複数の対象不動産等に投資をする不動産ファンドを立ち上げることを企画した事業会社A社は、合同会社を組成し、親SPCとして当該合同会社1社が、不動産信託受益権を直接保有する別の複数の合同会社（子SPC）に匿名組合出資をするスキームを考えた（いわゆる二層構造のスキーム）。ここで、親SPCは子SPCへの匿名組合出資をすることに関して金商法上の適格機関投資家等特例業務の届出を適法に行っている。このようなスキームでは、子SPCは金商法上の投資運用業者に全部一任する投資一任契約を締結する必要がある。", answer: "誤り", explanation: "二層構造の特例が使える可能性があり、親SPCの営業者が適格機関投資家等特例業務の届出をしている場合には、あらかじめ子SPCに関する事項を当局に届け出ることで、子SPCの投資運用業登録義務が適用除外となるため、必ずしも投資一任契約が必要とは言えない（104/上テキスト P.253 参照）。" },
  { subject: "104", no: "問題28", question: "一項有価証券の新規発行について、勧誘先が50名以上の場合であっても、最終的な取得者が50名未満である場合には、少人数私募に該当しうる。", answer: "誤り", explanation: "少人数私募に該当するためには、取得者だけでなく勧誘先も50名未満でなければならない（104/上テキスト P.314 参照）。" },
  { subject: "104", no: "問題28", question: "二項有価証券の新規発行について、勧誘により最終的な所有者が500名以上となる場合には募集に該当し、募集に該当する場合には当該二項有価証券の種類にかかわらず、発行額に応じて有価証券届出書や有価証券通知書の提出を要する。", answer: "誤り", explanation: "二項有価証券については、募集に当たっても原則として開示規制の対象にならず、例外的に主として有価証券への投資を事業とする集団投資スキーム持分等だけが開示規制の対象となる（104/上テキスト P.316 参照）。" },
  { subject: "104", no: "問題28", question: "一項有価証券を公募する場合、発行額に応じて有価証券届出書や有価証券通知書の提出を要するが、私募の場合は届出や有価証券通知書の提出は要せず、販売する者は一定の例外に当たるときを除き、届出が行われていないこと等を相手に告知する義務を負う。", answer: "正しい", explanation: "（104/上テキスト P.314 参照）。" },
  { subject: "104", no: "問題28", question: "主として有価証券への投資を事業とする集団投資スキーム持分等は、一項有価証券と代替的な関係にあることから、その内容は出資者や市場における他の投資家にとって重要であるため、例外的に開示規制の対象にはならない。", answer: "誤り", explanation: "有価証券への投資を事業とする集団投資スキーム持分等は、一項有価証券と代替的な関係にあることから、例外的に開示規制の「対象となる」（104/上テキスト P.316 参照）。" },
  { subject: "104", no: "問題29", question: "有価証券の募集または売出しにおいては、すべての投資家に対し目論見書の交付が義務付けられており、相手が適格機関投資家の場合であっても交付する必要がある。", answer: "誤り", explanation: "適格機関投資家を相手とする場合など、一部の場合には目論見書の交付義務が免除される（104/上テキスト P.319 参照）。" },
  { subject: "104", no: "問題29", question: "目論見書に虚偽記載があった場合には、投資家に損害が生じていれば、発行者や販売業者は故意・過失の有無にかかわらず損害賠償責任を負うが、免責事由（相当な注意を用いても虚偽記載を知りえなかった等）の立証ができれば責任を免れることができる。", answer: "誤り", explanation: "免責事由を証明できなければ損害賠償責任を負うが、この場合「故意・過失」が要件となる（104/上テキスト P.319 参照）。" },
  { subject: "104", no: "問題29", question: "契約締結前交付書面・契約締結時交付書面・取引残高報告書の交付義務は、相手が特定投資家の場合には金融商品取引業者等に課されない。", answer: "正しい", explanation: "（104/上テキスト P.319 参照）。" },
  { subject: "104", no: "問題29", question: "私募や私売出しの場合であっても、適格機関投資家私募や少人数私募に該当する場合には、告知事項を記した書面を投資家に交付する必要がある。", answer: "正しい", explanation: "（104/上テキスト P.319 参照）。" },
  { subject: "104", no: "問題30", question: "金融商品取引業者等が広告等を用いて、不動産証券化商品の内容を告知する場合、特定投資家のみを相手とする場合を除き一定の事項の表示義務がある。また利益の見込み等について、著しく事実に相違し、又は著しく人を誤認させる表示をすることが禁じられている。", answer: "正しい", explanation: "（104/上テキスト P.321 参照）。" },
  { subject: "104", no: "問題30", question: "日本証券業協会（日証協）に加入する金融商品取引業者は、一項有価証券に係る営業に関する広告等に関し、日証協が定める規則の適用を受け、当該規則が定める禁止行為の定めに従う他、景品類の審査体制や審査基準や保管に係る規則を整備する必要がある。", answer: "正しい", explanation: "（104/上テキスト P.322 参照）。" },
  { subject: "104", no: "問題30", question: "金商法は、金融商品取引契約の締結や勧誘に関して顧客に虚偽を告げる行為を禁止しており、これに違反した場合は刑罰の対象になる。", answer: "正しい", explanation: "（104/上テキスト P.322 参照）。" },
  { subject: "104", no: "問題30", question: "金融サービス提供法は、金融商品の販売等に関し、断定的判断の提供を禁止しており、金融商品販売業者がこれに違反して投資家に損害を与えた場合、金融商品販売業者には故意過失を問わず損害賠償責任が生じ、また、元本欠損額が損害額として推定される。", answer: "正しい", explanation: "（104/上テキスト P.322 参照）。" },
  { subject: "104", no: "問題31", question: "証券会社が、自己の親法人等又は子法人等の発行するREITの投資口の引受主幹事会社となることができるのは、投資法人・主幹事会社の双方から独立した証券会社が発行価格の決定に適切に関与しているという要件を充足する場合に限られる。", answer: "誤り", explanation: "そのような要件を満たしている場合でも、引受主幹事会社となることができるとはされていない（104/上テキスト P.341 コラム 参照）。" },
  { subject: "104", no: "問題31", question: "投資法人と執行役員との間の利益相反取引は、当該投資法人の投資主の3分の2以上の同意があれば実施可能となる。", answer: "誤り", explanation: "役員との間で利益相反取引を行う場合は、投資主の3分の2の同意では足りず、全投資主の同意が基本的に必要である（104/上テキスト P.338 参照）。" },
  { subject: "104", no: "問題31", question: "資産運用会社が自ら運用するファンド間での取引は、原則として禁じられているが、当該価格を踏まえて調査した価格で不動産売買を行うときは、禁止が解除される。", answer: "正しい", explanation: "（104/上テキスト P.359 参照）。" },
  { subject: "104", no: "問題31", question: "投資法人がその資産運用会社の利害関係人等との間で取引をする場合は、軽微なものであっても、役員会の承認を経た投資法人の同意を要する。", answer: "誤り", explanation: "資産に及ぼす影響が「軽微なものを除き」、役員会の承認を経た同意を要する（104/上テキスト P.339 参照）。" },
  { subject: "104", no: "問題32", question: "金商法はJ-REITの投資口についてもインサイダー取引を規制しており、J-REITの根本的性質を左右する事項の他、投資口の発行・自己投資口の取得・業績変動・物件売買その他が、重要事実として規制の対象となるが、公開買付け等の実施・中止に係る事実は規制の対象とはならない。", answer: "誤り", explanation: "公開買付け等の実施・中止に係る事実も規制の対象となる（104/上テキスト P.346 参照）。" },
  { subject: "104", no: "問題32", question: "東京証券取引所は、上場会社等に重要な情報の適時開示（決定または発生し次第、開示すること）を求めており、対象となる情報の範囲は通常は金商法のインサイダー取引規制における重要事実より広い。", answer: "正しい", explanation: "（104/上テキスト P.346 参照）。" },
  { subject: "104", no: "問題32", question: "資産運用会社は、上場会社等（J-REITを含む）に係る未公表の重要情報で、投資者の投資判断に影響を及ぼすと認められるものに関し、不公正な取引の防止を図るために必要かつ適切な措置を講じる必要があり、当該措置の内容としては、例えば役職員数や扱う業務の範囲等により、部署を分ける等が考えられる。", answer: "正しい", explanation: "（104/上テキスト P.359 参照）。" },
  { subject: "104", no: "問題32", question: "投資法人の増資は、増資の金額が1億円未満であっても基本的に金商法上のインサイダー取引規制上の重要事実に該当する。", answer: "誤り", explanation: "投資法人の増資は、1億円未満なら基本的にインサイダー取引規制上の重要事実にはならない（104/上テキスト P.346～347 参照）。" },
  { subject: "104", no: "問題33", question: "投資法人が行う不動産取引のうち、利益相反の要素を含む取引の種類としては、売買又は賃貸借の2種類に分類される。", answer: "誤り", explanation: "売買や賃貸借以外にも、媒介取引や管理委託取引等のケースでも利益相反は発生し得る（104/上テキスト P.335 参照）。" },
  { subject: "104", no: "問題33", question: "J-REITでは、不動産ファンドにあたる投資法人の資産運用を、投資法人の子会社である資産運用会社が行う内部運用型の体系がとられているため、利益相反取引の扱いが問題となる。", answer: "誤り", explanation: "J-REITでは、資産運用を別法人に委託する「外部運用型」の体系がとられているため問題となる（104/上テキスト P.335 参照）。" },
  { subject: "104", no: "問題33", question: "上場投資法人の投資口（投資証券）に係るインサイダー取引の法規制は、投資信託及び投資法人に関する法律（いわゆる投信法）に基づき課せられる。", answer: "誤り", explanation: "インサイダー取引の法規制は、金融商品取引法に基づき課せられる（104/上テキスト P.380～381 参照）。" },
  { subject: "104", no: "問題33", question: "日本におけるJ-REITの発足当初は、上場投資法人の投資口（投資証券）の売買取引は、インサイダー取引の法規制の適用対象外とされていた。", answer: "正しい", explanation: "2014年施行の改正法により、初めて上場投資法人の投資口もインサイダー取引規制の対象に含まれることとなった（104/上テキスト P.380～381 参照）。" },
  { subject: "104", no: "問題34", question: "上場投資法人とその資産運用会社の利害関係人等との間で、不動産の売買取引が行われる場合、原則としてあらかじめ投資法人の同意を得る必要がある。", answer: "正しい", explanation: "（104/上テキスト P.367 参照）。" },
  { subject: "104", no: "問題34", question: "上場投資法人とその資産運用会社の利害関係人等との間で、不動産の売買取引が行われた場合、取引に係る事項を記載した書面（取引報告書面）を、遅滞なく投資法人に交付する必要がある。", answer: "正しい", explanation: "（104/上テキスト P.368 参照）。" },
  { subject: "104", no: "問題34", question: "上場投資法人Aが、他の投資法人からの吸収合併により消滅法人となることを決定した場合、その事実が公表されるまでは、その事実を知った上場投資法人Aの会社関係者による、上場投資法人Aの投資口の売買取引が禁止される。", answer: "正しい", explanation: "（104/上テキスト P.383～384 参照）。" },
  { subject: "104", no: "問題34", question: "上場投資法人の会社関係者である個人が、インサイダー取引の法規制に違反する投資口の売買取引を行った場合、その罰則として科せられるのは、違反して得た財産の没収及び追徴と、罰金刑である。", answer: "誤り", explanation: "財産の没収や罰金刑のみならず、懲役刑も科され得る（104/上テキスト P.380 参照）。" },
  { subject: "104", no: "問題35", question: "譲渡人が譲渡不動産の対価として特別目的会社の発行する証券等を有している場合でも、譲渡人のリスク負担割合が概ね10%の範囲内であれば、リスクと経済価値のほとんど全てが他の者に移転しているものとして取り扱われる。", answer: "誤り", explanation: "リスク負担割合、すなわち流動化する不動産の譲渡時の適正な価額（時価）に対するリスク負担の金額の割合が概ね5%の範囲内であれば、リスクと経済価値のほとんど全てが他の者に移転しているものとして取り扱います（104/下テキスト P.24、Web講義 104/下第IV部 P.12 参照）。" },
  { subject: "104", no: "問題35", question: "譲渡人がセール・アンド・リースバック取引により、継続的に譲渡不動産を使用している場合には継続的関与があると判定されるが、当該リースバック取引がオペレーティング・リース取引であって、譲渡人（借手）が適正な賃借料を支払うこととなっているときには、売却処理が認められる。", answer: "正しい", explanation: "リースバック取引がオペレーティング・リース取引であって、譲渡人（借手）が適正な賃借料を支払うこととなっているときは、その限りにおいて売却処理が認められることとなっています（104/下テキスト P.28、Web講義 104/下第IV部 P.14 参照）。" },
  { subject: "104", no: "問題35", question: "追加出資の可能性がある場合や他の名目でありながら実質的に追加負担となるリスクに該当する場合には、当該追加出資や追加負担リスクを加味してリスク負担割合を算定する。", answer: "正しい", explanation: "追加出資の可能性がある場合や他の名目でありながら実質的に追加負担となるリスクに該当する場合には、当該追加出資や追加負担リスクを加味してリスク負担割合を算定した上で、不動産流動化実務指針の許容範囲内か否かを判断します（104/下テキスト P.28、Web講義 104/下第IV部 P.13 参照）。" },
  { subject: "104", no: "問題35", question: "「特別目的会社を活用した不動産の流動化に係る譲渡人の会計処理に関する実務指針」で例示されている継続的関与の一例として、「譲受人である特別目的会社が譲渡人に対して売戻しの権利を有している場合」がある。", answer: "正しい", explanation: "継続的関与の例として9つの項目が挙げられており、「譲受人である特別目的会社が譲渡人に対して売戻しの権利を保有している場合」もその一つです（104/下テキスト P.23、Web講義 104/下第IV部 P.11 参照）。" },
  { subject: "104", no: "問題36", question: "企業Aが自己の計算において他の企業の議決権の過半数を所有している場合、企業Aは当該他の企業を支配していると判断することができる。", answer: "正しい", explanation: "（104/下テキスト P.33、Web 講義 104/下第Ⅳ部 P.17 参照）。" },
  { subject: "104", no: "問題36", question: "企業Bが自己の計算において他の企業の議決権の41%を所有している場合に、企業Bが当該他の企業の資金調達額の総額の過半について融資を行っているときは、企業Bは当該他の企業を支配していると判断することができる。", answer: "正しい", explanation: "（104/下テキスト P.33～34、Web 講義 104/下第Ⅳ部 P.17 参照）。" },
  { subject: "104", no: "問題36", question: "企業Cが自己の計算において所有している議決権と、自己と緊密な関係がある者及び自己の意思と同一の内容の議決権を行使することに同意している者が所有している議決権とを合わせて他の企業の議決権の過半数を占めている場合に、企業Cが当該他の企業の重要な財務及び営業又は事業の方針の決定を支配する契約等が存在するときは、企業Cは当該他の企業を支配していると判断することができる。", answer: "正しい", explanation: "（104/下テキスト P.34、Web 講義 104/下第Ⅳ部 P.17 参照）。" },
  { subject: "104", no: "問題36", question: "資産流動化型ヴィークルである特定目的会社を連結財務諸表作成の対象となる子会社の範囲に含めるかどうかの判断に際しては、持株基準を適用して判定する。", answer: "誤り", explanation: "特定目的会社についても持株基準ではなく実質支配基準をもとに判定する（104/下テキスト P.35、Web 講義 104/下第Ⅳ部 P.18 参照）。" },
  { subject: "104", no: "問題37", question: "「連結財務諸表に関する会計基準」では、株式会における議決権を想定していることから、意思決定を行う出資者が業務執行の決定も直接行っている投資事業組合は、子会社又は関連会社の範囲に含まれることはないとしている。", answer: "誤り", explanation: "基本的に業務執行の権限を用いることによって支配力、影響力を判断するため、投資事業組合が子会社等に含まれる可能性はある（104/下テキスト P.37～39、Web 講義 104/下第Ⅳ部 P.19 参照）。" },
  { subject: "104", no: "問題37", question: "「連結財務諸表に関する会計基準」第7-2項において、特別目的会社については、一定の要件を満たすときは、当該特別目的会社に資産を譲渡した企業から独立しているものと認め、当該特別目的会社に資産を譲渡した企業の子会社に該当しないものと推定することとされている。", answer: "正しい", explanation: "（104/下テキスト P.35～36、Web 講義 104/下第Ⅳ部 P.18 参照）。" },
  { subject: "104", no: "問題37", question: "「一定の特別目的会社に係る開示に関する適用指針」では、特別目的会社を①子会社に該当するものとされている特別目的会社、②「連結財務諸表に関する会計基準」7-2項において子会社に該当しないものと推定された特別目的会社、③「連結財務諸表に関する会計基準」7-2項によらず子会社に該当しない特別目的会社に区分しているが、このうち③を「開示対象特別目的会社」という。", answer: "誤り", explanation: "上記区分のうち、②を「開示対象特別目的会社」という（104/下テキスト P.44～45、Web 講義 104/下第Ⅳ部 P.20 参照）。" },
  { subject: "104", no: "問題37", question: "開示対象特別目的会社の概要及び開示対象特別目的会社を利用した取引の概要、開示対象特別目的会社との取引金額等は、連結財務諸表に注記しなければならない。ただし、重要性が乏しいものは注記を省略することができる。", answer: "正しい", explanation: "（104/下テキスト P.46～47、Web 講義 104/下第Ⅳ部 P.20 参照）。" },
  { subject: "104", no: "問題38", question: "固定資産の減損損失の計上を行う際は、①固定資産のグルーピング、②減損の兆候の把握、③減損の認識の判定、④減損損失の測定、の順番でステップを踏んだ上で、⑤減損損失を損益計算書に計上する。", answer: "正しい", explanation: "（104/下テキスト P.92【図表Ⅳ-8-7】、Web 講義 104/下第Ⅳ部 P.36 参照）。" },
  { subject: "104", no: "問題38", question: "減損対象となる資産の帳簿価額が10,000、使用価値が4,000、正味売却価額が4,700のとき、計上される減損損失の額は6,000である。", answer: "誤り", explanation: "この場合の回収可能価額は使用価値と正味売却価額の高い方である4,700となり、帳簿価額10,000との差額5,300を減損損失として計上する（104/下テキスト P.94～95、Web 講義 104/下第Ⅳ部 P.37 参照）。" },
  { subject: "104", no: "問題38", question: "減損損失の計上にあたっては、独立したキャッシュ・フローを生み出す最小単位ごとに判断されるため、必ず個々の資産ごとに減損損失の計上の要否を判断しなければならない。", answer: "誤り", explanation: "概ね独立したキャッシュ・フローを生み出す最小単位でグルーピングしなければならず、個々の資産ごとに判断するわけではない（104/下テキスト P.92、Web 講義 104/下第Ⅳ部 P.36 参照）。" },
  { subject: "104", no: "問題38", question: "減損会計により固定資産の減損損失を計上した場合に、当該固定資産の価値が翌期以降に回復した場合には、減損損失の戻入益を計上して固定資産の帳簿価額を回復させなければならない。", answer: "誤り", explanation: "減損会計は「帳簿切離し方式」によるため、翌期以降に収益性が回復したとしても、評価益（戻入益）の計上は認められない（104/下テキスト P.92、Web 講義 104/下第Ⅳ部 P.37 参照）。" },
  { subject: "104", no: "問題40", question: "「資産除去債務に関する会計基準」の適用となる固定資産は、有形固定資産のほかに準ずる有形の資産も含む。したがって、建設仮勘定やリース資産なども同会計基準の適用対象となる。", answer: "正しい", explanation: "（104/下テキスト P.97、Web 講義 104/下第Ⅳ部 P.38 参照）。" },
  { subject: "104", no: "問題40", question: "資産除去債務の認識対象は、有形固定資産の取得、建設、開発又は通常の使用によって生じ、当該有形固定資産の除去に関して法令又は契約で要求される法律上の義務及びそれに準ずるものをいい、この場合の義務には有形固定資産を除去する際に当該有形固定資産に使用されている有害物質等を法律等の要求による特別の方法で除去する義務は含まれない。", answer: "誤り", explanation: "除去そのものが義務でなくても、除去の際に有害物質等を特別の方法で除去する義務がある場合、それも資産除去債務に含まれる（104/下テキスト P.97、Web 講義 104/下第Ⅳ部 P.38 参照）。" },
  { subject: "104", no: "問題40", question: "資産除去債務に対応する除去費用は、資産除去債務を負債として計上した時に、当該負債の計上額と同額を、関連する有形固定資産の帳簿価額に加えて資産計上し、減価償却を通じて各期に費用配分する。", answer: "正しい", explanation: "一時の費用とするのではなく、減価償却を通じて残存耐用年数にわたり費用配分する（104/下テキスト P.97～98、Web 講義 104/下第Ⅳ部 P.38 参照）。" },
  { subject: "104", no: "問題40", question: "資産除去債務の発生時に、当該債務の金額を合理的に見積ることができない場合には、これを計上せず、当該債務額を合理的に見積ることができるようになった時点で負債として計上する。", answer: "正しい", explanation: "（104/下テキスト P.97、Web 講義 104/下第Ⅳ部 P.39 参照）。" },
  { subject: "104", no: "問題41", question: "企業会計基準委員会移管指針第10号「特別目的会社を活用した不動産の流動化に係る譲渡人の会計処理に関する実務指針」の適用対象となる不動産の譲渡にあたっては、企業会計基準第29号「収益認識に関する会計基準」は適用されない。", answer: "正しい", explanation: "（104/下テキスト P.15、P.21、Web 講義 104/下第Ⅳ部 P.7 参照）。" },
  { subject: "104", no: "問題41", question: "企業会計基準委員会移管指針第10号「特別目的会社を活用した不動産の流動化に係る譲渡人の会計処理に関する実務指針」によると、不動産信託受益権の譲渡にあたっては、財務構成要素アプローチにより、当該信託受益権を構成する財務的要素に対する支配が他に移転した場合に当該移転した財務構成要素の消滅を認識し、留保される財務構成要素の存続を認識する。", answer: "誤り", explanation: "不動産信託受益権の譲渡についても、財務構成要素アプローチではなく「リスク・経済価値アプローチ」に基づいて会計処理を行う（104/下テキスト P.25～26、Web 講義 104/下第Ⅳ部 P.13 参照）。" },
  { subject: "104", no: "問題41", question: "企業会計基準第20号「賃貸等不動産の時価等の開示に関する会計基準」では、賃貸等不動産を保有している場合には、期末時点の時価をもって貸借対照表価額とし、(1)賃貸等不動産の概要、(2)賃貸等不動産の貸借対照表計上額及び期中における主な変動、(3)賃貸等不動産の当期末における時価の算定方法、(4)賃貸等不動産に関する損益、を注記することとされている。", answer: "誤り", explanation: "期末における時価等の注記は行うが、貸借対照表では簿価（取得原価から減価償却等を控除した額）で計上する（104/下テキスト P.102、Web 講義 104/下第Ⅳ部 P.41 参照）。" },
  { subject: "104", no: "問題41", question: "固定資産の減価償却費の算定にあたり、法人税法等で定められている耐用年数は課税の公平性から一律に定められているものであり、会計上はそれぞれの企業の使用状況等を勘案した上で減価償却費の算定をする必要があることから、会計上の減価償却費の算定においては法人税法等で定める耐用年数を使用することができない。", answer: "誤り", explanation: "よほど不合理と認められる事情がない限り、会計上も法人税法等で定める耐用年数を使用した場合でも妥当なものとして取り扱われている（104/下テキスト P.88、Web 講義 104/下第Ⅳ部 P.34 参照）。" },
  { subject: "104", no: "問題42", question: "日本においてはヴィークルに共通の会計に関する開示基準が定められている。法定ヴィークルにおいては法律に基づく開示基準があり、かつ、発行証券について広く投資家から投資を募集する場合等においては金融商品取引法に定める開示制度の適用がある。", answer: "誤り", explanation: "日本においてヴィークルに共通の会計に関する開示基準は存在しない（104/下テキスト P.117、Web 講義 104/下第Ⅳ部 P.44 参照）。" },
  { subject: "104", no: "問題42", question: "GK-TKスキームにおける匿名組合決算報告書については、法令等において特段の様式の定めが置かれていないものの、匿名組合員に現金分配を行う際の報告書には支払分配金の額及び分配金の算出方法等を明記しなければならないこととされている。", answer: "誤り", explanation: "匿名組合報告書の様式には法令等による特段の定めはなく、現金分配報告書に関する記載事項の定めもない（104/下テキスト P.137、Web 講義 104/下第Ⅳ部 P.47 参照）。" },
  { subject: "104", no: "問題42", question: "特定目的会社の計算書類等の開示方法等については、特定目的会社計算規則の定めによるものとされており、資本金が1億円以下である場合などの一定の要件を満たす小規模な特定目的会社については附属明細書の作成を省略することができる。", answer: "誤り", explanation: "小規模な特定目的会社であっても附属明細書の作成を省略できるような例外規定は存在しない（104/下テキスト P.132～133、Web 講義 104/下第Ⅳ部 P.46 参照）。" },
  { subject: "104", no: "問題42", question: "投資法人は役員会の承認を受けた「金銭の分配に係る計算書」に基づき、利益を超えて金銭の分配（利益超過分配）を行うことができる。利益超過分配を行った場合には、利益超過分配額を出資総額又は出資剰余金から控除する。", answer: "正しい", explanation: "（104/下テキスト P.122～123、Web 講義 104/下第Ⅳ部 P.45 参照）。" },
  { subject: "104", no: "問題44", question: "信託法第258条に規定する「受益者の定め（受益者を定める方法の定めを含む。）のない信託」は原則として集団投資信託となるが、委託者等受益者以外のものが「みなし受益者」に該当する場合には受益者等課税信託となる。", answer: "誤り", explanation: "「受益者の定めのない信託」は原則として法人課税信託に分類され、信託段階で課税される（104/下テキスト P.213～P.214【図表Ⅴ-4-1】、Web 講義 104/下第Ⅴ部 P.23、27 参照）。" },
  { subject: "104", no: "問題44", question: "受益者等課税信託においては、信託財産に係る消費税の計算の際、当該信託財産に係る資産の譲渡等、課税仕入れ及び課税貨物の保税地域からの引取りに係る消費税は、当該受益者の資産等取引とみなして計算する。", answer: "正しい", explanation: "（消費税法第14条、104/下テキスト P.227、Web 講義 104/下第Ⅴ部 P.25 参照）。" },

  { subject: "104", no: "問題46", question: "特定目的会社が受け取った配当等については、受取配当金の益金不算入の適用はない。また、特定目的会社が支払う配当等についても、法人である出資者において受取配当金の益金不算入の適用はない。", answer: "正しい", explanation: "（法人税法第23条1項、租税特別措置法第67条の14第2項、第4項、104/下テキスト P.254～255【図表Ⅴ-5-10】、Web 講義 104/下第Ⅴ部 P.35 参照）。" },
  { subject: "104", no: "問題46", question: "特定目的会社の資本金が1億円以下であったとしても、資本金1億円以下の中小法人に認められている法人税の軽減税率は適用されない。", answer: "正しい", explanation: "特定目的会社等の法人には、中小法人向けのような優遇規定（軽減税率等）は適用されない（104/下テキスト P.254～255【図表Ⅴ-5-10】、Web 講義 104/下第Ⅴ部 P.36 参照）。" },

  { subject: "104", no: "問題46", question: "特定目的会社は、資本金が10億円を超えている場合のみ、法人事業税に係る外形標準課税の適用対象となる。", answer: "誤り", explanation: "特定目的会社の資本金の額にかかわらず、事業税については所得割のみ対象を基礎とした税率の適用（外形標準課税の不適用）となる（104/下テキスト P.254～255【図表Ⅴ-5-10】、Web 講義 104/下第Ⅴ部 P.36 参照）。" },

  { subject: "104", no: "問題50", question: "不動産の売買においては、商慣行として固定資産税や都市計画税の未経過部分を精算するのが通常であるが、この精算部分に係る消費税の取扱いについて、建物に係る固定資産税等を精算した場合には建物の売買代金として消費税は課税となる。", answer: "正しい", explanation: "固定資産税等の精算金は税金の精算とは扱われず、売買代金がその分増額されたものとして取り扱われるため、建物に係る精算金には消費税が課される（104/下テキスト P.340 参照）。" },
  { subject: "104", no: "問題50", question: "消費税の課税事業者を選択しようとする場合には、その適用を受けようとする課税期間の前課税期間中に課税事業者選択届出書を提出しなければならないが、適用を受けようとする課税期間が事業開始日の属する課税期間である場合には、例外的にその課税期間中に届出書を提出することで課税事業者となることができる。", answer: "正しい", explanation: "（消費税法第9条第4項、104/下テキスト P.339、Web 講義 104/下第Ⅴ部 P.62 参照）。" },
  { subject: "104", no: "問題50", question: "任意組合等がインボイスを発行しようとする場合には、業務執行組合員が納税地を所轄する税務署長に適格請求書発行事業者である旨の届出を提出すれば足りるため、各々の組合員が適格請求書発行事業者であることは必ずしも求められていない。なお、任意組合の組合員のうち事業の損益の配賦を受けない者はいないものとする。", answer: "誤り", explanation: "任意組合等の事業として行われる取引について適格請求書（インボイス）を交付するためには、組合員の全てが適格請求書発行事業者である必要がある（104/下テキスト P.347、Web 講義 104/下第Ⅴ部 P.69 参照）。" },
];
