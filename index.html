  { subject: "103. 不動産投資の基礎", no: "33-3", question: "特定目的会社においては、減損損失の70%相当額を導管性判定式の分母から控除することができる措置があるが、これによらずすべての事業年度において導管性を維持するわけではない。", answer: "正しい", explanation: "特別損失に細分された減損損失について分母から控除する措置が置かれているが、減損損失の全額が対象とはならず、この措置が機能せず導管性を維持できない場合も生じ得る。（103テキストP.267〜268参照）" },
  { subject: "103. 不動産投資の基礎", no: "33-4", question: "投資法人に負ののれん発生益が生じた場合には、導管性を維持するために多額の配当を行う必要がある。", answer: "誤り", explanation: "負ののれん発生益は法人税が税務上の所得を上回る場合に該当し、一時差異等調整積立金を計上して内部留保が認められる。（103テキストP.285、P.288参照）" },
  { subject: "103. 不動産投資の基礎", no: "34-1", question: "特定目的会社が取得する一定の不動産に係る不動産取得税及び登録免許税の軽減措置は時限措置であり、開発型スキームなどで不動産の取得時期が未定の場合、改正の動向に留意が必要である。", answer: "正しい", explanation: "これら軽減措置は時限措置であるため、将来の税制改正に留意が必要である。（103テキストP.344〜346参照）" },
  { subject: "103. 不動産投資の基礎", no: "34-2", question: "登録免許税は、固定資産税評価額を課税標準として課税される都道府県民税である。", answer: "誤り", explanation: "登録免許税は課税標準に税率を乗じて課される国税である。（103テキストP.341参照）" },
  { subject: "103. 不動産投資の基礎", no: "34-3", question: "不動産特定共同事業において取得する一定の不動産に係る不動産取得税及び登録免許税についての軽減措置は、不動産特定共同事業法第2条第7項に定める小規模不動産特定共同事業者は適用できない。", answer: "誤り", explanation: "小規模不動産特定共同事業者についても軽減措置の対象に含まれる。（103テキストP.226、P.346〜348参照）" },
  { subject: "103. 不動産投資の基礎", no: "34-4", question: "不動産の現物を取得し、直後に信託財産として登記した場合には、不動産の移転は形式的移転となり、不動産の現物を取得したことによる不動産取得税及び登録免許税は非課税となる。", answer: "誤り", explanation: "現物不動産の取得後に信託財産とする場合、現物の取得自体は所有権移転として課税対象となる。形式的移転のみで非課税となるわけではない。（103テキストP.337〜342参照）" },
  { subject: "103. 不動産投資の基礎", no: "35-1", question: "[前提]設立日・事業開始日:2021年1月1日(特定目的会社)、設立時資本金:10万円(資本金の増減はないものとする)。2021年12月25日に、第1課税期間(2021年1月1日〜2021年12月31日)から課税選択する意図で課税事業者選択届出書を提出した。この特定目的会社は、第1課税期間において消費税の課税事業者とならない。", answer: "誤り", explanation: "事業開始日と同日の事業年度においてその期間中に課税事業者選択届出書を提出した場合は、その第1課税期間から課税事業者となる。（103テキストP.351〜352参照）" },
  { subject: "103. 不動産投資の基礎", no: "35-2", question: "[前提]設立日・事業開始日:2021年1月1日(特定目的会社)、設立時資本金:10万円(資本金の増減はないものとする)。2021年12月25日に、第2課税期間(2022年1月1日〜2022年12月31日)から課税選択する意図で課税事業者選択届出書を提出した。この特定目的会社は、第2課税期間において消費税の課税事業者とならない。", answer: "誤り", explanation: "提出した日の属する課税期間の翌課税期間（第2課税期間）から課税事業者となる。（103テキストP.351〜352参照）" },
  { subject: "103. 不動産投資の基礎", no: "35-3", question: "[前提]設立日・事業開始日:2021年1月1日(特定目的会社)、設立時資本金:10万円。2021年12月25日に増資を行い、資本金額が10億円となった。なお、課税選択は行っていない。この特定目的会社は、第1課税期間(2021年1月1日〜2021年12月31日)において消費税の課税事業者とならない。", answer: "正しい", explanation: "第1課税期間の課税事業者の判定は、期首（設立時）の資本金等で行うため、設立時資本金が10万円であれば第1課税期間は免税事業者となる。（103テキストP.351〜352参照）" },
  { subject: "103. 不動産投資の基礎", no: "35-4", question: "[前提]設立日・事業開始日:2021年1月1日(特定目的会社)、設立時資本金:10万円。2021年12月25日に増資を行い、資本金額が10億円となった。なお、課税選択は行っていない。この特定目的会社は、第2課税期間(2022年1月1日〜2022年12月31日)において消費税の課税事業者とならない。", answer: "誤り", explanation: "第2課税期間の開始時において資本金が1,000万円以上となっているため、第2課税期間は特定新規設立法人に該当等し、課税事業者となる。（103テキストP.351〜352参照）" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "36-1", question: "0.5の確率で0円、0.5の確率で30,000円を得られる投資機会Aがある。富Wに対する投資家Xの効用をU＝√(W/3)で表せるとき、投資家Xはリスク回避的な投資家である。", answer: "正しい", explanation: "U＝√(W/3)は上に凸な関数であり、この効用を持つ投資家はリスク回避的な投資家である[1]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "36-2", question: "0.5の確率で0円、0.5の確率で30,000円を得られる投資機会Aがある。富Wに対する投資家Xの効用をU＝√(W/3)で表せるとき、投資家Xにとって、投資機会Aの期待効用は50である。", answer: "正しい", explanation: "0.5×√(0/3)＋0.5×√(30,000/3)＝0.5×100＝50である[1]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "36-3", question: "0.5の確率で0円、0.5の確率で30,000円を得られる投資機会Aがある。富Wに対する投資家Xの効用をU＝√(W/3)で表せるとき、投資家Xにとって、投資機会Aの確実性等価は7,000円である。", answer: "誤り", explanation: "50＝√(W/3)より、W＝50^2×3＝7,500である[1]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "36-4", question: "0.5の確率で0円、0.5の確率で30,000円を得られる投資機会Aがある。富Wに対する投資家Xの効用をU＝√(W/3)で表せるとき、投資家Xにとって、投資機会Aと、確実に15,000円を得られる投資機会Bとでは投資機会Bの効用の方が大きい。", answer: "正しい", explanation: "投資機会Bの期待効用はU＝√(15,000/3)≒70.71であり、投資機会Aを上回る[1]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "37-1", question: "資産A、Bの収益率がともに正規分布に従うものとし、期待値が資産A10%、資産B5%、標準偏差がともに5%であるとき、リスクを標準偏差で捉えた場合、リスク回避的な投資家であれば、資産Aよりも資産Bを選択する。", answer: "誤り", explanation: "リスク回避的な投資家であれば、リスクが同じ場合、期待値が高い資産を選択する（資産Aを選択する）[1]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "37-2", question: "資産A、Bの収益率がともに正規分布に従うものとし、期待値が資産A10%、資産B5%、標準偏差がともに5%であるとき、資産AとBともに、それぞれの期待値を上回る値を取る確率は同じである。", answer: "正しい", explanation: "正規分布は左右対称であり、期待値を上回る確率は同じである[1]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "37-3", question: "資産A、Bの収益率がともに正規分布に従うものとし、期待値が資産A10%、資産B5%、標準偏差がともに5%であるとき、資産Aと資産Bの分布の裾の広さは同じである。", answer: "正しい", explanation: "資産A、資産Bの標準偏差は同じであり、同じレンジの収益率を取る確率は同じである[1]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "37-4", question: "資産A、Bの収益率がともに正規分布に従うものとし、期待値が資産A10%、資産B5%、標準偏差がともに5%であるとき、資産Aが5%から15%までの値を取る確率と資産Bが0%から10%までの値を取る確率は同じである。", answer: "正しい", explanation: "資産A、資産Bの標準偏差は同じであり、同じレンジの収益率を取る確率は同じである（±1標準偏差の範囲）[1]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "38-1", question: "A・Bという2つのリスク資産があり、資産Aは期待リターン5%でリスク（標準偏差）2%、資産Bは期待リターン7%でリスク（標準偏差）3%である。今、資産A・Bのそれぞれを50%の保有割合で組み合わせるポートフォリオを考える。このとき、資産A・Bの相関係数は0.5である。", answer: "誤り", explanation: "この情報からはAとBの相関係数は確認できない[1]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "38-2", question: "A・Bという2つのリスク資産があり、資産Aは期待リターン5%でリスク（標準偏差）2%、資産Bは期待リターン7%でリスク（標準偏差）3%である。今、資産A・Bのそれぞれを50%の保有割合で組み合わせるポートフォリオを考える。このとき、このポートフォリオの期待リターンは6%である。", answer: "正しい", explanation: "0.5×5%＋0.5×7%＝6%である[1]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "38-3", question: "A・Bという2つのリスク資産があり、資産Aは期待リターン5%でリスク（標準偏差）2%、資産Bは期待リターン7%でリスク（標準偏差）3%である。今、資産A・Bのそれぞれを50%の保有割合で組み合わせるポートフォリオを考える。このとき、資産A・Bの相関係数が小さくなるほど、ポートフォリオのリスク（標準偏差）は大きくなる。", answer: "誤り", explanation: "2つの資産の相関係数が小さくなるほど、ポートフォリオのリスク（標準偏差）は小さくなる[1]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "38-4", question: "A・Bという2つのリスク資産があり、資産Aは期待リターン5%でリスク（標準偏差）2%、資産Bは期待リターン7%でリスク（標準偏差）3%である。今、資産A・Bのそれぞれを50%の保有割合で組み合わせるポートフォリオを考える。このとき、資産A・Bが正の完全相関にある場合、ポートフォリオの分散効果は最大化される。", answer: "誤り", explanation: "正の完全相関にある場合、分散効果は得られない[1]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "39-1", question: "安全資産が存在する場合、トービンの分離定理によれば、リスク資産同士を組み合わせて構成される「接点ポートフォリオ」は、投資家のリスク回避度とは無関係に決まる。", answer: "正しい", explanation: "テキストの記載の通り正しい[1]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "40-1", question: "資産A、B、C、Dがあり、それぞれのβ値が1.2、1.0、0.8、0.01であるとする。CAPMが成立するものとし、安全資産のリターンが1%、市場ポートフォリオの期待リターンが3%であるとき、資産Aの期待リターンは、3.4%である。", answer: "正しい", explanation: "1%＋1.2×(3%－1%)＝0.034 となり、3.4%である[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "40-2", question: "資産A、B、C、Dがあり、それぞれのβ値が1.2、1.0、0.8、0.01であるとする。CAPMが成立するものとし、安全資産のリターンが1%、市場ポートフォリオの期待リターンが3%であるとき、各資産を期待リターンの大きさの順に並べると、A＞B＞C＞Dである。", answer: "正しい", explanation: "市場ポートフォリオの期待リターンが正の値であることから、資産の期待リターンの順番はベータの順番に等しい[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "40-3", question: "資産A、B、C、Dがあり、それぞれのβ値が1.2、1.0、0.8、0.01であるとする。CAPMが成立するものとし、安全資産のリターンが1%、市場ポートフォリオの期待リターンが3%であるとき、資産Dの期待リターンは、安全資産のリターンと等しい。", answer: "誤り", explanation: "ベータがゼロの場合に、安全資産のリターンと等しくなる[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "40-4", question: "資産A、B、C、Dがあり、それぞれのβ値が1.2、1.0、0.8、0.01であるとする。CAPMが成立するものとし、安全資産のリターンが1%、市場ポートフォリオの期待リターンが3%であるとき、βがゼロの資産がある場合、その資産のシステマティックリスクとアン・システマティックリスクの合計は、常に0（ゼロ）にはならない。", answer: "正しい", explanation: "ベータがゼロであってもアン・システマティックリスクが必ずしもゼロとなるわけではない[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "41-1", question: "シャープ・レシオが等しい2つのファンドでも、トレーナーの測度は異なることがある。", answer: "正しい", explanation: "シャープ・レシオが等しいとしても、必ずしもベータ値1単位当たりの安全資産利子率に対する超過リターンが等しくなるわけではない[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "41-2", question: "ファンドのリターンが証券市場線（SML）上にあれば、このファンドのジェンセンのアルファはゼロである。", answer: "正しい", explanation: "ベータ値の値に見合ったリターンしか得ていないということであり正しい[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "41-3", question: "2つのファンドのトレーナーの測度が等しければ、横軸にベータ値、縦軸にリターンを取った平面上において、このうちの一方のファンドと安全資産を結ぶ直線上にもう一方のファンドも位置している。", answer: "正しい", explanation: "トレーナーの測度は、横軸にベータ値、縦軸にリターンを取った平面上での、安全資産の利子率を切片とする直線の傾きであるので、傾きが同じであれば両者は同じ直線である[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "41-4", question: "シャープ・レシオとは、トータル・リスク1単位当たりの市場ポートフォリオの期待リターンに対する超過リターンのことである。", answer: "誤り", explanation: "シャープ・レシオとはトータル・リスク1単位当たりの安全資産利子率に対する超過リターンのことである[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "42-1", question: "3年物スポットレートは、3年物固定利付債の投資収益率のことを指す。", answer: "誤り", explanation: "満期n年の割引債の割引率のことをn年のスポットレートと呼ぶ[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "42-2", question: "3年物スポットレートは、3年物固定利付債の最終利回り（内部収益率）のことを指す。", answer: "誤り", explanation: "満期n年の割引債の割引率のことをn年のスポットレートと呼ぶ[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "42-3", question: "3年物スポットレートは、3年物割引債の割引率のことを指す。", answer: "正しい", explanation: "満期n年の割引債の割引率のことをn年のスポットレートと呼ぶ[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "42-4", question: "3年物スポットレートは、3年物割引債の残存年数のことを指す。", answer: "誤り", explanation: "満期n年の割引債の割引率のことをn年のスポットレートと呼ぶ[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "43-3", question: "デュレーションは、キャッシュ・フローを受け取れるまでの期間をキャッシュ・フローの現在価値で単純平均したものである。", answer: "誤り", explanation: "単純平均ではなく加重平均したものである[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "44-イ", question: "先渡し契約とは、特定の資産を満期日に特定の価格で売るもしくは買う権利の売買契約である。", answer: "誤り", explanation: "これはヨーロピアン・オプション取引の説明である[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "44-ロ", question: "オプション取引では、約定後も値洗いによって損益が変動し、損失が大きくなった場合には取引所から追加の証拠金を求められる。", answer: "誤り", explanation: "値洗いや追加の証拠金を求められるのは、先物取引である[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "44-ハ", question: "先物取引は、標準化を行うことで多様な取引参加者を見込めることから、流動性の向上につながるという利点がある。", answer: "正しい", explanation: "テキストの記載の通り正しい[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "44-ニ", question: "先物取引と先渡し契約は、取引の標準化が行われている点で異なっているが、現時点の取引を将来時点で約定するという効果は同じである。", answer: "誤り", explanation: "将来時点の取引を現時点で約定する効果が同じとなる[2]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "45-イ", question: "オプションの価値は本源的価値と時間価値に分けられる。", answer: "正しい", explanation: "テキストの記載の通り正しい[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "45-ロ", question: "同一の行使価格を持つコール・オプションとプット・オプションを購入することで作成されるポジションをロング・ストラドルと呼ぶ。", answer: "正しい", explanation: "テキストの記載の通り正しい[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "45-ハ", question: "原資産の保有とプット・オプションの買いポジションによる戦略をプロテクティブ・プット戦略と呼ぶ。", answer: "正しい", explanation: "テキストの記載の通り正しい[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "45-ニ", question: "原資産の保有とコール・オプションの買いポジションによる戦略をカバード・コール戦略と呼ぶ。", answer: "誤り", explanation: "原資産の保有とコール・オプションの「売り」ポジションによる戦略をカバード・コール戦略と呼ぶ[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "46-1", question: "法人税と倒産コストが存在する場合のMM理論（トレードオフ理論）の考え方において、企業価値は、資本構成から独立しているものであり、負債比率の大小は企業価値に影響を及ぼさない。", answer: "誤り", explanation: "法人税や倒産コストが存在することを前提とすると、負債比率の大小は企業価値に影響を及ぼす[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "46-2", question: "法人税と倒産コストが存在する場合のMM理論（トレードオフ理論）の考え方において、企業価値における負債の節税効果と倒産コストの期待値との関係を踏まえると、倒産コストの期待値の限界的増加が節税効果のそれと拮抗するところが負債利用の限界であり、そこが最適資本構成ということになる。", answer: "正しい", explanation: "テキストの記載の通り正しい[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "46-3", question: "法人税と倒産コストが存在する場合のMM理論（トレードオフ理論）によって、J-REITの資本構成を説明することができる。", answer: "誤り", explanation: "J-REITでは導管性要件を満たすことで法人税の全部または大部分を損金にできるため、負債の節税効果はほとんど存在しない。したがって、J-REITの資本構成を負債の節税効果と倒産コストの期待値のトレードオフ関係から十分に説明することはできない[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "46-4", question: "法人税と倒産コストが存在する場合のMM理論（トレードオフ理論）の考え方において、企業価値における負債の節税効果と倒産コストの期待値には、シナジー（相互作用）の関係がある。", answer: "誤り", explanation: "企業価値における負債の節税効果と倒産コストの期待値には、シナジー（相互作用）ではなく、トレードオフの関係がある[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "47-1", question: "「日経平均（日経225）」が下落した場合、「TOPIX（東証株価指数）」は上昇することもある。", answer: "正しい", explanation: "日経平均が下落しても、TOPIXが上昇することもある[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "47-2", question: "「日経平均（日経225）」は、株式時価総額を指数化したものである。", answer: "誤り", explanation: "日経平均は株価平均型のインデックスである[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "47-3", question: "不動産証券化協会が公表しているAJPI（ARES Japan Property Index）は、一定の投資期間に実際に売買された不動産を基礎として、総合収益率を算出している。", answer: "誤り", explanation: "AJPIは、J-REITの保有物件などを対象にしており、計算期間中に売買された不動産は原則として除外される[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "47-4", question: "東証REIT指数には、TOPIX（東証株価指数）とは異なり、いわゆる配当込みインデックスだけが存在している。", answer: "誤り", explanation: "東証REIT指数には、配当込みインデックスだけでなく、配当無しインデックスも存在している[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "48-イ", question: "市場リスク（システマティックリスク）とは株式市場全体の変動に連動するリスクで、個別企業もしくはその企業が属する業界特有の要因によっても生じる。", answer: "誤り", explanation: "市場リスク（システマティックリスク）とは株式市場全体の変動に連動するリスクであり、一般的には景気変動や金利など経済全体に関連した要因によって生じる。個別企業もしくはその企業が属する業界特有の要因によって生じるリスクは「個別リスクもしくは非組織的危険＝アン・システマティックリスク」という[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "48-ロ", question: "市場リスクというのは、株式市場を構成するすべての銘柄が等しく影響を受けるわけではない。個々の銘柄が市場リスクの影響を受ける度合いが、ベータ（β＝当銘柄と市場のリターンの共分散／市場のリターンの分散）と呼ばれる指標で表される。", answer: "正しい", explanation: "テキストの記載の通り正しい[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "48-ハ", question: "妥当株価を算出する方法として、「配当は永久に支払われる」、「1株当たり配当の成長率=gは永久に一定である」、「期待リターン＝割引率＝rは成長率＝gより大きい」という想定をして単純化したモデルを「定額配当割引モデル」という。", answer: "誤り", explanation: "同説明文は「定率成長配当割引モデル」のことである[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "48-ニ", question: "CAPMで個別銘柄株式Aの期待リターンを算出する計算式は、「株式Aの期待リターン＝リスクフリーレート＋エクイティリスクプレミアム÷ベータ」である。", answer: "誤り", explanation: "同モデルでの計算式は、「株式Aの期待リターン＝リスクフリーレート＋エクイティリスクプレミアム×ベータ」である[3]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "49", question: "J-REITを資産価値の面から評価する指標として、インプライド・キャップレートという指標がある。以下の前提のとき、個別銘柄Aのインプライド・キャップレートの数値はいくらか。【前提】リスクフリーレート＝0.5%、エクイティリスクプレミアム＝5.0%、年間NOI（減価償却前賃貸事業利益）＝10、ネットデット＝100、時価総額＝150", answer: "4.0%", explanation: "インプライド・キャップレートは 年間NOI / (ネットデット + 時価総額) で計算される。前提数値を当てはめると、10 / (100+150) = 4.0%となる。なお、計算にはリスクフリーレートやエクイティリスクプレミアムは使用しない[4]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "50-イ", question: "GRESBは不動産会社やファンドのESG配慮を計る年次評価である。責任投資原則（PRI）を主導した欧州の年金基金が中心となり、2019年に創設された。GRESBリアルエステイト評価参加者はグローバル、日本ともに年々増加しており、2022年におけるJ-REITの参加社は合計30社にまで拡大している。", answer: "誤り", explanation: "GRESB（グローバル不動産サステナビリティ・ベンチマーク）は2009年に創設された。また、J-REITの参加社は合計57社にまで拡大している[4]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "50-ロ", question: "2018年5月に日本リテールファンド（現・日本都市ファンド）がJ-REITで初めてグリーンボンドを発行した。それ以降、J-REIT市場においてESG債の発行は増加しており、2022年のESG債の発行額は投資法人債発行額全体の50%に達した。", answer: "誤り", explanation: "2022年のESG債（グリーンボンド、ソーシャルボンド、サステナビリティボンドの総称）の発行額は投資法人債発行額全体の80%近くに達した[4]。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "50-ハ", question: "ESG分野において、「気候変動対策に熱心なフリをする」グリーンウォッシングの問題が課題となっている。", answer: "正しい", explanation: "テキストの記載の通り正しい[4]。" },
  { subject: "106. 不動産証券化と倫理行動", no: "1-イ", question: "第二種金融商品取引業者であるＡ社は顧客Xから不動産信託受益権の販売の媒介を受託したが、Ａ社の社員で一般社団法人不動産証券化協会認定マスター（以下の各問において、「マスター」という）が、担当者として投資家Yに当該受益権を販売した。この場合、マスターがＡ社の指導通りの説明を投資家Yに対して行う限り、マスターの説明義務違反が投資家Yの賠償請求を根拠づけるものであったとしても、マスターが投資家Yから説明義務違反による損害賠償請求を受けることはなく、常にＡ社のみが使用者として投資家Yに対する損害賠償責任を負う。", answer: "誤り", explanation: "Ａ社の社員であるマスターが不動産信託受益権の販売を行うという設定であるので、投資家Yが説明義務違反で賠償請求をする場合には、まずマスター個人の民法709条に基づく賠償責任が問題となる。この賠償責任があるということになれば、使用者たるＡ社が民法第715条に基づく使用者責任を負う。請求をする投資家Yとしては、Ａ社の使用者責任だけを追及することも、社員個人の不法行為責任だけを追及することも、（損害賠償額が増えるわけではないが）両者を追求することもできる。" },
  { subject: "106. 不動産証券化と倫理行動", no: "1-ロ", question: "上記のイ.において、マスターがＡ社の社員として不動産信託受益権の販売媒介行為を投資家Yに対して行う場合、Ａ社が投資家Yに対して不法行為責任を負う場合に限り、マスターも個人として投資家Yに対して不法行為責任を負う。", answer: "誤り", explanation: "Ａ社が不法行為責任を負う場合に限り、Ａ社の社員たるマスターも個人として当該投資家に対して不法行為責任を負うというわけではない。" },
  { subject: "106. 不動産証券化と倫理行動", no: "1-ハ", question: "上記のイ.において、Ａ社がマスターの説明義務違反で損害賠償責任を負い投資家Yに賠償した場合、Ａ社はマスター個人に対する懲戒処分だけではなく、損害の補填請求（求償）をマスターに行うことが可能な場合がある。", answer: "正しい", explanation: "Ａ社が使用者責任を負う場合には、被用者（Ａ社の社員）に対する求償権を行使できる（民法第715条第3項）。マスターが懲戒処分を受ける可能性もある。" },
  { subject: "106. 不動産証券化と倫理行動", no: "1-ニ", question: "マスターが第二種金融商品取引業者のＡ社の社員としてＡ社の顧客であるX所有の不動産信託受益権の販売媒介行為を行う場合、一般の投資家に対する販売価格よりも著しく安い価格でＡ社の子会社Bに当該不動産信託受益権を販売することは、マスターが遵守すべき金融商品取引法（以下の各問において、「金商法」という）上の規定に違反する。", answer: "正しい", explanation: "ここでは、マスターはＡ社の顧客であるXの利益を犠牲にしてＡ社の子会社に不当な利益を与える行動をしている。金商法第44条の3第1項は、「金融商品取引業者又はその役員若しくは使用人は、次に掲げる行為をしてはならない。ただし、公益又は投資者保護のため支障を生ずることがないと認められるものとして内閣総理大臣の承認を受けたときは、この限りでない。」とし、その第1号で「通常の取引の条件と異なる条件であって取引の公正を害するおそれのある条件で、当該金融商品取引業者の親法人等又は子法人等と有価証券の売買その他の取引又は店頭デリバティブ取引を行うこと。」を挙げている。" },
  { subject: "106. 不動産証券化と倫理行動", no: "2-イ", question: "金商法は、金融商品取引業者等が顧客に対して誠実かつ公正にその業務を遂行しなければならないとするが、使用人がそのような誠実公正義務を負うとまでは規定していない。", answer: "誤り", explanation: "金商法第36条第1項は、「金融商品取引業者等並びにその役員及び使用人は、顧客に対し誠実かつ公正に、その業務を遂行しなければならない。」とする。" },
  { subject: "106. 不動産証券化と倫理行動", no: "2-ロ", question: "金融商品取引業者に適用される金融庁の監督指針は、金融商品取引業者は、販売する商品の内容が顧客の属性等に適合することの合理的な理由があるかを検討・評価する必要性を指摘するが、そのような適合性の検証の必要性と、顧客に対する誠実公正義務の履行は別の問題としている。", answer: "誤り", explanation: "2021年1月に改正された監督指針は、適合性の検証の必要性と顧客に対する誠実公正義務の履行とは一体のものとして捉えており、別の問題という位置づけをしていない。" },
  { subject: "106. 不動産証券化と倫理行動", no: "2-ハ", question: "金融庁が公表している「顧客本位の業務運営に関する原則」（以下「顧客本位の原則」という）は、ベストプラクティスを目指す上で有用と考えられる原則であり法的義務を課すものではないとされているが、顧客本位の原則の一つである「金融事業者は、顧客の資産状況、取引経験、知識及び取引目的・ニーズを把握し、当該顧客にふさわしい金融商品・サービスの組成、販売・推奨等を行うべきである。」という点は、金融商品取引業者としては法律上の義務である。", answer: "正しい", explanation: "顧客本位原則は法的拘束力を有するものではないとされているが、その原則の一つとして、顧客の資産状況、取引経験、知識及び取引目的・ニーズを把握し、当該顧客にふさわしい金融商品・サービスの組成、販売・推奨等を行うべきであるという点は、金商法第40条第1号でいう、金融商品取引業者等は、金融商品取引行為について、顧客の知識、経験、財産の状況及び金融商品取引契約を締結する目的に照らして不適当と認められる勧誘を行って投資者の保護に欠けることにならないようにその業務を行わなければならないという法律上の行為義務である。" },
  { subject: "106. 不動産証券化と倫理行動", no: "2-ニ", question: "金融商品取引業者の職員である個人が顧客に対して法令等に準拠したうえで行動することができるようにするためには、当該個人が自ら遵法意識を高めることが必要であり、当該個人を雇用する金融商品取引業者が法令遵守等の社内体制を構築することまでは必要ない。", answer: "誤り", explanation: "金融商品取引業者等が企業である場合、個々の職員は組織の業務分掌の範囲内で行動をしている。いくら個人として十分な意識を有していても、帰属する組織が法令遵守等の体制を整えていなければ、法令遵守のもとで能力を発揮する環境をもつことができない。金融商品取引業者等が法令遵守等の体制を整えるのは投資家保護及び市場の公正さの確保のためであるが、所属する職員が法令に準拠したうえで最大限の能力を発揮する環境を整備する責任も企業にはある。" },
  { subject: "106. 不動産証券化と倫理行動", no: "3-1", question: "利益相反取引は、一般的な不動産ファンドでは見られない、J-REIT特有の取引形態である。", answer: "誤り", explanation: "利益相反取引とは、資産の保有主体と運用主体が異なる場合において、双方の利益が相反する要素を含む取引であり、私募ファンドでも見られる形態である。" },
  { subject: "106. 不動産証券化と倫理行動", no: "3-2", question: "投資信託及び投資法人に関する法律（以下の各問において、「投信法」という）では、利益相反取引の規制対象となる資産運用会社の関係者を「利害関係人等」と定義している。", answer: "正しい", explanation: "" },
  { subject: "106. 不動産証券化と倫理行動", no: "3-3", question: "多くの資産運用会社では、独自の社内規定を定めることで、利益相反取引に関するけん制機能を強化している。", answer: "正しい", explanation: "" },
  { subject: "106. 不動産証券化と倫理行動", no: "3-4", question: "上場投資法人及びその資産運用会社が東京証券取引所に提出する運用体制報告書には、利益相反取引への対応方針及び運用体制を記載しなければならない。", answer: "正しい", explanation: "" },
  { subject: "106. 不動産証券化と倫理行動", no: "4-1", question: "投資法人が不動産の取得を行う場合の適時開示では、対象不動産の過去の取引情報も開示しなければならない。", answer: "正しい", explanation: "" },
  { subject: "106. 不動産証券化と倫理行動", no: "4-2", question: "投資法人が不動産の取得を行った場合、資産運用会社は利益相反性に関するオピニオンレターを外部の弁護士から取得し、法令に沿って投資法人へ通知しなければならない。", answer: "誤り", explanation: "投資法人が不動産を取得した場合に、資産運用会社が法令に沿って投資法人へ通知しなければならないのは、外部の不動産鑑定士による不動産鑑定評価である。" },
  { subject: "106. 不動産証券化と倫理行動", no: "4-3", question: "インサイダー取引規制における「重要事実」には、投資証券の発行主体である投資法人に係る決定事実だけでなく、その資産運用会社に係る決定事実も含まれる。", answer: "正しい", explanation: "" },
  { subject: "106. 不動産証券化と倫理行動", no: "4-4", question: "インサイダー取引規制における重要事実の「公表」は、法令で要件が定められている。", answer: "正しい", explanation: "" },
  { subject: "106. 不動産証券化と倫理行動", no: "5-イ", question: "運用受託者が、運用対象である不動産の売却時の鑑定評価を不動産鑑定士に委託する際、自らが管理する私募ファンドに有利となるよう働きかけた。", answer: "誤り", explanation: "不動産鑑定士などの外部専門家を利用する場合、彼らの職業倫理に反するようなことを要請してはならない。また外部専門家もそのような要請に応じてはならない。" },
  { subject: "106. 不動産証券化と倫理行動", no: "5-ロ", question: "土壌汚染のある物件を売却する際、部下より「軽微な汚染であったので先方に説明する必要はない」と報告を受け、これを黙認した。", answer: "誤り", explanation: "黙認しているとなると、善管注意義務違反を越えて、忠実義務違反である。プロたる者は、判断に迷う問題に直面した時にこそ、また部下や同僚が誤った方向へ進もうとした時にこそ、躊躇することなく、自らの考えや姿勢を明確に伝える必要がある。" },
  { subject: "106. 不動産証券化と倫理行動", no: "5-ハ", question: "運用受託者が、通常より高い報酬や有利な条件で運用受託者と同じ資本傘下にある不動産会社に投資不動産の維持管理を委託した。", answer: "誤り", explanation: "運用受託者が、通常より高い報酬や有利な条件で同じ資本傘下にある不動産会社に投資不動産の維持管理を委託するのは、忠実義務違反である。" },
  { subject: "106. 不動産証券化と倫理行動", no: "5-ニ", question: "マスターは、関係法令及び不動産証券化協会の定める規則並びにマスター職業倫理規程を遵守し、顧客に対し公正に職務を遂行しなければならない。", answer: "正しい", explanation: "" },
  { subject: "106. 不動産証券化と倫理行動", no: "5-ホ", question: "不動産投資運用業に従事していないマスターは、認定後は継続教育を受講する義務はない。", answer: "誤り", explanation: "マスターは、例外なく認定後も継続教育などを通じて常に不動産証券化に関する理論と実務の研鑽に努め、専門家に相応しい専門知識・能力を維持、向上させなければならない。" },
  { subject: "102. 不動産証券化の概要", no: "6-イ", question: "不動産証券化には大きく分けて、①資金調達、②リスクコントロール、③流動性の付与の3つの機能がある。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "6-ロ", question: "国土交通省公表の「不動産証券化の実態調査」によれば、証券化対象として取得された不動産又は信託受益権の取引金額は、2013年度から2019年度にかけて毎年度4～5兆円台で安定的に推移し、新型コロナウイルスの感染が拡大した2020年度も前年度比微減にとどまった。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "6-ハ", question: "不動産証券化では、原資産が生み出すキャッシュフローを組み変え、SPVがリスク・リターン構成の異なる証券を発行する場合もある。例えば、原資産が生み出すキャッシュフローを束ねて、Ａ証券の元利払いに優先的にキャッシュフローを充て、B証券には劣後して支払う仕組みにするような場合が、これに該当する。このことを「エクイティ優先構造」と呼ぶ。", answer: "誤り", explanation: "「エクイティ優先構造」ではなく、「優先劣後構造」と呼ぶ。" },
  { subject: "102. 不動産証券化の概要", no: "6-ニ", question: "不動産証券化では、原資産となるのは賃貸不動産や不動産担付ローンのように、キャッシュフローを生み出す資産であり、それを原資として投資家へ債務の元利払いや配当などが行われる。このため、原資産はSPVが譲渡を受けた時点でキャッシュフローを生み出している必要がある。", answer: "誤り", explanation: "原資産は、SPVが譲渡を受けた時点でキャッシュフローを生み出している必要はなく、不動産の開発後にキャッシュフローを生み出すような資産も証券化の対象となる。" },
  { subject: "102. 不動産証券化の概要", no: "7-1", question: "不動産向けローンの証券化商品には、賃貸オフィスビルや賃貸マンションなど収益不動産への貸付債権を裏づけとしたCMBSと、住宅ローン債権を裏づけとしたRMBSがある。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "7-2", question: "投資資金の運用という側面が強い証券化を「ファンド型スキーム」という。「ファンド型スキーム」は投資家利益の最大化を図るため、能動的かつ機動的に運用を行う仕組みで、アセットマネジメント機能の発揮が求められる。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "7-3", question: "私募REITは、一定の条件の下で出資金の払戻しなどを認めて流動性を確保する、非上場のクローズドエンド型の不動産投資法人である。", answer: "誤り", explanation: "私募REITはオープンエンド型の不動産投資法人である。" },
  { subject: "102. 不動産証券化の概要", no: "7-4", question: "特定目的会社（TMK）は、資産流動化法に基づいて資産を証券化するためのビークルである。特定目的会社の発行する資産対応証券は金商法上の有価証券に指定され、詳細な情報開示ルールが課されている。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "8-イ", question: "不動産が適正な価格でSPVに譲渡されることは、真正売買の条件の1つでもあり非常に重要である。不動産の適正価格とは、収益還元法で求めた市場価格（時価）のことであり、その評価においてはデューデリジェンスに基づいた厳格な不動産鑑定が求められる。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "8-ロ", question: "ノンリコースローンとは、債権者の求償権が担保不動産にしか及ばないローンである。通常、J-REITの借り入れはノンリコースローンであり、債務不履行により貸付金の回収不足が生じても、債権者は債務者の他の資産から回収することはできない。", answer: "誤り", explanation: "J-REITの借り入れはコーポレートローンである。" },
  { subject: "102. 不動産証券化の概要", no: "8-ハ", question: "不動産投資では、資産を換金して投資を完了することを投資の出口と言うが、収益還元法の1つであるDCF法は、出口を想定した不動産評価手法ともいえる。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "8-ニ", question: "レバレッジ効果とは、外部の低利な資金を借入や社債発行で取り入れることにより、エクイティ投資家の出資分に対する利回りが上昇することをいう。通常、実物不動産の利回りと借入金利の差が大きいほどレバレッジ効果も大きくなる。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "10-イ", question: "借地借家法は立場の弱い賃借人を保護するための法律であることから、事業用建物の賃貸借契約に同法は適用されない。", answer: "誤り", explanation: "原則として、居住用不動産でも事業用不動産でも借地借家法は適用される。" },
  { subject: "102. 不動産証券化の概要", no: "10-ロ", question: "借地借家法は民法の特別法であるため、土地・建物の賃貸借に対して民法は適用されず、借地借家法が適用される。", answer: "誤り", explanation: "借地借家法が優先適用されるに過ぎず、同法に規定が無い事柄については民法が適用される。" },
  { subject: "102. 不動産証券化の概要", no: "10-ハ", question: "売買による不動産の所有権は、民法上、売主と買主の売買契約成立の時に売主から買主に移転する。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "10-ニ", question: "不動産売買契約は要式契約のため、民法上、売買契約書を作成しなければ、売買の効力は生じない。", answer: "誤り", explanation: "売買契約は不要式契約であるため売買契約書は紛争予防等の見地から作成されるに過ぎない。" },
  { subject: "102. 不動産証券化の概要", no: "11-イ", question: "市街化調整区域は、区域区分のなされていない都市計画区域であり、用途地域は必要に応じて定められる。", answer: "誤り", explanation: "本肢の説明は非線引都市計画区域のものである。" },
  { subject: "102. 不動産証券化の概要", no: "11-ロ", question: "宅地建物取引業を行うに際しては、国土交通大臣または都道府県知事の登録を受ける必要がある。", answer: "誤り", explanation: "宅地建物取引業を行う場合、国土交通大臣または都道府県知事の「免許」を受ける必要がある。" },
  { subject: "102. 不動産証券化の概要", no: "11-ハ", question: "一定の事業規模を有するオフィス・店舗の管理を行う者は国土交通大臣の登録を受ける必要がある。", answer: "誤り", explanation: "そのような規制はない。なお、賃貸住宅の管理業務等に関する法律は賃貸住宅の管理等を行う業者に対する規制である。" },
  { subject: "102. 不動産証券化の概要", no: "11-ニ", question: "いわゆるサブリース事業者に対して不動産を賃貸する所有者は、賃貸住宅の管理業務等に関する法律上、特定転貸事業者と位置づけられる。", answer: "誤り", explanation: "賃貸住宅の管理業務等に関する法律における特定転貸事業者とは、サブリース事業者を指すものである。" },
  { subject: "102. 不動産証券化の概要", no: "12-イ", question: "わが国における短期金融市場には、金融機関のみが参加するインターバンク市場と、金融機関に限らず広く一般企業なども参加することができるオープン市場がある。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "12-ロ", question: "銀行等の金融機関を介した金融を直接金融、証券市場で株式・社債・CP等を発行して資金調達することを間接金融と呼ぶが、投資信託や証券化等の集団投資スキームを通じた資金調達を市場型間接金融と呼ぶことがある。", answer: "誤り", explanation: "銀行等の金融機関を介した金融を間接金融、証券市場で株式・社債・CP等を発行して資金調達することを直接金融と呼ぶ。" },
  { subject: "102. 不動産証券化の概要", no: "12-ハ", question: "先物取引は、ある商品を、将来の一定期日までに、あらかじめ定める価格（権利行使価格）で売り付け（プット）または買い付け（コール）する権利の取引である。", answer: "誤り", explanation: "先物取引ではなくオプション取引の説明である。" },
  { subject: "102. 不動産証券化の概要", no: "12-ニ", question: "イールドカーブ（利回り曲線）は、通常、短期金利ほど低く長期金利ほど高くなる（順イールド）が、金利低下期待が高まり金利の先安観が強い場合など、長期金利が短期金利に近づき（フラットイールド）、さらには長期金利が短期金利を下回る（逆イールド）ことがある。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "13-イ", question: "金商法に基づく開示は、投資家に対して適切な投資判断材料を提供することにより資本市場の健全な発展及び投資家の保護を図ることを目的としており、企業内容等の開示、公開買付けに関する開示、株券などの大量保有の状況に関する開示に大別される。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "13-ロ", question: "会社法に基づく開示は、企業の直接的な利害関係者である債権者、株主の保護を目的としており、計算書類及び事業報告の定時株主総会での報告または承認などが求められる。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "14-ロ", question: "株式は上場されると不特定多数の投資家により売買されるようになるため、上場は株式公開とも呼ばれ、市場への最初の株式供給という意味でPO（Public Offering）ともいう。", answer: "誤り", explanation: "株式公開は、市場への初めの株式供給との意味で IPO（Initial Public Offering）と呼ばれる。" },
  { subject: "102. 不動産証券化の概要", no: "14-ニ", question: "信用取引とは、顧客が売買代金の一定比率を委託保証金として証券会社に預託し、買付資金又は売付証券を当該証券会社から借りて売買を行い、所定の期限内に返済する取引で、制度信用取引と一般信用取引の2種類がある。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "15-イ", question: "金商法の施行により、信託受益権や投資ファンド等の集団投資スキームの持分も有価証券とみなされて規制対象とされることになった。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "15-ロ", question: "金商法では金融商品取引業として①第一種金融商品取引業、②第二種金融商品取引業、③投資運用業、④投資助言・代理業が規定されており、これらの業務は登録制として横断的に規制されるが、財産的基礎要件などの参入規制（登録拒否要件）はない。", answer: "誤り", explanation: "業務内容の範囲に応じて参入規制（登録拒否要件）が設けられている。" },
  { subject: "102. 不動産証券化の概要", no: "15-ハ", question: "証券市場は、その機能により、新たに証券を発行して発行者が資金調達を行う発行（プライマリー）市場と、既発証券が売買される流通（セカンダリー）市場に分けられる。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "15-ニ", question: "証券のセカンダリー市場における証券会社の主な業務には、顧客の証券の売買等の媒介、取次ぎ、代理を行うブローカレッジ業務と証券会社が自らの計算とリスクで証券の売買を行うディストリビューション業務がある。", answer: "誤り", explanation: "セカンダリー市場における自己売買はディーリング業務である。" },
  { subject: "102. 不動産証券化の概要", no: "17-ロ", question: "銀行の信用リスク管理とは、貸出先が返済不能の状況に陥るといった与信業務に伴う危険性を定性的に把握・管理し、経営の健全性や収益性のバランスを適切にコントロールすることである。", answer: "誤り", explanation: "信用リスク管理とは、銀行の固有業務である与信業務に関わるリスクの管理である。与信先が倒産して返済不能の状況に陥る等の危険性を「定量的」に把握・管理し、経営の健全性と収益性のバランスを適切にコントロールすることは、銀行業務の基本ともいえる。" },
  { subject: "102. 不動産証券化の概要", no: "17-ニ", question: "貸出スプレッドとは、基準金利に対する上乗せ金利を指し、銀行の引き受ける信用リスクやコストに見合うリターンといえる。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "18-イ", question: "ノンリコースローンとは、特定の事業もしくは資産から発生するキャッシュフローのみを返済原資とする融資のことで、広義のコーポレートファイナンスに含まれる。", answer: "誤り", explanation: "ノンリコースローンとは、特定の事業もしくは資産から発生するキャッシュフローのみを返済原資とし、それ以外のスポンサーなどへの求償権（Recourse）が付かない非遡及型ローンを指す。すべての事業リスクを事業主が負担するコーポレートファイナンスとは異なるものである。" },
  { subject: "102. 不動産証券化の概要", no: "18-ロ", question: "PFIはPPPの代表的な手法の一つで、公共事業に民間のノウハウや資金を活用する手法である。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "18-ハ", question: "開発対象建物の建設資金を調達する開発型ローンでは、完全なノンリコースとなる例が中心である。", answer: "誤り", explanation: "開発型ローンは開発対象建物の建設資金を調達するもので、ファイナンス期間は比較的短期であるが、稼働前のため物件からのキャッシュフローが少ない、もしくは限定的であることから、完全なノンリコースの例は少ない。" },
  { subject: "102. 不動産証券化の概要", no: "18-ニ", question: "プロジェクトファイナンス導入のメリットとして、対象事業のリスク・リターンがより明確になることが挙げられる。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "19-イ", question: "生命保険会社では、保険契約の責任準備金のデュレーションにあわせた確定利付資産を中心に運用が行われてきたが、運用利回り確保のため国内確定利付資産（国債、地方債、社債）の運用資産に占める割合は減少してきており、2021年3月末時点では、40%を下回っている。", answer: "誤り", explanation: "2021年3月末時点の国内生保全体の資産配分を確認すると、国内確定利付資産（国債、地方債、社債）は48.2%となっている。" },
  { subject: "102. 不動産証券化の概要", no: "19-ロ", question: "損害保険会社は、営業拠点網の整備の過程で所有した実物不動産への投資とともに、オルタナティブ投資の一環として、不動産証券化商品への投資を行っている。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "19-ニ", question: "銀行、保険会社、年金基金などの機関投資家は、顧客等から拠出された資金を投資運用・管理しており、利息、保険金、給付金等の形で顧客に一定の支払いをする必要がある。こうした支払義務等の特性に基づき、総合的に資産管理を行うリスク管理手法をALMという。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "20-ロ", question: "国内年金基金の不動産投資では、私募REITへの投資が国内不動産投資の形態として普及しつつある。国内私募REITの投資家分布（2021年12月末時点・出資総額ベース）において、「年金」の占める割合は30%を超えている。", answer: "誤り", explanation: "国内私募REITの投資家分布（2021年12月末時点・出資総額ベース）において、「年金」の占める割合は20.2%。" },
  { subject: "102. 不動産証券化の概要", no: "20-ハ", question: "SWF（ソブリン・ウェルス・ファンド）は、石油などの資源売却収入を主たる原資とするものと外貨準備金や財政余剰金を原資とするものに大別できる。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "20-ニ", question: "国内銀行は、株式・債券への投資が主な有価証券投資であるが、その他有価証券として不動産証券化商品にも投資している。また、不動産会社や不動産流動化等を目的とするSPCへの貸し出しにより、不動産投資市場を支えている。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "21-イ", question: "最近の日本の確定給付企業年金による不動産投資の資産構成割合は、企業年金実態調査によると、15%を超えている。", answer: "誤り", explanation: "2020年度末のプライベートエクイティ等を含む「その他」で10.5%に留まる。" },
  { subject: "102. 不動産証券化の概要", no: "21-ロ", question: "米国の企業年金は、資産規模が大きいほど、直接投資とオープンエンドファンドへの投資割合が高くなっている。", answer: "誤り", explanation: "直接投資は高くなっているものの、オープンエンドファンドへの投資は低くなっている。" },
  { subject: "102. 不動産証券化の概要", no: "21-ハ", question: "GPIF（年金積立金管理運用独立行政法人）は不動産投資を積極的に拡大しており、2021年3月末では、オルタナティブ投資全体に対して設定された5%の投資枠をフルに活用している。", answer: "誤り", explanation: "2021年3月末では、インフラを除く不動産への投資は約0.3%に過ぎず、オルタナティブ投資全体への投資も0.7%に留まる。" },
  { subject: "102. 不動産証券化の概要", no: "21-ニ", question: "日本の企業年金は、年金給付を着実に実施する観点から、国内の不動産投資を海外の不動産投資より優先する傾向がある。", answer: "正しい", explanation: "解説では「必ずしも誤りとは言えない。年金運用の本質が着実な給付を実行するためという目的にあることを考えれば、本肢を“明らかな誤り”とすることはできない」とされており、本設問の「明らかな誤り」には該当しない（正答肢）。" },
  { subject: "102. 不動産証券化の概要", no: "22-イ", question: "上場REITは、株式と同様に証券取引所に上場され時々刻々の時価が付されることで流動性が高く、企業年金にとってもっとも有用な不動産投資の対象である。", answer: "誤り", explanation: "不動産投資のメリットを低流動性と考える投資家からは、上場による時価変動の大きさを“もっとも有用”と評価することはありえない。" },
  { subject: "102. 不動産証券化の概要", no: "22-ロ", question: "不動産投資に固有のリスクとしては、流動性や物件の個別性、情報の非対称性などを意識されることが多い。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "22-ハ", question: "日本の企業年金は、バブル経済の崩壊に関係なく、「5：3：3：2規制」の時代から、国内の証券化された不動産商品へ積極的な投資に取り組んでいた。", answer: "誤り", explanation: "バブル経済の崩壊以前には、国内に不動産を証券化した商品の大きな市場は存在していない。" },
  { subject: "102. 不動産証券化の概要", no: "22-ニ", question: "不動産投資に際しては、投資開始以前の対象に対する精査のみならず、投資期間中も定性・定量両面でのモニタリングを、ゲートキーパーやマネジャー等を通じて行う必要がある。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "23-イ", question: "流動化とは、資金調達主体である原資産所有者が倒産隔離されたSPVを経由して裏付資産への関与を継続しながら借入などにより資金調達をすることと言える。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "23-ロ", question: "証券化とは、資金調達主体が金銭債権を裏付けに倒産隔離されたSPVを経由して優先劣後構造を有する2つ以上の階層化された有価証券の発行により資金調達をすることと言える。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "23-ハ", question: "流動化は、原資産所有者が裏付資産への関与を継続することから、コーポレートファイナンスに含まれる。", answer: "誤り", explanation: "流動化はコーポレートファイナンスではなく、ストラクチャードファイナンス（アセットファイナンス）に含まれる。" },
  { subject: "102. 不動産証券化の概要", no: "23-ニ", question: "「国際決済銀行や金融庁が金融機関に関する自己資本比率規制で定義している証券化取引」には、不動産をSPVで保有させた上でノンリコースファイナンスにより資金調達を行う取引が含まれる。", answer: "誤り", explanation: "当該取引は「特定貸付債権」に該当するものとして、定義から除外されている。" },
  { subject: "102. 不動産証券化の概要", no: "24-1", question: "SPVの倒産隔離を考える際には、①自ら倒産しない、②他者の倒産に巻きこまれない、という2点に配慮することが求められる。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "24-2", question: "一般社団法人は、出資（基金拠出）者と議決権保有者の制度的同一という特性を有しているため、資産保有SPCの議決権を保有する主体として倒産隔離のために利用されている。", answer: "誤り", explanation: "「制度的同一」ではなく「制度的分離」が正しい。" },
  { subject: "102. 不動産証券化の概要", no: "24-3", question: "信託は、信託財産に帰せられる収入及び支出は受益者が特定していれば受益者が信託財産を所有しているとみなされ受益者に帰属するものの、信託財産の名義は受託者のため、受託者が破産した場合には信託財産が破産財団に含まれてしまうというデメリットがある。", answer: "誤り", explanation: "受託者が破産した場合にも信託財産は破産財団に含まれない。" },
  { subject: "102. 不動産証券化の概要", no: "24-4", question: "税法上、任意組合、投資事業有限責任組合、有限責任事業組合は法人格を持たないことから法人課税はされず、組合事業の所得は組合員に直接帰属し、組合員に課税が行われるが、匿名組合は営業者が課税主体となることから組合員に課税が行われることは想定されない。", answer: "誤り", explanation: "匿名組合においては、組合員への利益分配がなされた場合、当該利益に対応した部分は結果として組合員の課税となる。" },
  { subject: "102. 不動産証券化の概要", no: "25-イ", question: "サービサーのリスクとして、サービサーが破綻した際に、本来SPVに送金されるべきキャッシュフローとサービサーのその他営業資金が混ざってしまい、一緒に管財人に差し押さえられてしまうといったコミングリングリスクがある。", answer: "正しい", explanation: "" },
  { subject: "102. 不動産証券化の概要", no: "25-ロ", question: "SPVへの資産の譲渡における対抗要件として、「債務者対抗要件」と「第三者対抗要件」があるが、金銭債権の証券化においてオリジネーターがサービサーとしてサービシング業務を行っている場合には第三者対抗要件を具備しないのが一般的である。", answer: "誤り", explanation: "金銭債権の証券化においてオリジネーターがサービサーとしてサービシング業務を行っている場合には「債務者対抗要件」を具備しないのが一般的である。" },
  { subject: "102. 不動産証券化の概要", no: "25-ハ", question: "真正売買の議論は、①オリジネーターによる資産譲渡が売却取引として認められるかという会計上の問題、②低廉譲渡の関係による税務上の問題、③譲渡担保とみなされるといった法律上の問題の3つの点から問題となるが、実務上はいずれかを満たすことで達成される。", answer: "誤り", explanation: "3つを全部満たす条件を実務は探っていくこととなる。" },
  { subject: "102. 不動産証券化の概要", no: "25-ニ", question: "現金準備勘定は、ABSの発行代わり金の一部などを準備金としてSPVにおいて留保することで流動性補完として機能する一方で、ABSの元本の償還や利息の支払いの可能性を高めるための信用補完としても機能する。", answer: "正しい", explanation: "" },
  { subject: "103. 不動産投資の基礎", no: "26-イ", question: "不動産投資のスタンスには時代の変遷があり、リーマンショック前までは、短期でキャピタルゲインを狙うオポチュニスティックな投資が少なからず見られた。", answer: "正しい", explanation: "正しい。（102 テキスト P.10 参照）" },
  { subject: "103. 不動産投資の基礎", no: "26-ロ", question: "不動産は、他の金融資産と比較した特徴の1つとして、購入にあたって詳細な調査が必要となることが挙げられる。", answer: "正しい", explanation: "正しい。（102 テキスト P.11 参照）" },
  { subject: "103. 不動産投資の基礎", no: "26-ハ", question: "複数の不動産投資でポートフォリオを構成する場合、全体の7〜8割を超えるような目玉となる大型物件を入れることで、魅力度が増し、リスクも軽減される。", answer: "誤り", explanation: "逆にリスクが高まる。投資の分散化が好ましい。（102 テキスト P.15 参照）" },
  { subject: "103. 不動産投資の基礎", no: "26-ニ", question: "保有する不動産に関連する法改正情報や建物設備・什器備品などのリコール情報を定期的に収集することは、保有期間中のリスクを軽減するために重要である。", answer: "正しい", explanation: "正しい。（102 テキスト P.16 参照）" },
  { subject: "103. 不動産投資の基礎", no: "27-イ", question: "不動産投資の種類としては、エクイティによる投資とパッシブな投資の2つがある。", answer: "誤り", explanation: "エクイティによる投資とデットによる投資。（102 テキスト P.17〜18 参照）" },
  { subject: "103. 不動産投資の基礎", no: "27-ロ", question: "不動産投資は、リスクとリターンの高低により、「コア」「バリューアッド」「オポチュニスティック」の3つに分かれるが、各タイプのIRRの基準数値は、不動産証券化協会（ARES）が3年毎に明確な基準を出している。", answer: "誤り", explanation: "明確な基準はなく、各タイプの IRR の水準は、マーケットの状況、投資環境、リスク特性などにより、変化するものである。（102 テキスト P.18〜19 参照）" },
  { subject: "103. 不動産投資の基礎", no: "27-ハ", question: "公募のREITはプライベートファンドに対して、相対的に規模が大きく、上場により一般の投資家から幅広く資金調達することから、様々な規制や制約がある。", answer: "正しい", explanation: "正しい。（102 テキスト P.20 参照）" },
  { subject: "103. 不動産投資の基礎", no: "27-ニ", question: "最近始まったブロックチェーンを用いた不動産STO（セキュリティトークンオファリング）は、機関投資家などの大口投資を誘うものとして期待されている。", answer: "誤り", explanation: "不動産 STO は小口投資を誘うものである。（102 テキスト P.19 参照）" },
  { subject: "103. 不動産投資の基礎", no: "28-イ", question: "アセットマネジメントとは、投資家からの委託に基づき投資対象不動産の取得、保有期間中の管理および運用、投資対象不動産の売却に至るまでの戦略を立案し、実行する一連の業務のことである。", answer: "正しい", explanation: "正しい。（102 テキスト P.27 参照）" },
  { subject: "103. 不動産投資の基礎", no: "28-ロ", question: "アセットマネジャーとは、アセットマネジメント業務を行う者のことであり、投資家の利益を最大化することが役割である。", answer: "正しい", explanation: "正しい。（102 テキスト P.27 参照）" },
  { subject: "103. 不動産投資の基礎", no: "28-ハ", question: "アセットマネジャーの業務範囲には、不動産関連・金融関連・ファンド関連の各業務があり、不動産実務のみならずファイナンス、会計、財務などに関する知識が必要である。", answer: "正しい", explanation: "正しい。（102 テキスト P.28〜29 参照）" },
  { subject: "103. 不動産投資の基礎", no: "28-ニ", question: "アセットマネジャーとは、投資戦略・管理運用計画・資金調達計画などを立案し不動産ファンドを運営する「経営者」であり、プロパティマネジャーとはアセットマネジャーの指示に基づいて不動産の維持管理などを行う「執行者」である。", answer: "正しい", explanation: "正しい。（102 テキスト P.27 および Web 講義 102 第Ⅰ部第 2 章資料 P.1 の解説を参照）" },
  { subject: "103. 不動産投資の基礎", no: "29-イ", question: "投資戦略を立案する際には、投資クライテリアをもとに投資期間や期待リターン（想定配当利回り）及び成長戦略などの要素やアセットマネジャーの強みや特徴なども加味して、投資の開始から終了までのストーリーを考えなければならない。", answer: "正しい", explanation: "正しい。（102 テキスト P.30 および Web 講義 102 第Ⅰ部第 2 章資料 P.2 解説参照）" },
  { subject: "103. 不動産投資の基礎", no: "29-ロ", question: "デューデリジェンスとは、物的調査・法的調査・経済的調査の観点から投資対象不動産の調査を行うことで、その不動産の適正な投資価値とリスクを明確化することである。", answer: "正しい", explanation: "正しい。（102 テキスト P.33〜39 および Web 講義 102 第Ⅰ部第 2 章資料 P.2 参照）" },
  { subject: "103. 不動産投資の基礎", no: "29-ハ", question: "アンダーライティングを行うに際しては、新規募集賃料の水準設定や今後発生が見込まれる修繕費及び資本的支出工事費の想定金額などの将来予測を精緻に行うことが重要であり、デューデリジェンスで得られた賃料水準や修繕履歴及び資本的支出工事の実績値は過去のデータであるため、アンダーライティングの参考にしてはならない。", answer: "誤り", explanation: "デューデリジェンスで得られた収入及び支出に関する過去のデータを参考にして、新規の募集賃料水準や修繕及び資本的支出工事の実施内容などを想定するものであり、実績データはアンダーライティングの際に参考となる。（102 テキスト P.38〜39 参照）" },
  { subject: "103. 不動産投資の基礎", no: "29-ニ", question: "キャッシュマネジメントにおける注意点として、PM会社から提出されるファンディングリクエストは原則としてSPCに代わってPM会社が立て替え払いをしているものであり、アセットマネジャーはPM会社からファンディングリクエストを受領したならば直ちに支払いの手続きを行わなければならない。", answer: "誤り", explanation: "アセットマネジャーはファンディングリクエストを受領した後、発注先を選定する際に入札手続きを経る必要がなかったのか、支払いに際してレンダー承諾が必要ではなかったのかなど、当該支払いが適正なものであるかの確認を行った上で支払い手続きを行わなければならない。（102 テキスト P.51〜52 参照）" },
  { subject: "103. 不動産投資の基礎", no: "30-2", question: "投資（運用）委員会とは、主に業務の適法性の観点から各種法令や社内規定の遵守状況、また利害関係人取引などについて審議、承認を行うものであり、外部有識者として弁護士などが外部委員となる場合が多い。", answer: "誤り", explanation: "業務の適法性の観点から各種法令や社内規定の遵守状況、利害関係人取引などについて審議、承認するのはコンプライアンス（評価）委員会である。投資（運用）委員会では取得および売却価格や取引条件などの投資判断、投資戦略やビジネスプランなどに関して、業務の妥当性の観点から協議、決議を行い、不動産鑑定士などが外部委員となることが多い。（102 テキスト P.47〜48 参照）" },
  { subject: "103. 不動産投資の基礎", no: "30-3", question: "コベナンツとは、「誓約事項」と呼ばれるもので、違反したり抵触したりすると投資家への配当が停止したり借入金の強制期限前弁済となったりする。", answer: "正しい", explanation: "正しい。（102 テキスト P.45 参照）" },
  { subject: "103. 不動産投資の基礎", no: "31-1", question: "ホテルの収入に関する指標の一つに平均客室単価（ADR、Average Daily Rate）がある。これは「客室販売収入÷販売客室数」で算出される。この平均客室単価に客室稼働率を掛けたもの（平均客室単価×客室稼働率）が、一日あたり販売可能客室数あたり客室売上を指すRevPARである。", answer: "正しい", explanation: "正しい。（102 テキスト P.104 参照）" },
  { subject: "103. 不動産投資の基礎", no: "31-2", question: "物流施設の需要増加の背景にある、宅配便個数や電子商取引の市場規模は増加傾向が続いている。特にサービス業も含めた消費者向けeコマース（BtoC-EC）の伸びは著しく、EC化率はコロナ禍の影響があった2020年には50%と半数に達した。", answer: "誤り", explanation: "2020 年の EC 化率は 8.08％と 1 割未満。50％には達していない。（102 テキスト P.108 参照）" },
  { subject: "103. 不動産投資の基礎", no: "31-3", question: "ホテルは施設数、客室数とも増加傾向が続いている。旅館は減少傾向にあるものの施設数と客室数はいまだホテルより多い。", answer: "誤り", explanation: "ホテルの客室数は 2009 年に旅館を上回った。（102 テキスト P.101 参照）" },
  { subject: "103. 不動産投資の基礎", no: "31-4", question: "マルチテナント型と呼ばれる物流施設は、入居するテナント（荷主企業・物流企業）の要望に沿った用地・設備を兼ね備えた施設として設計・建設・運営され、主に定期借家契約に基づき賃貸で提供される、いわばオーダーメイド型の専用物流施設である。", answer: "誤り", explanation: "これはビルド・トゥ・スーツ型に関する記述。（102 テキスト P.106 参照）" },
  { subject: "103. 不動産投資の基礎", no: "32-イ", question: "商業施設では、入居店舗の売上に応じて賃料が決まる売上歩合賃料が採用される事がある。これは、入居店舗にとってはメリットが多いため、賃貸側にとってはデメリットになる。", answer: "誤り", explanation: "賃貸側にとっては店舗売上が多い際には賃料が増えるため、必ずしもデメリットとはいえない。デメリットの面は賃料収入の変動が大きい点といえる。（102 テキスト P.92 参照）" },
  { subject: "103. 不動産投資の基礎", no: "32-ロ", question: "平成20年（2008年）をピークに減少している総人口と同様に、総務省が公表する最新の「平成30年（2018年）住宅・土地統計調査」によると、住宅総数は減少し、空き家数は増加が続いている。", answer: "誤り", explanation: "2018 年（最新）の総務省「住宅・土地統計調査」で、住宅総数は増加している。（102 テキスト P.93〜94 参照）" },
  { subject: "103. 不動産投資の基礎", no: "32-ハ", question: "商業施設は、管理運営（オペレーション）の仕方によって売上や収益に影響がでる。このような専門のオペレーターを必要とする、商業施設、ホテル、ヘルスケア施設（病院・診療所、高齢者向け居住施設）はオペレーショナルアセットといわれる。", answer: "正しい", explanation: "正しい。（102 テキスト P.86 参照）" },
  { subject: "103. 不動産投資の基礎", no: "32-ニ", question: "一般的に賃貸住宅は、オフィスや商業など他のアセットと比べて賃料変動が小さく、安定しているとみなされていたが、新型コロナウイルス禍では稼働率低下や賃料下落がみられ、ホテルと同程度の大きな影響を受けた。", answer: "誤り", explanation: "コロナ禍であってもホテルほどの大きな影響はでていない。（102 テキスト P.99 参照）" },
  { subject: "103. 不動産投資の基礎", no: "33-イ", question: "地価公示（公示地価）と相続税路線価（路線価）は共に毎年1月1日時点における1㎡当たりの標準的な宅地の価額を算定したものである。それぞれ、地価公示は国土交通省土地鑑定委員会が、相続税路線価は都道府県知事が判定して公表するものである。", answer: "誤り", explanation: "相続税路線価は国税庁から公表される。（102 テキスト P.67 参照）" },
  { subject: "103. 不動産投資の基礎", no: "33-ロ", question: "日本は戦後から4回の地価高騰期があった。そのうち1回目は高度成長期の1960年前後で、その時の対前年同期比の地価上昇率は3回目の1985年から1991年にかけてのバブル期よりも高かった。", answer: "正しい", explanation: "正しい。（102 テキスト P.68〜69 参照）" },
  { subject: "103. 不動産投資の基礎", no: "34-1", question: "民間調査会社のデータによると、東京のビジネス地区ではオフィス供給が毎年行われている。ただし、建替えなどの滅失があるためオフィスストックの量は漸減傾向にある。", answer: "誤り", explanation: "オフィスストックは増加が続いている。（102 テキスト P.72〜73 参照）" },
  { subject: "103. 不動産投資の基礎", no: "34-2", question: "テナントが新規に入居する際に一定期間賃料相当額を免除するフリーレントで需給バランスを把握する事ができる。ただし最近は、段階賃料やレントホリデーなどのテナント優遇策が取られることがあり、フリーレントの付与率や月数だけでは需給動向を判断できないケースがある。", answer: "正しい", explanation: "正しい。（102 テキスト P.78 参照）" },
  { subject: "103. 不動産投資の基礎", no: "34-3", question: "一般的なオフィスの賃貸借契約では契約更新時などに賃料改定が行われることがある。ビルオーナーとテナントの交渉で賃料が決定されるため、継続賃料は新規賃料（募集、成約）に比べて変動が大きい傾向にある。", answer: "誤り", explanation: "継続賃料は新規賃料に比べて変動が小さい。（102 テキスト P.82 参照）" },
  { subject: "103. 不動産投資の基礎", no: "34-4", question: "不動産投資の対象として、オフィスは他のアセットに比べて後発といえ、J-REIT市場に最初に上場した2銘柄は商業施設とホテルを投資対象としたリートであった。", answer: "誤り", explanation: "J-REIT 市場に最初に上場した 2 銘柄はどちらもオフィス系リート。（102 テキスト P.65 参照）" },
  { subject: "103. 不動産投資の基礎", no: "35-イ", question: "デューデリジェンスの目的は、投資対象の詳細調査による投資リスクの把握・リスク軽減・リスク回避手段の構築・適正投資価値の把握、投資効率の向上である。", answer: "正しい", explanation: "正しい。（102 テキスト P.118 参照）" },
  { subject: "103. 不動産投資の基礎", no: "35-ロ", question: "不動産所有者は、デューデリジェンスに耐えられるように、適切な管理業務を実行するとともに、物件、あるいは運営に関する当面の計画を詳細に記録し開示する必要がある。", answer: "誤り", explanation: "不動産所有者は、物件、あるいは運営に関する当面の計画ではなく、履歴を詳細に記録し開示する必要がある。（102 テキスト P.119 参照）" },
  { subject: "103. 不動産投資の基礎", no: "35-ハ", question: "不動産に関するデューデリジェンスでは、一般的に土地、建物、環境、法律、経済に関する調査が行われる。", answer: "正しい", explanation: "正しい。（102 テキスト P.119 参照）" },
  { subject: "103. 不動産投資の基礎", no: "35-ニ", question: "デューデリジェンスの発注者は、弁護士、会計士、建設会社、エンジニアリング会社、設計士、不動産鑑定士、マーケットリサーチャー等の専門家である。", answer: "誤り", explanation: "デューデリジェンスの発注者は、不動産のオリジネーターや投資家、J-REIT 等の不動産ファンドの運用会社等である。弁護士、会計士、建設会社、エンジニアリング会社、設計士、不動産鑑定士、マーケットリサーチャー等の専門家は、デューデリジェンスの担い手である。（102 テキスト P.118 参照）" },
  { subject: "103. 不動産投資の基礎", no: "36-イ", question: "都市計画法、建築基準法等に加え、地方自治体が建築指導要綱を定めている場合があるが、特段留意する必要はない。", answer: "誤り", explanation: "都市計画法、建築基準法等に加え、地方自治体が独自に建築に関わる行政指導として建築指導要綱を定めている場合があるので、留意する必要がある。（102 テキスト P.133 参照）" },
  { subject: "103. 不動産投資の基礎", no: "36-ロ", question: "既存不適格建築物とは、建築時には建築基準法等の法的規制を満たしていたが、法改正等により、現在の法令等の基準には反する部分がある建築物を指すが、再建築した場合には、持続的な収益力に問題が生じることはない。", answer: "誤り", explanation: "例えば、既存不適格建築物で容積率が現行の許容容積率を上回る場合は、再建築した場合には現況建物の消化している容積率をとれず、持続的な収益力に問題が生じる場合もあることに留意する必要がある。（102 テキスト P.132 参照）" },
  { subject: "103. 不動産投資の基礎", no: "36-ハ", question: "都市計画法とは、都市を健全に発展させることを目的とした法律で、日本の国土を都市計画区域と都市計画区域外に区分し、都市における建築を規制している。", answer: "正しい", explanation: "都市計画法は、1969年に施行された都市を健全に発展させることを目的とした法律で、日本の国土を都市計画区域と都市計画区域外に区分し、都市における建築を規制している。（102 テキスト P.128 参照）" },
  { subject: "103. 不動産投資の基礎", no: "36-ニ", question: "建築基準法とは、建築法規の根幹となる法律で、建築物の安全性を維持するための具体的な規制が設けられている。", answer: "正しい", explanation: "建築基準法は、1950年に施行された建築法規の根幹となる法律で、建築物の安全性を維持するための具体的な規制が設けられている。（102 テキスト P.130 参照）" },
  { subject: "103. 不動産投資の基礎", no: "37-イ", question: "借入金と自己資金に係る還元利回りから還元利回りを求める方法は、対象不動産の取得の際の資金調達上の構成要素（借入金及び自己資金）に係る各還元利回りを各々の構成割合により加重平均して求めるものである。", answer: "正しい", explanation: "正しい。（102 テキスト P.206 参照）" },
  { subject: "103. 不動産投資の基礎", no: "37-ロ", question: "土地と建物に係る還元利回りから還元利回りを求める方法は、対象不動産が建物及びその敷地である場合に、その物理的な構成要素（土地及び建物）に係る各還元利回りを各々の価格の構成割合により加重平均して求めるものである。", answer: "正しい", explanation: "正しい。（102 テキスト P.206 参照）" },
  { subject: "103. 不動産投資の基礎", no: "37-ハ", question: "類似の不動産の取引事例との比較から還元利回りを求める方法は、対象不動産と類似の不動産の取引事例から求められる利回りをもとに、取引時点及び取引事情並びに地域要因及び個別的要因の違いに応じた補正を行うことにより求めるものである。", answer: "正しい", explanation: "正しい。（102 テキスト P.205〜206 参照）" },
  { subject: "103. 不動産投資の基礎", no: "37-ニ", question: "還元利回りは、直接還元法の収益価格及びDCF法の復帰価格の算定において、一期間の純収益から対象不動産の価格を直接求める際に使用される利回りであり、将来の収益に影響を与える要因の変動予測と予測に伴う不確実性を含まないものである。", answer: "誤り", explanation: "還元利回りは、直接還元法の収益価格及び DCF 法の復帰価格の算定において、一期間の純収益から対象不動産の価格を直接求める際に使用される利回りであり、将来の収益に影響を与える要因の変動予測と予測に伴う不確実性を含むものである。（102 テキスト P.204 参照）" },
  { subject: "103. 不動産投資の基礎", no: "40-1", question: "現状の建物に耐震補強工事が行われていたとしても、建物竣工後に行われた工事のためその費用は反映されない。", answer: "誤り", explanation: "竣工後に耐震補強工事等が行われていれば、その耐震性を保持するための費用は反映される。" },
  { subject: "103. 不動産投資の基礎", no: "40-2", question: "再調達価格には、解体撤去費用、設計料、官公庁の指導事項による工事費増要因も含むものとしている。", answer: "誤り", explanation: "ER 作成時点での物理的な建物価格を算定する目的から、変動要因の多い諸費用は含まない。" },
  { subject: "103. 不動産投資の基礎", no: "40-3", question: "竣工後における法的な制約条件の変更の影響等は含まれない。", answer: "正しい", explanation: "あくまで現状規模の建物を再築した場合の価格算定となる。建築基準法などの改正による容積率アップ等の外部要因は、算定の対象外となる。" },
  { subject: "103. 不動産投資の基礎", no: "40-4", question: "対象建物を調査時点に再度新築するとした場合の費用であるので、調査時点で求められている建物性能・スペック等にグレードアップした建物価格を算定する。", answer: "誤り", explanation: "価格算定は、現状の建物性能・仕様等が対象となる。" },
  { subject: "103. 不動産投資の基礎", no: "41-1", question: "PMLの評価手法は、米国のASTM基準等で様々な定義があるが、ERの委託者はどの定義で評価を実施するかを決める必要がある。", answer: "正しい", explanation: "記述の通り。（102 テキスト P.178 参照）" },
  { subject: "103. 不動産投資の基礎", no: "41-2", question: "複数棟のポートフォリオPML分析を必要とするようなケースでは、ER作成者により評価方法が異なる可能性がある。", answer: "正しい", explanation: "ER 作成者により評価方法が異なる可能性があるため、注意が必要である。（102 テキスト P.178 参照）" },
  { subject: "103. 不動産投資の基礎", no: "41-3", question: "建物が1981年以降に竣工した「新耐震基準」のため、地震リスク評価（PML）は行わず、被害想定を軽微と判断した。", answer: "誤り", explanation: "「新耐震基準」の建物であっても、最大級の地震が発生した際は、建物の被害は発生する可能性がある。また「旧基準（1981 年以前）」の建物でも、耐震安全性を考慮して余裕値を持つ建物は、想定被害が低くなる事もあるため、耐震基準のみならず単純に年代だけで判定することはできない。（102 テキスト P.178 参照）" },
  { subject: "103. 不動産投資の基礎", no: "41-4", question: "地震リスク評価（PML）は、該当地で想定される最大級の地震に対して、建物全般の損失率・損失額（物的損失）を算出するものである。", answer: "正しい", explanation: "記述の通り。（102 テキスト P.177 参照）" },
  { subject: "103. 不動産投資の基礎", no: "42-イ", question: "土壌汚染対策法は有害物質を使用する事業所（特定施設）を廃止する時の「調査義務」と一定規模以上の開発時や、地下水汚染が発覚した土地などでの行政の「調査命令」を規定し、土壌調査を土地所有者等にさせるものである。", answer: "正しい", explanation: "記述の通り。（102 テキスト P.187 参照）" },
  { subject: "103. 不動産投資の基礎", no: "42-ロ", question: "土壌汚染対策法において土壌汚染が判明した場合の区域指定された土地には、健康被害の恐れがある「形質変更時要届出区域」がある。", answer: "誤り", explanation: "記述は「要措置区域」であり、「形質変更時要届出区域」は汚染はあるが現状の土地利用を継続するうえでは健康影響の心配が無い区域である。（102 テキスト P.187 参照）" },
  { subject: "103. 不動産投資の基礎", no: "42-ハ", question: "土壌汚染リスク評価結果は報告書に土地利用履歴、有害物質の使用有無や保管・廃棄の状況、土地周辺の土壌・地下水汚染状況、水理地質構造等を勘案して総合的に記載される。", answer: "正しい", explanation: "記述の通り。（102 テキスト P.186 参照）" },
  { subject: "103. 不動産投資の基礎", no: "42-ニ", question: "地方自治体では土壌汚染に対して独自の環境条例や指導要綱を規定しており、国の法規より緩い条例を設けているところもある。", answer: "誤り", explanation: "国の法規より「厳しい」条例を設けているところもある。（102 テキスト P.187 参照）" },
  { subject: "103. 不動産投資の基礎", no: "43-イ", question: "プロパティマネジメントとは、投資家利益の極大化、投資家のために不動産ファンドの対象となる不動産を運用し、投資家のインカムゲインとキャピタルゲインの最大化を図ることである。", answer: "誤り", explanation: "問題文は「アセットマネジメント」の説明である。（102 テキスト P.254 図表Ⅳ-1-1 参照）" },
  { subject: "103. 不動産投資の基礎", no: "43-ロ", question: "プロパティマネジャーは、対象不動産の運営収益から運営費用を控除した運営純収益（NOI）の改善・増大を図ることが求められる。", answer: "正しい", explanation: "（102 テキスト P.254 参照）" },
  { subject: "103. 不動産投資の基礎", no: "43-ハ", question: "狭義のプロパティマネジメントとは、設備管理業務、定期保守業務、保安警備業務などの日常的なメンテナンスを中心としたハード分野の業務のことである。", answer: "誤り", explanation: "建物管理業務のハード分野だけでなく、運営にかかわるソフト分野も含む。（102 テキスト P.257、P.258 図表Ⅳ-1-5、図表Ⅳ-1-6 参照）" },
  { subject: "103. 不動産投資の基礎", no: "43-ニ", question: "ビルオーナー（AM）あるいは投資家等からの委託を受けてビルの管理運営をマネジメントすることをコンストラクションマネジメントという。", answer: "誤り", explanation: "コンストラクションマネジメントではなく、狭義の PM の説明になっている。（102 テキスト P.255 参照）" },
  { subject: "103. 不動産投資の基礎", no: "44-1", question: "賃料条件、エリア、立地、坪数、設備スペックなどに加え、社員の働き方や環境問題への対応など、企業が入居オフィスを選ぶ際の視点は多岐にわたる。", answer: "正しい", explanation: "（102 テキスト P.271、P.272 図表Ⅳ-2-2 参照）" },
  { subject: "103. 不動産投資の基礎", no: "44-2", question: "賃貸の募集条件設定に際しては、「テナントの移転動向」「募集賃料水準」「空室率」などの公開情報や、仲介業者等による成約情報などをもとに、マーケットの動向や実態に即した条件を設定する。", answer: "正しい", explanation: "（102 テキスト P.272〜273 参照）" },
  { subject: "103. 不動産投資の基礎", no: "44-3", question: "契約期間が1年以上の定期建物賃貸借契約において、建物の賃貸人は賃借人に対し期間の満了により賃貸借契約が終了する旨の通知をせずとも、契約終了を賃借人に対抗することができる。", answer: "誤り", explanation: "賃貸人は、期間満了の 1 年前から 6 ヶ月前までの間に賃借人に対し期間の満了により賃貸借が終了する旨の通知をしなければ、その終了を賃借人に対抗することができない。（借地借家法第38 条第 4 項）（102 テキスト P.276 参照）" },
  { subject: "103. 不動産投資の基礎", no: "44-4", question: "一時使用目的のために賃貸借契約を締結したことが明らかな場合には、民法のみが適用され、借地借家法は適用されない。", answer: "正しい", explanation: "（102 テキスト P.276 参照）" },
  { subject: "103. 不動産投資の基礎", no: "45-イ", question: "賃貸ビルの工事区分「B工事」とは、テナント側が指定した工事業者で、テナントが費用負担をする工事のことである。", answer: "誤り", explanation: "問題文は「C 工事」の説明文である。（102 テキスト P.281 図表Ⅳ-2-10 参照）" },
  { subject: "103. 不動産投資の基礎", no: "45-ロ", question: "テナントの入居工事にあたりプロパティマネジャーは、消防法や建築基準法などの違法性チェックや、躯体への悪影響の有無など技術的な確認に加え、工事が他のテナントに迷惑を及ぼさないかどうか確認した。", answer: "正しい", explanation: "（102 テキスト P.281 図表Ⅳ-2-11 参照）" },
  { subject: "103. 不動産投資の基礎", no: "45-ハ", question: "テナントの入居にあたりプロパティマネジャーは、ビルの使用上の制限や義務に関する遵守事項を定めた「貸方基準」をテナントに配布して十分に説明をし、規則の周知徹底を図った。", answer: "誤り", explanation: "貸方基準ではなく、館内使用細則である。（102 テキスト P.278 参照）" },
  { subject: "103. 不動産投資の基礎", no: "45-ニ", question: "原状回復工事にあたりプロパティマネジャーは、賃貸借契約締結当時にテナントと交わした「原状回復確認書」に基づき工事仕様を確認した。", answer: "正しい", explanation: "（102 テキスト P.282 参照）" },
  { subject: "103. 不動産投資の基礎", no: "46-イ", question: "建物管理業務の委託先を選定するうえでは、提案金額の一番安い委託先候補を選ばなくてはならない。", answer: "誤り", explanation: "提案金額だけでなく、提案内容や会社の管理実績等、多方面から検討し決定する。（102 テキスト P.304 参照）" },
  { subject: "103. 不動産投資の基礎", no: "46-ロ", question: "建物管理業務を総合ビルメテナンス会社に一括委託する場合であっても、産業廃棄物の収集運搬・処分の許可業者への委託は、建物所有者と直接契約することが義務付けられている。", answer: "誤り", explanation: "産業廃棄物の処分は排出事業者（建物事業者）が責任を負うものだが、収集運搬・処分の委託に際し建物所有者が直接契約を行うことが義務付けられているわけではない。" },
  { subject: "103. 不動産投資の基礎", no: "46-ハ", question: "ビルメンテナンス業務にかかるコストは不動産収支の支出となるため、資産価値の最大化のためにコスト削減を最優先に考えてビルメンテナンス業務仕様を策定しなければならない。", answer: "誤り", explanation: "資産価値の最大化のため、無理や無駄のない仕様とコストを考慮しビルメンテナンス業務仕様を構築する必要があり、コスト削減が最優先事項ではない。（102 テキスト P.300 参照）" },
  { subject: "103. 不動産投資の基礎", no: "46-ニ", question: "保安警備業務において、定期的に施設を訪れ、火元や設備機器に異常がないか、侵入者がいないかなどを確認する方式を常駐警備方式という。", answer: "誤り", explanation: "問題文は「定期巡回警備方式」の説明である。（102 テキスト P.294 参照）" },
  { subject: "103. 不動産投資の基礎", no: "47-イ", question: "建物修繕は、主に性能維持を目的とした「修繕工事」「改修工事」と資産価値を向上させる「更新工事」に分けることができる。", answer: "誤り", explanation: "「改修工事」と「更新工事」が逆である。（102 テキスト P.305 参照）" },
  { subject: "103. 不動産投資の基礎", no: "47-ロ", question: "社会的劣化とは、設備機器の性能の向上や利用者のニーズの変化、法令改正などにより、市場が求める建物の価値基準より劣る状態となることである。", answer: "正しい", explanation: "（102 テキスト P.306 参照）" },
  { subject: "103. 不動産投資の基礎", no: "47-ハ", question: "長期修繕計画は概ね 10 年を超える修繕計画のことで、将来実行する更新工事のおおよその実施時期と概算金額を把握できるが、実施時期や金額は定期的に見直す必要がある。", answer: "正しい", explanation: "（102 テキスト P.310 参照）" },
  { subject: "103. 不動産投資の基礎", no: "47-ニ", question: "修繕計画に基づき実行した工事は、セントラル空調方式を個別空調方式に変更するなど、工事内容によってはビルメンテナンス業務仕様の変更だけでなく、館内使用細則の「設備等の利用」に関する事項の変更が必要な場合もある。", answer: "正しい", explanation: "（102 テキスト P.315、Web 講義 102 第Ⅳ部④ P.11 解説を参照）" },
  { subject: "103. 不動産投資の基礎", no: "48-1", question: "省エネ法は、全国の物件（所有・入居）でのエネルギー使用量（原油換算値）の合計が年間 3,000 キロリットル以上の事業者には、定期報告の義務を課している。", answer: "誤り", explanation: "3,000KL/年ではなく、1,500KL/年が正しい。（102 テキスト P.317、P.318 図表Ⅳ-3-14 参照）" },
  { subject: "103. 不動産投資の基礎", no: "48-2", question: "テナントビルの場合、省エネ法では不動産の所有者がテナントとして賃借利用している事業者に対し、エネルギー使用量の情報提供を努力義務として課している。", answer: "正しい", explanation: "（102 テキスト P.318 参照）" },
  { subject: "103. 不動産投資の基礎", no: "48-3", question: "事業者の省エネ状況を業種共通（共有）の指標を用いて評価し、各事業者が目指すべき目標（水準）の達成を目指し、省エネの取り組みを進めるものとして「ベンチマーク制度」が 2008 年からスタートしている。", answer: "正しい", explanation: "（102 テキスト P.317 参照）" },
  { subject: "103. 不動産投資の基礎", no: "48-4", question: "省エネ法とは別に、東京都は「地球温暖化対策報告書制度」と「総量削減義務制度」を設けている。", answer: "正しい", explanation: "（102 テキスト P.317 参照）" },
  { subject: "103. 不動産投資の基礎", no: "49-1", question: "労働安全衛生法のもとで石綿の規制が段階的に強化され、2006年には代替困難なものを除く含有率0.1重量％超え石綿含有製品の製造、輸入、譲渡、提供又は使用が禁止となり、2012年には代替品の猶予措置も撤廃された。", answer: "正しい", explanation: "（102 テキスト P.359 参照）" },
  { subject: "103. 不動産投資の基礎", no: "49-2", question: "「改修」とは、劣化に対する修繕や更新に留まらず、その時点及び将来の姿も見据えて、ビルに求められる機能や性能を竣工時点のレベルを超えて、より高い水準へと引き上げる行為をいう。", answer: "正しい", explanation: "（102 テキスト P.329 参照）" },
  { subject: "103. 不動産投資の基礎", no: "49-3", question: "法改正によって現行法不適合となった部分が生じた建築物は既存不適格とされ、現行法適用の除外が規定されている。これら既存不適格項目は、確認申請が必要な改修の際には、現行法に適した状態にすることが求められており、これを遡及適用という。", answer: "正しい", explanation: "（102 テキスト P.357 参照）" },
  { subject: "103. 不動産投資の基礎", no: "49-4", question: "構造耐震指標であるIs値が低い建物ほどその建物の耐震性能は高く、耐震改修促進法の告示により、震度6〜7程度の規模の地震に対するIs値の評価について、Is値が0.6未満の場合「地震の振動及び衝撃に対して倒壊し、又は崩壊する危険性が低い」とされている。", answer: "誤り", explanation: "Is 値が高い建物ほどその建物の耐震性能は高く、Is 値が 0.6 以上の場合「地震の振動及び衝撃に対して倒壊し、又は崩壊する危険性が低い」とされている。（102 テキスト P.368〜370 参照）" },
  { subject: "103. 不動産投資の基礎", no: "50-1", question: "責任投資原則を不動産投資に適用する考え方として、国連環境計画金融イニシアティブ不動産ワーキンググループ（UNEP FI PWG）が「責任不動産投資（RPI）」を推進している。", answer: "正しい", explanation: "（102 テキスト P.375 参照）" },
  { subject: "103. 不動産投資の基礎", no: "50-2", question: "機関投資家の投資判断において、ESG問題に配慮した行動を促すために、2006年に国連によってSDGs（持続可能な開発目標）が提唱され、日本を含めた世界各国で多くの機関投資家などが署名している。", answer: "誤り", explanation: "2006 年に国連が提唱したのは「責任投資原則（PRI：Principles for Responsible Investment）」である。（102 テキスト P.374 参照）" },
  { subject: "103. 不動産投資の基礎", no: "50-3", question: "CASBEE-不動産は、建物を利用する人の健康性、快適性の維持・増進を支援する建物の仕様、性能、取組みを評価するツールで、2018年3月に国土交通省が公表した「健康性、快適性等に関する不動産に係る認証制度のあり方についてのとりまとめ」に基づくものとなっており2019年から認証が開始された。", answer: "誤り", explanation: "建物を利用する人の健康性、快適性の維持・増進を支援する建物の仕様、性能、取組みを評価するツールは CASBEE-ウェルネスオフィスである。（102 テキスト P.383 参照）" },
  { subject: "103. 不動産投資の基礎", no: "50-4", question: "2020年10月に菅義偉首相が所信表明演説で、国内の原油及び天然ガスの使用を2050年までに実質ゼロとする「2050年カーボンニュートラル宣言」をおこなった。", answer: "誤り", explanation: "国内の温暖化ガスの排出を 2050 年までに実質ゼロとする宣言が「2050 年カーボンニュートラル宣言」である。（102 テキスト P.373 参照）" },
  { subject: "102. 不動産証券化の概要", no: "1-イ", question: "不動産証券化の仕組みとして、宅建業法上の不動産又は不動産を主たる信託財産とする不動産信託受益権をSPCが取得する場合、そのための資金調達方法が重要となるが、どのような金融機関からデットの調達を行い、どのような投資家からエクイティ性の資金を調達するかをSPCに助言することは、金商法上の金融商品取引業者でなくとも行える。", answer: "正しい", explanation: "証券化商品を現実化するためには、仕組みを考案し、それをアレンジする者の存在が不可欠である。実務的にはアレンジャーあるいはFAと呼ばれる。デットやエクイティの調達に関してSPCに助言することは、金融商品取引行為には該当しない。金商法上の「投資助言業」には該当しない段階のこととして明らかであろう。" },
  { subject: "102. 不動産証券化の概要", no: "1-ロ", question: "不動産の証券化の仕組みを考える際には、対象となる不動産等の保有者であるSPCが倒産隔離性を有することが必要となるが、そのためにSPCの役員や議決権保有者を証券化に利害関係を持たない第三者にするという方法や、SPCに対して倒産申立権を有する者から倒産申立権放棄書を取得するという方法がとられる。", answer: "正しい", explanation: "SPCの倒産隔離性には、SPC自体の制度設計として、役員や議決権保有者を関係者の利害関係人ではない独立した第三者にするという意義がある。また、倒産申立権の放棄という手法も利用される。" },
  { subject: "102. 不動産証券化の概要", no: "1-ハ", question: "不動産の証券化の仕組みを考える際には、売主が対象となる不動産等をSPCに譲渡した後に会社更生手続きに入る場合、当該会社更生手続きにおいて更生管財人から当該不動産等の譲渡を否認されない限り、問題となる点はない。", answer: "誤り", explanation: "対象となる不動産資産の売主であるオリジネーターが当該不動産資産をSPCに譲渡した後に会社更生手続きを開始した場合には、更生管財人から、譲渡行為の性質を変えられるリスクと、譲渡行為そのものを否認されるリスクがある。前者は譲渡が担保のための権利の移転に過ぎないとされ、SPCが不動産資産の保有者ではなく更生担保権者に位置付けられるリスク（真正譲渡性の問題）である。" },
  { subject: "102. 不動産証券化の概要", no: "1-ニ", question: "不動産証券化の仕組みで不動産等を保有する媒体としてSPCを使う場合には、その投資判断に関わる意思決定の仕組みをどうするかを検討する必要があるが、SPCとして合同会社、特定目的会社、登録投資法人のいずれを利用する場合でも、不動産等の売買に関する投資判断は、適用のある法律上でライセンス（登録や許可等）を有する第三者に委託する必要がある。", answer: "誤り", explanation: "不動産資産の売買に関する投資判断を、ライセンスを有する第三者に委託する必要があるのは、登録投資法人のみと言える。登録投資法人は資産の運用に係る業務を資産運用会社にしなければならないと規定されている。特定目的会社の場合は、投資判断の委託は義務付けられていない。合同会社の場合は、金融商品取引法上の自己運用という方法があり、投資判断を第三者に委託する必要はない。" },
  { subject: "102. 不動産証券化の概要", no: "2-イ", question: "不動産の所有者Ａが賃借人Xと賃貸借契約を締結しているところ（Xは対象不動産を占有している）、AがBとの間で不動産の売買契約を締結して対象不動産をBに譲渡した場合（Bは所有権移転登記をうけている）、Bは、Xの承諾なくして自動的に、Xとの間の賃貸借契約関係上の賃貸人になる。", answer: "誤り", explanation: "民法第605条の2の規定通りの効果である。対象不動産の所有権の移転に伴う賃貸人たる地位の譲受人への移転は自動的に行われる。民法第605条の2の適用を受けるためには、賃借人において賃借権の対抗要件が具備されており、新たな賃貸人において対抗するためには所有権移転の登記がなされていることが必要となる。" },
  { subject: "102. 不動産証券化の概要", no: "2-ロ", question: "上記イ.の場合において、AがBに不動産を譲渡すると同時に、AがBとの間でAが賃貸人の地位を留保する合意をし、かつ、Bが当該不動産をAに賃貸する旨の合意をすれば、AはXの承諾なくして、Xとの間の賃貸借契約関係上の賃貸人に留まることができる。", answer: "誤り", explanation: "民法第605条の2においては、対象不動産の所有権の移転に伴う賃貸人たる地位の譲受人への移転は自動的に行われるにもかかわらず、不動産の譲渡人及び譲受人が、賃貸人たる地位を譲渡人に留保する旨及びその不動産を譲受人が譲渡人に賃貸する旨の合意をしたときは、賃貸人たる地位は、譲受人に移転しない、と規定された。" },
  { subject: "102. 不動産証券化の概要", no: "2-ハ", question: "上記イ.の場合において、AがBに不動産を譲渡すると同時に、AがBとの間でAが賃貸人の地位を留保する合意をし、かつ、Bが当該不動産をAに賃貸する旨の合意をした後に、AがBとの間の賃貸借契約上の債務不履行をした結果、Bから賃貸借契約を解除された場合でも、AとB間で賃貸借契約を合意解約した場合でも、BがAとX間の賃貸借契約上の賃貸人の地位を承継する。", answer: "正しい", explanation: "民法第605条の2に基づき、不動産の譲渡人及び譲受人が、賃貸人たる地位を譲渡人に留保する旨及びその不動産を譲受人が譲渡人に賃貸する旨の合意をしたときは、その後、譲受人（賃貸人）と譲渡人（賃借人）との賃貸借契約が債務不履行解除されても、合意解約されても、いずれも当該賃貸借契約の「終了」に該当し、譲渡人に留保されていたもともとの賃借人に対する賃貸人の地位は譲受人に移転すると解釈されている。" },
  { subject: "102. 不動産証券化の概要", no: "2-ニ", question: "不動産の所有者AがXと賃貸借契約を締結しているところ（Xは対象不動産を占有しておらず、また、賃借権の登記もしていなかった）、AがBとの間で不動産の売買契約を締結して対象不動産をBに譲渡した場合（Bは所有権移転登記をうけている）、BはXの承諾なくして、Aとの合意により、Aが有していたXとの間の賃貸借契約関係上の賃貸人の地位を承継することはできない。", answer: "誤り", explanation: "民法第605条の3は、所有権の移転に伴い譲渡人と譲受人との合意により賃貸人の地位を移転する規定である。賃借人の承諾がなくとも契約上の地位の移転を認めるものであり、「契約の当事者の一方が第三者との間で契約上の地位を譲渡する旨の合意をした場合において、その契約の相手方がその譲渡を承諾したときは、契約上の地位は、その第三者に移転する」（民法第539条の2）という条文の特則となる。また、民法第605条の3を適用する場合には、賃借人が賃借権の対応要件を具備しているか否かを問わない。" },
  { subject: "102. 不動産証券化の概要", no: "3-1", question: "Aは、Aが所有する不動産を、Aのために当該不動産の管理処分をすることを目的としてBに信託した。この場合、不動産の所有権はAからBに移転しないが、不動産を管理処分する権限がAからBに移転する。", answer: "誤り", explanation: "信託の場合には、所有権がAからBに移転する。テキストには「形式的な所有権」と記載しているが、信託としての所有権の移転という程度の意味である。これに対し、信託ではなく、不動産の管理処分の委託という意味でPMとの間で締結する不動産管理委託契約では、所有権の移転はない。" },
  { subject: "102. 不動産証券化の概要", no: "3-2", question: "上記1.でAからBへ不動産の信託をすると、Aは信託法上定義される受益権を取得するが、信託法上、受益権の定義には信託不動産の管理及び処分に関する指図権が含まれている。", answer: "誤り", explanation: "指図権は信託法上、明確に規定されていない。信託法上の受益権の定義は、「受益債権及びこれを確保するためにこの法律の規定に基づいて受託者その他の者に対し一定の行為を求めることができる権利をいう」（第2条第7項）。指図権も一定の行為を求めることができる権利ではあるが、上記の定義は、「この法律の規定に基づいて受託者その他の者に対し」というものである。例えば、信託の本旨に反してなされた信託財産処分行為の取消権（信託法第27条）が該当する。指図権というのは契約上の権利である。" },
  { subject: "102. 不動産証券化の概要", no: "3-3", question: "上記1.でAは受益権をCに譲渡した。不動産証券化で使われる信託契約の場合には、Aが受益権をCに譲渡したことにより、金商法上はAが有価証券をCに発行したとみなされる。", answer: "正しい", explanation: "対象不動産の所有者（オリジネーター）が当初委託者兼当初受益者として受益権を譲渡することが金商法上では新規有価証券の発行に該当することになる。定義府令第14条に発行者と発行時期に関するみなし規定があり、証券化における不動産信託契約の類型では（委託者又は委託者から指図の権限の委託を受けた者のみの指図により信託財産の管理又は処分が行われる場合を除く）、当初委託者兼当初受益者が受益権というみなし有価証券の発行者とみなされ、また当該受益権を譲渡する時に発行されたとみなされる。" },
  { subject: "102. 不動産証券化の概要", no: "3-4", question: "上記3.で受益権を譲り受けたCが信託受託者Bに金融機関からの借入れを指図し、信託受託者Bが金融機関から信託不動産を担保に借入れをしてその融資金をCに交付した場合、その後Cについて会社更生手続きが開始されると、Cが当該信託不動産の実質的所有者とみなされて上記金融機関がBに対して有する担保権を実行できなくなるリスクがある。", answer: "誤り", explanation: "信託受託者が、自ら借入れ債務の主体（資金調達の主体）となる方法という観点では、設例の場合も信託内借入れに該当するわけであるが、証券化手法の観点における信託内借入れという場合には、オリジネーターが証券化で資金調達を企図する場合に、資金調達の主体としてSPCを使わず、オリジネーターが信託を設定し受益権を保持しつつ、信託受託者が信託不動産を担保に資金調達をして、その資金を当初の委託者兼受益者たるオリジネーターに信託財産として交付するような場合を言う。この場合には、オリジネーター（信託受託者ではなく）の倒産リスクが課題となる。これに対して設例の場合には、純粋に信託財産責任負担債務の問題で、受益者は債務を負わず、受益者が倒産しても受託者が責任を負うことになり、受益者の倒産リスクは問題にならない。" },
  { subject: "102. 不動産証券化の概要", no: "4-イ", question: "特定目的会社における特定資産である不動産の処分（売却、担保設定等）は、その最高意思決定機関である特定社員総会の決議事項として法定されているが、定款で取締役会又は取締役の決定事項とすることができる。投資法人では、不動産の処分（売却、担保設定等）の投資判断は資産運用会社が行うことになっているが、投資法人における機関の意思決定としては、法律上、常に役員会の承認決議が必要とされている。", answer: "誤り", explanation: "特定目的会社における特定資産の処分は、特定目的会社の社員総会で決議する事項ではない。テキストには、普通決議事項の対象は列挙していないので、普通決議事項かもしれないと思ったかもしれないが、普通決議事項ではない。仮に総会の決議事項だとしても、法の規定により社員総会の決議を必要とする事項について、取締役等その他の機関が決定できるように定款を定めることは無効である。投資法人では、不動産の処分が、常に役員会の承認事項となるわけではない。利害関係人等との取引は役員会の承認事項である。" },
  { subject: "102. 不動産証券化の概要", no: "4-ロ", question: "特定目的会社では、優先出資証券の私募や私募の取扱いは、必ずしも金融商品取引業者が行う必要はないが、投資法人では、設立後の投資主の募集は一般事務受託者としての第一種金融商品取引業者が行う必要がある。", answer: "正しい", explanation: "特定目的会社の発行する資産対応証券である優先出資証券については、特定譲渡人が募集等の取扱いを受託する場合以外では、特定目的会社の取締役又は使用人自らが募集等を行うことができるようになった。投資法人の募集投資口の募集等については、第一項有価証券なので第一種金融商品取引業者の取扱い有価証券となるが、募集投資口の募集は一般事務受託者（投信法第2条第23項）に委託しなければならない。" },
  { subject: "102. 不動産証券化の概要", no: "4-ハ", question: "特定目的会社では特定資産管理処分受託者やその役員は当該特定目的会社の取締役に就任することを禁止されているが、投資法人では資産運用会社の取締役が当該投資法人の執行役員に就任することは禁止されていない。", answer: "正しい", explanation: "特定目的会社では、特定譲渡人、特定資産管理処分受託者、特定資産が受益権である場合の信託受託者（信託銀行）及びそれぞれの役員は、取締役、監査役になれない。投資法人の執行役員については、資産運用会社の役員が就任できないという制限はない。" },
  { subject: "102. 不動産証券化の概要", no: "4-ニ", question: "特定目的会社が不動産を特定資産として取得するときには、常に、特定目的会社として当該不動産を取得する前に不動産鑑定書を取得する義務がある。投資法人が不動産を特定資産として取得するときには、資産運用会社は、常に、投資法人が取得する前に不動産鑑定書を取得する義務がある。", answer: "誤り", explanation: "投資法人について、資産運用会社は、投資法人が特定資産のうち不動産や不動産信託受益権を取得または譲渡した場合には、資産運用会社の利害関係人等でない不動産鑑定士による鑑定評価を取得させる義務（投信法第201条第1項）があるが、事前ではないので、この点が誤っている。特定目的会社については、優先出資の募集に際しては、引受けの申込みをしようとする者に一定の事項を通知する義務がある（資産流動化法第40条第1項）。" },
  { subject: "102. 不動産証券化の概要", no: "5-1", question: "投資法人を組成する場合には、設立企画人が設立時に発行される投資証券の全部を引受け、規約を作成し公証人の認証を経て、金商法上の届出を行うことによって法人として設立されたことになり、資産の運用を開始する場合には、投資法人として金商法が規定する登録が必要となる。", answer: "誤り", explanation: "ほぼすべて誤りの文章である。まず投資法人には規約はあるが、それについては公証人の認証を得る必要はない。また、投資法人の設立は法人登記であり、金商法上の設立の届出は必要であるが、それが法人としての設立になるわけではない。また、資産の運用会社に登録は必要であるが、それは金商法上の登録ではなく、投資信託及び投資法人に関する法律の規定である。" },
  { subject: "102. 不動産証券化の概要", no: "5-2", question: "投資法人の法制度の特色は、投資法人の代表者としての執行役員が、役員会の承認を得て、資産の運用、保管、一般事務とされる法定の事項を第三者に委託することによって投資法人を運営するという点であり、執行役員が資産の運用や保管、一般事務を自ら判断して行うという体制になっていない。そのこともあって、投資法人としては、使用人を雇用することが禁止されている。なお、資産の運用の委託に関しては、その委託契約を投資法人が解約するときに限り投資主総会の承認決議が必要である。", answer: "誤り", explanation: "最後のお書きの文章が間違っている。資産の運用に係る委託契約については、解約だけではなく、締結についても投資主総会の承認決議が必要である。" },
  { subject: "102. 不動産証券化の概要", no: "5-3", question: "投資法人は特定資産の運用主体ではあるが、運用に係る投資判断を投資法人の役員会が行っているわけではない。ただし、投資法人の役員会は、資産運用会社が投資法人をして資産運用会社の親会社から一定の規模以上の不動産を取得するという運用行為を行う場合には、その取得前に役員会として承認するか否かの決議を行う必要がある。", answer: "正しい", explanation: "2013年の改正（2014年施行）では、投信法201条の2が新設され、第1項で、資産運用会社は、投資法人が資産運用会社の利害関係人等との間で「有価証券の取得又は譲渡」、「不動産の取得又は譲渡」又は「不動産の貸借」に該当する取引（投資法人の資産に及ぼす影響が軽微なものとして内閣府令で定めるものを除く）が行われることとなる場合には、あらかじめ、投資法人の同意を得なければならないとされた。投資法人の同意を執行役員が与えるためには役員会の承認を受ける必要がある（同条第2項）。" },
  { subject: "102. 不動産証券化の概要", no: "5-4", question: "投資法人が行うことのできる資産の運用について、投資法人が更地を購入し、新たな建物を建築する発注を行うことはリスクが高いので禁止されている。", answer: "誤り", explanation: "投資法人が行うことができる「不動産の取得」（投信法193条第1項第3号）には、投資法人が自ら宅地の造成または建物の建築を行うことは含まない一方、投資法人が宅地の造成または建物の建築に係る請負契約の注文者になることを含むと一般的に解されている。" },
  { subject: "102. 不動産証券化の概要", no: "6-1", question: "不動産の証券化の仕組みで、エクイティ性の資金調達をする目的で組合が利用されることがある。例えば、不動産を取得し管理運用のうえ売却して利益を得ようとする不動産会社が、エクイティ性の資金を調達する手法として、任意組合を組成し、任意組合員となる投資家から金銭の出資を受ける場合には、原則として、不特法の適用を受ける。", answer: "正しい", explanation: "賃貸や売買という不動産取引を行う不動産会社が任意組合契約に基づく金銭の出資により資金を調達する場合には不動産特定共同事業法の適用が原則としてある。" },
  { subject: "102. 不動産証券化の概要", no: "6-2", question: "上記1.でいう原則の例外として、不特法の適用を受けない場合がある。それは、上記1.でいう不動産会社が、他の組合員から業務の執行の委任を受けない場合、つまり、組合員となる者全員が自ら業務を決定し執行する場合には、組合の事業として不動産取引を行う場合でも、不特法の適用はない。ただし、この場合には、任意組合員全員が不動産取引を行うことになり、売買を業として行う場合には、組合員全員が宅建業法上の免許（以下の各問において、当該免許を受けて宅地建物取引業を営む者を「宅建業者」という）を取得する必要がある。", answer: "正しい", explanation: "不特法第2条第3項第1号は任意組合型の不動産特定共同事業契約を、「各当事者が、出資を行い、その出資による共同の事業として、そのうちの1人又は数人の者にその業務の執行を委任して不動産取引を営み、当該不動産取引から生ずる収益の分配を行うことを約する契約」と規定し、「1人又は数人の者にその業務の執行を委任して」という要件がある。不特法第2条第4項は不動産特定共同事業を定義するが、その1号では、不動産特定共同事業を、「不動産特定共同事業契約を締結して当該不動産特定共同事業契約に基づき営まれる不動産取引から生ずる収益又は利益の分配を行う行為」を業として行うものをいうとするが、その中で、不特法第2条第3項第1号に掲げる不動産特定共同事業契約にあっては、業務の執行の委任を受けた者又はこれに相当する者の行うものに限ると規定して、業務の執行の委任を受けていない場合には不動産特定共同事業から除外されることを明記している。" },
  { subject: "102. 不動産証券化の概要", no: "6-3", question: "不動産を取得し管理運用のうえ売却して利益を得ようとする不動産会社が、エクイティ性の資金を調達する手法として、匿名組合契約を利用する場合もある。この場合には、不動産会社が匿名組合契約上の営業者となり、資金を出資する投資家が匿名組合員となる。匿名組合を使う場合には、匿名組合員は営業者の行う事業に関して、出資の限度で責任を負うと解されており、任意組合の組合員が任意組合の事業から生ずる債務について無限責任を負う場合と違いがある。", answer: "正しい", explanation: "不特法第2条第3項第2号は、匿名組合契約型を定める。「当事者の一方が相手方の行う不動産取引のため出資を行い、相手方がその出資された財産により不動産取引を営み、当該不動産取引から生じる収益の分配を行うことを約する契約」と規定する。" },
  { subject: "102. 不動産証券化の概要", no: "6-4", question: "不動産を取得し管理運用のうえ売却して利益を得ようとする不動産会社が、エクイティ性の資金を調達する手法として、投資事業有限責任組合を組成することもできる。この場合には、不動産会社が無限責任社員となり、投資家を有限責任社員とすると、投資事業有限責任組合の事業から生ずる債務に対する投資家の責任を有限化できるメリットがあると言われている。", answer: "誤り", explanation: "投資事業有限責任組合法で許容される投資事業の中には、現物不動産の取得および保有はないので、有責組合で現物不動産を取得、保有、売買等をすることはできない（政令で認められる担保不動産の取得等を除く）。" },
  { subject: "102. 不動産証券化の概要", no: "8-イ", question: "不動産の管理及び処分を行う信託契約は、金商法制定以前から、いわゆるGK-TK方式の仕組みのうえで利用されてきたが、当該信託契約上、受益者の有する権利である不動産信託受益権は、金商法制定によりはじめて有価証券とみなされるようになった。そして、そのような信託契約上の不動産信託受益権については、信託受託者が当該受益権の発行者とみなされるようになった。", answer: "誤り", explanation: "定義府令第14条に信託受益権の発行者と発行時期に関するみなし規定があり、証券化で使われる類型の信託契約では、当初委託者兼当初受益者が受益権というみなし有価証券の発行者とみなされる。" },
  { subject: "102. 不動産証券化の概要", no: "8-ロ", question: "不動産信託受益権の取得、運用、売却行為を出資対象事業とするGK-TK方式の仕組みで、匿名組合員の勧誘を行う場合、匿名組合出資持分（当該匿名組合契約上、組合員が有する権利）を50人を超える多数の投資家が取得することとなる場合には、金商法上の公募（法律上は募集）が行われることになる。", answer: "誤り", explanation: "流動性が低いとされる第二項有価証券（すなわち第2項各号規定のみなし有価証券）には原則として金融商品取引法第二章の「企業内容等の開示規定」の適用はないが（金商法第3条でその旨明記されている）、例外的に「有価証券投資事業権利等」といって、匿名組合の営業者の行う「出資対象事業」として、その出資総額の50%を超える額を有価証券に対する投資とする事業のような場合の匿名組合は、金商法第二章の開示規定の適用を受ける。開示規定の適用を受ける有価証券の募集については、第二項有価証券において公募を意味する「募集」とは、匿名組合出資持分の場合には500名以上の者が匿名組合員となるような場合をいう（金商法第1条の7の2）。" },
  { subject: "102. 不動産証券化の概要", no: "8-ハ", question: "宅建業者が当初委託者としてその所有する不動産上に自己信託を設定し、当該信託上の信託受益権を金商法上の特定投資家ではない者に販売する場合、当該宅建業者は、宅地建物取引士をして、販売の相手方に対して宅建業法上の重要事項の説明をさせる義務を負う。", answer: "正しい", explanation: "宅建業法上の重要事項の説明義務は現物不動産取引のみを念頭においていたが、金商法施行に伴い改正され、宅建業法第35条第3項は、「宅地建物取引業者は、宅地又は建物に係る信託（当該宅地建物取引業者を委託者とするものに限る）の受益権の売主となる場合における売買の相手方に対し、その者が取得しようとしている信託の受益権に係る信託財産である宅地又は建物に関し、その売買の契約が成立するまでの間に、宅地建物取引士をして、少なくとも次に掲げる事項について、これらの事項を記載した書面（第5号において図面を必要とするときは、図面）を交付して説明をさせなければならない。」としている。" },
  { subject: "102. 不動産証券化の概要", no: "8-ニ", question: "不動産信託受益権を保有する合同会社との間で不動産信託受益権に関する投資一任契約を締結しているアセットマネジメント会社が、信託契約の対象となる信託不動産の大規模修繕に伴い追加の金銭信託をするべきか否かについて判断をすることは、有価証券の投資判断として運用行為に該当する可能性がある。", answer: "正しい", explanation: "信託不動産の大規模修繕に伴う受託者による金銭の拠出（金銭の信託）は信託受益権という有価証券の価値に大きな影響を与える判断と考えられるため、投資運用業の業務に該当する可能性がある。" },
  { subject: "102. 不動産証券化の概要", no: "9-1", question: "不動産から生じる賃貸収益を投資家に分配する方法としては、投資家に不動産を売却するだけの単純な不動産取引から、不特法上のスキームを利用する方法のほかに、不動産を信託受益権化して金商法上のルールで不動産信託受益権を販売する方法もあり、関係する法制度上、投資家保護のルールには多様なものがあるが、宅建業法、不特法、金商法、金融サービス法に共通して規定されている投資家保護のルールは、事業者による事前の説明義務ということである。", answer: "正しい", explanation: "金商法第37条の3第1項本文柱書は、「金融商品取引業者等は、金融商品取引契約を締結しようとするときは、内閣府令で定めるところにより、あらかじめ、顧客に対し、次に掲げる事項を記載した書面を交付しなければならない。」と規定する。それぞれ法律で同様の事前の説明義務がある。" },
  { subject: "102. 不動産証券化の概要", no: "9-2", question: "不動産運用からの収益を資本市場の投資家に分配する制度としての上場リート（主として不動産を特定資産として運用する投資法人で、その発行する投資口が上場されているもの）においては、金商法上のインサイダー規制が適用される。", answer: "正しい", explanation: "2014年4月からは、金商法上のインサイダー規制の対象となる「上場会社等」に上場投資法人が含まれるようになり、「特定有価証券等」に上場リートの投資口等が含まれるようになった。" },
  { subject: "102. 不動産証券化の概要", no: "9-3", question: "GK-TK方式において匿名組合員から金銭の出資を受けて不動産信託受益権を取得して運用する場合の匿名組合契約上の営業者は、SPCであっても、金商法上の自己運用行為を行う者となり、その行為を業として行う場合には、原則として、投資運用業の登録が必要となる。", answer: "正しい", explanation: "匿名組合出資などを受けて不動産信託受益権を保有するSPC（SPC以外の事業会社でも同様である）は、自らが有価証券の投資事業を行う主体となり、業として行う場合には、原則的に投資運用業（その中でも自己運用業と言われる）の登録が必要とされることとなった。" },
  { subject: "102. 不動産証券化の概要", no: "9-4", question: "特定目的会社が優先出資社員からの金銭の出資を受けて不動産信託受益権を取得して運用する場合、特定目的会社は、金商法上の自己運用行為を行う者として、業として行う場合には投資運用業の登録が必要となるが、特定資産管理処分受託者に管理及び処分を委託すれば、登録をする必要はない。", answer: "誤り", explanation: "特定目的会社とGK-TK方式におけるGKとを比較した場合の違いの一つとして、両法人が不動産信託受益権投資をした場合、特定目的会社の自己運用行為にならないのに、GKの場合にはなるという点がある。自己運用業を構成する自己運用行為とは、金融商品の価値等の分析に基づく投資判断に基づいて主として有価証券又はデリバティブ取引に係わる権利に対する投資として、集団スキーム持分等を有する者から出資又は拠出を受けた金銭その他の財産の運用を行うこと（第2条第8項第12号に掲げる行為に該当するものを除く）をいう。つまり、特定目的会社の場合には、出資を受けているのは、集団スキーム持分等を有する者からではないので、自己運用行為にはならない。" },
  { subject: "102. 不動産証券化の概要", no: "10-イ", question: "特定目的会社が特定資産として不動産信託受益権を取得する場合には、資産の流動化に関する法律が規定する特定資産管理処分受託者の選任は不要である。", answer: "正しい", explanation: "特定資産が不動産信託受益権である場合、信託受託者が既に存在するので、資産流動化法上は、別途特定資産管理処分受託者を置く必要はない。" },
  { subject: "102. 不動産証券化の概要", no: "10-ロ", question: "特定目的会社が特定資産として不動産信託受益権を取得する場合には、特定目的会社がアセットマネジメント会社と金商法上の投資一任契約を締結することも投資助言契約を締結することもできる。", answer: "正しい", explanation: "この場合、任意に、アセットマネジメント会社と金商法上の投資一任契約や投資助言契約を締結できる。" },
  { subject: "102. 不動産証券化の概要", no: "10-ハ", question: "上記ロ.において、投資助言契約を特定目的会社と締結するアセットマネジメント会社は、投資助言契約を締結する前に、特定目的会社に対して金商法上のオプトインの手続きを行えば、金商法上の契約締結前交付書面を特定目的会社に交付する必要はない。", answer: "誤り", explanation: "特定目的会社ははじめから特定投資家である。特定投資家のうち一定の投資家の場合には、オプトアウト告知をしなければならない。" },
  { subject: "102. 不動産証券化の概要", no: "10-ニ", question: "GK-TK方式で不動産信託受益権に投資をする仕組みにおいて、営業者たる合同会社がアセットマネジメント会社と締結する契約を金商法上の投資助言契約とする場合には、匿名組合員が実質的に投資判断を行っていることにならないか、それが匿名組合契約の性質に反するのではないかという議論があり得るが、不動産信託受益権に投資をする特定目的会社がアセットマネジメント会社と投資助言契約を締結する場合には、優先出資社員が投資判断を行うたてつけ（例えば、定款で一定の重要な投資判断事項について優先出資社員総会での決議を必要とする措置をとる）にすることには問題がない。", answer: "正しい", explanation: "GK-TK方式では、エクイティ投資家たる匿名組合員に投資判断の意思決定を行わせることは匿名組合としての観点から慎重な解釈がなされているが、明確な公権的解釈があるわけではない。特定目的会社の場合には、定款で優先出資社員に追加的な議決権を付与することができ、そのような議決権の付与が優先出資社員の有限責任性に否定的な影響を与えることもないので、スキーム上の安定性があるといわれる。" },
  { subject: "102. 不動産証券化の概要", no: "11-イ", question: "証券会社Aの従業員であるXは、上場リートの投資口を個人に勧誘する際に、1年後には投資口の価格が1.5倍に上昇することは確実である旨を告げて投資口を販売した（当該個人の投資口の取得は、出資の引受けが消費者契約としてなされた場合として消費者契約法の適用があるとする）。ところが、1年後には投資口価格が半値になった。この事例において、当該個人は、投資口取得から6年後に、消費者契約法に基づき投資口の引受けに関する契約を取り消すことができる。", answer: "誤り", explanation: "消費者契約法は、消費者契約法の締結に際し、事業者が断定的判断の提供をし、消費者が誤認、それによって意思表示をした場合に契約を取り消すことを認めている（消費者契約法第4条第1項）。本問は断定的判断の提供と言えるであろう。この契約の取消しについては、追認をすることができる時から1年間行使しないとき、あるいは当該消費者契約の締結の時から5年を経過したとき時効によって消滅するので、6年後に消費者契約法に基づき取消しすることはできない。" },
  { subject: "102. 不動産証券化の概要", no: "11-ロ", question: "上記イ.の事例において、当該個人は、投資口取得から2年後に、金融サービス法に基づき、同法で規定された不法行為の特則を利用して、証券会社Aに損害賠償請求をすることができる（損害賠償請求権が時効により消滅していないことを前提とする）。", answer: "正しい", explanation: "金商法上の有価証券の販売は、有価証券を取得させる行為に該当するので、金融サービス法上の金融商品の販売等に該当する。同法第5条は、顧客に対し、当該金融商品の販売に係る事項について、不確実な事項の断定的判断の提供、又は確実であると誤認させるおそれのあることを告げる行為（以下「断定的判断の提供等」という）を行ってはならないとし、当該法条の規定に違反して断定的判断の提供等を行ったことにより、これによって生じた当該顧客の損害を賠償する責任に任ずるとしている。金融サービス法第6条の損害賠償請求権は民法の不法行為の特則である。" },
  { subject: "102. 不動産証券化の概要", no: "11-ハ", question: "宅建業者が所有する不動産を信託受益権にして事業として個人に販売する場合、当該宅建業者が契約適合責任を負うと判断した場合にのみ契約適合責任を負う旨の信託受益権売買契約は、消費者契約法上取消し可能な契約となる。", answer: "誤り", explanation: "宅建業者が法人でも個人でも、事業として個人に不動産信託受益権を販売する契約には消費者契約法の適用がある。消費者契約法上、事業者の債務不履行により消費者に生じた損害を賠償する責任の全部を免除し、又は当該事業者にその責任の有無を決定する権限を付与する条項は、事業者の責任の全部を免除する条項に該当する権限を事業者のみに付与する規定は無効となる。消費者契約法上、取消しできる場合ではない。" },
  { subject: "102. 不動産証券化の概要", no: "11-ニ", question: "不動産特定共同事業者が対象となる不動産の共有持分を事業参加者となる者に販売し、事業参加者から当該不動産共有持分の出資を受け、不動産の賃貸及び売却から生じた利益を事業参加者に金銭として分配するという任意組合契約型の商品の販売には、金融サービス法の適用はない。", answer: "正しい", explanation: "金融サービス法では不動産特定共同事業契約の締結も金融商品の販売と定義されているが（金融サービス法第3条第1項第7号）、対象となる契約は、金銭をもって出資の目的とし、かつ、契約の終了の場合における残余財産の分配若しくは出資の返還が金銭により行われることを内容とするもの又はこれらに類する事項として政令で定めるものを内容とするものに限る、とされているので、現物を出資したり、現物で出資の返還をするような組合型の不動産特定共同事業契約には適用がない。" },
  { subject: "102. 不動産証券化の概要", no: "12-イ", question: "不特法上の特例事業者が対象不動産を取得し建物の修繕工事をして売却する内容の商品は、特例投資家以外の投資家に販売することができない場合があるが、そのような内容の商品でも、不特法上の第四号事業者が投資家との間で金商法上のオプトインの手続きをして、投資家に金商法上の特定投資家になってもらえば、当該投資家に販売することができる。", answer: "正しい", explanation: "特例事業の場合には、「宅地の造成又は建物の建築に関する工事その他主務省令で定める工事であってその費用の額が事業参加者の保護に欠けるおそれのないものとして主務省令で定める金額を超えるものを行う場合にあっては、特例投資家に限定して契約を締結すること」という要件がある。宅地の造成、建物の建築以外に建物の修繕又は模様替に関する工事が対象となり、これらを行う特例事業の場合、第三号事業者に委託する特例事業の場合には、対象不動産の価格（鑑定評価額、公示価格、路線価、販売公表価格その他これらに準じて公正と認められる価格をいう）の1割に相当する額を超えないものにのみ参加できるとされている。金商法上の特定投資家は不特法上の特例投資家であり、オプトインした場合は含まれる。" },
  { subject: "102. 不動産証券化の概要", no: "12-ロ", question: "不動産信託受益権を投資対象とするGK-TK方式で営業者となる合同会社が匿名組合員の投資家勧誘を第二種金融商品取引業者に委託する場合、当該第二種金融商品取引業者は、金商法及び金融サービス法上、投資家の知識、経験、財産の状況及び当該金融商品の販売に係る契約を締結する目的に照らして適切な説明を行う義務を負うが、相手方が金商法上の特定投資家である場合には、この義務は適用されない。", answer: "正しい", explanation: "金融サービス法上は、法第4条第2項は、重要事項の説明は、「顧客の知識、経験、財産の状況及び当該金融商品の販売に係る契約を締結する目的に照らして、当該顧客に理解されるために必要な方法及び程度によるものでなければならない。」とし、販売業者の説明義務の中に適合性原則を反映させ、投資家に適合する説明義務を課している。この説明義務は顧客が特定顧客の場合には不要である。金商法上も、適合性の原則を反映させた説明義務が課されており、金融商品取引業者等は契約締結前交付書面の交付に関し、あらかじめ、顧客に対して、顧客の知識、経験、財産の状況及び金融商品取引契約を締結する目的に照らして当該顧客に理解されるために必要な方法及び程度による説明をすることなく、金融商品取引契約を締結する行為をしてはならないとされている。特定投資家の場合には適用されない。" },
  { subject: "102. 不動産証券化の概要", no: "12-ハ", question: "不特法上の不動産特定共同事業者は、匿名組合契約型の不動産特定共同事業契約を相手方と締結するときに相手方が特例投資家以外の事業参加者の場合には、許可又は認可に係る不動産特定共同事業契約約款に基づいて不動産特定共同事業契約を締結しなければならないが、特例投資家の場合には、それだけでこの義務がなくなる。", answer: "誤り", explanation: "「不動産特定共同事業者は、不動産特定共同事業契約の締結をするときは、第3条第1項の許可又は第9条第1項の認可に係る不動産特定共同事業契約約款に基づいて、これをしなければならない。」（不特法第23条第1項）とされているが、特例投資家のみを相手方として不動産特定共同事業契約の締結をする場合であって、当該不動産特定共同事業契約により当該不動産特定共同事業契約の権利義務を他の特例投資家に譲渡する場合以外の譲渡が禁止される旨の制限が付されているときは、この義務は適用されないとされた（同法第68条第3項）。" },
  { subject: "102. 不動産証券化の概要", no: "12-ニ", question: "不特法上の不動産特定共同事業者は、有価証券に該当しない不特法上の不動産特定共同事業商品を特例投資家に販売する場合、当該投資家に対して投資勧誘をすること自体が適切であるかどうかを判断しなければならない法律上の義務を負う。", answer: "誤り", explanation: "金商法第40条は、いわゆる適合性の原則を規定し、同条第1号は、「金融商品取引行為について、顧客の知識、経験、財産の状況及び金融商品取引契約を締結する目的に照らして不適当と認められる勧誘を行って投資者の保護に欠けることとなっており、又は欠けることとなるおそれがあること」にならないように、その業務を行わなければならないとしている。当該顧客に投資勧誘をすることの適切性を判断しなければならない法律上の義務である。この適合性の原則は、金商法の場合には特定投資家、不特法の場合には特例投資家には適用がない。" },
  { subject: "102. 不動産証券化の概要", no: "13-イ", question: "不動産証券化商品について、金商法は商品のリスクではなく内容についての説明義務を課すものであり、金融サービス法は商品のもつリスクの説明義務を課すというように、両法は説明の対象について明確な役割分担をしている。", answer: "誤り", explanation: "両法で説明義務の対象は異なるものの、重なり合う部分もあり、明確な役割分担をしているわけではない。金商法については、説明義務を規定すると言ってよい締結前交付書面で記載すべき事項には、リスクもある。第37条の3第1項第5号では「顧客が行う金融商品取引行為について、金利、通貨の価格、金融商品市場における相場その他の指標に係る変動により損失が生ずることとなるおそれがあるときは、その旨」と規定している。" },
  { subject: "102. 不動産証券化の概要", no: "13-ロ", question: "不動産証券化商品について、不特法上の説明義務と金商法上の説明義務の両方の適用がある商品については、勧誘をする事業者は、いずれか一方の法律上の説明義務を履行すれば足りる。", answer: "誤り", explanation: "不特法上の契約成立前交付書面での記載事項と金商法上の締結前交付書面での記載事項は重なるところも異なることもある。「一つの販売行為に複数の金融商品販売業者が関与する場合、いずれか一の金融商品販売業者等が当該重要事項について説明をしたときは、他の金融商品販売業者等は、当該重要事項について説明をすることを要しない。」という規定があるが、本肢のような規定はない。" },
  { subject: "102. 不動産証券化の概要", no: "13-ハ", question: "不動産証券化商品について、金商法上の説明義務や不特法上の説明義務は行政法規上の説明義務であり、行政法規上のいずれかの義務に違反するからといって、直ちに民法上の不法行為を構成する説明義務違反になるわけではない。逆に、金商法上の説明義務や不特法上の説明義務は一定の事項に関して説明義務を課すものに過ぎないので、それらの事項を網羅しているからと言って、民法上の不法行為を構成する説明義務違反にならないというわけではない。", answer: "正しい", explanation: "Web講義103第Ⅰ部9章で解説している。" },
  { subject: "102. 不動産証券化の概要", no: "13-ニ", question: "不動産証券化商品についての説明義務を課す法律として、宅建業法、金商法、不特法はそれぞれ書面による説明義務を課しているが、金融サービス法上の重要事項の説明義務は、書面によることまでは要求されていない。", answer: "正しい", explanation: "103/上テキストP.215参照" },
  { subject: "102. 不動産証券化の概要", no: "14-1", question: "資産の流動化に関する法律に基づいて設立された特定目的会社が発行する資産対応証券（優先出資、特定社債、特定約束手形）の募集等を取り扱う業務は基本的に第一種金融商品取引業となるが、資産対応証券の募集等の取扱いを、特定資産の譲渡人が特定目的会社から受託するときは、金融商品取引業には当たらないものとされ、事前に金融庁長官に届出て行うことができる。", answer: "正しい", explanation: "資産流動化法第208条。" },
  { subject: "102. 不動産証券化の概要", no: "14-2", question: "金商法に定める金融商品取引業のうち、第二種金融商品取引業のみを行う者又は投資運用業のみを行う者は、いずれも金商法の兼業規制の対象にならない。", answer: "誤り", explanation: "投資運用業を行う者は、兼業規制の適用を受ける。なお、第二種金商業のみを行う者には、この規制の適用を受けないという点は正しい。（金商法第35条、同第35条の2）" },
  { subject: "102. 不動産証券化の概要", no: "14-3", question: "集団投資スキーム持分の自己募集を行うためには、原則として第二種金融商品取引業の登録を要するが、かかる業務のうち、相手に適格機関投資家を含むなどのいわゆる適格機関投資家等特例業務の条件を満たすものは、登録ではなく届出を以て行うことができる。", answer: "正しい", explanation: "金商法第63条・第63条の3第1項・金商令第17条の12。" },
  { subject: "102. 不動産証券化の概要", no: "14-4", question: "投資助言・代理業のみを行う者には、最低資本金規制及び最低純財産額規制がかからない。", answer: "正しい", explanation: "103/上テキストP.239参照" },
  { subject: "102. 不動産証券化の概要", no: "15-イ", question: "元本保証商品は、出資の受入れ、預り金及び金利等の取締りに関する法律又は利息制限法の適用を受けることはない。", answer: "誤り", explanation: "元本保証商品は出資の受入れ、預り金及び金利等の取締りに関する法律及び利息制限法の適用を受ける。" },
  { subject: "102. 不動産証券化の概要", no: "15-ロ", question: "金商法に規定する有価証券を販売するには原則として金融商品取引業の登録を要し、さらに販売にあたる役職員は、みなし有価証券のみを扱う場合等を除き、外務員の登録を要する。", answer: "正しい", explanation: "103/上テキストP.236参照" },
  { subject: "102. 不動産証券化の概要", no: "15-ハ", question: "法令が定める自主規制団体の規則（自主規制規則）は、法令ではなく、会員でない業者を直接縛らないため、自主規制団体の会員でない業者が第一種金融商品取引業等の登録を行うに際して、関連する自主規制団体の自主規制規則に準ずる内容の社内規則を作成していないとしても登録拒否要件には当たらない。", answer: "誤り", explanation: "自主規制規則は法令ではなく、会員でない業者を拘束しないが、第一種金融商品取引業、第二種金融商品取引業及び投資運用業を行う際の登録拒否要件として、その業務を行う主要な協会会員又は会員となろうとする協会（認定金融商品取引業協会、認定金融商品取引協会に加入していない者で、当該協会の定款諸規則に準ずる内容の社内規則を作成していない・当該社内規則を遵守するための体制を整備していないものが存在する（金商法第29条の4第1項第4号ニ）。" },
  { subject: "102. 不動産証券化の概要", no: "15-ニ", question: "個人（事業として又は事業のために契約当事者となる場合を除く）との契約は、消費者契約法の適用を受ける。", answer: "正しい", explanation: "103/上テキストP.234参照" },
  { subject: "102. 不動産証券化の概要", no: "16-イ", question: "一項有価証券の少人数私募に該当するためには、有価証券の取得申し込みの勧誘対象が50名以上となっても、その実際の取得者は50名未満とならなければならない。", answer: "誤り", explanation: "一項有価証券の少人数私募とは、適格機関投資家私募にも特定投資家私募にもならず、「勧誘対象」が50名未満で多数の者に所有される恐れが少ない場合をいう（金商法第2条第3項第2号ハ、金商令第1条の7の1号）。勧誘先が50名以上なら、最終的な取得者が50名未満でも少人数私募にはならない。" },
  { subject: "102. 不動産証券化の概要", no: "16-ロ", question: "一項有価証券について発行額が1億円未満の公募を行う場合でも有価証券届出書の提出が必要となる。", answer: "誤り", explanation: "発行額が1億円以上の公募を行う場合、有価証券届出書の提出が必要となる（金商法第4条第1項、第5条）。一方、発行額が1,000万円超1億円未満の公募を行う場合、有価証券届出書に代わり有価証券通知書の提出が必要であり、発行額1,000万円以下の場合はいずれも不要である。" },
  { subject: "102. 不動産証券化の概要", no: "16-ハ", question: "二項有価証券の募集とは、有価証券の新規発行において取得申し込みの勧誘対象が500名以上となる場合をいい、実際の取得者が500名以上かどうかは問われない。", answer: "誤り", explanation: "二項有価証券の募集の定義は、新たに発行される有価証券の取得の申込の勧誘のうち、その勧誘に応じることで「相当程度多数の者が当該取得勧誘に係る有価証券を所有することとなる場合」（金商法第2条第3項本文・第3号）をいい、勧誘先ではなく所有者の数が基準となる。そして「相当程度多数の者」とは、500名以上のことをいう（金商令第1条の7の2）。" },
  { subject: "102. 不動産証券化の概要", no: "16-ニ", question: "金融商品取引業者が二項有価証券の募集に携わり、500名以上が契約を締結することとなるとき、金融商品取引業者は当該契約に係る契約締結前交付書面（取引の内容等、所定の事項を記した書面）を届け出る必要がある。", answer: "正しい", explanation: "金商法第37条の3第3項、金商令第16条の2。" },
  { subject: "102. 不動産証券化の概要", no: "18-イ", question: "金融サービス法のほか、宅建業法や信託業法も投資家に対する説明義務を定めているが、努力義務を定めたものにすぎず、これらに反しても行政処分を受ける恐れはない。", answer: "誤り", explanation: "各種業法で定められている説明義務に反すれば、行政処分を受ける恐れがある。" },
  { subject: "102. 不動産証券化の概要", no: "18-ロ", question: "金商法は金融商品取引業者に対し、契約締結前交付書面のうち所定の部分につき、必要な方法及び程度による説明をせずに金融商品取引契約を締結することを禁じている。", answer: "正しい", explanation: "金商法第38条第9号、金商業等府令第117条第1項第1号。" },
  { subject: "102. 不動産証券化の概要", no: "18-ハ", question: "金融サービス法は、その対象となる商品の販売に際して、元本欠損が生ずるおそれなどの一定の事項について、顧客の知識、経験、財産状況、契約締結の目的に照らして十分な説明を行うよう求めているが、顧客が金商法上の特定投資家である場合は、説明が不要となる。", answer: "正しい", explanation: "金融サービス法第4条第2項・第7項、金融サービス令第12条。" },
  { subject: "102. 不動産証券化の概要", no: "18-ニ", question: "金融サービス法上必要とされている投資家への説明の欠如により投資家が損害を被った場合、故意過失がある場合に限定して民事上の損害賠償責任が生じるとされている。", answer: "誤り", explanation: "金融サービス法上必要とされている投資家への説明の欠如により投資家が損害を被った場合、故意過失の有無によらず民事上の損害賠償責任が生じる（金サ法第6条）。" },
  { subject: "102. 不動産証券化の概要", no: "19-1", question: "投資法人の資産運用業務を担う資産運用会社のコンプライアンス部門の責任者は一般にコンプライアンスオフィサーと呼ばれ、業務運営をコンプライアンス面からチェックすることをその職責とする。", answer: "正しい", explanation: "103/上テキストP.280参照" },
  { subject: "102. 不動産証券化の概要", no: "19-2", question: "コンプライアンスオフィサーとともに重要な役割を担うのが資産運用会社のコンプライアンス委員会であり、コンプライアンス上の重要案件を審議する。コンプライアンス委員会は、コンプライアンスオフィサーのほか当該会社の監査役などにより構成され、外部専門家を委員に加えることはない。", answer: "誤り", explanation: "コンプライアンス委員会には、コンプライアンスオフィサーのほか、外部専門家を委員に加えることが一般的である。" },
  { subject: "102. 不動産証券化の概要", no: "19-3", question: "エクイティ・ストーリーとは、J-REITが提示する投資・運用・管理・分配の方針、財務・成長の戦略等を含む方針・目標をいい、投資家の投資判断にとって極めて重要である。", answer: "正しい", explanation: "103/上テキストP.281参照" },
  { subject: "102. 不動産証券化の概要", no: "19-4", question: "スポンサーは投資案件の提供、リーシング及び維持管理面での支援によりJ-REITの成長を支える存在ではあるが、スポンサーと投資法人等（投資法人から業務を受託した会社を含む）との取引は、利益相反の問題を生じるおそれがある。", answer: "正しい", explanation: "スポンサーはREITの外部成長、内部成長に貢献するが、スポンサーとの取引は常に利益相反の問題が伴うので注意が必要である。" },
  { subject: "102. 不動産証券化の概要", no: "20-イ", question: "不動産の譲渡に関する会計基準は、売却先のヴィークルが資産流動化型か資産運用型かにより適用される会計基準が異なる。", answer: "正しい", explanation: "ヴィークルは資産流動化型と資産運用型に分類できるが、不動産の譲渡に関する会計基準もヴィークルが資産流動化型か資産運用型かによって適用される会計基準が異なる。" },
  { subject: "102. 不動産証券化の概要", no: "20-ロ", question: "不動産の会計上の譲渡の成立の可否の判断にあたっては、関係会社間以外の譲渡に関しても、監査委員会報告第27号「関係会社間の取引に係る土地・設備等の売却益の計上についての監査上の取扱い」が判断基準の一つとして適用される。", answer: "正しい", explanation: "実務においては、関係会社間以外の譲渡の際にも判断基準の一つとして考慮されている。" },
  { subject: "102. 不動産証券化の概要", no: "20-ニ", question: "不動産の譲渡の際には、金融商品と同様に構成要素ごとに分解して移転の可否を判断する財務構成要素アプローチと、資産全体のリスクと経済価値が他に移転しているかにより判断を行うリスク・経済価値アプローチのいずれの考え方も認められており、譲渡の実態をより適切に表す方法を選択することができる。", answer: "誤り", explanation: "不動産の譲渡の際には、金融商品のように構成要素ごとに分解して移転の可否を判断することは困難と考えられているため、リスク・経済価値アプローチによって、資産全体を対象として資産が他に移転しているかの判断を行う。" },
  { subject: "102. 不動産証券化の概要", no: "21-2", question: "譲渡人が譲渡不動産の対価として特別目的会社の発行する証券等を有している場合でも、譲渡人のリスク負担割合がおおむね5%の範囲内であれば、リスクと経済価値のほとんどすべてが他の者に移転しているものとして取り扱われる。", answer: "正しい", explanation: "103/下テキストP.24～25、Web講義103第Ⅲ部①資料P.13参照" },
  { subject: "102. 不動産証券化の概要", no: "22-1", question: "子会社の連結にあたっては、持株基準と実質支配力基準の2つの考え方があるが、日本の会計基準においては持株基準が採用されているため、資金調達の総額の過半が特定の会社からの借入れにより行われている場合でも、当該特定の会社が融資先の議決権の過半数を保有していなければ融資先が連結対象となることはない。", answer: "誤り", explanation: "日本の会計基準では、持株基準を一つの目安としながらも、実質的に他の企業を支配しているか否か（実質支配力基準）によって連結の要否を判断することとされている。他の企業の議決権の40%～50%を保有している場合でも、融資資料の①～⑤の要件の一つでも該当すれば、他の企業を支配していると認められ、連結対象となる場合がある。" },
  { subject: "102. 不動産証券化の概要", no: "22-2", question: "「連結財務諸表に関する会計基準」によると、親会社とは、「出資、人事、資金、技術、取引等の関係を通じて、他の企業の財務及び営業又は事業の方針の決定に対して重要な影響を与えることができる企業」と定義されている。", answer: "誤り", explanation: "問題文は持分法における関連会社の定義を一部修正したもの。" },
  { subject: "102. 不動産証券化の概要", no: "22-3", question: "通常、企業の意思決定は企業が自己の判断に基づき行うものであるため、企業Aと緊密な者及び企業Aの意思決定に同意している者がいる場合でも、企業Aの連結範囲の判定にあたってこれらの者の議決権を考慮する必要はない。", answer: "誤り", explanation: "緊密な者及び同意している者が所有している議決権についても考慮した上で他の企業を支配しているか否かを判定することが求められている。" },
  { subject: "102. 不動産証券化の概要", no: "22-4", question: "企業Bが自己の計算において他の企業の議決権の41%を所有している場合に、企業Bが他の企業の重要な財務及び営業又は事業の方針の決定を支配する契約等が存在していれば、企業Bは他に考慮すべき事実がなければ他の企業を支配していると判断することができる。", answer: "正しい", explanation: "103テキスト/下P.34～36参照" },
  { subject: "102. 不動産証券化の概要", no: "24-2", question: "「リース取引に関する会計基準の適用指針」において、現在価値基準とは、「解約不能のリース期間中のリース料総額の現在価値が、当該リース物件を借手が現金で購入するものとした場合の合理的美積金額の概ね75%以上であること」と定義されている。", answer: "誤り", explanation: "「75%以上」ではなく、「90%以上」が正しい。" },
  { subject: "102. 不動産証券化の概要", no: "24-4", question: "「リース取引に関する会計基準の適用指針」に基づき判断した場合、解約不能のリース期間が8年、リース物件の経済的耐用年数が10年のリース取引については、同適用指針9項（2）の括弧書きに該当する場合を除き、ファイナンス・リース取引に該当すると判断される。", answer: "正しい", explanation: "経済的耐用年数基準では、「解約不能のリース期間が、当該リース物件の経済的耐用年数の概ね75%以上」であることが要求されているが、問題文を検討すると8年÷10年＝80%となり、経済的耐用年数基準の要件を満たすため、ファイナンス・リース取引に該当すると判断される。同適用指針9項（2）の括弧書きに該当する場合とは、種々の事項を判断した結果現在価値基準の判定結果が90%を大きく下回ることが明らかな場合であり、この場合にはファイナンス・リース取引には該当しないと判断される。" },
  { subject: "102. 不動産証券化の概要", no: "25-1", question: "減損損失の計上にあたっては、独立したキャッシュ・フローを生み出す最小単位ごとに判断されるため、資産が他の資産と一体となり機能している場合であっても、必ず個々の資産ごとに減損損失の計上の要否を判断しなければならない。", answer: "誤り", explanation: "「おおむね独立したキャッシュ・フローを生み出す最小単位でグルーピングする」ことが求められているため、不動産の一般的な証券化ヴィークルでは物件ごとのグルーピングとなることが多いものの、当該グルーピングの結果によっては複数の資産が資産グループとして1つにまとめられ、当該資産グループを単位として減損損失の判定対象となることがある。" },
  { subject: "102. 不動産証券化の概要", no: "25-2", question: "減損損失計上の手順の中で、減損の兆候があると判断された場合には、その次のステップにおいて回収可能価額の金額を算定し、算定結果に基づき減損損失を計上しなければならないが、減損の兆候が「経営環境の著しい悪化」のみである場合には、例外的に割引前キャッシュ・フローを減損の認識の判定に使用することができる。", answer: "誤り", explanation: "減損の兆候が例示されているいずれのものであった場合でも、「減損の認識の判定」のステップにおいて割引前将来キャッシュ・フローは算定される。" },
