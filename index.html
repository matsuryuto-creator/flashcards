  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題38", question: "減損損失の計上にあたっては、独立したキャッシュ・フローを生み出す最小単位ごとに判断されるため、必ず個々の資産ごとに減損損失の計上の要否を判断しなければならない。", answer: "誤り", explanation: "概ね独立したキャッシュ・フローを生み出す最小単位でグルーピングしなければならず、個々の資産ごとに判断するわけではない（104/下テキスト P.92、Web 講義 104/下第Ⅳ部 P.36 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題38", question: "減損会計により固定資産の減損損失を計上した場合に、当該固定資産の価値が翌期以降に回復した場合には、減損損失の戻入益を計上して固定資産の帳簿価額を回復させなければならない。", answer: "誤り", explanation: "減損会計は「帳簿切離し方式」によるため、翌期以降に収益性が回復したとしても、評価益（戻入益）の計上は認められない（104/下テキスト P.92、Web 講義 104/下第Ⅳ部 P.37 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題40", question: "「資産除去債務に関する会計基準」の適用となる固定資産は、有形固定資産のほかに準ずる有形の資産も含む。したがって、建設仮勘定やリース資産なども同会計基準の適用対象となる。", answer: "正しい", explanation: "（104/下テキスト P.97、Web 講義 104/下第Ⅳ部 P.38 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題40", question: "資産除去債務の認識対象は、有形固定資産の取得、建設、開発又は通常の使用によって生じ、当該有形固定資産の除去に関して法令又は契約で要求される法律上の義務及びそれに準ずるものをいい、この場合の義務には有形固定資産を除去する際に当該有形固定資産に使用されている有害物質等を法律等の要求による特別の方法で除去する義務は含まれない。", answer: "誤り", explanation: "除去そのものが義務でなくても、除去の際に有害物質等を特別の方法で除去する義務がある場合、それも資産除去債務に含まれる（104/下テキスト P.97、Web 講義 104/下第Ⅳ部 P.38 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題40", question: "資産除去債務に対応する除去費用は、資産除去債務を負債として計上した時に、当該負債の計上額と同額を、関連する有形固定資産の帳簿価額に加えて資産計上し、減価償却を通じて各期に費用配分する。", answer: "正しい", explanation: "一時の費用とするのではなく、減価償却を通じて残存耐用年数にわたり費用配分する（104/下テキスト P.97～98、Web 講義 104/下第Ⅳ部 P.38 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題40", question: "資産除去債務の発生時に、当該債務の金額を合理的に見積ることができない場合には、これを計上せず、当該債務額を合理的に見積ることができるようになった時点で負債として計上する。", answer: "正しい", explanation: "（104/下テキスト P.97、Web 講義 104/下第Ⅳ部 P.39 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題41", question: "企業会計基準委員会移管指針第10号「特別目的会社を活用した不動産の流動化に係る譲渡人の会計処理に関する実務指針」の適用対象となる不動産の譲渡にあたっては、企業会計基準第29号「収益認識に関する会計基準」は適用されない。", answer: "正しい", explanation: "（104/下テキスト P.15、P.21、Web 講義 104/下第Ⅳ部 P.7 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題41", question: "企業会計基準委員会移管指針第10号「特別目的会社を活用した不動産の流動化に係る譲渡人の会計処理に関する実務指針」によると、不動産信託受益権の譲渡にあたっては、財務構成要素アプローチにより、当該信託受益権を構成する財務的要素に対する支配が他に移転した場合に当該移転した財務構成要素の消滅を認識し、留保される財務構成要素の存続を認識する。", answer: "誤り", explanation: "不動産信託受益権の譲渡についても、財務構成要素アプローチではなく「リスク・経済価値アプローチ」に基づいて会計処理を行う（104/下テキスト P.25～26、Web 講義 104/下第Ⅳ部 P.13 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題41", question: "企業会計基準第20号「賃貸等不動産の時価等の開示に関する会計基準」では、賃貸等不動産を保有している場合には、期末時点の時価をもって貸借対照表価額とし、(1)賃貸等不動産の概要、(2)賃貸等不動産の貸借対照表計上額及び期中における主な変動、(3)賃貸等不動産の当期末における時価の算定方法、(4)賃貸等不動産に関する損益、を注記することとされている。", answer: "誤り", explanation: "期末における時価等の注記は行うが、貸借対照表では簿価（取得原価から減価償却等を控除した額）で計上する（104/下テキスト P.102、Web 講義 104/下第Ⅳ部 P.41 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題41", question: "固定資産の減価償却費の算定にあたり、法人税法等で定められている耐用年数は課税の公平性から一律に定められているものであり、会計上はそれぞれの企業の使用状況等を勘案した上で減価償却費の算定をする必要があることから、会計上の減価償却費の算定においては法人税法等で定める耐用年数を使用することができない。", answer: "誤り", explanation: "よほど不合理と認められる事情がない限り、会計上も法人税法等で定める耐用年数を使用した場合でも妥当なものとして取り扱われている（104/下テキスト P.88、Web 講義 104/下第Ⅳ部 P.34 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題42", question: "日本においてはヴィークルに共通の会計に関する開示基準が定められている。法定ヴィークルにおいては法律に基づく開示基準があり、かつ、発行証券について広く投資家から投資を募集する場合等においては金融商品取引法に定める開示制度の適用がある。", answer: "誤り", explanation: "日本においてヴィークルに共通の会計に関する開示基準は存在しない（104/下テキスト P.117、Web 講義 104/下第Ⅳ部 P.44 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題42", question: "GK-TKスキームにおける匿名組合決算報告書については、法令等において特段の様式の定めが置かれていないものの、匿名組合員に現金分配を行う際の報告書には支払分配金の額及び分配金の算出方法等を明記しなければならないこととされている。", answer: "誤り", explanation: "匿名組合報告書の様式には法令等による特段の定めはなく、現金分配報告書に関する記載事項の定めもない（104/下テキスト P.137、Web 講義 104/下第Ⅳ部 P.47 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題42", question: "特定目的会社の計算書類等の開示方法等については、特定目的会社計算規則の定めによるものとされており、資本金が1億円以下である場合などの一定の要件を満たす小規模な特定目的会社については附属明細書の作成を省略することができる。", answer: "誤り", explanation: "小規模な特定目的会社であっても附属明細書の作成を省略できるような例外規定は存在しない（104/下テキスト P.132～133、Web 講義 104/下第Ⅳ部 P.46 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題42", question: "投資法人は役員会の承認を受けた「金銭の分配に係る計算書」に基づき、利益を超えて金銭の分配（利益超過分配）を行うことができる。利益超過分配を行った場合には、利益超過分配額を出資総額又は出資剰余金から控除する。", answer: "正しい", explanation: "（104/下テキスト P.122～123、Web 講義 104/下第Ⅳ部 P.45 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題44", question: "信託法第258条に規定する「受益者の定め（受益者を定める方法の定めを含む。）のない信託」は原則として集団投資信託となるが、委託者等受益者以外のものが「みなし受益者」に該当する場合には受益者等課税信託となる。", answer: "誤り", explanation: "「受益者の定めのない信託」は原則として法人課税信託に分類され、信託段階で課税される（104/下テキスト P.213～P.214【図表Ⅴ-4-1】、Web 講義 104/下第Ⅴ部 P.23、27 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題44", question: "受益者等課税信託においては、信託財産に係る消費税の計算の際、当該信託財産に係る資産の譲渡等、課税仕入れ及び課税貨物の保税地域からの引取りに係る消費税は、当該受益者の資産等取引とみなして計算する。", answer: "正しい", explanation: "（消費税法第14条、104/下テキスト P.227、Web 講義 104/下第Ⅴ部 P.25 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題44", question: "受益者等課税信託において、その信託財産に帰せられる収益及び費用は、当該受益者等の収益及び費用とみなして法人税等が課税される。", answer: "正しい", explanation: "（104/下テキスト P.214、Web 講義 104/下第Ⅴ部 P.24 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題44", question: "特定受益証券発行信託、合同運用信託、証券投資信託等の集団投資信託から生ずる信託収益は、信託収益の発生段階では課税されず、その収益の計算期間の末日等、信託収益を受益者が現実に受領した時に受益者に課税される。", answer: "正しい", explanation: "（104/下テキスト P.217、Web 講義 104/下第Ⅴ部 P.26 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題45", question: "匿名組合の法人組合員については、いわゆるパス・スルー課税であるため、組合から生じた損失のうち、自己に帰属すべき損失を全額取り込むことができ、取り込み規制は置かれていない。", answer: "誤り", explanation: "法人組合員に対しては、組合債務の責任が実質的に出資価額に限定されている場合などに、出資額を超える損失の取り込みが制限される等の取り込み規制が置かれている。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題45", question: "居住者である個人が匿名組合員である場合に、匿名組合契約に基づいて出資をする者が当該匿名組合契約に基づく営業者から受ける利益の分配は、匿名組合事業が不動産賃貸事業である場合に限り、不動産所得となる。", answer: "誤り", explanation: "居住者である個人が匿名組合員として受ける利益の分配は、原則として「雑所得」として扱われ、損失が生じても他の所得と損益通算することはできない（104/下テキスト P.201、Web 講義 104/下第Ⅴ部 P.16 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題45", question: "法人匿名組合員における匿名組合損益分配に係る所得の認識時点は、匿名組合契約による計算期間の末日の属する事業年度となる。", answer: "正しい", explanation: "（104/下テキスト P.199、Web 講義 104/下第Ⅴ部 P.17 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題45", question: "匿名組合契約等に基づく匿名組合の分配金に係る源泉税率は、個人の組合員については20.42%、法人の組合員については15.315%である。", answer: "誤り", explanation: "匿名組合の分配金に係る源泉税率は、法人・個人の区分に関わらず20.42%である（104/下テキスト P.202、Web 講義 104/下第Ⅴ部 P.19 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題46", question: "特定目的会社が受け取った配当等については、受取配当金の益金不算入の適用はない。また、特定目的会社が支払う配当等についても、法人である出資者において受取配当金の益金不算入の適用はない。", answer: "正しい", explanation: "（法人税法第23条1項、租税特別措置法第67条の14第2項、第4項、104/下テキスト P.254～255【図表Ⅴ-5-10】、Web 講義 104/下第Ⅴ部 P.35 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題46", question: "特定目的会社の資本金が1億円以下であったとしても、資本金1億円以下の中小法人に認められている法人税の軽減税率は適用されない。", answer: "正しい", explanation: "特定目的会社等の法人には、中小法人向けのような優遇規定（軽減税率等）は適用されない（104/下テキスト P.254～255【図表Ⅴ-5-10】、Web 講義 104/下第Ⅴ部 P.36 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題46", question: "特定目的会社において、欠損金の控除限度額は、導管性要件を満たす場合には、繰越控除前の所得金額の100%となっている。", answer: "正しい", explanation: "（租税特別措置法第67条の14第2項、104/下テキスト P.255【図表Ⅴ-5-10】、Web 講義 104/下第Ⅴ部 P.35 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題46", question: "特定目的会社は、資本金が10億円を超えている場合のみ、法人事業税に係る外形標準課税の適用対象となる。", answer: "誤り", explanation: "特定目的会社の資本金の額にかかわらず、事業税については所得割のみ対象を基礎とした税率の適用（外形標準課税の不適用）となる（104/下テキスト P.254～255【図表Ⅴ-5-10】、Web 講義 104/下第Ⅴ部 P.36 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題50", question: "高額特定資産とは、一の取引単位につき、課税仕入れに係る支払対価の額（税抜）が1,000万円以上の棚卸資産又は調整対象固定資産をいう。", answer: "正しい", explanation: "（消費税法施行令第25条の5、104/下テキスト P.340、Web 講義 104/下第Ⅴ部 P.66 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題50", question: "不動産の売買においては、商慣行として固定資産税や都市計画税の未経過部分を精算するのが通常であるが、この精算部分に係る消費税の取扱いについて、建物に係る固定資産税等を精算した場合には建物の売買代金として消費税は課税となる。", answer: "正しい", explanation: "固定資産税等の精算金は税金の精算とは扱われず、売買代金がその分増額されたものとして取り扱われるため、建物に係る精算金には消費税が課される（104/下テキスト P.340 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題50", question: "消費税の課税事業者を選択しようとする場合には、その適用を受けようとする課税期間の前課税期間中に課税事業者選択届出書を提出しなければならないが、適用を受けようとする課税期間が事業開始日の属する課税期間である場合には、例外的にその課税期間中に届出書を提出することで課税事業者となることができる。", answer: "正しい", explanation: "（消費税法第9条第4項、104/下テキスト P.339、Web 講義 104/下第Ⅴ部 P.62 参照）。" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "問題50", question: "任意組合等がインボイスを発行しようとする場合には、業務執行組合員が納税地を所轄する税務署長に適格請求書発行事業者である旨の届出を提出すれば足りるため、各々の組合員が適格請求書発行事業者であることは必ずしも求められていない。なお、任意組合の組合員のうち事業の損益の配賦を受けない者はいないものとする。", answer: "誤り", explanation: "任意組合等の事業として行われる取引について適格請求書（インボイス）を交付するためには、組合員の全てが適格請求書発行事業者である必要がある（104/下テキスト P.347、Web 講義 104/下第Ⅴ部 P.69 参照）。" },
  { subject: "101. 企業と不動産", no: "午前問1-イ", question: "株式とは金融商品取引法で定める有価証券である。", answer: "誤り", explanation: "金融商品取引法は株券を有価証券と定義している。(101テキストP.10、Web講義101参照)" },
  { subject: "101. 企業と不動産", no: "午前問1-ロ", question: "有価証券に化体された不動産とは、有価証券のキャッシュフローに依存して決まる財産的価値に対する請求権を不動産の形に変えた、という意味である。", answer: "誤り", explanation: "有価証券に化体された不動産とは、不動産のキャッシュフローに依存して決まる財産的価値に対する請求権を有価証券の形に変えた、という意味である。(101テキストP.11参照)" },
  { subject: "101. 企業と不動産", no: "午前問1-ハ", question: "特別法人は単にvehicleと呼ばれることがある。", answer: "正しい", explanation: "(101テキストP.12参照)" },
  { subject: "101. 企業と不動産", no: "午前問1-ニ", question: "不動産証券化とは、特別法人が不動産証券化商品を発行しそれを投資家に販売すること、ということもできる。", answer: "正しい", explanation: "(101テキストP.13参照)" },
  { subject: "101. 企業と不動産", no: "午前問1-ホ", question: "証券投資信託も不動産ファンドと同じようにファンドを利用した集団投資商品の一種である。", answer: "正しい", explanation: "(101テキストP.14参照)" },
  { subject: "101. 企業と不動産", no: "午前問2-ロ", question: "企業の資金調達には、企業が金融資産を売り出すという側面がある。", answer: "正しい", explanation: "(101テキストP.38参照)" },
  { subject: "101. 企業と不動産", no: "午前問2-ハ", question: "ダイベストメント(divestment)は投資(investment)と同じく拡大型企業戦略である。", answer: "誤り", explanation: "ダイベストメント(divestment)は縮小型企業戦略である。(101テキストP.39～40参照)" },
  { subject: "101. 企業と不動産", no: "午前問2-ニ", question: "他の資産に比べて、オンバランス賃貸不動産の資産の効率性（回転率）は高いが、そのマージン（税引き後営業利益率）は非常に低い、という傾向がある。", answer: "誤り", explanation: "他の資産に比べて、オンバランス賃貸不動産の資産の効率性（回転率）は低いが、そのマージン（税引き後営業利益率）は非常に高い、という傾向がある。(101テキストP.43参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問4-イ", question: "ストック社会への変化の中で、不動産をより良好な状態で維持し、キャッシュフローや不動産価値を安定的に維持したいという要請が強まっている。", answer: "正しい", explanation: "(103テキスト巻頭の本テキストのねらいと学習のポイント参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問4-ロ", question: "他の金融資産への投資と比較すると、一般的に不動産投資は、社債や株式への投資よりも相対的にリスクが高いと認識されている。", answer: "誤り", explanation: "不動産投資は社債と比較してリスクが高く、株式よりはリスクが低い。(103テキストP.13参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問4-ハ", question: "リスク要因は、不動産投資の成否に係ることから、どのようなリスクがあるかの洗い出しが最も重要である。", answer: "正しい", explanation: "(103テキストP.15参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問4-ニ", question: "建物の機能を維持・更新し、適正な状態にし、長持ちさせるためには、不具合が発生した都度の事後の修繕が欠かせない。", answer: "誤り", explanation: "事後修繕ではなく、計画的な修繕が欠かせない。(103テキストP.18参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問5-イ", question: "バリューアッド投資とは、ファンドの主要な期待リターンの源泉が、不動産賃貸から生じるインカムリターンであるものをいう。", answer: "誤り", explanation: "バリューアッド投資とは、ファンドの主要な期待リターンの源泉が、不動産賃貸から生じるインカムリターンに加えて、割安に取得した物件の収益性を高めて不動産価値を増加させることにより得られるキャピタルリターンであるものをいう。選択肢はコア投資の説明文である。(103テキストP.21参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問5-ロ", question: "機関投資家には、年金基金、一般機関投資家（例：銀行、生命保険会社・損害保険会社など）、海外の個人投資家が含まれる。", answer: "誤り", explanation: "機関投資家とは、年金基金と一般機関投資家をさす。(103テキストP.22参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問5-ハ", question: "投資対象としての不動産も拡大しており、近年では不動産証券化を用いた老朽化不動産の更新・活用が非常に活発に行われている。", answer: "誤り", explanation: "不動産証券化を用いた老朽化不動産の更新・活用の促進は、まだ活発に行われているとはいえず、今後期待されている項目の1つである。(103テキストP.24参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問5-ニ", question: "わが国の不動産投資ビジネスが、今後もますます安定的に成長・発展していくためには、各プレーヤー相互の信頼関係と専門家としての自覚が必要である。", answer: "正しい", explanation: "(103テキストP.29参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問6-イ", question: "アセットマネジャーの主な業務は、どのような物件をいつ取得するのかという「入口戦略」、リーシングや修繕をどのように実施していくのかという「期中戦略」、投資物件をいつどのように売却するのかという「出口戦略」の3つの戦略を立案し実行することである。", answer: "正しい", explanation: "(103テキストP.31参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問6-ロ", question: "デューデリジェンスは物的調査、法的調査、経済的調査に大別され、それぞれの調査は一般的にアセットマネジャーにて完結するもので、第三者に委託するものではない。", answer: "誤り", explanation: "前段は正しいが、それぞれの調査は各分野の専門家に委託するのが一般的。(103テキストP.36参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問6-ハ", question: "ファンドを組成しようとする場合、投資家の趣向や投資資金の性格にあったファンドを組成すべきであり、オポチュニスティックファンドとは、安定的な利益配当を趣向する投資家に適合するファンドである。", answer: "誤り", explanation: "前段は正しいが、後段の安定的な利益配当を趣向する投資家にはコア、コアプラス、REITなどが該当する。(103テキストP.33～34、【図表Ⅰ-2-5】参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問6-ニ", question: "アセットマネジメントでは、ストラクチャーにより様々な法令を順守する必要があり、例えば、次のスキームでは以下の法令が特に重要となる。GK-TKスキームでは金融商品取引法に、TMKスキームであれば資産の流動化に関する法律に、REITであれば投資信託及び投資法人に関する法律に則る必要がある。", answer: "正しい", explanation: "(103テキストP.32【図表Ⅰ-2-3】参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問7-イ", question: "レンダーを選定する場合、一般的に競争入札を行うことで金利などの経済条件を好条件で調達することが可能になるので、フィナンシャルアドバイザーを起用することがあるが、必ずしもフィナンシャルアドバイザーを起用する必要はなく、アセットマネジャー自らが競争入札を行う場合もある。", answer: "正しい", explanation: "(103テキストP.45～46参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問7-ロ", question: "ストラクチャーを構成するうえでどのようなローンを調達するかは極めて重要であり、ローレバレッジ（浅めのLTV）にして配当利回りを高める設計とするか、又はその逆の設計にするかは、投資対象不動産の特性や投資家の志向によって変化する。", answer: "誤り", explanation: "ローレバレッジでは配当利回りは低くなるので、ハイレバレッジが正しい。(103テキストP.46参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問7-ハ", question: "配当停止事由とは資金移動が制限される事由のことであり、一般的にGK-TKスキームの場合では、信託口座からメイン口座への資金移動が禁止され、かつ投資家への配当やAM報酬の支払いが停止される。", answer: "誤り", explanation: "資金移動が制限されるのは正しいが、信託口座からメイン口座への資金移動が禁止されるのではなく、メイン口座からリリース口座への資金移動が禁止される。(103テキストP.47参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問7-ニ", question: "強制期限前弁済事由とは、貸付人が口座に留保された金銭をもって貸付の返済に充当できる事由のことであり、一般的にGK-TKスキームの場合ではメイン口座に留保された資金を返済に充当する。", answer: "正しい", explanation: "(103テキストP.47参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問8-1", question: "キャッシュマネジメントとは物件運営レベル及びSPC運営レベルのそれぞれにおいて入出金管理や効率的な資産運用を行うものであり、年度資金計画の作成と予実管理、資金移動の承認と実行、コベナンツ管理、配当の実施等の業務がある。", answer: "正しい", explanation: "(103テキストP.51参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問8-2", question: "DSCRテストとは、ローン契約において定められる返済の余裕度をはかるテストであり、基準値を何度か下回ると配当停止事由や強制期限前弁済事由等に抵触する場合もあるので、アセットマネジャーはこれに抵触しないよう注意を払わなければならない。", answer: "正しい", explanation: "(103テキストP.54参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問8-3", question: "LTVテストとは、ある時点の不動産鑑定評価額に対するローン元本額の割合であるLTV値が、ローン契約において定められた基準値を満たしているかテストするもので、LTV値が基準値を何度か上回ると物件の強制売却に至る場合もある。", answer: "正しい", explanation: "(103テキストP.54～55参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問8-4", question: "GK-TKスキームにおいて、口座の階層は信託口座、メイン口座、リリース口座の3階層に分けられており、一般に信託口座レベルでは物件運営にかかわる入出金のほかAM報酬の支払いが行われる。", answer: "誤り", explanation: "前段は正しいが、AM報酬は一般にリリース口座から支払われる。(103テキストP.52～53、【図表Ⅰ-2-14】参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問9-イ", question: "ホテルの需要に影響する訪日外国人の動向をみると、2023年の訪日外客数はコロナ禍の影響が減り、2019年の水準を超えて過去最高を記録した。", answer: "誤り", explanation: "2023年はコロナ禍の影響が減り大きく増加したものの、3,000万人を超えた2019年の水準には達していない。(103テキストP.106【図表Ⅱ-5-4】参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問9-ロ", question: "住宅の需要に影響する人口移動の動向をみると、東京23区については、2021年にはコロナ禍の影響などで人口の転出が転入を上回る転出超過に転じたが、2022年には転入超過に戻り、2023年はさらに転入が増加している。", answer: "正しい", explanation: "(103テキストP.101参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問9-ハ", question: "オフィスの需要に影響する在籍（出社ではなく）の1人当たりのオフィス面積の動向をみると、面積は増加傾向が続いていたが、コロナ禍を経て減少に転じた。", answer: "誤り", explanation: "在籍1人当たりのオフィス面積はコロナ禍前に増加傾向にあったわけではなく、コロナ禍を経ても減少していない。(103テキストP.79【図表Ⅱ-3-6】参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問9-ニ", question: "物流施設の需要に影響する消費者向け電子商取引の市場動向をみると、EC化率は年々上昇し続けており、市場規模は2022年度には約23兆円に達している。", answer: "正しい", explanation: "(103テキストP.111～112参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問1-イ", question: "不動産証券化には、実物不動産そのものの証券化だけでなく、不動産担保ローンの証券化も含まれる。住宅ローンの証券化商品は、略称でCMBSと呼ばれる。", answer: "誤り", explanation: "商業用不動産ローンの証券化商品の略称がCMBS(Commercial Mortgage Backed Securities)と略称されるのに対して、住宅ローンの証券化商品の略称はRMBS(Residential Mortgage Backed Securities)と呼ばれる。(102テキストP.36～37、P.46～48、Web講義102第Ⅰ部第1章P.6参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問1-ロ", question: "日本の不動産証券化市場は、1990年代後半から急速な成長を遂げ、2023年6月には、運用資産額ベースで、J-REITは約22兆円、私募ファンド（私募REITを含む）は約33兆円の規模にまで成長した。", answer: "正しい", explanation: "(102テキストP.22参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問1-ハ", question: "J-REITと同様のスキームを活用している私募REITは、所有している不動産価格を基準に投資口価格が評価されるため元本変動リスクが少なく、J-REITと比べて流動性は高くなっている。", answer: "誤り", explanation: "私募REITは元本変動リスクが少なく、相対的に安定的な運用を図ることができるが、投資口が上場されていないので、J-REITと比べて流動性は劣後する。(102テキストP.24参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問1-ニ", question: "経済性（Economy）、社会（Social）、ガバナンス（Governance）を重視するESG投資の普及は、不動産証券化市場のサステナブルな成長にも寄与することが見込まれる。", answer: "誤り", explanation: "Eは経済性(Economy)ではなく、環境(Environment)の頭文字である。(102テキストP.25参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問10-1", question: "東京23区のオフィスストックを規模別に棟数でみたときに、延床5,000坪以上のビルは1割以下である。", answer: "正しい", explanation: "(103テキストP.77、Web講義103第Ⅱ部第3章P.17参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問10-2", question: "新築ビルを対象とした空室率を見る際、対象物件数が少ないためデータの変動が大きい点や新築期間を超えると算出対象から外れる点に注意が必要である。", answer: "正しい", explanation: "(103テキストP.79参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問10-3", question: "フリーレントはテナント誘致や賃料単価を高く維持したい時などに使われるが、付与率や月数だけでは市場の需給動向を網羅できないケースがみられるようになってきた。", answer: "正しい", explanation: "(103テキストP.81参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問10-4", question: "民間調査機関が公表する「空室率」は、調査対象となる物件の基準が異なるものの、空室面積を算出する際の基準は同じである。", answer: "誤り", explanation: "エリアや規模・グレードなどのオフィスビルの基準が異なるだけでなく、竣工前の物件を含むか否か、退去が決まっていてもテナントがまだ入居している貸室面積（募集面積）を含むか否かの算出する際の基準の違う場合がある。(103テキストP.79、Web講義103第Ⅱ部第3章P.21～23参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問12-イ", question: "新規賃料には募集賃料と成約賃料がある。募集賃料はサンプリングの問題や成約賃料との乖離がある場合があるが、以前から長く公表されており市場のトレンド把握に適している。", answer: "正しい", explanation: "(103テキストP.67参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問12-ロ", question: "不動産投資における収益は、投資した金額以上で不動産を売却した時の利益であるインカムゲインと、投資した不動産を他者に貸して継続的に賃料収入などを受け取るキャピタルゲインに分けられる。", answer: "誤り", explanation: "インカムゲインとキャピタルゲインの説明が逆。(103テキストP.67参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問12-ハ", question: "今後の不動産売買市場の動向をみる際、J-REITや生命保険会社による不動産の取得・購入が多いときは、彼らが近いうちにその取得・購入した物件を売却すると考え、売却物件の供給が増加して、価格の下押し圧力になることを強く意識しておくべきである。", answer: "誤り", explanation: "J-REIT、生保、年金は、中長期の保有型の投資家といえ、取得した物件が短期的に売却されることは少なく、供給増加を強く意識することにはつながらない。(103テキストP.73～74参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問12-ニ", question: "不動産の売買は一般的には相対取引で行われるため、実際の取引価格（成約価格）が公になることは全くない。", answer: "誤り", explanation: "成約価格のデータは少ないが、IR情報でJ-REITや上場企業が不動産取引価格を公開するケースなどがある。(103テキストP.72参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問13-イ", question: "建物の敷地利用権が借地権である場合、土地の登記が必ずされる。", answer: "誤り", explanation: "借地権には物権である地上権と債権である賃借権があり、地上権の場合は乙区欄で確認できるが、賃借権の場合は土地賃貸人に登記に応じる義務がなく、登記されていない場合が多い。(103テキストP.128参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問13-ロ", question: "甲区欄には所有権に関する事項が記載されており、所有者は誰であるか、いつ、どんな原因で所有権を取得したのかが記載されている。", answer: "正しい", explanation: "(103テキストP.127参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問13-ハ", question: "不動産登記簿謄本は法務局において原則誰でも取得することができるが、取得に際して所有者の承諾や委任状が必要となる。", answer: "誤り", explanation: "不動産登記簿謄本は取得に際して、所有者等の承諾や委任状は必要とされない。(103テキストP.124参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問13-ニ", question: "乙区欄に記載されている事項について、根抵当権が設定されている場合には、極度額と実際の借り入れ残額は必ずしも一致しない。", answer: "正しい", explanation: "(103テキストP.127参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問14-イ", question: "一般的に、テナント構成について、特定のテナントや業種に偏りがなく分散状態にある方が、将来のキャッシュフローは安定的といえる。", answer: "正しい", explanation: "(103テキストP.138参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問14-ロ", question: "多数の不動産を所有しているファンド等において、ファンドが所有する対象不動産の管理費用を査定する際は、当該不動産単独の費用を査定する必要はなく、運営実績を採用して査定する。", answer: "誤り", explanation: "多数の不動産を所有しているファンド等の場合、一括してプロパティマネジメントや建物維持管理、火災保険等に係る契約を締結することで、経費削減を図っているケースもあるため、当該ケースでは対象不動産単独の管理に要する費用を把握する必要がある。(103テキストP.153参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問14-ハ", question: "実施済の修繕内容とエンジニアリングレポート記載の修繕項目を照合して、計画的な修繕計画が立案され、実行されているかを確認することは重要である。", answer: "正しい", explanation: "(103テキストP.153参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問14-ニ", question: "一般的に、収益調査において、過去の収支実績はマンスリーレポート等により直近1年のみ分析、検討を行えば十分である。", answer: "誤り", explanation: "収入及び支出に関して、直近1年分だけではなく、可能な限り過去に遡って分析、検討することが望ましい。(103テキストP.152～153参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問15-イ", question: "収益還元法の適用において、直接還元法とDCF法のいずれの方法を適用するか、また併用する場合にいずれの方法を重視するかは、対象不動産の種類、収集可能な資料の質、範囲及び評価目的に即して適切に選択することが必要である。", answer: "正しい", explanation: "(103テキストP.196参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問15-ロ", question: "直接還元法は、時間の概念を組み入れることが可能であり、より詳細なシナリオを設定することができるという長所がある。", answer: "誤り", explanation: "直接還元法は、一期間の純収益を還元するため手法の適用が簡単であり、また理論的にも分かりやすいという長所がある。(シナリオ設定ができるのはDCF法。)(103テキストP.196参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問15-ハ", question: "DCF法は、一定期間の将来予測を明示的に行って価格を求める手法であり、予測の内容、精度などにより、求められた価格の信頼性が左右されることとなる。", answer: "正しい", explanation: "(103テキストP.199～200参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問15-ニ", question: "最終還元利回りは、将来の時点の予測を伴うことから、現在の時点と比較して不確実性が高まること、建物の老朽化が進み、設備・仕様等の陳腐化が進むであろうこと等を考慮すると、一般的には、最終還元利回りは還元利回りと比較してやや高い水準となる。", answer: "正しい", explanation: "(103テキストP.201参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問18-1", question: "再調達価格の総額には、解体撤去費用、設計料、移転引越し費用、営業補償費などは含まない。", answer: "正しい", explanation: "(103テキストP.168～170 原価法の「再調達原価」との差異を理解する必要がある。参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問18-2", question: "再調達価格とは、対象建物の現状仕様に従い、対象建物を調査時点に再度新築するとした場合の費用である。", answer: "正しい", explanation: "(103テキストP.168～170参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問18-3", question: "対象建物が、竣工後に耐震補強工事などが行われていた場合には、新築時とは異なるため、その耐震性を保持するためのコストは反映されない。", answer: "誤り", explanation: "耐震補強のコストは反映される。(103テキストP.169参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問18-4", question: "再調達価格の算出方式には、竣工時の工事代金内訳書から物価の上昇等の要因を考慮して金額を算出する方式と主要部位の概算積算等を行って金額を算出する方式の2通りの方式がある。", answer: "正しい", explanation: "(103テキストP.168～170参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問19-1", question: "過去に実施された土壌汚染対策法に基づく調査で、「区域指定」等の指定を受けていなかったため、通常の地歴調査を実施して、対象物件の取得を進めた。", answer: "誤り", explanation: "土壌汚染対策法を含む各環境関連法規は、過去の調査後に法改正等があり得るため、常に最新の法令・基準による調査が必要である。(103テキストP.173～176参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問19-2", question: "地歴調査で近隣地域に工場等の存在は確認されなかった一般の商業地において、過去に印刷会社やクリーニング店の立地が確認されたため、フェーズⅡ調査を実施した。", answer: "正しい", explanation: "工業・工場エリア等でなく一般の商店街等であっても、有害物質の取扱い等で土壌汚染が発生している可能性は否定出来ない。(103テキストP.173～176参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問19-3", question: "土壌汚染対策法では、健康影響のおそれがある「要措置区域」と、汚染はあるが現状の土地利用を継続する上では健康影響の心配がない「形質変更時要届出区域」の区分があるが、自然由来と想定される区域の設定は無い。", answer: "誤り", explanation: "「自然由来特例区域」の指定はある。(103テキストP.175～176 コラム参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問19-4", question: "土壌汚染の地歴調査において、調査対象地が過去に工場敷地として利用されていたことが判明したが、当時の事業者は追跡できず、また年数も経過していることから「土壌汚染リスクは低い」と判断した。", answer: "誤り", explanation: "現所有者のみならず、過去の土地所有者（使用者）と事業内容等を特定することが重要になる。特定有害物質は長期間にわたり対象地に残存する可能性もあり、年数の経過のみで土壌汚染リスクが低いとは言えない。(103テキストP.173～176参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問20-1", question: "エンジニアリングレポートは技術的見地から、第三者の立場で、対象不動産の機能・性能等を客観的に評価し、収益性に影響を及ぼす様々なリスクを定量化する役割をもつ。", answer: "正しい", explanation: "(103テキストP.157参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問20-2", question: "建物が建築時に適法に建てられ検査済証が交付されているため、違法性上は問題が無いものと判断した。", answer: "誤り", explanation: "適法性調査に関する出題。竣工以後の増改築などにより建築基準法や消防法に適合していない場合があり得る。(103テキストP.158、164～165参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問20-3", question: "建物に使用されている材料、設備機器、これを動かすための油類（燃料）等に、環境上の問題がないかを確認した。", answer: "正しい", explanation: "建物環境リスク評価に関する出題。(103テキストP.171参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問20-4", question: "土壌・地下水汚染は人の健康や生活環境への影響もさることながら、大きな経済的なリスクであるため、地歴調査を実施した。", answer: "正しい", explanation: "土壌汚染リスク評価に関する出題。(103テキストP.173参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問2-イ", question: "レバレッジ効果とは、外部の低利な資金を借入又は社債発行で取り入れることにより、エクイティ投資家の出資分に対する利回りが上昇することをいう。通常、エクイティ利回りは借入比率が高いほど、またイールド・ギャップが大きいほど高くなる。", answer: "正しい", explanation: "(102テキストP.34～35参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問2-ロ", question: "不動産が適正な価格でSPVに譲渡されることは、真正売買の条件の1つであり非常に重要である。通常、不動産証券化における不動産の適正価格とは、積算法で求めた市場価格（時価）のことである。", answer: "誤り", explanation: "積算法ではなく収益還元法が正しい。(102テキストP.38～39参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問2-ハ", question: "利益相反とは、忠実義務を負う者が自己や第三者の利益を図り、投資家の利益を損なうことをいう。利益相反リスクは、証券化スキーム上の工夫や実務上の運用の工夫により可能な限り回避する仕組みの構築が求められるが、投資家や市場による監視や選別も一定の抑止力となる。", answer: "正しい", explanation: "(102テキストP.36～37参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問2-ニ", question: "倒産隔離の確保では、SPVそのものの倒産リスクが極小化されていることが求められる。具体的には、SPVに不動産の証券化以外の行為を禁止すると同時に、SPVの社員や株主が倒産申立てなど、オリジネーターに不利な議決権を行使できないようにする。", answer: "誤り", explanation: "オリジネーターではなく投資家が正しい。(102テキストP.30～32参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問3-イ", question: "資産流動化型スキームは、最初に不動産を特定してスキーム組成時の目論見通りに信託銀行などが当該物件の維持管理を行う静的な仕組みであり、その特徴を「モノありき」と表現することもある。", answer: "正しい", explanation: "(102テキストP.42～43参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問3-ロ", question: "私募REITは非上場のオープンエンド型の不動産投資法人であり、一定の条件の下で出資金の払戻しなどを認めて流動性を確保している。", answer: "正しい", explanation: "(102テキストP.44～46参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問3-ハ", question: "特定目的会社（TMK）とは、資産流動化法に基づいて資産を証券化するためのビークルである。特定目的会社は、資産を証券化するためだけに設立されるため、一般の株式会社に比べて組織の簡素化が図られており、一定の要件を満たせば支払配当が損金算入できるなどの優遇措置を受ける。", answer: "正しい", explanation: "(102テキストP.43参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問3-ニ", question: "賃貸オフィスビルや賃貸マンションなど収益不動産向けのノンリコースローンを裏付けに発行される証券化商品を略称でRMBSという。RMBSにはシングルアセット型とマルチアセット型の2つの発行形態がある。", answer: "誤り", explanation: "RMBSではなくCMBSが正しい。(102テキストP.46～47参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問4-1", question: "大規模な開発型証券化では、プロジェクト全体を統制するプロジェクトマネジメントや、建設に関わるファシリティマネジメントが導入されるケースが多い。", answer: "誤り", explanation: "ファシリティマネジメントではなくコンストラクションマネジメントが正しい。(102テキストP.55参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問4-2", question: "不動産のデューデリジェンスでは、対象不動産の耐震性や土壌汚染、アスベストの有無、長期修繕の必要性など、専門性の高い技術的事項に関する「エンジニアリングレポート」が重要な報告書となっている。", answer: "正しい", explanation: "(102テキストP.58～59参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問4-3", question: "近年、不動産のクロスボーダー取引が拡大する中、2008年5月に東京証券取引所の規則が改正され、J-REITによる海外不動産投資の制約が解除されたが、これまでのところJ-REITによる海外不動産投資は行われていない。", answer: "誤り", explanation: "イオンリート投資法人は初の海外不動産投資としてマレーシアのショッピングセンターを取得した。(102テキストP.68参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問4-4", question: "J-REIT市場の創設以降、本格的な不動産投資インデックスの作成が可能となった。不動産証券化協会が作成・公表するARES Japan Property Indexは、現実のキャッシュフローや契約実績に基づく指標であり、不動産マーケット全体をカバーする不動産投資インデックスである。", answer: "誤り", explanation: "不動産マーケット全体をカバーしたものではない。(102テキストP.64参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問5-イ", question: "国土交通省が示した「宅地建物取引業者による人の死の告知に関するガイドライン」（2021年（令和3年）10月）が取り扱う対象はオフィス等商業用不動産である。", answer: "誤り", explanation: "居住用不動産を対象とする。(102テキストP.81参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問5-ロ", question: "宅地建物取引業法上、専任媒介契約あるいは専属専任媒介契約を締結した宅地建物取引業者は一定の事項を指定流通機構に登録しなければならない。", answer: "正しい", explanation: "(102テキストP.86参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問5-ハ", question: "不動産の権利関係の公示制度として不動産登記制度が用いられているが、不動産登記に公信力はないと考えるのが通常である。", answer: "正しい", explanation: "(102テキストP.100参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問5-ニ", question: "不動産売買の際、買主が売主に対して自らの所有権を対抗するためには、所有権の移転の登記を行っている必要がある。", answer: "誤り", explanation: "所有権移転登記は第三者対抗要件であり、売主は第三者に該当しない。(102テキストP.100参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問6-イ", question: "市街化調整区域は、開発を抑制する区域であるため、原則として、1,000㎡以上の開発行為を行う場合に限り行政庁の許可が必要となる。", answer: "誤り", explanation: "市街化調整区域は開発を抑制する区域であるため、原則として、常に行政庁の許可が必要となる。(102テキストP.109【図表Ⅲ-2-2】参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問6-ロ", question: "民法ではいわゆる袋地通行権が認められており、判例によれば、この権利に基づき建築基準法上の接道義務を満たすに足りる土地利用を当然に請求できる。", answer: "誤り", explanation: "判例は袋地通行権に基づき接道義務を満たすだけの土地利用を当然に認めているわけではない。(102テキストP.114参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問6-ハ", question: "不動産投資顧問業登録規程における総合不動産投資顧問業者はいわゆる投資一任業務と投資助言業務の双方を行うことができる。", answer: "正しい", explanation: "(102テキストP.127～128参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問6-ニ", question: "賃貸住宅の管理業務等に関する法律によれば、200戸未満の賃貸住宅を管理するものであっても要件を満たせば賃貸住宅管理業者として登録できる。", answer: "正しい", explanation: "(102テキストP.128～129参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問7-イ", question: "銀行等の金融機関を介した金融を直接金融、証券市場で株式・社債・CP等を発行して資金調達することを間接金融と呼び、投資信託や証券化等の集団投資スキームを通じた資金調達を市場型間接金融と呼ぶことがある。", answer: "誤り", explanation: "銀行等の金融機関を介した金融を間接金融、証券市場で株式・社債・CP等を発行して資金調達することを直接金融と呼ぶ。(102テキストP.136参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問7-ロ", question: "金融市場は、取引される資金の期間により、1年以内の資金を取引する短期金融市場と1年超の資金を取引する長期金融市場に大別される。また、取引所を通さず、市場参加者の間で相対で取引がなされるコール市場もある。", answer: "誤り", explanation: "市場参加者の間で相対で取引がなされるのは店頭市場。(102テキストP.136参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問7-ハ", question: "オプション取引は、ある商品を、将来の一定期日までに、あらかじめ定める価格（権利行使価格）で売り付け（プット）又は買い付け（コール）する権利の取引である。", answer: "正しい", explanation: "(102テキストP.140参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問7-ニ", question: "イールドカーブ（利回り曲線）は、通常、短期金利ほど低く、長期金利ほど高くなる（順イールド）が、金利低下期待が高まり金利の先安感（先安観）が強い場合など、長期金利が短期金利に近づき（フラットイールド）、さらには長期金利が短期金利を下回る（逆イールド）ことがある。", answer: "正しい", explanation: "(102テキストP.143参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問8-イ", question: "株式を証券取引所に上場させるには、幹事証券会社を通して証券取引所に申請を行い、各証券取引所の定める「上場審査基準」に適合していれば上場適格と判断され上場される。", answer: "誤り", explanation: "上場審査基準に適合していることに加え、企業内容などの開示を適切に行うことができる状況にあるか等の実質的な審査が行われる。(102テキストP.157参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問8-ロ", question: "株式は、上場すると不特定多数の投資家により売買されるようになるため、上場は株式公開とも呼ばれ、市場への最初の株式供給という意味でIPO（Initial Public Offering）ともいう。", answer: "正しい", explanation: "(102テキストP.157参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問8-ハ", question: "上場株式の流通量が不足し公正な価格形成が困難となった場合や、会社がいわゆる破綻状態となった場合などは、上場廃止基準に基づき上場廃止の措置が取られる。", answer: "正しい", explanation: "(102テキストP.158参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問8-ニ", question: "貸借取引とは、顧客が売買代金の一定比率を委託保証金として証券会社に預託し、買付資金又は売付証券を当該証券会社から借りて売買を行い、所定の期間内に返済する取引で、制度信用取引と一般信用取引の2種類がある。", answer: "誤り", explanation: "問題文は貸借取引ではなく信用取引の説明である。(102テキストP.158～159参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問10-イ", question: "銀行の信用創造機能により新たに創り出された預金を派生的預金といい、支払準備率が低いほど派生的預金は小さくなる。", answer: "誤り", explanation: "支払準備率が低いと派生的預金は大きくなる。(102テキストP.183～184参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問10-ロ", question: "バーゼルⅡの自己資本比率算出に際しては、システム障害により銀行が損失を被るリスクは除外されている。", answer: "誤り", explanation: "システム障害リスクも含まれる。(102テキストP.187～188参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問10-ハ", question: "信託銀行は、「金融機関ノ信託ノ兼営等ニ関スル法律」に基づき信託業務を兼営している銀行であり、銀行法により設立されているが、預金業務や貸金業務は行っていない。", answer: "誤り", explanation: "預金業務や貸金業務も行っている。(102テキストP.199参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問10-ニ", question: "狭義の不動産信託は、不動産の管理を主目的とする管理信託と、不動産の処分及び代金回収を目的とする処分信託がある。", answer: "正しい", explanation: "(102テキストP.201参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問12-イ", question: "不動産証券化や不動産投資運用ビジネスの進展により、不動産の経営をアセットマネジャーやプロパティマネジャー等の第三者に委託することが普及してきているが、国内機関投資家の多くはまだ自ら不動産経営を行っているケースが多い。", answer: "誤り", explanation: "不動産証券化の過程において、機関投資家は証券化ビークルに資金を供給し、実質的な不動産所有者となる。機関投資家は一部の例外を除き、投資対象の不動産を自ら使用することはなく、不動産の経営を行うこともしない。機関投資家の多くは、投資した不動産の経営をアセットマネジャー等の第三者へ委託する。(102テキストP.206、P.207【図表V-1-1】参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問12-ロ", question: "生命保険会社では、保険契約の責任準備金のデュレーションにあわせた確定利付資産を中心に運用が行われており、国内確定利付資産（国債、地方債、社債）の運用資産に占める割合は2023年3月末時点では、40%を上回っている。", answer: "正しい", explanation: "(102テキストP.213～214【図表V-2-1】参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問12-ハ", question: "国内年金基金の不動産投資に関しては、J-REITへの投資実績を持つ基金が多いことが特徴として挙げられる。不動産証券化協会「機関投資家の不動産投資に関するアンケート調査」（2022年）によれば、国内年金基金にJ-REITへの投資の有無を尋ねた質問で、「投資済」との回答が50%を超えた。", answer: "誤り", explanation: "同調査によれば、国内年金基金に「上場Jリート」への投資の有無を尋ねた質問で、「投資済」との回答は10%となっている。(Web講義102第V部資料P.18【追加図表2】参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問12-ニ", question: "わが国の公的年金である年金積立金管理運用独立行政法人（GPIF）は世界有数の資産規模を有する年金基金であり、共済組合等の中にも上位に位置する基金もある。しかし、不動産の運用資産規模は海外基金と比べて小さいものとなっている。", answer: "正しい", explanation: "(102テキストP.211参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問13-イ", question: "海外機関投資家で、不動産運用資産額において上位を占めるのは、年金基金、保険会社、SWF（ソブリン・ウェルス・ファンド）、投資銀行などである。", answer: "誤り", explanation: "不動産運用資産額上位の海外機関投資家に投資銀行は含まれない。(102テキストP.210～212【図表V-1-6】参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問13-ロ", question: "SWF（ソブリン・ウェルス・ファンド）は、給付債務を持たないことから、投資利回りの設定に関して柔軟性が高く、優良な投資物件に対しては長期投資を前提に強気なスタンスで投資する傾向がある。そのため、欧米の大型不動産取引で取得者あるいは売却者として、名を連ねているが、日本での投資実績はまだない。", answer: "誤り", explanation: "GICが、2014年に「パシフィックセンチュリープレイス」を約1,800億円で取得したほか、CICが2015年に「目黒雅叙園」を取得する等、日本でも大型取引を行っている。(102テキストP.221～222参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問13-ハ", question: "グローバルに不動産投資を行っている海外の大規模年金基金は、各国の年金制度の一部ではあるが、日本の国民年金に類似する基礎年金や社会保障年金でないものも多い。", answer: "正しい", explanation: "(102テキストP.220～221参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問13-ニ", question: "国内の不動産投資市場において、海外投資家は、1990年代後半や2008年の金融危機後の低迷期からの回復期に資金供給者として影響力を発揮した。また、先進的物流施設のような新たな種類のアセットの国内での普及や、ホテルやリゾート分野で見られるような運営ノウハウの提供などにも寄与してきた。", answer: "正しい", explanation: "(102テキストP.223～224参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問14-イ", question: "GPIFによる最大の不動産投資先は欧州であり、この状態は世界の不動産の時価構成を考えると違和感がない。", answer: "誤り", explanation: "海外の不動産時価の比率を見ると米国が最大である。(102テキストP.232参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問14-ロ", question: "地共連の日本への投資比率はGPIFより高いが、これは地共連がGPIFより後から不動産投資を開始したためであり、日本から開始した後に海外へという拡大方向を考えると適切と思われる。", answer: "誤り", explanation: "明らかな誤り。(102テキストP.243、Web講義102第VI部第1章資料P.12参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問14-ハ", question: "用途別の配分を見ると、地共連はオフィスへの配分が最大であり、これは、新型コロナウイルス感染症が拡大するずっと以前から、不動産投資の拡大に積極的に取り組んでいたためと考えられる。", answer: "誤り", explanation: "地共連の不動産投資は近年のものであり、基本的に設立時期の分散を図るため淡々と投資している。新型コロナ感染症拡大のずっと以前から不動産投資の拡大に積極的に取り組んできた事実はない。(102テキストP.233、Web講義102第VI部第1章資料P.12参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問14-ニ", question: "産業・物流施設は、新型コロナウイルス感染症の影響を受けたリモート勤務やEC利用の拡大によって、両者の投資が大きく拡大したセクターであると言って良い。", answer: "誤り", explanation: "明らかな誤り。(Web講義102第VI部第1章資料P.11参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問15-イ", question: "確定給付企業年金による不動産投資は、主として私募REITや私募ファンドであり、一部にCMBSなどを組み入れる例も見られる。", answer: "正しい", explanation: "(102テキストP.237～238参照、Web講義102第VI部第1章資料P.12参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問15-ロ", question: "確定拠出企業年金やiDecoにおいて不動産投資を可能とするためには、上場REITを組み入れ対象とする公募投信を商品ラインナップに設定する必要がある。", answer: "正しい", explanation: "(Web講義102第VI部第1章資料P.19参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問15-ハ", question: "企業年金が不動産投資を行う最大の目的は、低流動性資産への投資を通じて保有資産の時価変動を抑制することにある。", answer: "誤り", explanation: "不動産投資の最大の目的は収益の獲得もしくは伝統的資産との低相関にあり、低流動性資産への投資を通じて保有資産の時価変動を抑制することは副次的な目的に過ぎない。(102テキスト第V部、第VI部及びP.240～241参照)" },
  { subject: "102. 不動産証券化の概要", no: "午後問15-ニ", question: "企業年金は受託者責任を果たすために、不動産を投資対象に含める場合には「運用の基本方針」に投資対象として明記しておく必要がある。", answer: "正しい", explanation: "(102テキストP.238～239参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問21-イ", question: "プロパティマネジメント業務は、「建物の管理運営の企画」、「テナント誘致業務」、「運営業務」、「建物管理業務」などから構成されるものであり、実際に行われる業務の範囲や程度は契約のもとに決定される。", answer: "正しい", explanation: "(103テキストP.234参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問21-ロ", question: "プロパティマネジャーの役割は投資家収益の最大化であり、不動産ファンドの対象となる不動産をポートフォリオとして運用し、投資家のインカムゲインとキャピタルゲインの最大化を図ることである。", answer: "誤り", explanation: "これはアセットマネジャーの役割の説明になっている。(103テキストP.233【図表IV-1-1】参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問21-ハ", question: "プロパティマネジャーには不動産運営のプロフェッショナルとして、対象不動産の固有のリスクや時代と共に刻々と変化するリスクを的確にコントロールすることにより資産価値を最大化することが求められる。", answer: "正しい", explanation: "(103テキストP.233参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問21-ニ", question: "プロパティマネジメント業務のうち「運営業務」は、建物の品質管理・テナント等の窓口対応・賃料などの入出金管理・定期的なビルオーナーへのレポーティングなどソフト面の対応を指す。", answer: "正しい", explanation: "(103テキストP.234参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問22-1", question: "長期修繕計画は概ね10年を超える修繕計画を指すことが多く、実施を見据えた現実的な計画である。そのため計画策定にあたっては修繕を行う対象と方法を費用を含めて明確にする必要がある。", answer: "誤り", explanation: "長期修繕計画と中期・短期修繕計画の説明が混在している。(103テキストP.238～239参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問22-2", question: "建物の劣化への対処方法である「修繕・更新」は、機能や性能が低下した機器等を竣工時と同等、又は実用上支障のない状態までに回復させる行為であり、主に社会的劣化への対処が目的である。", answer: "誤り", explanation: "主に物理的劣化への対処が目的である。(103テキストP.237参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問22-3", question: "建物の劣化への対処方法については予防保全を前提に検討し、リスク・コスト共に割高になる事後保全は避けるべきである。", answer: "誤り", explanation: "故障時のリスクが限定的であれば意識的に事後保全を想定して対応することもあり得る。(103テキストP.238参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問22-4", question: "改修計画は、ビルに新しい価値を生み出す業務であり、プロパティマネジメントの実務における通常業務と異なり、非定常の業務である。", answer: "正しい", explanation: "(103テキストP.240参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問23-1", question: "建物賃貸借契約は、更新の意思があるかどうか、更新を拒絶する正当事由があるかどうかなどに関わらず、契約期間の満了により契約を終了することができる。", answer: "誤り", explanation: "定期建物賃貸借契約の説明である。(103テキストP.247参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問23-2", question: "入居申込書は、入居希望テナントとの契約条件交渉に先立って、賃貸条件等、交渉に対する考え方を書面により受領するものであるが、一般的に法的拘束力を有さない。", answer: "正しい", explanation: "(103テキストP.246【図表IV-3-3】参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問23-3", question: "館内規則はビルへの入居に関し、当該ビルの標準仕様・工事区分・各種法的規制・建築・設備の規則及び条件を明示したものである。", answer: "誤り", explanation: "館内規則ではなく、貸方基準の説明である。(103テキストP.256、P.258参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問23-4", question: "プロパティマネジャーは通常、対象建物ごとに収入と支出の予測や修繕計画などをまとめた「PMレポート」をビルオーナー（アセットマネジャー等）へ年度ごとに提出する。", answer: "誤り", explanation: "PMレポートではなく、PMバジェットの説明である。(103テキストP.262参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問24-イ", question: "設備管理業務には主に日常運転監視業務と定期整備業務があり、その方法として設備管理員が施設に常駐して監視・点検などを行う常駐設備方式と、施設には常駐せず定期的に巡回する巡回設備管理方式がある。", answer: "正しい", explanation: "(103テキストP.264参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問24-ロ", question: "清掃衛生業務の特別清掃とは、日常清掃では落とせない汚れを専用の薬品、機材を使って定期的に除去する作業であり、床面やガラス面などが主な対象となる。", answer: "誤り", explanation: "これは定期清掃の説明である。(103テキストP.265～266参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問24-ハ", question: "巡回警備では、異常を検知してから警備対象施設まで30分以内（都内などの場合は25分以内）に到着しなければいけないことが警備業法で定められている。", answer: "誤り", explanation: "これは機械警備の説明である。(103テキストP.266～267参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問24-ニ", question: "プロパティマネジメントにおけるコンストラクションマネジメントとは、修繕工事・改修工事に関わる企画・提案、工事管理を通じて品質・工期・コストの最適化を図ることをいう。", answer: "正しい", explanation: "(103テキストP.269参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問25-1", question: "建築物衛生法で規定される特殊建築物の維持管理権原者は、特殊建築物の維持管理が環境衛生上適正に行われるように監督させるため、建築物環境衛生管理技術者免状を有する者のうちから、建築物環境衛生管理技術者を選任しなければならない。", answer: "誤り", explanation: "特殊建築物でなく特定建築物。(103テキストP.271～272参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問25-2", question: "消防法において全ての防火対象物は、自衛消防組織を設置しなければならない。", answer: "誤り", explanation: "自衛消防組織を設置しなくてはならないのは防災管理が義務付けられている防火対象物に限定される。(103テキストP.276参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問25-3", question: "電気事業法における電気主任技術者の外部委託とは、自社で電気主任技術者を選任せず外部の組織に保安管理業務を委託することである。", answer: "正しい", explanation: "(103テキストP.277参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問25-4", question: "建築基準法において建築確認申請が必要な建築行為は新築工事に限られる。", answer: "誤り", explanation: "(103テキストP.279～280参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問26-1", question: "PRIは2016年に公表された、サステナビリティ報告書の作成において準拠するガイドラインであり、企業が経済・環境・社会に与える様々なインパクトについて一般の人々に情報提供する際の国際的なベストプラクティスを反映した基準である。", answer: "誤り", explanation: "PRIは投資にESGの視点を組み入れる投資原則である。サステナビリティ報告書のガイドラインは、GRIスタンダードである。(103テキストP.293～294参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問26-2", question: "TCFD（気候関連財務情報開示タスクフォース）が提出した最終報告書は、企業に対して、気候変動のリスクと機会が財務に及ぼす影響を整理した上で気候関連情報を開示することを推奨している。", answer: "正しい", explanation: "(103テキストP.294参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問26-3", question: "GRESBは、欧州の主要年金基金などを中心に2009年に創設されたESGの取り組みを評価するフレームワークで、不動産業界をはじめとした実物資産を対象としていることが特徴であり、物件単位でESGの取り組みと実績を評価している。", answer: "誤り", explanation: "物件単位ではなく会社やファンド単位でESGの取り組みと実績を評価している。(103テキストP.295参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問26-4", question: "CRREMは、脱炭素社会に向けた物理リスクを管理し、パリ協定の2℃及び1.5℃目標に整合させるため、商業用及び住宅用不動産セクターの脱炭素化の道筋（パスウェイ）を科学的根拠に基づき定義するプロジェクトである。", answer: "誤り", explanation: "CRREMが管理するのは、物理リスクではなく移行リスクである。(103テキストP.297参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問27-イ", question: "LEEDは、グリーンビルディングとして環境性能を様々な視点から評価するため、エネルギー効率だけでなく、敷地選定、水の利用、立地と交通、材料と建築、室内環境、総合的プロセスなど複数の評価分野（カテゴリー）が設けられている。", answer: "正しい", explanation: "(103テキストP.303参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問27-ロ", question: "BELSは、建築物省エネ法に準じた評価手法を採用しており、(1)室内環境、(2)サービスの質、(3)敷地の屋外環境、(4)エネルギー、(5)資源・素材、(6)敷地外環境など、持続可能性の様々な側面を多面的に評価し、「環境品質」(Q)値と「環境負荷」(L)値の比率である総合指標で評価している。", answer: "誤り", explanation: "BELSは省エネルギー性能を表示する制度である。「(1)室内環境～」以降の記述の内容はCASBEEの評価項目である。(103テキストP.302～303参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問27-ハ", question: "日本の不動産市場においても、グリーンビルディング認証が不動産のキャッシュフローや価値に与える影響（グリーン・プレミアム）が存在することを示した実証研究が複数発表されている。", answer: "正しい", explanation: "(103テキストP.307参照)" },
  { subject: "103. 不動産投資の基礎", no: "午前問27-ニ", question: "ESGフレームワークの一つであるGRESBの評価項目には、グリーンビルディング認証を取得した物件の面積割合も含まれており、物件レベルでのESGの取り組みが企業・ファンドレベルでの評価につながるようになっている。", answer: "正しい", explanation: "(103テキストP.300参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問28-イ", question: "105科目のテキストでは、ファイナンスという言葉は、広義には資金調達だけではなく投資理論なども含むものとして使用している。", answer: "正しい", explanation: "(105テキストP.10参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問28-ハ", question: "不動産ファイナンスでは、仕組みを構築する際に、倒産隔離性を確保することが重要だと言われるが、当該事業主体にファイナンスを行っている債権者から見た場合には、第三者の債権者が出現しないことがより重要となる。", answer: "正しい", explanation: "事業主体に対する債権者が債権回収を行う場合に、第三者の債権者が出現しないことが重要である。(105テキストP.15～16参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問28-ニ", question: "J-REITへのファイナンスは、一般に不動産ファンドは投資期間が有限であることに対し、期限の定めが無い事業主体であることから、継続企業を前提としてファイナンスの可否を判断する必要がある。", answer: "正しい", explanation: "(105テキストP.19参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問29-イ", question: "社債を投資家に対して発行して資金調達する場合には、投資家保護のために必ず社債管理者が設置される。", answer: "誤り", explanation: "各社債の金額が1億円以上である場合など一定の条件では社債管理者の設置は不要である。(105テキストP.31参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問29-ロ", question: "SPV自体の倒産隔離の方法として、現在は慈善信託によるものが主流となっている。", answer: "誤り", explanation: "現在は一般社団法人が利用される。(105テキストP.34～35参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問29-ハ", question: "オリジネーターなどは、一般社団法人を設立するための費用を基金拠出の形で負担し、併せて一般社団法人に対する議決権を有する。", answer: "誤り", explanation: "一般社団法人に対する議決権を有しない。(105テキストP.36参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問29-ニ", question: "組合は、民法上の任意組合、商法上の匿名組合、投資事業有限責任組合契約に関する法律に基づく投資事業有限責任組合及び有限責任事業組合契約に関する法律に基づく有限責任事業組合があるが、いずれも組合事業の制限はない。", answer: "誤り", explanation: "投資事業有限責任組合には組合事業の制限あり。(105テキストP.42【図表II-2-9】参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問30-イ", question: "債権譲渡は譲渡人と譲受人との契約で行うことができ、債務者の関与は不要であるから、そのままでは誰が正当な債権者であるのか債務者にはわからない。そこで金銭債権の証券化において、オリジネーターがサービサーとしてサービシング業務を行っているか否かに拘らず、債務者対抗要件として債務者への譲渡の通知などを行なう。", answer: "誤り", explanation: "オリジネーターがサービサーとしてサービシング業務を行っている場合は、債務者への譲渡の通知などは行わないのが一般的である。(105テキストP.49～50参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問30-ロ", question: "債権譲渡については原債権者から債務者に確定日付ある証書で承諾すること、又は債権譲渡登記ファイルに譲渡の登記がなされることが第三者対抗要件となるが、オリジネーターがサービサーとしてサービシング業務を行っている場合は当該対抗要件を具備しないのが一般的である。", answer: "誤り", explanation: "オリジネーターがサービサーとして業務を行っている場合でも第三者対抗要件の具備は必須である。(105テキストP.50～51参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問30-ハ", question: "金銭債権の証券化において、動産・債権譲渡特例法に基づいて第三者対抗要件を具備する場合、債権譲渡登記を行うものの、オリジネーターがサービサーとしてサービシング業務を行っている場合、登記事項証明書を交付して債務者に通知したり、債務者の承諾を得ないのが一般的である。", answer: "正しい", explanation: "(105テキストP.51参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問30-ニ", question: "動産・債権譲渡特例法によれば、債権譲渡登記がされた場合において、譲渡人若しくは譲受人が当該債権の債務者に債権譲渡登記に係る登記事項証明書を交付して通知をするか、又は当該債務者が承諾をすることにより、債務者対抗要件が具備されたものとみなされる。", answer: "正しい", explanation: "(105テキストP.50～51参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問32-1", question: "投資法人債の発行市場は、米国の不動産バブルの崩壊を受けて、2008年から2009年にかけて、資金調達額が大幅に落ち込んだ。", answer: "正しい", explanation: "(105テキストP.81～82参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問32-2", question: "ESG推進の流れの中で、新規に起債される投資法人債の約8割がSDGs債となっており、特にソーシャルボンドの占める割合が高い。", answer: "誤り", explanation: "SDGs債のうち、特に占める割合が高いのはグリーンボンド。(105テキストP.89参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問32-3", question: "投資法人債のプライシングにおいては、原則はスプレッド・プライシングという手法が使われ、引受証券会社と機関投資家の間ではスプレッドの目線感の擦り合わせが行われる。", answer: "正しい", explanation: "(105テキストP.92参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問32-4", question: "J-REITに債券投資する機関投資家は、その属性ごとに運用方針が異なるが、基本的にはそれぞれのALM（Asset Liability Management）の考え方に基づき投資判断をしている。", answer: "正しい", explanation: "(105テキストP.93参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問33-1", question: "日本銀行が「異次元の金融緩和」を開始した2013年は、J-REITにおいて公募増資（IPOやPO）が活発に行われ、1兆円を超えるエクイティファイナンスがあった。", answer: "正しい", explanation: "(105テキストP.80～81参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問33-2", question: "公募増資の場合、投資家保護の観点から、有価証券届出書や目論見書といった「法定開示」や金融商品取引所が定めるルールに則った「適時開示」を要求される。", answer: "正しい", explanation: "(105テキストP.94参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問33-3", question: "地域金融機関や個人投資家の資金は、J-REITの個別銘柄に直接向かうこともあるが、投資信託を通じてJ-REIT市場に流入している部分も大きい。", answer: "正しい", explanation: "(105テキストP.104参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問33-4", question: "ここ数年は東京証券取引所で取引された総売買代金のうち、委託取引の約7割が個人投資家であり、J-REIT市場を牽引していると言っても過言ではない。", answer: "誤り", explanation: "委託取引の約7割を占めているのは海外投資家。(105テキストP.104参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問36-イ", question: "グリーンボンドとはグリーンプロジェクトに要する資金を調達するために発行する債券をいう。ソーシャルボンドとは社会的課題に取り組むプロジェクトの資金を調達するために発行される債券である。そして、サステナビリティボンドとは資金使途を環境・社会の持続可能性に貢献する事業に限定した債券をいい、グリーンボンドとソーシャルボンドの両方の特性を併せ持つ債券といえる。", answer: "正しい", explanation: "(105テキストP.137参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問36-ロ", question: "GRESB（グローバル不動産サステナビリティ・ベンチマーク）は、不動産会社・ファンドのESG配慮を測る年次評価である。責任投資原則（PRI）を主導した欧州の年金基金グループが中心となり2019年に創設された。", answer: "誤り", explanation: "GRESBは2009年に創設され、欧米・アジアの主要機関投資家が投資先を選定する際に活用している。(105テキストP.137参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問36-ハ", question: "J-REITにとっての「ガバナンス」とは「投資主利益の最大化を目的として運用を行う」という点にある。ガバナンスが欠如する場合に多く見られる点は「スポンサーとの利益相反問題」である。", answer: "正しい", explanation: "(105テキストP.135～136参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問37-イ", question: "企業価値は資本構成から独立したものであり、負債比率の大小は企業価値に影響を及ぼさない。", answer: "誤り", explanation: "この記述は、法人税がない場合のMM理論に関する記述である。(105テキストP.153～P.157参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問37-ロ", question: "負債の節税効果が生じるため、負債比率の大きい企業ほど企業価値が高くなる。", answer: "誤り", explanation: "負債には節税効果があるが、負債比率が高くなり過ぎると、節税効果の増加以上に倒産コストの期待値が増大するので、企業価値は減少に転じる。(105テキストP.157～P.161参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問37-ハ", question: "資本構成に負債があると、企業価値評価において倒産コストが織り込まれるようになるため、負債がなく株主資本だけの場合に企業価値は最大となる。", answer: "誤り", explanation: "負債比率が小さいうちは、倒産コストの期待値の増加よりも節税効果の増加の方が大きい場合が多く、そのような条件では、負債のある企業の方が企業価値は大きい。(105テキストP.159～P.161参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問37-ニ", question: "企業価値が最大化する負債の水準は、追加的に負債を取り入れた場合の倒産コストの期待値の限界的増加が負債の節税効果のそれと拮抗する水準である。", answer: "正しい", explanation: "(105テキストP.160【図表V-2-6 負債依存度と倒産コスト】参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問38-イ", question: "「日経平均株価（日経225）」が下落した場合には、「TOPIX（東証株価指数）」も下落する。", answer: "誤り", explanation: "日経平均は株価平均型、TOPIXは時価総額加重型のインデックスであるため、日経平均が下落した場合、TOPIXも下落するとは限らない。(105テキストP.165～166参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問38-ロ", question: "東証REIT指数には、いわゆる配当込みインデックスとそうでないものとがある。", answer: "正しい", explanation: "(105テキストP.168参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問38-ニ", question: "「日経平均株価（日経225）」は、株式時価総額を指数化したものである。", answer: "誤り", explanation: "「日経平均株価」は、株価平均型のインデックスであり、構成銘柄の株価の合計を構成銘柄の数で除して算出される。(105テキストP.165参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問41-1", question: "IRRは同額の資金を回収するならば回収のタイミングによらず一定となる。", answer: "誤り", explanation: "同じ金額を回収する場合には早く回収する方がIRRは高くなる。(105テキストP.189～P.190参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問41-2", question: "当初の投資額と同額を投資の終了時に回収する場合でも、期中で得られる配当等のキャッシュフローが年率で3%の場合、IRRは3%とならない。", answer: "誤り", explanation: "投資額と回収額が同じ場合で期中収益が3%の場合はIRRも3%となる。(105テキストP.189～P.190参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問41-3", question: "IRRは投資額と回収するキャッシュフローの現在価値の総和がゼロとなる割引率である。", answer: "正しい", explanation: "NPV（ネットプレゼントバリュー）がゼロとなる割引率である。(105テキストP.189～P.190参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問41-4", question: "IRRと債券のフォワードレートは同じ概念である。", answer: "誤り", explanation: "フォワードレートではなく最終利回りと同じ概念である。(105テキストP.189～P.190参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問43-1", question: "資産A・Bについてのリターンの相関係数は0.5である。", answer: "誤り", explanation: "この情報からはAとBの相関係数は確認できない。(105テキストP.195～P.200参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問43-2", question: "このポートフォリオの期待リターンは6%である。", answer: "正しい", explanation: "(0.5×5%)+(0.5×7%)=6%(105テキストP.195～P.200参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問43-3", question: "資産A・Bについてのリターンの相関係数が小さくなるほど、ポートフォリオのリスク（標準偏差）は大きくなる。", answer: "誤り", explanation: "2つの資産の相関係数が小さくなるほど、ポートフォリオのリスク（標準偏差）は小さくなる。(105テキストP.195～P.200参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問43-4", question: "資産Aと資産Bのリターンが正の完全相関にある場合、ポートフォリオの分散効果は最大化される。", answer: "誤り", explanation: "正の完全相関にある場合、分散効果は得られない。(105テキストP.195～P.200参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問44-1", question: "効率的フロンティアとは同じ期待リターンで最も低いリスク、同じリスクで最も高い期待リターンを持つポートフォリオの集合である。", answer: "正しい", explanation: "(105テキストP.203～P.206参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問44-2", question: "「最小分散ポートフォリオ」とは、「効率的フロンティア」上でリスク（標準偏差）が最も低いポートフォリオである。", answer: "正しい", explanation: "(105テキストP.203～P.206参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問44-3", question: "リスク回避度が異なる2人の投資家が、共通の「効率的フロンティア」を想定している場合、この2人の「最適ポートフォリオ」は必ず同じ組み合わせとなる。", answer: "誤り", explanation: "同一の効率的フロンティアを想定していたとしても、投資家のリスク回避度によって最適ポートフォリオは異なる。(105テキストP.203～P.206参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問44-4", question: "「無差別曲線」とは、同じ効用水準が得られるリスクとリターンの組み合わせを結んだ曲線である。", answer: "正しい", explanation: "(105テキストP.203～P.206参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問45-1", question: "資産Aの期待リターンは、3.4%である。", answer: "正しい", explanation: "1%+1.2×(3%-1%)=0.034 となり、3.4%である。(105テキストP.206～P.216参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問45-2", question: "各資産を期待リターンの大きさの順に並べると、A＞B＞C＞Dである。", answer: "正しい", explanation: "(105テキストP.206～P.216参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問45-3", question: "資産Dの期待リターンは、安全資産のリターンと等しい。", answer: "誤り", explanation: "期待リターンは1%+0.01×(3%-1%)=1.02%となり、安全資産のリターンより高くなる。(105テキストP.206～P.216参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問45-4", question: "βがゼロの資産がある場合、その資産のシステマティックリスクとアン・システマティックリスクの合計は、常に0（ゼロ）にはならない。", answer: "正しい", explanation: "ベータがゼロであってもアン・システマティックリスクが必ずしもゼロとなるわけではない。(105テキストP.206～P.216参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問47-1", question: "利回り変化が同一であれば、デュレーションが長い債券の方が価格変動は大きくなる。", answer: "正しい", explanation: "(105テキストP.226～P.227参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問47-2", question: "割引債のデュレーションは残存期間と等しい。", answer: "正しい", explanation: "(105テキストP.226～P.227参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問47-3", question: "デュレーションは、キャッシュフローを受け取れるまでの期間をキャッシュフローの現在価値で単純平均したものである。", answer: "誤り", explanation: "単純平均ではなく加重平均したものである。(105テキストP.226～P.227参照)" },
  { subject: "105. 不動産ファイナンスの基礎", no: "午前問47-4", question: "同一満期、かつ満期時の償還元本も同じでクーポンの異なる固定利付債では、クーポンが大きい債券の方がデュレーションは短い。", answer: "正しい", explanation: "(105テキストP.226～P.227参照)" },
  { subject: "106. 不動産証券化と倫理行動", no: "午前問48-イ", question: "匿名組合出資持分の私募の取扱いを匿名組合の営業者から受託した金融商品取引業者の担当者が、金融商品取引業者等の名称や報酬を記載しないで契約締結前交付書面を顧客に交付した場合、当該担当者個人は直ちに金商法違反を理由として不法行為責任を負うことになる。", answer: "誤り", explanation: "直ちに金商法違反を理由として不法行為責任を負うという点が誤っている。(Web講義資料106 第II部P.3参照)" },
  { subject: "106. 不動産証券化と倫理行動", no: "午前問48-ロ", question: "有価証券の販売を行う金融商品取引業者は、法人として販売行為を行うものであり、その社員である担当者個人は法人の履行補助者として販売行為をするに過ぎないので、仮に当該担当者個人が販売時の投資家勧誘行為において民事上の説明義務違反となる行為をした場合でも、当該担当者個人が不法行為責任を負うことはない。", answer: "誤り", explanation: "個人が不法行為責任を負うことはない、という点が誤っている。(106テキストP.41、Web講義資料106 第II部P.5参照)" },
  { subject: "106. 不動産証券化と倫理行動", no: "午前問48-ハ", question: "上記ロの場合において、担当者個人の違法な勧誘行為により法人である金融商品取引業者等が不法行為責任を負った場合、金融商品取引業者等は担当者個人に、法人として支払った賠償額につき求償することができる。", answer: "正しい", explanation: "会社は個人に求償権を有する。(106テキストP.41、Web講義資料106 第II部P.5参照)" },
  { subject: "106. 不動産証券化と倫理行動", no: "午前問48-ニ", question: "金融庁が公表している「顧客本位の業務運営に関する原則」では、金融事業者は情報等を顧客が理解できるよう分かりやすく提供すべきであるとしている。しかし、同原則は法律上の規範ではないため、顧客が到底理解できないような説明を行った担当者個人は、不法行為責任を負うことはない。", answer: "誤り", explanation: "顧客本位の原則に違反するから直ちに不法行為責任を負うということではないが、説明義務違反に基づく不法行為責任を認める可能性がある。(106テキストP.32～33参照)" },
  { subject: "106. 不動産証券化と倫理行動", no: "午前問49-イ", question: "金融商品取引業者A社は金商法上の金融商品取引業者の登録において、投資運用業務、不動産信託受益権の売買の媒介業務のいずれの業務も行うことができる前提において、不動産信託受益権を保有する合同会社から有価証券の投資判断に関する一任業務を受託している当該金融商品取引業者A社を、買主候補B社から購入に係る媒介業務を受任してくれないかと打診された。このような事例の場合、当該金融商品取引業者A社として考慮すべきことは、忠実義務の問題ではなく善管注意義務の問題である。", answer: "誤り", explanation: "利益相反の可能性がある場合の忠実義務の問題である。(106テキストP.45参照)" },
  { subject: "106. 不動産証券化と倫理行動", no: "午前問49-ロ", question: "上記イの事例において、当該金融商品取引業者A社は、合同会社の保有する不動産信託受益権の購入を希望するB社から媒介業務受任を打診された際に謝絶したところ、B社は別の業者に媒介業務を委託し、B社が買主となった。A社は、合同会社からB社への売却を実行する運用行為において、複数の鑑定会社から取得した鑑定価格のうち最も低い価格を参考に売買価格を設定した。このような事例において、A社の行為は、A社が金商法上合同会社に負う忠実義務に反する可能性がある。", answer: "正しい", explanation: "A社は運用行為において合同会社に対して負う忠実義務に反した行動をしている可能性がある。(106テキストP.45参照)" },
  { subject: "106. 不動産証券化と倫理行動", no: "午前問49-ハ", question: "顧客本位の原則では、金融事業者は、取引における顧客との利益相反の可能性について正確に把握し、利益相反の可能性がある場合には、当該利益相反を適切に管理すべきであるとされているが、上記ロにおいてA社がB社から購入に際して媒介業務を打診された際に謝絶したことは利益相反を適切に管理していることと評価できる。しかし、合同会社からB社への売却価格を判断する際に複数の鑑定会社から取得した鑑定価格のうち最も低い価格を参考に売買価格を設定したことは、顧客の最善の利益を図るべきであるという顧客本位の原則に反する。", answer: "正しい", explanation: "顧客本位の原則においても「顧客の最善の利益を図るべき」とされている。(106テキストP.45参照)" },
  { subject: "106. 不動産証券化と倫理行動", no: "午前問49-ニ", question: "匿名組合出資を受けて不動産信託受益権を保有する合同会社が適格機関投資家等特例業務の届出をして自己運用業務を遂行する場合、当該合同会社は、金商法上、匿名組合員に対して忠実に業務を行う義務を負うが、当該合同会社が業務執行に関与できないから、匿名組合員から反対を受けるような不動産信託受益権の売却行為をしても忠実義務に反することはない。", answer: "誤り", explanation: "運用行為の中核である売却という行為で匿名組合員から反対を受けるようなことを行うことは信頼を裏切る行為といえる。(Web講義資料104上/第I部P.83参照)" },
  { subject: "106. 不動産証券化と倫理行動", no: "午前問50-イ", question: "不動産証券化ビジネスに関わる人々はプロフェッショナルと見なされ、プロである限り、法的義務が出てくる根拠、つまり、倫理的義務、信認義務を理解し、それに基づいて行動しなければならない。", answer: "正しい", explanation: "(106テキストP.8参照)" },
  { subject: "106. 不動産証券化と倫理行動", no: "午前問50-ロ", question: "信認義務とは、主に忠実義務と善管注意義務という二つの義務からなり、後者の善管注意義務とは、信認者・受益者の利益を第一に考え行動することである。", answer: "誤り", explanation: "信認者・受益者の利益を第一に考え行動することは忠実義務を指している。(106テキストP.14参照)" },
  { subject: "106. 不動産証券化と倫理行動", no: "午前問50-ハ", question: "善管注意義務を負うということは、取り組む際の姿勢を問題とするのであって、結果を問うものではない。", answer: "正しい", explanation: "(106テキストP.15参照)" },
  { subject: "106. 不動産証券化と倫理行動", no: "午前問50-ニ", question: "不動産証券化協会認定マスターが職業倫理規程に反する行為を行った場合は、不動産証券化協会による処分の対象となる。", answer: "正しい", explanation: "(106テキストP.64参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問16-イ", question: "SPCの倒産隔離には、SPC自体に倒産原因が発生しないようにするための措置があり、具体的には、法人としての事業目的を限定する定款の作成や、支払停止や不能にならないようにSPCを運営することが考えられるが、実際の運営においてSPC自体に倒産原因が発生しないような完全な仕組みを作ることはできない。", answer: "正しい", explanation: "(104/上テキストP.13、Web講義104/上第I部第1章P.14参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問16-ロ", question: "特定目的会社（以下「TMK」という場合がある。）は宅地建物取引業法を直接取得・保有することのできる媒体であるが、合同会社（以下「GK」という場合がある。）は不動産の信託受益権を保有する媒体としてのみ利用されており、特別目的会社としての合同会社が現物不動産を保有する仕組みは存在しない。", answer: "誤り", explanation: "SPCの性質を有するGKとTKを使い対象資産を現物不動産とする仕組みが可能である。(104/上テキストP.17、P.200参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問16-ハ", question: "投資法人と特定目的会社は、いずれも会社法上の法人ではなく、証券化で利用されることを目的として設立される特別の法人なので、それぞれの設立準拠法により設立されると、それだけで倒産隔離がされた法人となる。", answer: "誤り", explanation: "設立されただけで倒産隔離がなされるということはない。(104/上テキストP.121～122参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問16-ニ", question: "SPCに対して倒産手続き開始の申立てをすることのできるSPCの役員や債権者から、当該SPCに対して倒産手続き開始の申立てをしないことを誓約する書面を取得する方法は、SPCの倒産隔離を図るための有力な手段である。", answer: "正しい", explanation: "債権者からの放棄書は有効であり、SPCの倒産手続開始を防止する方法として有力な手段。(104/上テキストP.50参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問17-イ", question: "不動産証券化における売主からの倒産隔離とは、決済後に売主が倒産した場合でも買主となったSPCに支障がないようにするための概念である。従って、当該SPCが出口売却をして清算終了する前に売主が倒産しない限り、問題は発生しないことになる。以上から、売主からの倒産隔離を検討するということは、売主が数年内に倒産する確率がどの程度であるかを見極めることである。", answer: "誤り", explanation: "売主からの倒産隔離という措置は、売主が倒産した場合に発生するSPC側のリスクを回避するために要請されるものであり、決済後に売主が倒産した場合には問題が発生しないという考えは誤りである。(104/上テキストP.30参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問17-ロ", question: "対象不動産等の売主の財務状況が良好な場合でも、当該売主が、対象不動産等をSPCに譲渡した後も当該SPCに対して何らかの継続的関与を行う場合には、当該対象不動産等の売買について、法律上の真正売買性が問題となることがある。", answer: "正しい", explanation: "売主の財務状況が良好な場合でも証券化の仕組みでは問題となることがある。(104/上テキストP.40参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問17-ハ", question: "売主がSPCに対象不動産等を譲渡する場合の法律上の真正売買性は、売主と買主の法律関係の性質論の問題であるが、会計上のオフバランスの問題は、売主のみに関する会計処理の問題であるので、法律上の真正売買の議論と会計上のオフバランスの取扱いついて関連性はなく、それぞれ個別に検討され、結論付けられる。", answer: "誤り", explanation: "法律上の真正売買と会計上のオフバランスの関係は、密接不可分の関係にあり、結論が異なるということはないと言ってよい。(104/上テキストP.37～38参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問17-ニ", question: "不動産の売買契約の締結時及び決済時において売主が倒産原因を有していない場合でも、売買代金が不相当に安い場合には、決済後に当該売主の債権者が詐害行為取消権を行使する可能性に留意すべきである。", answer: "正しい", explanation: "売主の財務状況が証券化に与える影響としては、否認権や詐害行為取消権の行使も注意が必要である。(104/上テキストP.43参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問18-イ", question: "現物不動産を所有するオリジネーターが、当該不動産を譲り受ける買主と不動産売買契約を締結し所有権を買主に移転した場合、オリジネーターから当該不動産の建物を賃借していた者（既存テナント）は、その賃借権の対抗要件を具備していなくとも、買主との関係で、賃借人の地位を引き続き有することになる場合がある。", answer: "正しい", explanation: "(104/上テキストP.74参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問18-ロ", question: "現物不動産を所有するオリジネーターが、当該不動産を譲り受ける買主と不動産売買契約を締結し所有権を買主に移転した場合、買主は、所有権の移転によって既存テナントに対する賃貸人の地位をオリジネーターから自動的に承継するため、建物の所有権移転の対抗要件を具備せずとも、賃貸人としての権利を既存テナントに対して行使できる。", answer: "誤り", explanation: "所有権移転の登記を受けていなければならない。(104/上テキストP.71、Web講義104/上第I部第2章P.21参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問18-ハ", question: "現物不動産を所有するオリジネーターが当該不動産を買主に譲渡するときに、買主との間で、オリジネーターが既存テナントの占有の移転も受けているに対する賃貸人の地位を留保する合意と買主から対象不動産を賃借する合意をすることにより、テナントの承諾なく、オリジネーターと既存テナント間の賃貸借契約を従前通り存続させる方法がある。", answer: "正しい", explanation: "(104/上テキストP.72参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問18-ニ", question: "現物不動産を所有するオリジネーターが、当該不動産を買主に譲渡するときに、買主との間で、オリジネーターが既存テナントに対する賃貸人の地位を留保する合意と買主から対象不動産を賃借する合意をした場合には、後日、オリジネーターが、買主との賃貸借契約上の債務不履行により同契約を解除されると、テナントはその賃借権（転借権）を所有者である買主に対抗できなくなる。", answer: "誤り", explanation: "賃貸借関係の効果を定める民法第613条では...賃貸人の地位は譲受人に移転する。(104/上テキストP.79、Web講義104/上第I部第2章P.28参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問19-イ", question: "信託業法上の信託会社等が信託受託者として対象不動産の信託を受け、対象不動産を信託財産とした後、信託不動産の管理処分に係る投資判断を信託受託者自らが行わず、受益者の指図により行う場合、受益者は指図権者として信託受託者のために忠実に当該信託不動産の管理又は処分に係る指図を行わなければならない。", answer: "誤り", explanation: "信託業法上の指図権者は「信託財産の管理又は処分の方法について指図を行う業を営む者」という。(104/上テキストP.106、P.91～92参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問19-ロ", question: "現物不動産を所有するオリジネーターが信託会社等に不動産を信託して、SPCが当該不動産の信託受益権をオリジネーターから取得した場合、SPCは不動産登記上の信託登記に受益者として表示されないと第三者に当該信託受益権の取得を対抗できない。", answer: "誤り", explanation: "信託受益権譲渡の対抗要件は、対象不動産の信託登記上の受益者の変更をすることではない。信託法第94条。(104/上テキストP.69～70参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問19-ハ", question: "現物不動産を所有するオリジネーターが信託会社等と不動産管理処分信託契約を締結して取得した信託受益権を分割して、50名以上の複数の投資家に当該信託受益権の準共有持分を販売する場合には、信託業法上、オリジネーターは自己信託業の登録をする必要がある。", answer: "誤り", explanation: "自己信託業とは信託宣言に基づいて設定されるもので...当初委託者が信託受託者となるものである。(104/上テキストP.90、P.108参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問19-ニ", question: "土地のみを信託財産とする信託受託者が、受益者の指図により当該信託土地の上に建物を新築する工事請負契約の発注者となった場合には、同契約上の請負人は請負代金が未払いとなった場合の債権回収方法として、受益者の財産に強制執行をすることはできないが、信託財産に強制執行をすることはできる。", answer: "正しい", explanation: "受託者の工事請負契約上の債務は信託事務の処理として発生したものなので、「信託財産限定責任負担債務」となる。(104/上テキストP.43、Web講義104/上第I部第2章P.50参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問20-イ", question: "投資法人が金融商品取引法上の投資運用業の登録をしている資産運用会社に資産の運用委託をしていても、投資法人自体が当該資産の売買の法律効果の帰属を受けるためには、法人としての意思決定をしなければならない。これを受けて投資信託及び投資法人に関する法律では、投資法人について、株式会社と同様に、重要な資産の売買を投資法人の役員会の承認事項としている。", answer: "誤り", explanation: "投資法人の役員会は執行役員と監督役員から構成される...役員会の承認事項という文言は使用されていない。(104/上テキストP.119、P.120参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問20-ロ", question: "特定目的会社が特定資産を取得・保有する場合には、原則として特定資産を信託会社等に信託しなければならないが、特定資産が現物不動産の場合には、特定目的会社は、宅建業法上の免許を有することなどの一定の要件を具備した特定資産管理処分受託者に不動産の管理処分に係る業務を委託すれば、特定資産としての当該不動産を信託する必要はない。", answer: "正しい", explanation: "(104/上テキストP.159参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問20-ハ", question: "投資法人は使用人を雇用することができないが、特定目的会社にはそのような制限はない。また、特定目的会社では取締役が会社の意思決定機関として自由に有価証券に関する投資判断ができるが、投資法人は、役員や役員会が、法人の業務の執行や意思決定において自由に出資証券に関する投資判断をするという制度にはなっていない。", answer: "正しい", explanation: "(104/上テキストP.112、P.121参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問20-ニ", question: "TMKの特定社員の議決権の行使については、TMKの定款で特定社員が総会に出席しないでかつ議決権を行使しない場合には、決議事項について賛成するものとみなすという規定を置くことができる。投資法人の投資主の議決権の行使についても、規約で同様のみなし賛成の規定を置くことができる。", answer: "誤り", explanation: "みなし賛成の規定を置くことができるが、特定目的会社については...優先出資社員の議決権の行使について適用がある。(104/上テキストP.118、P.158参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問21-1", question: "主として不動産に対する投資を行う登録投資法人の資産の運用を行う資産運用会社は、金商法上の投資一任契約に基づく運用行為をするための登録をする必要があり、また、宅建業法上の免許を有しかつ同法第50条の2第1項の取引一任代理等の認可を必要とする。", answer: "誤り", explanation: "「投資一任契約」ではなく「資産の運用に係る委託契約」が締結される。(104/上テキストP.145～147参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問21-2", question: "投資法人の執行役員と監督役員は投資主総会で選任及び解任されるが（設立時を除き）、機動的な役員会の運営をするために執行役員は1名、監督役員は2名という員数の制限があり、執行役員が監督役員を兼任することはできない。", answer: "誤り", explanation: "執行役員は1名以上選任する必要があるが、複数の執行役員を選任することは禁止されているわけではない。(104/上テキストP.118、P.119参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問21-3", question: "投資法人が不動産信託受益権を特定資産として取得しようとする場合には、当該投資法人から資産の運用の委託を受けている資産運用会社は、必ず当該不動産信託受益権の取得前に、資産運用会社の利害関係人等ではない不動産鑑定士による鑑定評価を取得し、当該投資法人に通知をしなければならない。", answer: "誤り", explanation: "不動産や不動産信託受益権を特定資産として取得する前に取得する場合はこの限りではないという規定もある。(104/上テキストP.110参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問21-4", question: "投資法人が資産運用会社に支払う資産運用報酬の額を変更する場合には、投資法人の投資主総会の決議を要する。", answer: "正しい", explanation: "(104/上テキストP.110、P.117参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問22-イ", question: "不動産特定共同事業法上の不特契約のうち組合契約型の不特契約において、組合員の有する権利はすべて、金商法上の集団投資スキーム持分から除外されている。", answer: "誤り", explanation: "金商法制定時から金商法対象の集団投資スキーム持分から除外されていたが、その後改正され除外規定からさらに除外され、集団投資スキーム持分になった。(104/上テキストP.202参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問22-ロ", question: "組合員から金銭の出資を受けた任意組合の業務執行組合員が、その出資金全部を使い、現物不動産を特定資産とするTMKの優先出資証券を取得することは、当該業務執行組合員による金商法上の自己運用行為に該当しない。", answer: "誤り", explanation: "有価証券に対する投資として運用を行うことは自己運用行為に該当する。(104/上テキストP.201、P.245参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問22-ハ", question: "不動産信託受益権を保有している匿名組合の営業者が、投資家に匿名組合契約の締結の勧誘行為をすることは、当該営業者による金商法上の金融商品取引行為に該当する。また、当該営業者が、第三者の保有する不動産信託受益権の販売の勧誘行為をすることも金融商品取引行為に該当する。", answer: "正しい", explanation: "(104/上テキストP.225、P.220参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問22-ニ", question: "投資事業有限責任組合契約上の有限責任組合員は、当該組合契約に有限責任組合員であることを明記し、登記上も有限責任組合員としての氏名又は名称及び住所を登記した場合に限り、当該組合の債務について有限責任を負う旨を第三者に対抗できる。", answer: "誤り", explanation: "投資事業有限責任組合では、組合の債務について有限責任を負う組合員の存在が認められている。(104/上テキストP.175～176参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問23-イ", question: "金商法によって不動産信託受益権が同法上の有価証券とみなされるようになったため、同法施行以降、宅地建物取引業者は、自らが保有する宅地建物を信託受益権にして当該受益権を第三者に売却する場合には、受益権の売買を反復継続するものとして金商法上の金融商品取引業者としての登録が必要とされるようになった。", answer: "誤り", explanation: "金商法施行以降、宅地建物取引業者は...宅建業法上の重要事項の説明をしなければならなくなった。(104/上テキストP.220参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問23-ロ", question: "不特法上の特例事業者として不動産を保有する法人から、組合契約型の不特契約の締結の媒介の委託を受けた不動産特定共同事業者が、資本金10億円の株式会社に不特契約締結の勧誘行為をする場合、金商法上のオプトアウト告知をする義務はない。", answer: "誤り", explanation: "不特法上の特例事業者が締結する任意組合型の不特契約の権利は、金商法上の集団投資スキーム持分に該当する。(104/上テキストP.254参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問23-ハ", question: "匿名組合の営業者（親ファンド）たる合同会社が、金商法上の適格機関投資家1名のほかに適格機関投資家ではない純資産1億円を有する株式会社を匿名組合員として、匿名組合契約を締結して出資を受け、不動産信託受益権を保有する別の合同会社（子ファンド）に匿名組合出資をする場合、親ファンドが自己運用行為に係る適格機関投資家等特例業務の届出をしているときは、子ファンドが投資運用業の登録義務から除外される方法がある。", answer: "正しい", explanation: "いわゆる二層構造の特例があるということ。(104/上テキストP.251参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問23-ニ", question: "現物不動産に投資をする合同会社が、合同会社の社員持分を発行し投資家を募り、不動産取引をすることによって得られる利益を合同会社の社員に分配する仕組みでは、合同会社は、不特法上の許可取得や金商法上の投資運用業の登録をする必要はないが、合同会社の社員となる投資家の勧誘行為をする上では、金融サービス法の適用を受ける場合がある。", answer: "正しい", explanation: "(104/上テキストP.221参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問24-イ", question: "不特法上の特例事業（倒産隔離型スキーム）で匿名組合型の不特契約の締結をして事業参加者となる者が500人以上となるような不特契約の締結の申込みの勧誘を行う行為は、金商法上の有価証券の募集（公募）の取扱いに該当する。", answer: "誤り", explanation: "特例事業における不特契約上の権利は...金商法上の募集（公募）の取扱いには該当しない。(104/上テキストP.233、P.234参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問24-ロ", question: "特例事業以外の不動産特定共同事業法上の不特契約で、金銭の出資を行い契約終了時にも金銭の返還を行う場合、当該不特契約の締結の媒介行為を行う不特法上の第二号事業者は、相手方が金商法上の特定投資家の場合、金融サービス法上の重要事項の説明を行う必要がないので、金商法に基づきオプトイン手続きをした上で、当該相手方に対する金融サービス法上の重要事項の説明を省略することができる。", answer: "誤り", explanation: "金商法上の有価証券については...金商法の募集の取扱いに該当する。(104/上テキストP.252参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問24-ハ", question: "証券会社が、事業者ではない個人に投資法人の発行する投資口の取得の申込みの勧誘を行う際に断定的判断の提供を行った結果、当該個人が投資口を取得した場合、当該個人は投資口の取得に係る意思表示の取消しに制限を受けることはない。", answer: "誤り", explanation: "消費者は、当該株式等の引受に係る意思表示については...取消しをすることができる。(104/上テキストP.264参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問24-ニ", question: "金融商品取引業者が、事業者ではない個人に不動産信託受益権の販売の勧誘を行う際に、この受益権売買契約を締結すれば対象不動産の売却価格が1年後に1割上がり投資収益が1.1倍になると説明し、勧誘の相手方である当該個人がそれを信じて受益権売買契約を締結した場合、当該個人はこのような投資商品に関する契約についても消費者契約法上の取消権を行使できる。", answer: "正しい", explanation: "(104/上テキストP.260、P.263参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問25-1", question: "ホテル宿泊業を行うことのみを目的とする合同会社が、ホテル建物を取得し、営業者として匿名組合員となる投資家との間で匿名組合契約を締結した。この場合ホテル建物の敷地が宅建業法上の宅地に分類され、合同会社が敷地について賃借人として敷地所有者と土地賃貸借契約を締結しても、合同会社は不特法上の許可を得る必要はない。", answer: "正しい", explanation: "ホテル宿泊業を目的とする匿名組合は不特法の適用範囲外。(104/上テキストP.193参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問25-2", question: "上記イの事例で、合同会社が金商法上の適格機関投資家に匿名組合契約の締結の勧誘を行う場合には、合同会社は金融商品取引業の登録をせずに、適格機関投資家等特例業務の届出をして勧誘行為を行うことができる。", answer: "誤り", explanation: "匿名組合契約は不特法上の不特契約ではないが、金商法上の集団投資スキーム持分に該当する。(104/上テキストP.221、P.248参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問25-3", question: "A社は、「ホテル宿泊業を行うことを目的として、ホテル不動産を信託財産とする信託受益権を取得・保有・売却することを出資対象事業とする合同会社（GK）を設立し、取得資金を賄うために投資家が合同会社に匿名組合契約に基づく出資を行うスキーム」を考えたとする。この場合、A社がそのようなスキームの策定、信託会社等の選定、投資家募集や投資一任業務を行う金融商品取引業者の選定を合同会社に助言するためには、金商法上の助言業務の登録が必要となる。", answer: "誤り", explanation: "金融商品取引行為は限定列挙されており、本問でいうスキームを考案したりする行為は金融商品取引行為として規定されていない。(104/上テキストP.215～216参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問25-4", question: "上記ハの事例で、A社がGK-TKスキームを前提として対象となるホテル不動産を特定し、事業収益の予想などを示す資料を持参した上で投資家に匿名組合出資の勧誘を行う行為は、GKが設立されていない段階であれば、金商法上の私募の取扱いをしたことにはならない。", answer: "誤り", explanation: "アレンジ業務を超えて投資家の勧誘行為まで行うと、金融商品取引行為に該当する可能性が生じる。(104/上テキストP.232参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問26-イ", question: "宅地建物取引業者がその保有する現物不動産（収益物件）を信託会社等に信託し、それにより生じた受益権を自ら投資家に反復継続して販売するときには、売主として金商法、宅建業法及び金融サービス法上の説明義務を負う。", answer: "誤り", explanation: "宅建業法上の重要事項説明義務を負うことはない。(104/上テキストP.217、P.237、P.270、P.272参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問26-ロ", question: "宅地建物取引業者が第二種金融商品取引業者でもある場合に自ら保有する不動産信託受益権（金商法上の既発行の有価証券とする）を金商法上の特定投資家に販売する場合でも、適合性のない投資家に勧誘を行ってはならないという金商法第40条第1号の規制の適用は受ける。", answer: "誤り", explanation: "金融商品取引業者が行う金融商品取引契約の締結の相手方が特定投資家の場合には適用されない。(104/上テキストP.278参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問26-ハ", question: "不動産特定共同事業商品の販売時の契約成立前交付書面に年5%の想定利回りと記載されていたところ、運用期間中テナントの倒産によって想定された利回りが達成できなくなった。この場合、事業参加者が不動産特定共同事業者に、年5%の利回りとなるように金銭の提供を約束させる行為は、不特法上禁止されている。", answer: "正しい", explanation: "(104/上テキストP.196参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問26-ニ", question: "消費者契約法上の事業者が、反復継続して、不動産信託受益権の売買契約を事業者ではない消費者と締結する際に、当該受益権の将来の市場価格について断定的判断を提供していた。この場合、当該消費者は、事業者が断定的判断の提供を受けたという事実のみを主張立証しただけでは、当該売買契約の意思表示を取消すことはできない。しかし、金融サービス法上は、当該主張立証だけで、事業者に対して損害賠償責任を負う。さらに、当該消費者が元本である当初の売買価格からの欠損額（元本欠損額）を主張立証した場合には、断定的判断の提供と損害との因果関係を主張立証しなくとも、当該断定的判断の提供によって生じた不法行為上の損害の額が推定され、その推定が崩されない限り、不法行為の請求が認められることになる。", answer: "正しい", explanation: "(104/上テキストP.261、P.275参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問27-1", question: "金商法が規定する「有価証券」を業として販売するためには、原則として内閣総理大臣の登録が必要である。", answer: "正しい", explanation: "(104/上テキストP.294、P.297参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問27-2", question: "金商法が規定する有価証券の販売に当たる役職員は、外務員の登録をせずに、みなし有価証券の販売をすることができる。", answer: "誤り", explanation: "原則として外務員の登録が必要。(104/上テキストP.294参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問27-3", question: "信託受益権・不特契約に基づく出資持分はみなし有価証券であるが、匿名組合・任意組合の出資持分は、原則としてみなし有価証券ではない。", answer: "誤り", explanation: "信託受益権、匿名組合・任意組合の出資持分は、原則としてみなし有価証券である。(104/上テキストP.294～295参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問27-4", question: "不動産証券化商品の販売に当たり必要となる登録、許可、届出等を欠いたとしても、刑罰や行政処分の対象となることはない。", answer: "誤り", explanation: "必要な登録・許可・届出等を欠いた場合は、刑罰や行政処分の対象となる。(104/上テキストP.295参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問28-イ", question: "投資運用業の財産要件は金商業4種（第一種金融商品取引業、第二種金融商品取引業、投資助言・代理業、投資運用業）で最も緩く、最低資本金規制及び最低純資産額規制が課されていない。", answer: "誤り", explanation: "投資運用業の財産要件は比較的厳しい。(104/上テキストP.299参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問28-ロ", question: "総合不動産投資顧問業者としての登録を受けている者でなくとも、不動産関連特定投資運用業を行うことができる場合がある。", answer: "正しい", explanation: "(104/上テキストP.298参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問28-ハ", question: "投資運用業者が、宅地建物取引業の免許を受けて宅地建物取引業を兼業する場合、内閣総理大臣の承認を受けなければならない。", answer: "誤り", explanation: "宅地建物取引業は届出業であり、承認を受ける必要はない。(104/上テキストP.299参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問28-ニ", question: "投資運用業者に自主規制団体への加入を強制する法律はないが、自主規制規則に準ずる社内規則を作成していないことは金融商品取引業者の登録拒否要件に当たる。", answer: "正しい", explanation: "(104/上テキストP.300参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問29-1", question: "適格機関投資家等特例業務とする場合には、持分の私募につき第二種金融商品取引業の登録が不要であることのみならず、資産の運用につき投資運用業の登録も不要である。", answer: "正しい", explanation: "適格機関投資家等特例業務は、法令上の要件を満たせば、いずれの登録も不要となる。(104/上テキストP.248、P.302参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問29-2", question: "適格機関投資家の範囲には、第一種金融商品取引業者や投資法人、銀行等だけでなく、一定の要件を満たした個人も含まれる。", answer: "正しい", explanation: "保有有価証券残高10億円以上かつ証券口座開設後1年を経過した個人なども該当する。(104/上テキストP.302参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問29-3", question: "適格機関投資家等特例業務は、適格機関投資家以外の者を49名以内に限定していれば、一般投資家も相手にすることができる。", answer: "誤り", explanation: "過去に不適切な勧誘により一般投資家が被害を受けるケースがあったことから、「適格機関投資家以外の者」の範囲に制限が設けられることになった。(104/上テキストP.302参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問29-4", question: "特例業務届出者には、事業年度毎に、事業報告書の内閣総理大臣への提出義務、及び業務や経理の状況を記した説明書類の措置・縦覧義務が生じる。", answer: "正しい", explanation: "(104/上テキストP.302参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問30-イ", question: "金商法において、第一種金融商品取引業者が、発行者等である顧客の非公開の情報を自己や第三者のために濫用する行為は禁止されているが、当該顧客の非公開情報を親法人等・子法人等と授受することは規制されていない。", answer: "誤り", explanation: "親法人等・子法人等と授受することは規制されていない、という部分は誤り。(104/上テキストP.325参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問30-ロ", question: "個人情報の保護に関する法律において、個人情報取扱事業者が個人データを第三者に提供する場合、原則として本人の事前の同意のほか、個人データを提供する事業者側で所定の事項の記録を要するが、受領する事業者側での対応は必要とされていない。", answer: "誤り", explanation: "受領側でも所定の事項の確認・記録を要す。(104/上テキストP.326参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問30-ハ", question: "インサイダー情報を所定の経路で知った者は、インサイダー取引を実行することだけではなく、他人の利益や損失回避を図ってインサイダー情報を伝達したり、取引の勧誘を行ったりすることも禁止されており、これに反した場合、刑事罰の対象となり得る。", answer: "正しい", explanation: "(104/上テキストP.327参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問30-ニ", question: "投資判断に影響する未公表情報の取扱いについて、適時開示制度上開示義務のない情報であっても、企業が重要な情報を特定の者（例えば証券会社のアナリスト）に提供した場合、投資家全般への公表が求められるというルール（フェアディスクロージャールール）が存在する。", answer: "正しい", explanation: "(104/上テキストP.328参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問31-イ", question: "投資法人の設立は、出資を金銭に限る募集設立のみならず、不動産や労務などの金銭以外の出資も認める発起設立によっても行うことができる。", answer: "誤り", explanation: "投資法人の設立の手法は、発起設立は認められておらず、募集設立に限られる。(104/上テキストP.331～332参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問31-ロ", question: "投資法人は、設立の届出、設立時募集投資口の引受け・払込み、それらに係る役員による調査・創立総会を経て、設立登記により法人として成立する。", answer: "正しい", explanation: "(104/上テキストP.332参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問31-ハ", question: "資産運用会社は、一定の場合には、投資法人から委託された資産運用業務の全部を外部に再委託することが認められる。", answer: "誤り", explanation: "投資法人から委託された資産運用業務の全部の再委託はできない。(104/上テキストP.335参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問31-ニ", question: "投資法人が不動産信託受益権の売買時のデューデリジェンスについては、利害関係人等ではない不動産鑑定士の鑑定評価を、事前又は事後に得る必要がある。", answer: "正しい", explanation: "(104/上テキストP.335参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問32-イ", question: "ファンドは、投資家から発行者への請求による出資の払戻しを認めるかどうかによって、オープンエンド型とクローズドエンド型に分けられるが、私募REITは、通常、投資主から投資法人への請求による払戻しを認めるオープンエンド型となっている。", answer: "誤り", explanation: "私募REITは、通常、払戻しを認めるオープンエンド型となっている。(104/上テキストP.347～348参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問32-ロ", question: "投資主の請求により投資口の払戻しをしない旨の規約の定めがある投資法人（クローズドエンド型投資法人。現在のJ-REITは全て該当）は、投資証券を発行できない。", answer: "誤り", explanation: "クローズドエンド型投資法人の場合は、投資証券を発行することができる。(104/上テキストP.348参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問32-ハ", question: "私募REITは投資家にとって流動性が乏しい反面、非上場のため通常は投資口価格の短期的変動がない（基準価額が物件の鑑定評価額をベースに算出されるのみ）という特徴がある。", answer: "正しい", explanation: "(104/上テキストP.348参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問32-ニ", question: "投信法においては、投資法人は投資証券を発行することが原則であり、投資口の譲渡には投資証券の交付を要するため、私募REITでは、投資証券の存在は避けられない。但し、オープンエンド型の私募REITでは、実務上は投資法人規約の定めに基き、投資主の請求があるまでは投資証券を発行しないこととされている。", answer: "正しい", explanation: "(104/上テキストP.348参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問33-1", question: "資産運用会社Bは、この取引に先立ち、投資信託協会から事前に取引の承認を受けなければならない。", answer: "誤り", explanation: "投資信託協会の規則では事前の承認を受ける規則は無い。(104/上テキストP.367参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問33-2", question: "資産運用会社Bは、この取引に先立ち、原則として投資法人Aの同意をあらかじめ得なければならない。", answer: "正しい", explanation: "(104/上テキストP.365参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問33-3", question: "資産運用会社Bは、この取引が行われた場合、Bの役職員の立場にある不動産鑑定士に対象不動産の鑑定評価を行わせ、その結果を投資法人Aへ通知しなければならない。", answer: "誤り", explanation: "利害関係人等や役職員等の一定の者を除く外部の不動産鑑定士に鑑定評価を行わせる必要がある。(104/上テキストP.366～367参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問33-4", question: "資産運用会社Bは、この取引が行われた場合、原則として6ヶ月以内に取引報告書面を投資法人Aに交付しなければならない。", answer: "誤り", explanation: "遅滞なく交付しなければならない。(104/上テキストP.366参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問34-1", question: "上場投資法人等の会社関係者が行った投資口の売買がインサイダー取引にあたるか否かは、その上場投資法人等の業務等に関する未公表の重要事実を知ったうえで行った取引かどうかで、形式的に判断される。", answer: "正しい", explanation: "(104/上テキストP.377参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問34-2", question: "上場投資法人等の会社関係者には、その投資法人の資産運用会社の役員等も含まれる。", answer: "正しい", explanation: "(104/上テキストP.380～381参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問34-3", question: "上場投資法人等の業務等に関する重要事実には、その投資法人の資産運用会社についての決算予想の修正も含まれる。", answer: "誤り", explanation: "資産運用会社に係る決算事実は、上場投資法人等の重要事実には該当しない。(104/上テキストP.382～386参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問34-4", question: "インサイダー取引規制に違反した場合の罰則は、個人だけでなく法人にも科される場合がある。", answer: "正しい", explanation: "(104/上テキストP.378参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問35-1", question: "不動産の譲渡に関しては、企業会計基準第29号「収益認識に関する会計基準」が常に適用されるが、ヴィークルのスキームによっては譲渡の際にその他の会計基準があわせて適用される場合がある。", answer: "誤り", explanation: "通常の営業活動による売却の場合に企業会計基準第29号が適用される。(104/下テキストP.16～18参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問35-2", question: "会計上の不動産の譲渡の成立の可否の判断にあたっては、関係会社間以外の譲渡に関しても、監査委員会報告第27号「関係会社間の取引に係る土地・設備等の売却益の計上についての監査上の取扱い」が判断基準の一つとして考慮される。", answer: "正しい", explanation: "(104/下テキストP.21参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問35-3", question: "不動産の譲渡の判断にあたっては、不動産の構成要素ごとに分解して移転の可否を判断する財務構成要素アプローチと、資産全体のリスクと経済価値のほとんどすべてが他に移転しているかにより判断を行うリスク・経済価値アプローチのいずれの考え方も認められており、譲渡の実態をより適切に表す方法を選択することができる。", answer: "誤り", explanation: "資産全体を対象として移転しているかどうかの判断を行う。(104/下テキストP.22参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問35-4", question: "不動産の信託受益権の譲渡の判断にあたっては、有価証券と同様に、企業会計基準第10号「金融商品に関する会計基準」が適用される。", answer: "誤り", explanation: "金融商品会計基準は適用されない。(104/下テキストP.24～25参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問36-イ", question: "譲渡人が譲渡した不動産に対して継続的に関与していると認められる場合には、不動産のリスクと経済価値が他の者に移転していない可能性がある。", answer: "正しい", explanation: "(104/下テキストP.22～23参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問36-ロ", question: "譲渡人が譲渡不動産の対価として特別目的会社の発行する証券等を有している場合でも、譲渡人のリスク負担割合が概ね5%の範囲内であれば、リスクと経済価値のほとんどすべてが他の者に移転しているものとして取り扱われる。", answer: "正しい", explanation: "(104/下テキストP.23～24参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問36-ハ", question: "匿名組合契約を用いた流動化スキームにおいて、匿名組合員に対して配当金の支払留保が行われる場合に生じる未払配当金は、リスク負担割合の計算上リスク負担には該当しない。", answer: "正しい", explanation: "(104/下テキストP.30参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問36-ニ", question: "譲渡人がセール・アンド・リースバック取引により、継続的に譲渡不動産を使用している場合には、不動産の譲渡後においても譲渡人が譲渡不動産に継続的に関与していると認められるため、いかなる場合においても不動産の譲渡が売却取引として認められることはない。", answer: "誤り", explanation: "譲渡人（借手）が適正な賃借料を支払うこととされている場合には、売却取引として会計処理できる場合がある。(104/下テキストP.28参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問38-1", question: "「連結財務諸表に関する会計基準」7-2項において、特別目的会社については、一定の要件を満たすときは、当該特別目的会社に出資している企業から独立しているものと認め、当該特別目的会社に出資している企業の子会社に該当しないものと推定することとされている。", answer: "誤り", explanation: "資産流動化ヴィークルについては、子会社に該当しないものと推定することとしている。(104/下テキストP.35～36参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問38-2", question: "「連結財務諸表に関する会計基準」では、株式会社における議決権を想定していることから、意思決定を行う出資者が業務執行の決定も直接行っている投資事業組合は、子会社又は関連会社の範囲に含まれることはない。", answer: "誤り", explanation: "(104/下テキストP.36～38参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問38-3", question: "「一定の特別目的会社に係る開示に関する適用指針」では、特別目的会社を①子会社に該当するものとされている特別目的会社、②「連結財務諸表に関する会計基準」7-2項において子会社に該当しないものと推定された特別目的会社、③「連結財務諸表に関する会計基準」7-2項によらず子会社に該当しない特別目的会社に区分しているが、このうち①及び②を「開示対象特別目的会社」という。", answer: "誤り", explanation: "②を開示対象特別目的会社という。(104/下テキストP.44～45参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問39-1", question: "「リース取引に関する会計基準」によると、ファイナンス・リース取引に該当すると判断されたリース取引であっても、それが所有権移転外ファイナンス・リース取引に該当するものであれば、売買処理を行わず賃貸借処理によって会計処理を行うことができる。", answer: "誤り", explanation: "所有権移転外ファイナンス・リース取引でも重要性に乏しい場合を除き売買処理をしなければならない。賃貸借処理が認められていたのは改正前の基準である。(104/下テキストP.48参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問39-2", question: "「リース取引に関する会計基準の適用指針」において、現在価値基準とは、「解約不能のリース期間中のリース料総額の現在価値が、当該リース物件を借手が現金で購入するものと仮定した場合の合理的な見積金額の概ね90%以上であること」と定義されている。", answer: "正しい", explanation: "(104/下テキストP.49参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問39-3", question: "「リース取引に関する会計基準」によれば、リースの借手は重要性の乏しいものや期間の短いものを除き、全てのリース取引を使用権資産として貸借対照表に計上しなければならないとされている。", answer: "誤り", explanation: "問題文の説明はIFRS第16号「リース」におけるリース取引の取り扱いである。(104/下テキストP.48参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問39-4", question: "「リース取引に関する会計基準の適用指針」に基づき判断した場合、解約不能のリース期間が7年、リース物件の経済的耐用年数が10年のリース取引については、現在価値基準の判定結果が90%を大きく下回ることが明らかな場合を除き、ファイナンス・リース取引に該当すると判断される。", answer: "誤り", explanation: "7年÷10年＝70%となり概ね75%以上という基準を満たさないため、ファイナンス・リース取引には該当しないと判断される。(104/下テキストP.49参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問41-イ", question: "「資産除去債務に関する会計基準」の適用対象となる固定資産は、企業が営業活動に使用している有形固定資産だけでなく、投資不動産なども適用対象となるが、建設仮勘定は適用対象から除外されている。", answer: "誤り", explanation: "建設仮勘定についても資産除去債務が存在している場合には、資産除去債務会計基準の適用対象となる。(104/下テキストP.92～93参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問41-ロ", question: "資産除去債務の認識対象には、有形固定資産を除去する際にその有形固定資産に使用されている有害物質等を法律等の要求による特別な方法で除去する義務も含まれるため、将来こうした義務に基づく除去費用が発生すると見込まれる場合には、その金額を合理的に見積り資産除去債務として計上しなければならない。", answer: "正しい", explanation: "(104/下テキストP.92～93参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問41-ハ", question: "資産除去債務として認識しなければならない債務がある場合には、これに対応する除去費用は原則として債務の計上時に一時の費用として会計処理する。", answer: "誤り", explanation: "一時の費用としてではなく、減価償却を通じて有形固定資産の残存耐用年数にわたり各期に費用配分する。(104/下テキストP.93参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問41-ニ", question: "資産除去債務の発生時に、当該債務の金額を合理的に見積ることができない場合には、これを計上せず、当該債務額を合理的に見積ることができるようになった時点で負債として計上する。負債計上していない場合には注記としての開示が必要となる。", answer: "正しい", explanation: "(104/下テキストP.93参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問42-1", question: "証券化ヴィークルが保有する販売用不動産において、期末における正味売却価額が取得原価よりも下落している場合には、当該正味売却価額をもって貸借対照表価額とし、取得原価と当該正味売却価額との差額は、見込販売時期までの期間において均等に償却を行う。", answer: "誤り", explanation: "取得原価と正味売却価額との差額は、当期の損失として処理する。(104/下テキストP.95参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問42-2", question: "取得価額を土地と建物に区分する場合には、固定資産税評価明細に記載されている各資産の評価価額の比率により配分しなければならず、それ以外の方法は利益操作防止の観点から禁止されている。", answer: "誤り", explanation: "合理的と認められる方法であればその方法によって配分することは可能であり、禁止した基準等はない。(104/下テキストP.81～82参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問42-3", question: "固定資産の減価償却費の算定にあたり、法人税法等で定められている耐用年数は課税の公平性から一律に定められているものであり、会計上はそれぞれの企業の使用状況等を勘案した上で減価償却の算定を行う必要があることから、会計上の減価償却費の算定においては法人税法等で定める耐用年数を使用することができない。", answer: "誤り", explanation: "よほど不合理と認められる事情がない場合には法人税法等で定める耐用年数を使用した場合でも妥当なものとして取り扱われている。(104/下テキストP.83～84参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問42-4", question: "企業会計基準第20号「賃貸等不動産の時価等の開示に関する会計基準」の適用対象となる賃貸等不動産に関しては、重要性が乏しい場合を除き、賃貸等不動産の概要や当期末における時価等を注記しなければならない。", answer: "正しい", explanation: "(104/下テキストP.97～98参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問43-イ", question: "ヴィークルそのものに法人税が課されるものとして、株式会社、一般社団法人等がこれに該当し、SPC等として用いる場合には何らかの工夫が必要となる。", answer: "正しい", explanation: "(104/下テキストP.183参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問43-ロ", question: "90%配当要件を満たすなど、条件によっては配当を損金算入することができるいわゆるペイ・スルー課税ヴィークルとしては、特定目的会社、投資法人、合同会社等があげられる。", answer: "誤り", explanation: "合同会社にこのような定めは存在しない。(104/下テキストP.183参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問43-ハ", question: "ヴィークル自体が原則として法人税課税なし、かつ直ちに組合員に課税されるものとして、特定受益証券発行信託、匿名組合等があげられる。", answer: "誤り", explanation: "特定受益証券発行信託は集団投資信託に分類され、信託収益を受益者が現実に受領したときに受益者に課税する。(104/下テキストP.183参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問43-ニ", question: "ヴィークル自体が原則として法人税課税なし、かつ直ちには組合員又は、受益者等構成員に課税されず、分配時に初めて課税されるものとして、合同運用信託、証券投資信託等がこれに該当する。", answer: "誤り", explanation: "(104/下テキストP.183参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問44-1", question: "特定目的会社の資本金が1億円を超えている場合であっても、法人事業税に係る外形標準課税の適用対象とはならない。", answer: "正しい", explanation: "特定目的会社は外形標準課税の対象外とされている。(104/下テキストP.250～252参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問44-2", question: "特定目的会社が受け取った配当等については、受取配当等の益金不算入の適用はないが、投資法人が受け取った配当等については、受取配当等の益金不算入の適用がある。", answer: "誤り", explanation: "特定目的会社が受け取った配当等についても受取配当等の益金不算入の適用はある。(104/下テキストP.250～251参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問44-3", question: "投資法人の資本金が1億円以下であった場合、90%超配当要件等の条件を満たすことを条件として、資本金1億円以下の中小法人に認められている法人税の軽減税率の適用を受けることができる。", answer: "誤り", explanation: "90%超配当要件が導管性要件の1つであるが、本定めに軽減税率の適用はない。(104/下テキストP.251、P.259参照)" },
  { subject: "104. 不動産証券化の法務／会計・税務", no: "午後問44-4", question: "特定目的会社及び投資法人のいずれにおいても、欠損金の控除限度額は、導管性要件を満たす場合であっても、繰越控除前の所得金額の50%が限度となっている。", answer: "誤り", explanation: "導管性要件を満たす特定目的会社等は、繰越控除前の所得金額の100%相当額を控除できる。(104/下テキストP.250～251参照)" },
